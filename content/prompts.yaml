  body: "Создай конфиг GitHub Actions для автоматического деплоя приложения на удалённый сервер через SSH по тегу релиза."
  comment: "Для self-hosted runner паттерна."

- slug: docs-readme
  category: docs/readme
  title: "README с Quick Start и архитектурой"
  body: "Напиши исчерпывающий README.md для этого репозитория: разделы Quick Start, Architecture, Contributing."
  comment: "Перед публикацией репозитория или передачей проекта."

- slug: docs-openapi-spec
  category: docs/api-docs
  title: "Генерация OpenAPI 3.0 спецификации"
  body: "Сгенерируй спецификацию OpenAPI 3.0 в формате YAML на основе этого контроллера бэкенда."
  comment: "Синхронизация кода и контракта API."

- slug: docs-mermaid-architecture
  category: docs/readme
  title: "Диаграмма архитектуры в Mermaid"
  body: "Опиши архитектуру этого модуля в виде диаграммы Mermaid.js (sequence diagram)."
