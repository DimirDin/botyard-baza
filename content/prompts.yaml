  title: "Контент-план из 10 технических тем"
  body: "Создай контент-план из 10 глубоких технических тем для привлечения DevOps/QA аудитории в блог."
  comment: "Планирование на месяц вперёд."

- slug: dev-tma-webapp-hook
  category: code/generate
  title: "React-хук инициализации Telegram WebApp"
  body: "Напиши React-хук для инициализации Telegram WebApp SDK и безопасной валидации initData на бэкенде (HMAC-SHA256)."
  comment: "Обязательный первый шаг для любого нового Mini App."

- slug: dev-tma-fsm-router
  category: code/generate
  title: "FSM-роутер для Telegram-бота"
  body: "Напиши роутер для Telegram-бота на aiogram 3, поддерживающий вложенные State Machines (FSM)."
  comment: "Для многошаговых диалогов бота."

- slug: dev-tma-stars-invoice
  category: code/generate
  title: "Инвойс на Telegram Stars"
  body: "Создай шаблон инвойса для Telegram Stars: генерация платёжной ссылки и обработка pre_checkout_query."
