- slug: sql-window-functions
  category: code/generate
  title: "Оконные функции для когортного анализа"
  body: "Создай сложный оконный запрос (window functions) для расчёта скользящего среднего и когортного анализа."
  comment: "Аналитика поверх продуктовых метрик."

- slug: game-fsm-platformer
  category: code/generate
  title: "FSM движения персонажа 2D-платформера"
  body: "Напиши конечный автомат (FSM) движения персонажа 2D-платформера на GDScript для Godot."
  comment: "Базовая механика движения/прыжка/приземления."

- slug: game-camera-lerp
  category: code/generate
  title: "Сглаживание движения камеры"
