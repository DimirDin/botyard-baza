  comment: "Один и тот же смысл, разная упаковка — для разных каналов/сегментов"

- slug: content-rewrite-shorten-no-loss
  category: content/rewrite
  title: "Сократить текст без потери смысла"
  body: "Сократи этот текст на {процент}% по объёму, сохранив все ключевые факты и выводы. Убирай воду и повторы, не убирай конкретные цифры/примеры.\n\n{текст}"
  comment: "Для постов, которые вышли длиннее лимита площадки"
