  comment: "Для таблиц логов/событий, разросшихся сверх разумного."

- slug: code-migrate-js-to-ts
  category: code/migrate
  title: "Миграция JS-файла в TypeScript"
  body: "Перепиши этот JavaScript-файл на TypeScript: добавь типы для всех параметров функций, возвращаемых значений и интерфейсов данных. Не меняй логику. Если тип вывести нельзя однозначно — используй unknown и оставь комментарий почему.\n\n{код}"
  comment: "Когда переводишь существующий проект на TS постепенно, файл за файлом"

- slug: code-migrate-framework-version
  category: code/migrate
  title: "Миграция между мажорными версиями фреймворка"
  body: "Вот код на {фреймворк} версии {старая_версия}. Перепиши под версию {новая_версия}: обнови устаревшие API на актуальные, отметь каждое изменение комментарием // migrated: было X, стало Y. Если для какого-то места нет однозначной замены — не переписывай, отметь TODO с объяснением.\n\n{код}"
  comment: "Для точечной миграции конкретного файла/модуля, не всего проекта разом"

- slug: review-style-consistency
  category: review/style
  title: "Проверка на единообразие стиля"
  body: "Проверь этот код на единообразие: именование переменных/функций (camelCase vs snake_case вперемешку), порядок импортов, длину строк, отступы. Перечисли конкретные несоответствия с номерами строк — не переписывай код целиком.\n\n{код}"
  comment: "Быстрая проверка перед PR, без правки автоматом"

- slug: review-style-guide-compliance
  category: review/style
  title: "Соответствие внешнему style guide"
  body: "Вот style guide проекта:\n{style_guide}\n\nПроверь этот код на соответствие каждому пункту guide. Для нарушений — укажи строку и конкретный пункт guide, который нарушен.\n\n{код}"
  comment: "Когда есть формализованный гайд (например Google Style Guide) и нужна построчная сверка"

- slug: docs-comments-docstrings
  category: docs/comments
  title: "Докстринги для существующих функций"
  body: "Добавь докстринги в формате {формат, например Google-style} ко всем публичным функциям и классам в этом файле: назначение, параметры, возвращаемое значение, исключения. Не трогай реализацию. Пропусти функции, у которых докстринг уже есть.\n\n{код}"
  comment: "Для legacy-кода без документации, добавляется без риска что-то сломать"

- slug: docs-comments-explain-complex-block
  category: docs/comments
  title: "Комментарии к неочевидному алгоритму"
  body: "В этом блоке кода неочевидная логика. Добавь построчные комментарии, объясняющие ПОЧЕМУ сделано именно так (не ЧТО делает строка — это видно по коду), особенно для неочевидных условий и граничных случаев.\n\n{код}"
  comment: "Для алгоритмически плотного кода, где через полгода сам не вспомнишь логику"

- slug: docs-changelog-from-commits
  category: docs/changelog
  title: "Changelog из списка коммитов"
  body: "Вот список коммитов за период (git log --oneline):\n{коммиты}\n\nСобери из них CHANGELOG.md по формату Keep a Changelog: раздели на Added/Changed/Fixed/Removed, убери чисто технические коммиты (typo fixes, merge commits) если они не влияют на пользователя."
  comment: "Перед релизом, когда коммиты уже накопились, а changelog писать руками лень"

- slug: docs-changelog-user-facing
  category: docs/changelog
  title: "Changelog для пользователей (не для разработчиков)"
  body: "Вот технический changelog:\n{технический_changelog}\n\nПерепиши для конечных пользователей продукта: убери упоминания внутренних рефакторингов и технического долга, оставь только то, что реально видно/ощутимо пользователю, простым языком без жаргона."
  comment: "Когда внутренний changelog есть, а нужен ещё и публичный, для рассылки/сайта"

- slug: docs-onboarding-repo-readme
  category: docs/onboarding
  title: "Onboarding-README по структуре репозитория"
  body: "Вот структура репозитория (дерево папок) и package.json/pyproject.toml:\n{структура}\n{манифест}\n\nНапиши README для нового разработчика: что за проект, как поднять локально (команды), структура основных папок и что в них лежит, куда смотреть в первую очередь чтобы понять логику."
  comment: "Для нового человека в команде, экономит день на распросы в чатике"

- slug: docs-onboarding-first-week-plan
  category: docs/onboarding
  title: "План первой недели для нового разработчика"
  body: "Вот стек проекта и основные модули: {описание}. Составь план первой недели для нового разработчика: что изучить в каком порядке, какие 2-3 маленькие задачи дать для первого PR, чтобы познакомиться с кодовой базой без риска что-то сломать."
  comment: "Структурированный onboarding-план, не просто README"

- slug: ops-bash-idempotent-script
  category: ops/bash
  title: "Идемпотентный bash-скрипт с обработкой ошибок"
  body: "Напиши bash-скрипт для: {задача}. Требования: идемпотентность (повторный запуск не ломает состояние), set -euo pipefail, обработка ошибок с понятным сообщением и ненулевым exit code, проверка наличия необходимых утилит в начале."
  comment: "Для скриптов деплоя/бэкапа, которые будут запускать не один раз"

- slug: ops-bash-log-parsing
  category: ops/bash
  title: "Парсинг и фильтрация логов bash-скриптом"
  body: "Напиши bash-скрипт, который читает лог-файл {путь/формат} и: фильтрует строки по {критерий}, считает частоту {что считать}, выводит топ-N результатов. Используй стандартные утилиты (grep/awk/sort), без лишних зависимостей."
  comment: "Быстрый анализ логов без поднятия ELK/Grafana ради разовой задачи"

- slug: ops-k8s-manifest-from-description
  category: ops/k8s
  title: "Kubernetes-манифест из описания сервиса"
  body: "Сгенерируй Kubernetes-манифесты (Deployment + Service + ConfigMap) для сервиса: {название}, образ {образ}, порт {порт}, переменные окружения {env}, ресурсы {лимиты cpu/memory}. Добавь readinessProbe и livenessProbe на {путь healthcheck}."
