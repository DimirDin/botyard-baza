# prompts.yaml — стартовая библиотека промптов
# Включены только конкретно сформулированные промпты из присланного материала.
# Шаблонные интервалы вида "PR-007 — PR-030 генерирует..." из исходника — не контент,
# а описание объёма будущей работы; они НЕ включены как есть, дописываются позже вручную.

- slug: code-rev-race-conditions
  category: review/logic
  title: "Проверка на race conditions и deadlock"
  body: "Проверь этот {язык} код на наличие race conditions и deadlock'ов при высокой конкурентной нагрузке."
  comment: "Для асинхронного или многопоточного кода перед продакшен-деплоем."

- slug: code-rev-memory-leaks
  category: review/performance
  title: "Поиск утечек памяти в асинхронном пайплайне"
  body: "Найди скрытые утечки памяти (memory leaks) в этом асинхронном пайплайне: {код}."
  comment: "Долгоживущие процессы, воркеры, боты с постоянной работой."

- slug: code-rev-owasp-audit
  category: review/security
  title: "Аудит эндпоинта на OWASP Top 10"
  body: "Проведи аудит безопасности этого эндпоинта на уязвимости OWASP Top 10 (SQL-injection, XSS, CSRF)."
  comment: "Перед выкаткой публичного API."

- slug: code-rev-big-o
  category: review/performance
  title: "Оценка сложности алгоритма"
  body: "Оцени этот алгоритм по нотации Big O. Предложи оптимизацию для снижения сложности по времени."
  comment: "Для узких мест, найденных в профилировании."

- slug: code-rev-pr-review
  category: review/pr-review
  title: "Жёсткое ревью пулл-реквеста"
  body: "Сделай жёсткое ревью этого пулл-реквеста. Пиши как суровый лид, укажи на code smells без реверансов."
  comment: "Замена первого прохода human-ревьюера."

- slug: code-rev-bola-idor
  category: review/security
  title: "Проверка middleware на BOLA/IDOR"
  body: "Проверь этот middleware авторизации на логические ошибки обхода доступов (BOLA/IDOR)."
  comment: "Для эндпоинтов с проверкой владения ресурсом."

- slug: refactor-strategy-pattern
  category: code/refactor
  title: "Замена if/else на паттерн Стратегия"
  body: "Перепиши этот монолитный кусок кода на паттерн «Стратегия», чтобы избавиться от бесконечных if/else."
  comment: "Когда ветвление логики разрослось за пределы читаемости."

- slug: refactor-sync-to-async
  category: code/refactor
  title: "Перевод синхронного кода на async/await"
  body: "Переведи этот синхронный код {язык} на асинхронные рельсы с использованием async/await."
  comment: "Миграция под нагрузку, которую синхронный код не тянет."

- slug: refactor-loop-optimization
  category: code/refactor
  title: "Оптимизация цикла: аллокации и вложенность"
  body: "Оптимизируй этот цикл: уменьши количество аллокаций памяти и вложенных итераций."
  comment: "Точечная оптимизация горячего пути после профилирования."

- slug: refactor-god-object
  category: code/refactor
  title: "Декомпозиция God Object"
  body: "Декомпозируй этот 'божественный объект' на несколько сфокусированных классов по принципу единственной ответственности."
  comment: "Когда один файл делает слишком много несвязанных вещей."

- slug: devops-multistage-dockerfile
  category: ops/docker
  title: "Multi-stage Dockerfile"
  body: "Напиши многоэтапный (multi-stage) Dockerfile для {стек}, минимизирующий размер финального образа."
  comment: "Базовый шаг перед любым продакшен-деплоем в контейнерах."

- slug: devops-compose-production
  category: ops/docker
  title: "Production-ready docker-compose"
  body: "Создай production-ready docker-compose.yml со связкой приложения, Postgres, Redis и Caddy как прокси."
  comment: "Отправная точка для нового сервиса на VPS-платформе."

- slug: devops-ansible-hardening
  category: ops/terraform
  title: "Ansible-плейбук для hardening сервера"
  body: "Напиши плейбук Ansible для базовой настройки голого Ubuntu-сервера: создание непривилегированного пользователя, SSH по ключам, UFW firewall, fail2ban."
  comment: "Перед вводом нового VPS в прод."

- slug: devops-github-actions-deploy
