  comment: "position = position.lerp(target_position, camera_speed * delta)."

- slug: cs-debug-docker-postgres
  category: code/debug
  title: "Кейс: дебаг упавшего Docker-контейнера БД"
  body: "Прочитай логи контейнера базы данных через Docker MCP, найди причину падения (например ошибку монтирования volumes), поправь docker-compose.yml и перезапусти стек."
  comment: "Сценарий связки Claude Code + Docker MCP."

- slug: cs-tma-localization-batch
  category: content/translate
  title: "Кейс: локализация Mini App через Batch API"
  body: "Собери JSONL-пакет с i18n-строками текущей RU-версии приложения для перевода на 5 языков и отправь через Batch API для получения скидки 50%."
  comment: "Экономичный способ массового перевода строк интерфейса."

- slug: cs-postgres-partitioning
  category: code/architect
  title: "Кейс: партиционирование таблицы без downtime"
  body: "Напиши SQL-миграцию, которая партиционирует таблицу на миллионы строк по месяцам, используя CONCURRENTLY-индексы, без блокировки записи."
  comment: "Для таблиц логов/событий, разросшихся сверх разумного."

- slug: code-migrate-js-to-ts
  category: code/migrate
  title: "Миграция JS-файла в TypeScript"
  body: "Перепиши этот JavaScript-файл на TypeScript: добавь типы для всех параметров функций, возвращаемых значений и интерфейсов данных. Не меняй логику. Если тип вывести нельзя однозначно — используй unknown и оставь комментарий почему.\n\n{код}"
  comment: "Когда переводишь существующий проект на TS постепенно, файл за файлом"

- slug: code-migrate-framework-version
  category: code/migrate
  title: "Миграция между мажорными версиями фреймворка"
  body: "Вот код на {фреймворк} версии {старая_версия}. Перепиши под версию {новая_версия}: обнови устаревшие API на актуальные, отметь каждое изменение комментарием // migrated: было X, стало Y. Если для какого-то места нет однозначной замены — не переписывай, отметь TODO с объяснением.\n\n{код}"
  comment: "Для точечной миграции конкретного файла/модуля, не всего проекта разом"

- slug: review-style-consistency
  category: review/style
  title: "Проверка на единообразие стиля"
  body: "Проверь этот код на единообразие: именование переменных/функций (camelCase vs snake_case вперемешку), порядок импортов, длину строк, отступы. Перечисли конкретные несоответствия с номерами строк — не переписывай код целиком.\n\n{код}"
  comment: "Быстрая проверка перед PR, без правки автоматом"

- slug: review-style-guide-compliance
  category: review/style
  title: "Соответствие внешнему style guide"
  body: "Вот style guide проекта:\n{style_guide}\n\nПроверь этот код на соответствие каждому пункту guide. Для нарушений — укажи строку и конкретный пункт guide, который нарушен.\n\n{код}"
  comment: "Когда есть формализованный гайд (например Google Style Guide) и нужна построчная сверка"

- slug: docs-comments-docstrings
  category: docs/comments
  title: "Докстринги для существующих функций"
  body: "Добавь докстринги в формате {формат, например Google-style} ко всем публичным функциям и классам в этом файле: назначение, параметры, возвращаемое значение, исключения. Не трогай реализацию. Пропусти функции, у которых докстринг уже есть.\n\n{код}"
  comment: "Для legacy-кода без документации, добавляется без риска что-то сломать"

- slug: docs-comments-explain-complex-block
  category: docs/comments
  title: "Комментарии к неочевидному алгоритму"
  body: "В этом блоке кода неочевидная логика. Добавь построчные комментарии, объясняющие ПОЧЕМУ сделано именно так (не ЧТО делает строка — это видно по коду), особенно для неочевидных условий и граничных случаев.\n\n{код}"
  comment: "Для алгоритмически плотного кода, где через полгода сам не вспомнишь логику"

- slug: docs-changelog-from-commits
  category: docs/changelog
  title: "Changelog из списка коммитов"
  body: "Вот список коммитов за период (git log --oneline):\n{коммиты}\n\nСобери из них CHANGELOG.md по формату Keep a Changelog: раздели на Added/Changed/Fixed/Removed, убери чисто технические коммиты (typo fixes, merge commits) если они не влияют на пользователя."
  comment: "Перед релизом, когда коммиты уже накопились, а changelog писать руками лень"

- slug: docs-changelog-user-facing
  category: docs/changelog
  title: "Changelog для пользователей (не для разработчиков)"
  body: "Вот технический changelog:\n{технический_changelog}\n\nПерепиши для конечных пользователей продукта: убери упоминания внутренних рефакторингов и технического долга, оставь только то, что реально видно/ощутимо пользователю, простым языком без жаргона."
  comment: "Когда внутренний changelog есть, а нужен ещё и публичный, для рассылки/сайта"

- slug: docs-onboarding-repo-readme
  category: docs/onboarding
  title: "Onboarding-README по структуре репозитория"
  body: "Вот структура репозитория (дерево папок) и package.json/pyproject.toml:\n{структура}\n{манифест}\n\nНапиши README для нового разработчика: что за проект, как поднять локально (команды), структура основных папок и что в них лежит, куда смотреть в первую очередь чтобы понять логику."
  comment: "Для нового человека в команде, экономит день на распросы в чатике"

- slug: docs-onboarding-first-week-plan
  category: docs/onboarding
  title: "План первой недели для нового разработчика"
  body: "Вот стек проекта и основные модули: {описание}. Составь план первой недели для нового разработчика: что изучить в каком порядке, какие 2-3 маленькие задачи дать для первого PR, чтобы познакомиться с кодовой базой без риска что-то сломать."
  comment: "Структурированный onboarding-план, не просто README"

- slug: ops-bash-idempotent-script
  category: ops/bash
  title: "Идемпотентный bash-скрипт с обработкой ошибок"
  body: "Напиши bash-скрипт для: {задача}. Требования: идемпотентность (повторный запуск не ломает состояние), set -euo pipefail, обработка ошибок с понятным сообщением и ненулевым exit code, проверка наличия необходимых утилит в начале."
  comment: "Для скриптов деплоя/бэкапа, которые будут запускать не один раз"

- slug: ops-bash-log-parsing
  category: ops/bash
  title: "Парсинг и фильтрация логов bash-скриптом"
  body: "Напиши bash-скрипт, который читает лог-файл {путь/формат} и: фильтрует строки по {критерий}, считает частоту {что считать}, выводит топ-N результатов. Используй стандартные утилиты (grep/awk/sort), без лишних зависимостей."
  comment: "Быстрый анализ логов без поднятия ELK/Grafana ради разовой задачи"

- slug: ops-k8s-manifest-from-description
  category: ops/k8s
  title: "Kubernetes-манифест из описания сервиса"
  body: "Сгенерируй Kubernetes-манифесты (Deployment + Service + ConfigMap) для сервиса: {название}, образ {образ}, порт {порт}, переменные окружения {env}, ресурсы {лимиты cpu/memory}. Добавь readinessProbe и livenessProbe на {путь healthcheck}."
  comment: "Быстрый старт манифеста, дальше руками подгоняешь под свой кластер"

- slug: ops-k8s-debug-crashloop
  category: ops/k8s
  title: "Дебаг CrashLoopBackOff по логам и describe"
  body: "Под в состоянии CrashLoopBackOff. Вот вывод kubectl describe pod и kubectl logs --previous:\n{describe}\n{logs}\n\nОпредели вероятную причину падения и предложи конкретную проверку/фикс, без общих советов вида 'проверьте конфигурацию'."
  comment: "Когда под падает, а причина в логах не очевидна с первого взгляда"

- slug: content-rewrite-audience-shift
  category: content/rewrite
  title: "Переписать текст под другую аудиторию"
  body: "Вот текст для аудитории {исходная_аудитория}:\n{текст}\n\nПерепиши под аудиторию {новая_аудитория}: смени уровень технических терминов и тон, сохрани фактическое содержание и структуру абзацев без искажений."
  comment: "Один и тот же смысл, разная упаковка — для разных каналов/сегментов"

- slug: content-rewrite-shorten-no-loss
  category: content/rewrite
  title: "Сократить текст без потери смысла"
  body: "Сократи этот текст на {процент}% по объёму, сохранив все ключевые факты и выводы. Убирай воду и повторы, не убирай конкретные цифры/примеры.\n\n{текст}"
  comment: "Для постов, которые вышли длиннее лимита площадки"

- slug: steer-course-correct
  category: steer/general
  title: "Скорректировать курс на середине задачи"
  body: "Стоп. Прежде чем продолжать — вот что нужно поменять: {что именно пошло не так}. Не переписывай всё с нуля: сохрани {что оставить как есть}, поправь только {конкретную часть}. После правки кратко резюмируй, что изменилось."
  comment: "Когда Claude уехал не в ту сторону, но часть работы уже годная — не откатывать всё, а поправить прицельно"

- slug: steer-narrow-scope
  category: steer/general
  title: "Сузить объём задачи"
  body: "Слишком широко захватываешь. Ограничь работу только файлами/модулями: {список}. Не трогай {что явно исключить}, даже если кажется что это тоже нужно поправить — вынесем отдельной задачей."
  comment: "Когда агент начинает рефакторить смежное, хотя просили одно конкретное место"

- slug: steer-correction-to-rule
  category: steer/general
  title: "Превратить разовую поправку в постоянное правило"
  body: "Ты только что сделал {ошибка/нежелательное поведение}. Сформулируй это как короткое правило для CLAUDE.md проекта, чтобы больше не наступать на те же грабли — 1-2 предложения, конкретно, без общих слов."
  comment: "Копит институциональную память проекта из живых поправок в разговоре, а не пишется заранее"

- slug: steer-checkpoint-before-continuing
  category: steer/general
  title: "Остановиться и показать промежуточный результат"
  body: "Прежде чем идти дальше, покажи что уже сделано: список изменённых файлов, что именно поменялось, и что осталось по плану. Не продолжай, пока я не подтвержу."
  comment: "Для длинных многошаговых задач — контрольная точка перед необратимыми действиями"

- slug: steer-explain-then-redirect
  category: steer/general
  title: "Спросить логику решения перед тем как менять его"
  body: "Объясни, почему ты выбрал именно такой подход к {часть задачи}, прежде чем я скажу, что менять. Возможно, у тебя была причина, которую я не учёл."
  comment: "Иногда 'неправильное' решение агента на деле объяснимо — стоит сначала спросить, а не сразу переделывать"

- slug: review-pr-risk-explain
  category: review/style
  title: "Объяснить риски pull request, а не только стиль"
  body: "Просмотри этот PR: {diff/ссылка}. Не просто перечисляй стилистические придирки — объясни, какие изменения реально рискованные (могут сломать прод, затронуть данные пользователей, повлиять на производительность) и почему именно."
  comment: "Ревью с фокусом на риск, а не на форматирование — то, что реально экономит время на проде"

- slug: review-infra-change-before-apply
  category: review/style
  title: "Проверить инфраструктурные изменения перед применением"
  body: "Вот diff инфраструктурной конфигурации (Terraform/K8s/CI): {diff}. Прежде чем применять — объясни, что именно изменится в реальной системе, какие ресурсы будут пересозданы (не просто обновлены), и есть ли необратимые шаги."
  comment: "Для проверки перед terraform apply / kubectl apply на прод — не просто линтер, а прогноз последствий"

- slug: docs-changelog-from-git-history
  category: docs/changelog
  title: "Примечания к релизу из истории git за период"
  body: "Собери примечания к выпуску (release notes) из истории коммитов за {период/диапазон тегов}: {git log}. Сгруппируй по значимости для пользователя, а не по хронологии, и опусти чисто технические правки без внешнего эффекта."
  comment: "Отличается от простого changelog акцентом на 'что это значит для пользователя', а не список коммитов"

- slug: ops-ci-workflow-from-description
  category: ops/bash
  title: "Написать CI workflow по описанию процесса"
  body: "Опиши, что должен делать пайплайн: {шаги — тесты, сборка, деплой, условия запуска}. Напиши workflow для {GitHub Actions/GitLab CI/другое}, включая кэширование зависимостей и понятные имена джобов."
  comment: "Из словесного описания процесса — рабочий конфиг, а не наоборот (не парсинг существующего)"

- slug: ops-diagnose-build-failure
  category: ops/bash
  title: "Найти и объяснить причину падения сборки"
  body: "Сборка падает с такой ошибкой: {лог ошибки}. Не предлагай сразу фикс — сначала объясни вероятную причину и на чём основан вывод, затем предложи проверку, которая подтвердит или опровергнет гипотезу."
  comment: "Гипотеза-сначала-фикс-потом — экономит время когда первая же 'очевидная' причина оказывается не той"

# --- think/* (added: универсальные think-промпты, 8 групп, 227 шт) ---
- slug: think-plan-with-failure-modes
  category: think/planning
  title: План с заранее вшитыми провалами
  body: Составь план для [ЦЕЛЬ] на [СРОК]. Для каждого ключевого этапа заранее опиши, как именно он может сорваться, и что заложить в план, чтобы это не было катастрофой. Не убирай риски из текста — покажи их рядом с планом.
  comment: Для запусков, проектов с внешними зависимостями, личных больших целей.
- slug: think-priorities-under-constraint
  category: think/planning
  title: Приоритеты при нехватке ресурса
  body: 'У меня есть [РЕСУРС: время/бюджет/люди] на [СПИСОК ЗАДАЧ]. Реального ресурса хватит не на всё. Помоги расставить приоритеты не по важности каждой задачи отдельно, а по тому, что действительно сдвинет [ЦЕЛЬ].'
  comment: Для перегруженных руководителей, стартаперов, планирования квартала.
- slug: think-plan-critical-path
  category: think/planning
  title: Найти реальный критический путь плана
  body: 'Вот план из нескольких задач: [ЗАДАЧИ]. Найди, какая цепочка задач реально определяет срок всего проекта (критический путь), а какие задачи можно двигать, не влияя на итоговый дедлайн.'
  comment: Без критического пути легко тратить силы на то, что не влияет на реальный срок.
- slug: think-plan-single-point-of-failure
  category: think/planning
  title: Найти единственную точку отказа плана
  body: 'Разбери план [ПЛАН] и найди: есть ли в нём шаг или ресурс, без которого весь план рушится, и нет запасного варианта. Предложи, как подстраховать именно это узкое место.'
  comment: Планы обычно рушатся не из-за общего невезения, а из-за одной непродуманной зависимости.
- slug: think-plan-buffer-realistic
  category: think/planning
  title: Реалистичный запас времени, а не оптимистичный
  body: 'Вот план со сроками: [ПЛАН СО СРОКАМИ]. Проверь, заложен ли реалистичный запас на задержки, основанный на том, как обычно идут похожие проекты, а не на оптимистичном сценарии «если всё пойдёт по плану».'
  comment: Оптимистичные сроки без запаса — частая причина хронических просрочек в проектах.
- slug: think-plan-first-milestone-fast
  category: think/planning
  title: Первая веха как можно раньше, а не в конце
  body: 'Вот план для [ЦЕЛЬ]: [ПЛАН]. Перестрой его так, чтобы первый ощутимый результат появился как можно раньше, а не только в самом конце — что можно вынести вперёд, не теряя качества финального результата.'
  comment: Ранний видимый результат даёт обратную связь и мотивацию, вместо долгого ожидания финала.
- slug: think-plan-what-to-not-do
  category: think/planning
  title: Явно решить, чего в этом плане не будет
  body: Для плана [ЦЕЛЬ/ПРОЕКТ] помоги составить не только список задач, но и явный список того, что мы сознательно НЕ будем делать в рамках этого плана — чтобы не расползаться по мере выполнения.
  comment: Явный список 'не делаем' защищает план от постепенного разрастания объёма во время работы.
- slug: think-plan-dependencies-external
  category: think/planning
  title: Внешние зависимости, которые я не контролирую
  body: Вот план [ПЛАН]. Найди все места, где успех зависит от людей или факторов вне моего контроля (другой отдел, подрядчик, регулятор, погода). Для каждого — что делать, если эта зависимость подведёт или задержится.
  comment: Внешние зависимости — самый частый источник срыва сроков, который недооценивают при планировании.
- slug: think-plan-decide-vs-defer
  category: think/planning
  title: Что решить сейчас, а что честно отложить
  body: В плане [ПЛАН] есть решения, которые нужно принять уже сейчас, и есть те, что можно и стоит отложить до появления большей информации. Раздели их — не откладывай то, что реально нужно решить сейчас, и наоборот.
  comment: Люди либо решают всё сразу, теряя гибкость, либо откладывают важное, что нужно решить немедленно.
- slug: think-plan-resource-double-check
  category: think/planning
  title: Проверка плана на реальную доступность ресурсов
  body: 'Вот план [ПЛАН], который предполагает [РЕСУРСЫ: люди/бюджет/инструменты]. Проверь честно: эти ресурсы реально доступны в нужный момент времени, или план строится на том, что ''как-нибудь найдём'', когда понадобится?'
  comment: Планы часто рушатся не из-за логики, а из-за того, что ресурс, на который рассчитывали, не появился вовремя.
- slug: think-plan-communicate-to-team
  category: think/planning
  title: План, понятный команде, а не только автору
  body: Вот план [ПЛАН], который я составил для себя. Перепиши его так, чтобы команда/партнёры, не участвовавшие в его создании, поняли не только что делать, но и зачем, без моих пояснений в переписке.
  comment: Планы часто понятны автору, но требуют расшифровки для тех, кто их будет исполнять.
- slug: think-plan-checkpoint-not-just-deadline
  category: think/planning
  title: Промежуточные точки проверки, а не только финальный срок
  body: 'Вот план с финальным дедлайном: [ПЛАН]. Добавь промежуточные точки проверки прогресса внутри срока — что конкретно должно быть готово к каждой, чтобы отставание заметили заранее, а не в последний момент.'
  comment: Единственный финальный дедлайн без промежуточных точек скрывает отставание до самого конца.
- slug: think-plan-worst-week-scenario
  category: think/planning
  title: План на случай самой плохой недели
  body: 'Вот план [ПЛАН]. Представь, что в середине срока случается плохая неделя: [РЕАЛИСТИЧНОЕ СОБЫТИЕ, болезнь/аврал/срыв поставки]. Что в плане ломается от этого, и как заранее сделать его устойчивее к такому.'
  comment: Планы редко тестируют на реалистичный, а не катастрофический сбой посередине пути.
- slug: think-plan-minimum-viable-version
  category: think/planning
  title: Минимально жизнеспособная версия плана
  body: 'Вот полный план для [ЦЕЛЬ]: [ПЛАН]. Если бы у меня было вдвое меньше времени или ресурса, что осталось бы в минимальной версии, которая всё равно достигает сути цели, а что можно смело выкинуть?'
  comment: Помогает отделить действительно необходимое от того, что добавилось просто потому, что 'было время'.
- slug: think-plan-explain-tradeoff-of-speed
  category: think/planning
  title: Что теряется, если ускорить план
  body: 'Вот план на [СРОК]: [ПЛАН]. Если нужно сделать его в два раза быстрее — что конкретно придётся принести в жертву (качество, объём, риск), а не просто ''работать усерднее''?'
  comment: Ускорение плана всегда что-то стоит — этот промпт делает цену явной, а не скрытой.
- slug: think-plan-align-with-actual-goal
  category: think/planning
  title: Проверка, что план ведёт к реальной цели
  body: 'Вот план [ПЛАН] и цель, ради которой он составлен: [ЦЕЛЬ]. Проверь пункт за пунктом: каждая задача реально приближает к этой цели, или часть задач попала в план по инерции, не будучи по сути нужной?'
  comment: Планы со временем обрастают задачами, которые перестали служить исходной цели.
- slug: think-plan-who-decides-mid-course
  category: think/planning
  title: Кто решает, если план придётся менять на ходу
  body: 'Вот план для команды [ПЛАН]. Заранее определи: если по ходу что-то пойдёт не так и план нужно скорректировать, кто имеет право это решить на месте, а что требует остановки и согласования со мной.'
  comment: Без явного правила команда либо ждёт согласования по мелочам, либо меняет план без ведома руководителя.
- slug: think-plan-realistic-effort-estimate
  category: think/planning
  title: Честная оценка трудозатрат, а не оптимистичная
  body: Задача [ЗАДАЧА] оценена в [ОЦЕНКА ВРЕМЕНИ]. Проверь эту оценку, вспомнив, как обычно идут похожие задачи на практике — учтена ли доработка, согласования и непредвиденные мелочи, а не только «чистая работа»?
  comment: Оценки времени почти всегда оптимистичны, если не учитывать типичный 'шум' вокруг самой задачи.
- slug: think-plan-sequence-vs-parallel
  category: think/planning
  title: Что можно делать параллельно, а что только последовательно
  body: 'Вот список задач для [ЦЕЛЬ]: [ЗАДАЧИ]. Раздели их на те, что можно делать одновременно, не мешая друг другу, и те, что обязательно должны идти строго по порядку. Это может сильно сократить общий срок.'
  comment: Задачи часто планируют последовательно по привычке, хотя часть из них можно делать параллельно.
- slug: think-plan-check-if-goal-still-valid
  category: think/planning
  title: Всё ещё ли актуальна исходная цель плана
  body: План [ПЛАН] составлялся под цель [ИСХОДНАЯ ЦЕЛЬ] какое-то время назад. Проверь, изменилось ли что-то в ситуации с тех пор так, что сама цель уже не так важна или актуальна, как когда план составлялся.
  comment: Долгие планы иногда продолжают выполняться по инерции после того, как их исходная цель устарела.
- slug: think-plan-communication-cadence
  category: think/planning
  title: Как часто и что именно сообщать по ходу плана
  body: 'Для плана [ПЛАН] с участниками [УЧАСТНИКИ/ЗАИНТЕРЕСОВАННЫЕ СТОРОНЫ] определи: как часто и в каком формате им нужно получать апдейты, чтобы не заваливать деталями, но и не оставлять в неведении о прогрессе.'
  comment: Слишком частые или слишком редкие апдейты одинаково подрывают доверие к тому, кто ведёт проект.
- slug: think-plan-explain-why-this-order
  category: think/planning
  title: Объяснить логику последовательности шагов
  body: 'Вот план с порядком шагов: [ПЛАН]. Объясни логику именно такого порядка — почему шаг 2 не может идти перед шагом 1, и есть ли шаги, порядок которых на самом деле произвольный и можно менять при необходимости.'
  comment: Явное понимание, какой порядок обязателен, а какой условен, даёт гибкость при изменении обстоятельств.
- slug: think-plan-check-scope-creep-risk
  category: think/planning
  title: Риск разрастания объёма по ходу выполнения
  body: Вот план [ПЛАН] с чётко определённым объёмом. Предположи, в каких местах по ходу выполнения объём скорее всего начнёт незаметно расти («а давайте ещё и...»), и как заранее защититься от этого разрастания.
  comment: Разрастание объёма («scope creep») почти всегда предсказуемо заранее в определённых точках плана.
- slug: think-plan-explain-tradeoff-of-team-size
  category: think/planning
  title: Что меняется при добавлении людей в план
  body: Вот план [ПЛАН] на [N] человек. Если добавить ещё людей, чтобы ускорить его — что реально ускорится, а что может замедлиться из-за координации и передачи контекста между новыми участниками?
  comment: Добавление людей в проект не всегда линейно ускоряет его — иногда наоборот, замедляет из-за координации.
- slug: think-plan-realistic-adoption-curve
  category: think/planning
  title: Реалистичная скорость принятия изменений людьми
  body: 'План [ПЛАН] предполагает, что люди [ЛЮДИ/КОМАНДА/КЛИЕНТЫ] начнут пользоваться новым по расписанию [СРОК]. Проверь: это реалистичная скорость привыкания к изменениям, или план недооценивает инерцию людей.'
  comment: Технически готовое изменение часто внедряется медленнее, чем планировалось, из-за человеческой инерции.
- slug: think-plan-explain-cost-of-delay-per-step
  category: think/planning
  title: Цена задержки на каждом конкретном шаге
  body: 'Вот план [ПЛАН] с этапами. Для каждого этапа скажи: если он задержится на неделю, насколько это критично сдвинет всё остальное — какие этапы ''дорогие'' по задержке, а какие можно сдвинуть без больших последствий.'
  comment: Не все задержки одинаково критичны — понимание этого помогает решать, куда бросать силы при нехватке времени.
- slug: think-plan-check-if-plan-survives-key-person-leaving
  category: think/planning
  title: Выдержит ли план уход ключевого человека
  body: 'Вот план [ПЛАН], где ключевую роль играет [ЧЕЛОВЕК/РОЛЬ]. Проверь: если этот человек внезапно выпадет из процесса (болезнь, увольнение, перегруз), сможет ли план продолжиться, и что нужно заранее подготовить.'
  comment: Планы часто держатся на одном незаменимом человеке — это стоит проверять заранее, а не в момент кризиса.
- slug: think-verify-common-claim
  category: think/research
  title: Проверка расхожего утверждения
  body: Все говорят [УТВЕРЖДЕНИЕ] про [ТЕМА]. Разберись, что из этого правда, что устарело, а что — маркетинг или искажение. Дай источник за каждым выводом и не повторяй утверждение просто потому, что оно везде на слуху.
  comment: Для проверки 'общеизвестных истин' в своей нише перед тем, как строить на них стратегию.
- slug: think-map-the-blindspot
  category: think/research
  title: Карта слепых зон
  body: 'Разбери всё пространство вокруг [ТЕМА/РЫНОК/ПРОЕКТ]. Затем скажи, о чём никто не говорит: какие риски или возможности остаются в тени, потому что все сфокусированы на очевидном.'
  comment: Для конкурентного анализа, due diligence, стратегического планирования.
- slug: think-distinguish-correlation-causation
  category: think/research
  title: Отделить совпадение от причины
  body: 'В источниках по [ТЕМА] утверждается, что [А] приводит к [Б]. Разберись: это реально причинно-следственная связь, или просто два явления происходят вместе по другой общей причине?'
  comment: Частая ошибка при переносе выводов исследований на свою ситуацию — совпадение принимают за причину.
- slug: think-find-primary-source
  category: think/research
  title: Докопаться до первоисточника цифры
  body: 'Везде повторяется цифра/факт: [ЦИФРА/ФАКТ] про [ТЕМА]. Найди, откуда она изначально взялась, кто и как её посчитал, и не исказилась ли она по пути, пока её пересказывали друг за другом.'
  comment: Многие 'известные факты' при проверке источника оказываются устаревшими или неверно процитированными.
- slug: think-research-both-sides-evidence
  category: think/research
  title: Доказательства обеих сторон спора
  body: По вопросу [СПОРНАЯ ТЕМА] собери реальные аргументы и данные за обе стороны, без перекоса в одну из них. Укажи, где данных достаточно для вывода, а где обе стороны на самом деле просто спорят при нехватке фактов.
  comment: Для оценки споров в своей нише, где важно не занять сторону раньше, чем разобрался в фактах.
- slug: think-research-what-changed-recently
  category: think/research
  title: Что изменилось недавно в этой теме
  body: 'По теме [ТЕМА] у меня есть понимание, сложившееся какое-то время назад. Проверь, что изменилось за последний год-два: новые данные, новые практики, устаревшие рекомендации — и что из старого понимания больше не работает.'
  comment: Для быстро меняющихся областей — старое, но когда-то верное понимание может тихо устареть.
- slug: think-research-competitor-real-numbers
  category: think/research
  title: Реальные цифры конкурентов, а не заявленные
  body: Конкурент [КОНКУРЕНТ] заявляет [ЗАЯВЛЕНИЕ/ЦИФРА]. Проверь по независимым источникам, насколько это похоже на правду, и какие косвенные признаки (отзывы, вакансии, обновления продукта) подтверждают или опровергают это.
  comment: Заявления конкурентов в маркетинге часто не совпадают с их реальным положением дел.
- slug: think-research-source-quality-check
  category: think/research
  title: Оценка качества источника
  body: 'Вот источник информации по [ТЕМА]: [ИСТОЧНИК]. Оцени: у него есть очевидный коммерческий или идеологический интерес в этом выводе? Насколько ему стоит доверять, и что стоит перепроверить у второго независимого источника.'
  comment: Полезно перед тем как строить решение на одной статье или обзоре без проверки его предвзятости.
- slug: think-research-quantify-the-vague
  category: think/research
  title: Превратить расплывчатое утверждение в цифру
  body: В обсуждениях [ТЕМА] часто говорят «многие», «в основном», «редко» без цифр. Найди реальные данные или хотя бы обоснованную оценку, которая стоит за этими словами, чтобы понимать реальный масштаб, а не ощущение.
  comment: Расплывчатые слова маскируют как реально большие, так и реально маленькие масштабы явления.
- slug: think-research-opposite-search
  category: think/research
  title: Специально поискать опровержение своей гипотезы
  body: 'Моя гипотеза по [ТЕМА]: [ГИПОТЕЗА]. Вместо того чтобы искать подтверждения, целенаправленно поищи данные, которые её опровергают. Насколько сильны эти контраргументы против моей гипотезы?'
  comment: Люди естественным образом ищут подтверждение своей идеи — этот промпт разворачивает поиск в обратную сторону.
- slug: think-research-timeline-of-topic
  category: think/research
  title: Хронология развития темы
  body: 'Собери хронологию того, как менялось [ТЕМА/ПОДХОД/ТЕХНОЛОГИЯ] за последние несколько лет: ключевые точки изменения и что их вызвало. Это часто объясняет текущее состояние лучше, чем снимок на сегодня.'
  comment: Понимание того, как пришли к текущей ситуации, помогает прогнозировать, куда она движется дальше.
- slug: think-research-numbers-in-context
  category: think/research
  title: Цифра в контексте, а не сама по себе
  body: 'Есть цифра: [ЦИФРА] про [ТЕМА]. Это много или мало? Дай контекст для сравнения — с чем эту цифру стоит сопоставить (предыдущий период, другая страна/рынок, другая компания), чтобы она стала осмысленной, а не просто выглядела внушительно.'
  comment: Цифры без сравнительного контекста легко использовать, чтобы создать нужное впечатление в любую сторону.
- slug: think-research-identify-consensus
  category: think/research
  title: Где реальный консенсус, а где только громкое меньшинство
  body: 'По теме [СПОРНАЯ ТЕМА] разберись: это тема, где среди специалистов есть реальный устоявшийся консенсус, а спор создаёт шумное меньшинство, или это правда открытый вопрос без единого мнения?'
  comment: Помогает не путать 'громко и часто повторяемое' с 'широко признанным профессиональным сообществом'.
- slug: think-research-check-outdated-advice
  category: think/research
  title: Проверка совета на устаревание
  body: 'Мне дали совет по [ТЕМА]: [СОВЕТ]. Проверь, актуален ли он ещё, или основан на практике/данных, которые с тех пор изменились (законы, технологии, рыночная ситуация).'
  comment: Хорошие в прошлом советы иногда продолжают передаваться по инерции после того, как условия изменились.
- slug: think-research-compare-methodology
  category: think/research
  title: Сравнение по методологии, а не только по выводам
  body: 'Два исследования/отчёта по [ТЕМА] дают разные выводы: [ИСТОЧНИК 1] и [ИСТОЧНИК 2]. Разберись не в выводах, а в методологии каждого — как считали, на какой выборке, в какой период — это часто объясняет расхождение.'
  comment: Разные выводы часто объясняются разной методологией, а не тем, что один источник просто ошибся.
- slug: think-research-what-experts-privately-say
  category: think/research
  title: Что практики говорят приватно, а не публично
  body: Публично про [ТЕМА] принято говорить [ОФИЦИАЛЬНАЯ ПОЗИЦИЯ]. Разберись, что реальные практики в этой сфере говорят между собой, неформально — есть ли разрыв между публичной и приватной оценкой темы.
  comment: Публичная позиция профессии иногда расходится с тем, что говорят в кулуарах — это ценная информация.
- slug: think-research-find-the-real-driver
  category: think/research
  title: Найти настоящую причину явления
  body: 'Наблюдается явление: [ЯВЛЕНИЕ] в [ОБЛАСТЬ/РЫНОК]. Общепринятое объяснение — [ОБЪЯСНЕНИЕ]. Проверь, это реальная причина, или более заметная, но не главная — и есть ли менее очевидный, но более весомый фактор.'
  comment: Заметные объяснения не всегда самые весомые — стоит проверять глубже поверхностной причины.
- slug: think-research-check-if-still-true
  category: think/research
  title: Всё ещё ли это правда сегодня
  body: Утверждение [УТВЕРЖДЕНИЕ] про [ТЕМА] было правдой, когда я его узнал. Проверь, актуально ли оно прямо сейчас — многое в этой сфере могло измениться с тех пор, а утверждение продолжает жить по инерции.
  comment: Для быстро меняющихся тем — рынков, технологий, регулирования, где 'было верно' не значит 'верно сейчас'.
- slug: think-research-scope-of-applicability
  category: think/research
  title: Где именно применим этот вывод
  body: 'Исследование/пример говорит [ВЫВОД] про [КОНТЕКСТ ИСТОЧНИКА]. Проверь: применим ли этот вывод к моей ситуации [МОЙ КОНТЕКСТ], или условия достаточно разные, чтобы вывод не переносился напрямую.'
  comment: Выводы часто верны только в узком контексте, из которого получены, и не масштабируются автоматически.
- slug: think-research-quantify-risk-not-just-describe
  category: think/research
  title: Оценить вероятность риска, а не просто назвать его
  body: Про [РЕШЕНИЕ/ПЛАН] говорят, что есть риск [РИСК]. Найди, насколько этот риск реально вероятен и как часто он материализуется в похожих случаях — а не просто подтверди, что риск теоретически существует.
  comment: Названный риск не значит вероятный риск — важно понимать реальную частоту, а не только возможность.
- slug: think-research-check-if-sample-representative
  category: think/research
  title: Проверка, репрезентативна ли выборка
  body: 'Вывод [ВЫВОД] основан на данных/примерах: [ИСТОЧНИК ДАННЫХ]. Проверь: эта выборка реально отражает общую картину, или это узкий, нетипичный срез, который создаёт искажённое впечатление?'
  comment: Небольшая или нетипичная выборка часто выдаётся за общую закономерность.
- slug: think-research-explain-disagreement-source
  category: think/research
  title: В чём корень разногласий экспертов
  body: 'Эксперты по теме [ТЕМА] расходятся во мнениях: [ПОЗИЦИЯ 1] против [ПОЗИЦИЯ 2]. Разберись, в чём реальный корень разногласия — они по-разному видят факты, или согласны с фактами, но по-разному расставляют приоритеты и ценности.'
  comment: Разногласие по фактам и разногласие по ценностям решаются по-разному — важно понимать, какое это.
- slug: think-research-check-anecdote-vs-pattern
  category: think/research
  title: Единичный случай или устойчивая закономерность
  body: 'Мне рассказали историю про [СЛУЧАЙ], которая иллюстрирует [ВЫВОД] о [ТЕМА]. Проверь: это подтверждённая широкая закономерность, или яркий, но единичный случай, который не стоит обобщать на всю ситуацию.'
  comment: Яркие истории убедительны эмоционально, но не всегда статистически значимы.
- slug: think-research-industry-report-bias
  category: think/research
  title: Проверка отраслевого отчёта на заинтересованность автора
  body: Отчёт по [ТЕМА] опубликован [ОРГАНИЗАЦИЯ/АВТОР]. Проверь, есть ли у автора коммерческий интерес в определённых выводах отчёта, и как это могло повлиять на выбор данных или формулировки заключений.
  comment: Отраслевые отчёты часто финансируются заинтересованными сторонами — стоит держать это в уме.
- slug: think-research-check-if-fixed-or-evolving
  category: think/research
  title: Это устоявшееся знание или ещё формирующееся
  body: 'По теме [ТЕМА] разберись: это область с давно устоявшимся консенсусом, или молодая, быстро развивающаяся, где сегодняшнее понимание через год-два может сильно измениться? Дай мне это как контекст к выводам.'
  comment: Уровень уверенности в выводах должен зависеть от зрелости самой области знания.
- slug: think-research-cross-check-two-sources
  category: think/research
  title: Сверка двух независимых источников
  body: 'Вот факт из одного источника: [ФАКТ + ИСТОЧНИК]. Найди, подтверждается ли он независимым вторым источником с другой точки зрения или интереса, или единственный источник — это единственное, на чём держится факт.'
  comment: Факт, подтверждённый только одним источником, требует большей осторожности, чем перепроверенный дважды.
- slug: think-research-explain-in-numbers-not-adjectives
  category: think/research
  title: Дать реальный порядок величины вместо оценочного слова
  body: По вопросу [ВОПРОС] источники используют слова вроде «огромный рост», «критично важно», «незначительно». Найди реальные числа за этими словами, чтобы понимать масштаб, а не только эмоциональную окраску формулировки.
  comment: Эмоционально окрашенные слова в источниках часто скрывают довольно скромные реальные цифры, и наоборот.
- slug: think-research-check-if-still-cited-correctly
  category: think/research
  title: Правильно ли цитируется исходное исследование
  body: Утверждение [УТВЕРЖДЕНИЕ] ссылается на исследование/данные [ИСТОЧНИК]. Проверь, действительно ли исходное исследование говорит именно это, или по пути пересказа смысл сместился от оригинала.
  comment: Классическая проблема испорченного телефона — популярные пересказы часто искажают исходный вывод.
- slug: think-editor-cut-fluff
  category: think/texts
  title: Жёсткий редактор без комплиментов
  body: 'Вот текст: [ВСТАВИТЬ]. Разбери как строгий редактор: что лишнее, что неясно, где я прячу слабый аргумент за красивой фразой. Перепиши 2-3 самых слабых места. Никаких похвал — только правки и почему они нужны.'
  comment: Для писем, статей, коммерческих предложений, презентаций — любого текста перед отправкой.
- slug: think-audience-rewrite
  category: think/texts
  title: Переписать под другого читателя
  body: 'Вот текст, написанный для [АУДИТОРИЯ 1]: [ВСТАВИТЬ]. Перепиши для [АУДИТОРИЯ 2], у которой другой уровень контекста и другие приоритеты. Покажи, что именно пришлось убрать, добавить или объяснить иначе.'
  comment: Для перевода технического текста в бизнес-язык и наоборот.
- slug: think-cut-by-half
  category: think/texts
  title: Сократить вдвое без потери смысла
  body: 'Вот текст: [ВСТАВИТЬ]. Сократи его примерно вдвое так, чтобы главный смысл и все ключевые факты остались, а исчезли только повторы, вводные слова и то, что читатель может додумать сам.'
  comment: Для писем, постов, коммерческих предложений — где длина сама по себе снижает вероятность дочитать.
- slug: think-find-buried-lede
  category: think/texts
  title: Найти зарытую главную мысль
  body: 'Вот текст: [ВСТАВИТЬ]. Найди, какая мысль в нём на самом деле самая важная для читателя, даже если она не в начале. Перепиши так, чтобы она шла первой, а остальное строилось вокруг неё.'
  comment: Частая ошибка — важное сообщение тонет в предыстории и деталях, вместо того чтобы открывать текст.
- slug: think-remove-hedging-language
  category: think/texts
  title: Убрать размывающие формулировки
  body: 'Вот текст: [ВСТАВИТЬ]. Найди все места, где я смягчаю мысль словами вроде «наверное», «в целом», «в какой-то степени», «возможно» — и оцени, где это оправданная осторожность, а где просто неуверенность, которую стоит убрать.'
  comment: Избыточные оговорки ослабляют текст там, где автор на самом деле уверен в своей позиции.
- slug: think-check-if-text-answers-question
  category: think/texts
  title: 'Проверка: текст реально отвечает на вопрос читателя'
  body: 'Вот текст: [ВСТАВИТЬ], и вопрос, который читатель держит в голове, открывая его: [ВОПРОС]. Проверь: текст реально и быстро отвечает на этот вопрос, или читателю придётся сам додумывать ответ из контекста?'
  comment: Тексты часто хорошо написаны, но не отвечают на тот вопрос, ради которого их читают.
- slug: think-strengthen-weak-opening
  category: think/texts
  title: Усилить слабое начало текста
  body: 'Вот первый абзац текста: [ВСТАВИТЬ]. Оцени честно: он заставит дочитать дальше, или потеряет читателя? Предложи 3 альтернативных начала — разных по подходу, не просто перефразированных.'
  comment: Первый абзац решает, будет ли прочитан весь остальной текст — стоит отдельного внимания.
- slug: think-match-tone-to-brand
  category: think/texts
  title: Подогнать тон текста под голос бренда
  body: 'Вот текст: [ВСТАВИТЬ]. Вот как обычно звучит наш бренд/канал: [ОПИСАНИЕ ТОНА, ПРИМЕРЫ]. Перепиши текст так, чтобы он звучал узнаваемо в этом голосе, не теряя фактов и структуры.'
  comment: Для контент-команд, где разные авторы должны звучать как один голос бренда.
- slug: think-remove-jargon-keep-precision
  category: think/texts
  title: Убрать жаргон, но не потерять точность
  body: 'Вот текст с профессиональными терминами: [ВСТАВИТЬ]. Перепиши для читателя без этого бэкграунда, заменив жаргон понятными словами, но не теряя точность там, где термин был нужен по сути, а не для важности.'
  comment: Упрощение часто теряет точность вместе с жаргоном — этот промпт разделяет одно от другого.
- slug: think-check-text-for-defensive-tone
  category: think/texts
  title: Проверка текста на оправдывающийся тон
  body: 'Вот текст: [ВСТАВИТЬ]. Проверь, не звучит ли он как оправдание, даже если по факту я ни в чём не виноват. Покажи, какие фразы создают это впечатление, и как их переформулировать увереннее.'
  comment: Для деловой переписки и публичных заявлений, где оправдывающийся тон подрывает доверие к позиции.
- slug: think-turn-features-into-benefit
  category: think/texts
  title: Перевести характеристики в пользу для читателя
  body: 'Вот описание [ПРОДУКТ/УСЛУГА] с перечислением характеристик: [ВСТАВИТЬ]. Перепиши так, чтобы за каждой характеристикой явно стояло, что это конкретно даёт читателю — без общих фраз вроде «это удобно».'
  comment: Для описаний продуктов, коммерческих предложений — где список фич не продаёт сам по себе.
- slug: think-check-consistency-of-terms
  category: think/texts
  title: Проверка на разнобой в терминах
  body: 'Вот текст: [ВСТАВИТЬ]. Проверь, называю ли я одну и ту же вещь разными словами в разных местах, что может путать читателя, и предложи единый термин на весь текст.'
  comment: Для технической документации, договоров, длинных статей — где непоследовательные термины сбивают с толку.
- slug: think-rewrite-title-for-curiosity
  category: think/texts
  title: Заголовок, вызывающий любопытство, а не кликбейт
  body: 'Вот текст: [ВСТАВИТЬ], и текущий заголовок: [ЗАГОЛОВОК]. Предложи 3 альтернативных заголовка, которые честно отражают содержание, но формулируют его так, чтобы захотелось узнать, что внутри.'
  comment: Разница между кликбейтом и честным крючком — заголовок не обещает больше, чем даёт текст.
- slug: think-check-if-example-helps
  category: think/texts
  title: Проверка, реально ли пример помогает понять
  body: 'Вот текст с примером: [ВСТАВИТЬ]. Проверь: этот пример реально иллюстрирует мысль, или просто занимает место? Если он слабый — предложи более точный, который лучше показывает суть.'
  comment: Плохо подобранный пример иногда путает больше, чем помогает — стоит проверять его отдельно.
- slug: think-rewrite-for-skimmers
  category: think/texts
  title: Адаптация для тех, кто читает по диагонали
  body: 'Вот текст: [ВСТАВИТЬ]. Большинство читателей пробегут его глазами, а не прочитают полностью. Перепиши структуру так, чтобы даже беглый просмотр (заголовки, жирный текст, первые слова абзацев) передавал главное.'
  comment: Для email-рассылок, лендингов, длинных документов, которые читают по диагонали.
- slug: think-check-claims-are-backed
  category: think/texts
  title: Проверка, что утверждения подкреплены, а не голословны
  body: 'Вот текст с утверждениями: [ВСТАВИТЬ]. Найди фразы вида «лучший», «уникальный», «доказано», которые звучат сильно, но ничем не подкреплены в тексте, и предложи, чем их заменить или как обосновать.'
  comment: Для коммерческих текстов и презентаций — непроверяемые превосходные степени снижают доверие читателя.
- slug: think-rewrite-avoiding-corporate-speak
  category: think/texts
  title: Убрать корпоративный новояз
  body: 'Вот текст: [ВСТАВИТЬ]. Найди фразы-штампы вроде «синергия», «на land-е», «драйвить процесс», «в моменте» и подобные, и перепиши их простым конкретным русским языком без потери смысла.'
  comment: Корпоративный жаргон часто маскирует отсутствие конкретной мысли — этот промпт это вскрывает.
- slug: think-check-structure-follows-logic
  category: think/texts
  title: Проверка, что структура текста следует логике, а не хронологии
  body: 'Вот текст: [ВСТАВИТЬ]. Проверь: порядок абзацев следует логике важности для читателя, или просто хронологии того, как я об этом думал, когда писал? Предложи порядок, ориентированный на читателя.'
  comment: Тексты часто написаны в порядке мыслей автора, а не в порядке, удобном для восприятия читателем.
- slug: think-rewrite-remove-passive-voice
  category: think/texts
  title: Убрать пассивный залог там, где он размывает ответственность
  body: 'Вот текст: [ВСТАВИТЬ]. Найди фразы в пассивном залоге вроде «было решено», «допущена ошибка» — и там, где важно показать, кто именно действовал, перепиши в активном залоге с явным субъектом.'
  comment: Пассивный залог часто используется, чтобы скрыть, кто принял решение или допустил ошибку.
- slug: think-check-if-cta-clear
  category: think/texts
  title: Проверка, понятно ли читателю, что делать дальше
  body: 'Вот текст: [ВСТАВИТЬ]. Проверь: в конце понятно, какое одно конкретное действие читатель должен совершить дальше? Если действий несколько или ни одного явного — предложи, как это исправить.'
  comment: Для email, лендингов, объявлений — текст без ясного следующего шага часто просто игнорируется.
- slug: think-rewrite-shorter-sentences
  category: think/texts
  title: Разбить длинные предложения без потери связности
  body: 'Вот текст: [ВСТАВИТЬ]. Найди предложения длиннее, чем нужно для понимания с первого раза, и раздели их, сохранив логическую связь между частями — не просто ставь точки там, где были запятые.'
  comment: Длинные предложения часто требуют перечитывания — короче не значит примитивнее.
- slug: think-check-text-for-condescension
  category: think/texts
  title: Проверка текста на снисходительный тон
  body: 'Вот текст, объясняющий что-то читателю: [ВСТАВИТЬ]. Проверь, не звучит ли объяснение свысока или как будто читатель туповат. Покажи конкретные фразы и как их переформулировать на равных.'
  comment: Для обучающих материалов и FAQ — снисходительный тон отталкивает читателя даже при верных фактах.
- slug: think-rewrite-with-concrete-numbers
  category: think/texts
  title: Заменить общие слова на конкретные цифры
  body: 'Вот текст: [ВСТАВИТЬ]. Найди места со словами «быстро», «много», «значительно», «эффективно» без цифр за ними, и там, где у меня есть реальные данные, замени общие слова на конкретные числа.'
  comment: Конкретные цифры убедительнее общих усилительных слов, даже приблизительные.
- slug: think-check-if-text-is-fair-to-critics
  category: think/texts
  title: Проверка, честно ли текст описывает противоположную позицию
  body: 'Вот текст, где я критикую или спорю с [ПОЗИЦИЯ/ПОДХОД]: [ВСТАВИТЬ]. Проверь: я описываю противоположную позицию честно и в её сильной версии, или подменяю её удобной для критики слабой формулировкой?'
  comment: Спор с ослабленной версией чужой позиции быстро теряет доверие внимательного читателя.
- slug: think-rewrite-remove-redundant-intro
  category: think/texts
  title: Убрать лишнее вступление перед сутью
  body: 'Вот текст: [ВСТАВИТЬ]. Проверь, сколько абзацев проходит, прежде чем начинается реально полезная информация. Предложи вариант, который начинается сразу с сути, а предысторию даёт по необходимости дальше.'
  comment: Длинные разогревающие вступления — частая причина, почему читатель не доходит до главного.
- slug: think-check-email-gets-to-point
  category: think/texts
  title: Письмо, которое сразу понятно за 5 секунд
  body: 'Вот письмо: [ВСТАВИТЬ]. Проверь: если получатель прочитает только первые 2 строки, поймёт ли он, зачем это письмо и что от него нужно? Если нет — перепиши так, чтобы это было понятно сразу.'
  comment: Деловые письма часто хоронят суть в третьем абзаце — большинство получателей до него не доходят.
- slug: think-teach-via-misconceptions
  category: think/learning
  title: Обучение через частые ошибки
  body: 'Разбери тему [ТЕМА] через самые частые заблуждения новичков в этой области: что люди обычно понимают неправильно и почему это кажется логичным, но ошибочно. Дай верную версию и как её проще запомнить.'
  comment: Работает для любой профессиональной темы — от бухгалтерии до медицины и права.
- slug: think-feynman-simplify
  category: think/learning
  title: Упрощение до сути (метод Фейнмана)
  body: Объясни [СЛОЖНАЯ ТЕМА] так, как если бы объяснял умному 12-летнему — без потери сути, только без жаргона. Затем покажи, какой жаргонный термин я теперь смогу использовать правильно и что он на самом деле означает.
  comment: Для презентаций клиентам, объяснения сложных решений неспециалистам.
- slug: think-teach-build-mental-model
  category: think/learning
  title: Собрать ментальную модель темы
  body: 'Помоги мне построить целостную картину темы [ТЕМА]: не список фактов, а модель — как части связаны между собой и что из чего следует. Дай 3-4 главных «узла», на которых держится вся тема, остальное — детали вокруг них.'
  comment: Для быстрого погружения в новую профессиональную область без потери связности.
- slug: think-teach-through-worked-example
  category: think/learning
  title: Обучение на разобранном примере
  body: 'Возьми конкретный пример: [ПРИМЕР] и разбери его шаг за шагом, объясняя не только что делается, но и почему на каждом шаге выбрано именно так. Затем дай похожий пример и посмотри, смогу ли я повторить логику сам.'
  comment: Абстрактное правило запоминается хуже, чем разобранный пример с объяснением решений внутри.
- slug: think-teach-quiz-me
  category: think/learning
  title: Проверь меня вопросами, а не расскажи
  body: Вместо того чтобы объяснять [ТЕМА], задавай мне по одному вопросу за раз, начиная с простого. Оценивай мой ответ, поправляй, если ошибся, и усложняй вопросы по мере того, как я отвечаю правильно.
  comment: Активное вспоминание закрепляет знание лучше, чем пассивное чтение объяснения.
- slug: think-teach-compare-similar-concepts
  category: think/learning
  title: Сравнение похожих понятий, которые путают
  body: Термины [ПОНЯТИЕ А] и [ПОНЯТИЕ Б] в этой области легко перепутать. Объясни разницу через конкретный пример на каждый, где важно не спутать одно с другим, и что случится, если перепутать.
  comment: Для областей с похожими на слух, но разными по сути терминами — юридическими, медицинскими, техническими.
- slug: think-teach-history-of-idea
  category: think/learning
  title: Почему так решили именно так
  body: Объясни [ПРАВИЛО/ПОДХОД/СТАНДАРТ], но не только что оно означает, а откуда оно взялось — какую проблему решали, когда это придумывали. Это часто объясняет правило лучше, чем сама формулировка.
  comment: Понимание происхождения правила помогает применять его осмысленно, а не механически.
- slug: think-teach-what-experts-actually-do
  category: think/learning
  title: Что эксперты делают на практике, а не по учебнику
  body: По теме [ТЕМА] расскажи не только формальную теорию, но и то, что реальные практики делают иначе на практике, и почему учебник не всегда совпадает с реальной работой в этой сфере.
  comment: Закрывает разрыв между 'как учат' и 'как реально работает' в профессии.
- slug: think-teach-common-beginner-trap
  category: think/learning
  title: Ловушка, в которую попадает почти каждый новичок
  body: В теме [ТЕМА] есть ловушка, в которую попадает почти каждый, кто учится самостоятельно. Опиши её, покажи, почему она соблазнительна, и как понять, что я уже в неё попал, до того как это дорого стоило.
  comment: Профилактика типичной ошибки эффективнее, чем разбор проблемы постфактум.
- slug: think-teach-analogy-from-my-field
  category: think/learning
  title: Аналогия из моей собственной профессии
  body: 'Объясни [НОВАЯ ДЛЯ МЕНЯ ТЕМА] через аналогию с тем, что я и так хорошо знаю: [МОЯ ПРОФЕССИЯ/ОБЛАСТЬ]. Затем скажи прямо, где аналогия перестаёт работать, чтобы я не перенёс её слишком буквально.'
  comment: Учиться через знакомую область — самый быстрый способ, если аналогию честно ограничить.
- slug: think-teach-explain-jargon-map
  category: think/learning
  title: Карта жаргона новой области
  body: 'Я захожу в новую для себя область: [ОБЛАСТЬ]. Дай 10-15 терминов, которые нужно знать в первую очередь, простым языком каждый, и укажи, какие 2-3 из них люди чаще всего используют неправильно.'
  comment: Быстрый вход в незнакомую профессиональную область без чтения учебника с нуля.
- slug: think-teach-progressive-difficulty
  category: think/learning
  title: Постепенное усложнение с проверкой на каждом шаге
  body: Обучи меня [НАВЫК/ТЕМА] по шагам от простого к сложному. После каждого шага дай мне маленькое задание, чтобы проверить, усвоил ли я его, прежде чем переходить дальше.
  comment: Не даёт проскочить фундамент и застрять непонятно на каком уровне позже.
- slug: think-teach-explain-failure-of-others
  category: think/learning
  title: Обучение через чужие провалы
  body: В области [ТЕМА] расскажи 2-3 реалистичных, обобщённых сценария, как люди проваливаются, пытаясь освоить это самостоятельно. Объясни, что было сделано не так и как я могу этого избежать.
  comment: Чужие ошибки учат быстрее, чем абстрактная теория без примеров провалов.
- slug: think-teach-what-to-learn-first
  category: think/learning
  title: Что учить в первую очередь, а что подождёт
  body: 'Я хочу освоить [БОЛЬШАЯ ОБЛАСТЬ] с нуля. Помоги расставить приоритет: что даёт 80% пользы за 20% усилий, а что можно отложить, пока не понадобится конкретная задача.'
  comment: Спасает от попытки выучить всё сразу вместо того, чтобы начать применять быстрее.
- slug: think-teach-explain-via-contrast
  category: think/learning
  title: Объяснение через контраст с неправильным подходом
  body: Объясни правильный способ делать [ЗАДАЧА], показав рядом типичный неправильный способ и почему он кажется рабочим, но на самом деле создаёт проблему позже.
  comment: Контраст 'правильно vs похоже на правильно' запоминается лучше, чем одна верная версия без сравнения.
- slug: think-teach-explain-edge-cases
  category: think/learning
  title: Обучение через пограничные случаи
  body: Я понял основное правило по теме [ТЕМА]. Теперь покажи 3 пограничных случая, где это правило работает не так очевидно или требует исключения, и объясни логику каждого исключения.
  comment: Основное правило без исключений создаёт ложную уверенность, которая ломается на практике.
- slug: think-teach-explain-why-changed
  category: think/learning
  title: Почему подход в этой сфере изменился со временем
  body: В области [ТЕМА] раньше делали иначе — [СТАРЫЙ ПОДХОД]. Объясни, что изменилось и почему, чтобы я не путал устаревшие практики с актуальными, если наткнусь на старые источники.
  comment: Для быстро меняющихся областей — важно понимать, что устарело, а что всё ещё актуально.
- slug: think-teach-explain-through-story
  category: think/learning
  title: Объяснение через историю одного случая
  body: Объясни принцип [ПРИНЦИП] не абстрактно, а через историю одного конкретного, реалистичного случая от начала до конца — так, чтобы принцип стал понятен через то, что произошло, а не через формулировку.
  comment: История с сюжетом запоминается сильнее сухого определения.
- slug: think-teach-explain-tradeoffs-of-methods
  category: think/learning
  title: Сравнение методов по их компромиссам
  body: 'В теме [ТЕМА] есть несколько разных методов делать одно и то же: [МЕТОД 1, 2]. Объясни не просто ''как работает каждый'', а какими компромиссами отличается один от другого и когда какой метод реально уместен.'
  comment: Знание одного метода без понимания компромиссов приводит к его слепому применению не там, где нужно.
- slug: think-teach-what-question-to-ask-next
  category: think/learning
  title: Какой вопрос задать дальше, чтобы углубиться
  body: Я только что узнал про [ТЕМА/ФАКТ]. Какой следующий вопрос я должен задать, чтобы по-настоящему разобраться, а не остановиться на поверхностном понимании? Задай его сам и ответь на него.
  comment: Помогает продолжить обучение самостоятельно, когда непонятно, что спрашивать дальше.
- slug: think-teach-explain-with-numbers
  category: think/learning
  title: Обучение через реальные цифры, а не общие слова
  body: Объясни [ТЕМА/ЯВЛЕНИЕ], используя не общие формулировки вроде «значительно» или «часто», а конкретные ориентировочные цифры и порядки величин, даже если это оценка, а не точная статистика.
  comment: Общие слова без цифр создают ложное чувство понимания темы.
- slug: think-teach-explain-limits-of-analogy
  category: think/learning
  title: Где аналогия ломается
  body: Мне объяснили [ТЕМА] через аналогию с [АНАЛОГИЯ]. Разбери, в каких местах эта аналогия действительно помогает понять суть, а в каких вводит в заблуждение, если её продолжать применять слишком буквально.
  comment: Проверка чужого объяснения на скрытые искажения от слишком удобной аналогии.
- slug: think-teach-summarize-then-test
  category: think/learning
  title: Перескажи своими словами и получи проверку
  body: 'Вот как я понял тему [ТЕМА]: [МОЁ ОБЪЯСНЕНИЕ СВОИМИ СЛОВАМИ]. Проверь, где я ошибся или упростил до потери смысла, и поправь только эти места, не переписывая всё заново.'
  comment: Активная проверка своего понимания эффективнее, чем повторное чтение объяснения от эксперта.
- slug: think-teach-explain-prerequisite-gap
  category: think/learning
  title: Какого базового знания мне не хватает
  body: 'Я не понимаю [ТЕМА], хотя вроде читал объяснение несколько раз. Помоги найти: какого более базового понятия мне, скорее всего, не хватает, из-за чего само объяснение не складывается в голове.'
  comment: Часто проблема не в сложности темы, а в пропущенной ступеньке до неё.
- slug: think-teach-practical-vs-textbook
  category: think/learning
  title: Учебная версия против практической рабочей версии
  body: Объясни [ТЕМА] сначала так, как её дают в учебнике/курсе, а затем — как её реально применяют на практике опытные люди, и в чём разница между этими двумя версиями.
  comment: Учебная версия часто идеализирована — практическая версия ближе к реальной работе.
- slug: think-teach-explain-common-shortcut
  category: think/learning
  title: Распространённое упрощение и его цена
  body: В области [ТЕМА] люди часто используют упрощённое правило вместо полного понимания. Назови такое упрощение, объясни, когда оно безопасно работает, а когда приводит к ошибке.
  comment: Упрощения полезны, пока не знаешь их границ применимости — это промпт их проясняет.
- slug: think-teach-explain-with-checklist-outcome
  category: think/learning
  title: Обучение с конкретным чек-листом на выходе
  body: 'Объясни [ТЕМА] так, чтобы в конце у меня был не просто набор фактов, а короткий практический чек-лист: что конкретно проверять/делать, если я применяю это знание на практике завтра.'
  comment: Превращает теоретическое объяснение в применимый инструмент, а не просто эрудицию.
- slug: think-teach-explain-through-debate
  category: think/learning
  title: Обучение через спор двух точек зрения
  body: По теме [СПОРНАЯ ТЕМА В ОБУЧЕНИИ] представь двух преподавателей с разными взглядами на то, как её правильно понимать, и пусть каждый аргументирует. Помоги мне понять, в чём суть их разногласия, а не только чью сторону принять.
  comment: Спорные темы лучше усваиваются через понимание сути разногласия, а не через одну 'официальную' версию.
- slug: think-teach-explain-cost-of-not-knowing
  category: think/learning
  title: Что случится, если этого не знать
  body: Объясни [ТЕМА], но начни с того, что реально идёт не так у людей, которые этого не знают и сталкиваются с задачей вслепую. Это должно объяснить, зачем вообще нужно разбираться в теме, прежде чем объяснять саму тему.
  comment: Мотивация 'зачем учить' часто важнее самого объяснения — без неё материал не откладывается.
- slug: think-decision-matrix-pressure-test
  category: think/decisions
  title: Матрица решения с проверкой на прочность
  body: 'Сравни варианты [ОПЦИЯ А, Б, В] для цели [ЦЕЛЬ] по критериям, которые реально важны мне: [КРИТЕРИИ]. Затем пересчитай выбор, представив, что один ключевой факт оказался неверным — какой вариант устойчивее к ошибке в данных?'
  comment: Для выбора поставщика, найма, инвестиции — решений, где важна не только 'лучшая оценка', но и устойчивость.
- slug: think-second-order-effects
  category: think/decisions
  title: Эффекты второго порядка
  body: Я планирую [РЕШЕНИЕ]. Опиши очевидный, ожидаемый результат. Затем — что произойдёт дальше как следствие этого результата, через месяц и через год, включая побочные эффекты, которые я, скорее всего, не рассматривал.
  comment: 'Для стратегических решений: смена цены, оргструктуры, продуктовой политики.'
- slug: think-what-would-change-my-mind
  category: think/decisions
  title: Что перевернуло бы твой вывод
  body: 'Дай мне свою рекомендацию по [ВОПРОС] с аргументами. Затем честно скажи: какой один факт, если бы он оказался верным, заставил бы тебя поменять вывод на противоположный? Как мне быстро это проверить?'
  comment: Раскрывает, насколько вывод устойчив, а не просто звучит уверенно.
- slug: think-reversible-vs-irreversible
  category: think/decisions
  title: Разделить обратимое и необратимое
  body: Вот решение [РЕШЕНИЕ] с несколькими шагами. Раздели их на те, что можно легко отменить, если что-то пойдёт не так, и те, что необратимы. Дай совет, где можно действовать быстро, а где — сначала перепроверить.
  comment: Необратимые шаги требуют другого уровня осторожности, чем обратимые — их часто путают.
- slug: think-regret-minimization
  category: think/decisions
  title: Минимизация будущего сожаления
  body: 'Я выбираю между [ВАРИАНТ А] и [ВАРИАНТ Б] по поводу [ВОПРОС]. Представь меня через 5 лет: о каком из этих решений я, скорее всего, пожалею сильнее, если оно не сработает — не по деньгам, а по ощущению упущенного.'
  comment: Хорошо для жизненных развилок, где чистая логика цифр не даёт однозначного ответа.
- slug: think-cost-of-inaction
  category: think/decisions
  title: Цена бездействия
  body: 'Я рассматриваю [РЕШЕНИЕ], но склоняюсь оставить всё как есть. Оцени честно: что реально произойдёт, если я не буду ничего менять, через полгода и через год — статус-кво тоже имеет цену, посчитай её.'
  comment: Бездействие часто воспринимается как безопасный вариант, хотя у него тоже есть стоимость.
- slug: think-decision-owner-check
  category: think/decisions
  title: Чьё это на самом деле решение
  body: 'Вопрос [ВОПРОС] обсуждают несколько человек: [УЧАСТНИКИ]. Помоги разобраться: кто на самом деле должен принять это решение, кого нужно только проконсультировать, а кого просто поставить в известность.'
  comment: Частая причина затянутых решений — непонятно, кто реально имеет право сказать 'да'.
- slug: think-decide-with-partial-info
  category: think/decisions
  title: Решение при неполных данных
  body: 'У меня нет полной информации по [ВОПРОС] — известно только [ЧТО ИЗВЕСТНО], неизвестно [ЧТО НЕИЗВЕСТНО]. Помоги решить: достаточно ли того, что есть, чтобы действовать, или недостающее критично и стоит подождать/уточнить.'
  comment: Для ситуаций, где 'подождать больше данных' может быть и мудростью, и прокрастинацией.
- slug: think-tradeoff-explicit
  category: think/decisions
  title: Явный компромисс вместо ложного 'всё сразу'
  body: Я хочу получить и [ЦЕЛЬ А], и [ЦЕЛЬ Б] одновременно от решения [РЕШЕНИЕ]. Честно скажи, реально ли это совместить, или придётся выбирать — и если выбирать, какая пропорция между ними разумна в моей ситуации.
  comment: Часто хочется 'и то и то' там, где реально нужен осознанный компромисс, а не иллюзия обоих.
- slug: think-decision-under-uncertainty-ranges
  category: think/decisions
  title: Диапазон исходов вместо одной цифры
  body: 'Оцени результат решения [РЕШЕНИЕ] не одной цифрой, а диапазоном: оптимистичный, реалистичный и пессимистичный сценарий. Скажи, какой из них наиболее вероятен и на что я реально могу рассчитывать при планировании.'
  comment: Одна 'ожидаемая' цифра часто создаёт ложную точность там, где на деле большой разброс.
- slug: think-precommit-to-exit-criteria
  category: think/decisions
  title: Заранее заданные критерии выхода
  body: 'Я начинаю [ПРОЕКТ/ЭКСПЕРИМЕНТ]. Помоги заранее определить: по каким конкретным признакам я пойму, что это не работает и пора остановиться, прежде чем начну эмоционально держаться за уже вложенное.'
  comment: Определять критерии провала до начала честнее, чем оценивать их постфактум, когда уже вложился.
- slug: think-compare-to-null-option
  category: think/decisions
  title: Сравнение с вариантом 'ничего не делать'
  body: Я рассматриваю [РЕШЕНИЕ] и сравниваю его с альтернативами. Добавь в сравнение вариант вообще ничего не менять — и оцени его по тем же критериям, а не как автоматически худший вариант.
  comment: Опция 'ничего не делать' часто выпадает из сравнения, хотя иногда она и есть правильный ответ.
- slug: think-decide-for-future-self
  category: think/decisions
  title: Решение глазами будущей версии себя
  body: 'Я сейчас выбираю [ВАРИАНТ А или Б] под влиянием [ТЕКУЩЕЕ СОСТОЯНИЕ: усталость/срочность/эмоция]. Как бы это решение оценил я сам через неделю в спокойном состоянии — совпадает ли вывод?'
  comment: Отделяет решение, принятое в моменте под давлением, от того, что выдержит проверку временем.
- slug: think-decompose-big-scary-decision
  category: think/decisions
  title: Разбить пугающее решение на маленькие
  body: Решение [БОЛЬШОЕ РЕШЕНИЕ] кажется слишком большим и пугающим, чтобы решиться сразу. Разбей его на маленькие обратимые шаги, каждый из которых можно сделать и посмотреть на результат, не беря на себя весь риск сразу.
  comment: Превращает парализующее 'решение всей жизни' в серию проверяемых маленьких шагов.
- slug: think-check-decision-against-values
  category: think/decisions
  title: Сверка решения с реальными приоритетами
  body: 'Вот решение [РЕШЕНИЕ] и то, что я называю важным для себя: [ЗАявленные ПРИОРИТЕТЫ]. Проверь: это решение реально соответствует этим приоритетам, или я на словах говорю одно, а выбираю по факту другое?'
  comment: Ловит разрыв между декларируемыми ценностями и фактическим выбором.
- slug: think-multi-criteria-weighted
  category: think/decisions
  title: Взвешенное сравнение по нескольким критериям
  body: Сравни варианты [А, Б, В] по критериям [КРИТЕРИЙ 1, 2, 3], но сначала помоги честно определить, какой критерий для меня важнее остальных — не считай их равнозначными по умолчанию, если это не так.
  comment: Простое сравнение 'по пунктам' часто искажается, когда все критерии молча считаются равными.
- slug: think-decision-if-had-to-explain-child
  category: think/decisions
  title: Объясни решение так, чтобы понял ребёнок
  body: Вот моё решение [РЕШЕНИЕ] и логика за ним. Объясни эту логику так просто, чтобы понял ребёнок. Если объяснение начинает звучать странно или неубедительно в упрощённом виде — это сигнал, что с решением что-то не так, или нет?
  comment: Простое объяснение вскрывает решения, которые держатся только на сложной терминологии.
- slug: think-decision-timeline-pressure
  category: think/decisions
  title: Что изменится, если решить на неделю раньше или позже
  body: 'Я собираюсь принять решение [РЕШЕНИЕ] сейчас. Оцени: что конкретно изменится, если я приму его на неделю раньше или на неделю позже — выигрыш от скорости реально больше риска поспешности, или нет?'
  comment: Разделяет реальную срочность от искусственного давления действовать прямо сейчас.
- slug: think-decision-compare-to-peer
  category: think/decisions
  title: Как решил бы человек в похожей ситуации, но без моих эмоций
  body: Опиши, как решил бы вопрос [ВОПРОС] человек в точно такой же ситуации, как моя, но без личной эмоциональной вовлечённости — просто по фактам. Совпадает ли это с тем, к чему склоняюсь я сам?
  comment: Похоже на 'взгляд со стороны', но фокусируется именно на снятии эмоциональной пристрастности.
- slug: think-decision-hidden-third-option
  category: think/decisions
  title: Скрытый третий вариант между крайностями
  body: Я вижу выбор между [КРАЙНОСТЬ А] и [КРАЙНОСТЬ Б] по вопросу [ВОПРОС]. Помоги найти вариант посередине или сбоку, который решает суть проблемы, не требуя выбирать одну из двух крайностей целиком.
  comment: Многие решения кажутся 'или-или' только потому, что никто не искал третий путь.
- slug: think-decision-cost-of-perfection
  category: think/decisions
  title: Цена стремления к идеальному варианту
  body: 'Я всё ещё ищу идеальный вариант для [РЕШЕНИЕ], хотя уже есть достаточно хороший. Оцени: сколько времени/возможностей я теряю, продолжая искать лучший, и оправдан ли этот поиск, или пора взять достаточно хороший вариант.'
  comment: Для перфекционистов и людей, застревающих в анализе вместо действия.
- slug: think-decision-explain-to-skeptic
  category: think/decisions
  title: Защита решения перед скептиком
  body: Вот решение [РЕШЕНИЕ] с аргументами. Представь самого скептичного, но справедливого человека из моего окружения — какие вопросы он задаст в первую очередь, и выдержит ли решение эти вопросы без правок?
  comment: Похоже на 'адвоката дьявола', но именно от лица конкретного скептичного, но не враждебного человека.
- slug: think-decision-map-stakeholders
  category: think/decisions
  title: Карта того, кто пострадает, а кто выиграет
  body: 'Решение [РЕШЕНИЕ] затрагивает несколько людей/групп: [СПИСОК]. Для каждого честно скажи, выигрывает он от этого решения или теряет, и стоит ли это учитывать перед тем, как решение будет принято окончательно.'
  comment: Решения редко нейтральны для всех — явная карта интересов не даёт забыть, кто проиграет.
- slug: think-decision-analogous-past-case
  category: think/decisions
  title: Похожий случай из прошлого
  body: 'Было ли в моей ситуации похожее решение раньше: [ОПИШИ КОНТЕКСТ, если было]? Как оно тогда сработало, и чему это должно научить меня сейчас — не повторяю ли я ту же ошибку под новым предлогом.'
  comment: Заставляет учиться на собственном опыте, а не решать каждый раз с чистого листа.
- slug: think-decision-minimum-viable-test
  category: think/decisions
  title: Минимальный тест перед большим решением
  body: Прежде чем принимать большое решение [РЕШЕНИЕ], предложи маленький, дешёвый и быстрый способ проверить ключевое допущение на практике, прежде чем вкладываться в него по полной.
  comment: Для стартап-гипотез, найма, крупных покупок — там, где можно сначала протестировать дёшево.
- slug: think-decision-anchor-check
  category: think/decisions
  title: Проверка на эффект якоря
  body: 'Первое число/вариант, которое я увидел по вопросу [ВОПРОС], было [ПЕРВОЕ ЗНАЧЕНИЕ]. Проверь: я оцениваю остальные варианты объективно, или подсознательно сравниваю всё с этим первым числом, даже если оно было случайным?'
  comment: Первая цифра или вариант часто искажает восприятие всех последующих — это стоит проверять явно.
- slug: think-decision-social-proof-check
  category: think/decisions
  title: Проверка на 'все так делают'
  body: 'Я склоняюсь к [РЕШЕНИЕ], потому что так делают многие в моей нише. Проверь: это решение подходит именно моей ситуации, или я выбираю его просто потому, что так спокойнее — ''как у всех''?'
  comment: Массовость решения не гарантирует его правильность для конкретного случая.
- slug: think-decision-explain-in-one-sentence
  category: think/decisions
  title: Решение, объяснимое одним предложением
  body: Сформулируй итоговое решение по [ВОПРОС] одним ясным предложением без «но» и оговорок. Если это не получается — значит, решение ещё не готово. Покажи, что именно ещё не решено, если предложение не складывается.
  comment: Хороший фильтр готовности решения — если не помещается в одну чёткую фразу, что-то ещё не додумано.
- slug: think-decision-review-after-time
  category: think/decisions
  title: План пересмотра решения через время
  body: 'Я принимаю решение [РЕШЕНИЕ] сейчас, основываясь на текущих данных. Помоги заранее назначить: через какой срок и по каким признакам я должен пересмотреть это решение, а не считать его принятым навсегда.'
  comment: Решения, принятые с расчётом на пересмотр, надёжнее решений, которые считаются финальными раз и навсегда.
- slug: think-message-three-audiences
  category: think/communication
  title: Одно сообщение — три аудитории
  body: 'Напиши [СООБЩЕНИЕ/ОБЪЯВЛЕНИЕ] на тему [ТЕМА] в трёх версиях: для [АУДИТОРИЯ 1], [АУДИТОРИЯ 2] и [АУДИТОРИЯ 3]. Не меняй факты — меняй что выносишь вперёд, тон и уровень детализации. Покажи, что именно отличается и почему.'
  comment: Для HR-объявлений, PR, внутренних коммуникаций — когда одна новость бьёт по разным людям по-разному.
- slug: think-hard-conversation-prep
  category: think/communication
  title: Подготовка к сложному разговору
  body: 'Мне предстоит разговор: [СИТУАЦИЯ, например «сообщить об увольнении/отказе/повышении цены»]. Смоделируй, как отреагирует собеседник, какие возражения будут самыми острыми, и дай 2-3 варианта, как я могу открыть разговор — разные по жёсткости. Укажи, где я рискую показаться либо слишком мягким, либо слишком резким.'
  comment: Для менеджеров, HR, продаж, любых переговоров один на один с высокой ставкой.
- slug: think-negotiation-positions
  category: think/communication
  title: Карта интересов на переговорах
  body: 'Вот ситуация переговоров: [ОПИСАНИЕ]. Распиши: что каждая сторона говорит, что ей на самом деле нужно, где интересы совпадают, а где — нет. Предложи 2 варианта сделки, которые закрывают реальные интересы обеих сторон, не только позиции.'
  comment: Для B2B-сделок, зарплатных переговоров, споров с партнёрами.
- slug: think-anticipate-objections
  category: think/communication
  title: Заранее собранные возражения
  body: Я хочу донести [ИДЕЯ/ПРЕДЛОЖЕНИЕ] до [АУДИТОРИЯ]. Составь список самых вероятных возражений именно этой аудитории, по каждому дай короткий честный ответ — не отговорку, а реальный аргумент, который выдержит встречный вопрос.
  comment: Для питчей инвесторам, презентаций руководству, продаж — где вопросы предсказуемы, если подумать заранее.
- slug: think-say-no-without-burning-bridge
  category: think/communication
  title: Отказ без порчи отношений
  body: 'Мне нужно отказать [КОМУ] в [ЧЁМ], но сохранить хорошие отношения на будущее. Дай 2 варианта отказа: короткий прямой и более мягкий с объяснением. Укажи, в какой ситуации какой уместнее.'
  comment: Для отказа клиенту, партнёру, коллеге — когда важно и не размыто и не грубо.
- slug: think-deliver-bad-news-structure
  category: think/communication
  title: Структура для плохой новости
  body: 'Мне нужно сообщить [ПЛОХАЯ НОВОСТЬ] человеку/команде [КОМУ]. Помоги выстроить порядок: что сказать первым, что дать сразу, чтобы не оставлять в подвешенном состоянии, и чего категорически не говорить в такой ситуации.'
  comment: Для увольнений, срыва сроков, отмены проекта — где порядок слов реально влияет на реакцию.
- slug: think-explain-decision-not-defend
  category: think/communication
  title: Объяснить решение, не оправдываясь
  body: Мне нужно объявить решение [РЕШЕНИЕ], которое понравится не всем. Помоги сформулировать так, чтобы это звучало как объяснение логики, а не как оправдание или извинение — без потери уважения к несогласным.
  comment: Частая ошибка руководителей — объявлять непопулярное решение виноватым тоном.
- slug: think-read-between-lines
  category: think/communication
  title: Что человек на самом деле имеет в виду
  body: 'Вот сообщение, которое я получил: [СООБЩЕНИЕ]. Разбери, что там сказано прямо, а что, вероятно, подразумевается, но не проговорено. Предложи, как ответить, учитывая и то и другое.'
  comment: Для писем от клиентов, начальства, партнёров — где формальный текст скрывает реальный запрос или недовольство.
- slug: think-tone-check-before-send
  category: think/communication
  title: Проверка тона перед отправкой
  body: 'Вот сообщение, которое я собираюсь отправить: [ТЕКСТ]. Прочитай его глазами получателя, который сейчас на взводе или настроен подозрительно. Что там может быть прочитано не так, как я имел в виду?'
  comment: Ловит письма, которые кажутся нейтральными автору, но звучат резко или пассивно-агрессивно получателю.
- slug: think-escalation-vs-patience
  category: think/communication
  title: Эскалировать или подождать
  body: 'Ситуация: [ОПИСАНИЕ КОНФЛИКТА/ПРОБЛЕМЫ С ЧЕЛОВЕКОМ]. Помоги решить: стоит ли эскалировать вопрос выше (руководителю, юристу, третьей стороне), или ещё есть смысл решить напрямую? Что теряется и выигрывается в каждом варианте.'
  comment: Для конфликтов на работе, с подрядчиками, с соседями — где эскалация необратимо меняет отношения.
- slug: think-persuade-with-their-values
  category: think/communication
  title: Убеждение через ценности собеседника, а не свои
  body: Я хочу убедить [КТО] сделать [ЧТО]. Мои причины — [МОИ ПРИЧИНЫ]. Но подумай, какие ценности и приоритеты важны именно этому человеку, и переформулируй аргумент так, чтобы он звучал важным для него, а не для меня.
  comment: Классическая ошибка убеждения — приводить свои резоны вместо резонов собеседника.
- slug: think-apology-that-lands
  category: think/communication
  title: Извинение, которое не звучит формально
  body: 'Я накосячил в ситуации: [ЧТО ПРОИЗОШЛО]. Помоги составить извинение, которое не сваливает вину на обстоятельства, конкретно называет, что было не так, и не превращается в оправдание на середине текста.'
  comment: Формальное 'извините за неудобства' часто раздражает сильнее, чем помогает — этот промпт этого избегает.
- slug: think-give-hard-feedback
  category: think/communication
  title: Сложная обратная связь без смягчения до нуля
  body: Мне нужно дать обратную связь [КОМУ] по поводу [ПРОБЛЕМА]. Помоги сформулировать так, чтобы человек услышал суть, а не только тон, но при этом не унижался и оставался мотивирован исправить, а не защищаться.
  comment: Для менеджеров и HR — баланс между 'слишком мягко, не дошло' и 'слишком жёстко, включилась защита'.
- slug: think-ask-for-more-without-guilt
  category: think/communication
  title: Просьба о большем без чувства вины
  body: Мне нужно попросить [ЧТО, например «повышение/отсрочку/скидку»] у [КОГО]. Помоги сформулировать просьбу прямо и уверенно, без извиняющегося тона и без чрезмерного обоснования, которое звучит как оправдание за саму просьбу.
  comment: Для переговоров о зарплате, дедлайнах, условиях — где неуверенная формулировка снижает шансы заранее.
- slug: think-clarify-without-sounding-clueless
  category: think/communication
  title: Уточняющий вопрос, не выглядящий некомпетентно
  body: Мне непонятно [ЧТО ИМЕННО] в разговоре/задаче с [КЕМ], но я не хочу выглядеть так, будто не в теме. Помоги сформулировать уточняющий вопрос, который звучит как проверка деталей, а не как непонимание основ.
  comment: Для новых сотрудников, младших специалистов на встречах с клиентами или руководством.
- slug: think-set-boundary-professionally
  category: think/communication
  title: Установить границу без конфликта
  body: '[ЧЕЛОВЕК/КЛИЕНТ] регулярно [НЕЖЕЛАТЕЛЬНОЕ ПОВЕДЕНИЕ, например «пишет по ночам с ожиданием мгновенного ответа»]. Помоги сформулировать, как обозначить границу вежливо, но твёрдо, так, чтобы это не выглядело как одноразовая жалоба.'
  comment: Для фрилансеров, консультантов, сотрудников — где границы приходится проговаривать явно, а не намёками.
- slug: think-summarize-meeting-for-absent
  category: think/communication
  title: Пересказ встречи для того, кто не присутствовал
  body: 'Вот заметки/транскрипт встречи: [ЗАМЕТКИ]. Перескажи для человека, который не присутствовал: что решили, что осталось спорным, и что конкретно от него требуется дальше — без пересказа всего разговора по порядку.'
  comment: Для менеджеров, которые пересылают итоги встреч тем, кто в них не участвовал.
- slug: think-defuse-tense-thread
  category: think/communication
  title: Разрядить накалившуюся переписку
  body: 'Вот переписка, которая накаляется: [ПЕРЕПИСКА]. Помоги составить следующее сообщение так, чтобы снизить градус, не сдавая свою позицию и не извиняясь там, где я не виноват.'
  comment: Для email/чат-конфликтов с клиентами или коллегами, где тон уже начал портиться.
- slug: think-pitch-in-one-breath
  category: think/communication
  title: Питч в одно дыхание для занятого человека
  body: Мне нужно донести [ИДЕЯ/ПРОЕКТ] человеку, у которого есть 30 секунд внимания. Сожми до сути так, чтобы за это время он понял, зачем ему в это вникать дальше, без потери главного смысла.
  comment: Для лифтовых питчей инвесторам, руководству, потенциальным партнёрам.
- slug: think-explain-price-increase
  category: think/communication
  title: Сообщить о повышении цены без потери клиента
  body: Мне нужно сообщить клиенту [КЛИЕНТ] о повышении цены на [ПРОДУКТ/УСЛУГА]. Помоги сформулировать так, чтобы объяснить причину по существу, а не звучать как извинение, и предугадать, какой будет первая реакция.
  comment: Для фрилансеров, агентств, любых сервисов с постоянными клиентами.
- slug: think-follow-up-without-nagging
  category: think/communication
  title: Напоминание, не звучащее как назойливость
  body: Я уже писал [КОМУ] по поводу [ЧТО] и не получил ответ. Помоги составить напоминание, которое звучит как забота о процессе, а не как раздражение или давление, и добавь лёгкий повод ответить именно сейчас.
  comment: Для деловой переписки, где важно не показаться навязчивым, но и не потерять сделку в молчании.
- slug: think-explain-mistake-to-client
  category: think/communication
  title: Сообщить клиенту о своей ошибке
  body: 'Я допустил ошибку в работе с клиентом: [ЧТО ПРОИЗОШЛО]. Помоги составить сообщение, которое признаёт факт без самоуничижения, сразу предлагает решение, и не создаёт впечатление, что это случится снова.'
  comment: Для консультантов, подрядчиков, сервисных специалистов — где доверие важнее идеальной репутации.
- slug: think-navigate-office-politics
  category: think/communication
  title: Провести идею через несколько заинтересованных сторон
  body: 'Мне нужно продвинуть [ИДЕЯ/ИЗМЕНЕНИЕ], но в компании несколько людей с разными и иногда противоречащими интересами: [СТОРОНЫ]. Помоги понять, к кому обращаться первым и как формулировать для каждого, чтобы не подставить себя между сторонами.'
  comment: Для внутренних инициатив в компаниях со сложной структурой согласований.
- slug: think-respond-to-public-criticism
  category: think/communication
  title: Ответ на публичную критику
  body: 'Меня/компанию публично раскритиковали за [СИТУАЦИЯ]: [ЦИТАТА КРИТИКИ]. Помоги составить ответ, который признаёт то, что реально было не так, не звучит как оправдание, и не провоцирует дальнейший виток спора.'
  comment: Для соцсетей, отзывов, публичных заявлений — где реакция важнее самого инцидента.
- slug: think-decline-meeting-nicely
  category: think/communication
  title: Отказаться от встречи без обид
  body: Меня пригласили на встречу [ТЕМА], но я считаю, что моё присутствие не нужно или у меня нет на это времени. Помоги вежливо отказаться, предложив альтернативу (асинхронный апдейт, делегат), не выглядя незаинтересованным.
  comment: Для перегруженных календарей — где важно фильтровать встречи, не портя отношения.
- slug: think-explain-technical-to-non-technical
  category: think/communication
  title: Объяснить техническую проблему нетехническому человеку
  body: Мне нужно объяснить [ТЕХНИЧЕСКАЯ ПРОБЛЕМА] человеку без технического бэкграунда, от которого зависит решение (бюджет, сроки). Убери жаргон, но не упрощай до потери сути — покажи, что реально стоит на кону в его терминах (деньги, время, риск).
  comment: Для разработчиков, инженеров, врачей — говорящих с руководством, клиентами, пациентами.
- slug: think-ask-for-referral
  category: think/communication
  title: Попросить рекомендацию, не выглядя навязчивым
  body: Я хочу попросить [КЛИЕНТ/КОЛЛЕГА] порекомендовать меня или мою работу дальше. Помоги сформулировать просьбу так, чтобы это выглядело естественным продолжением хороших отношений, а не просьбой об одолжении.
  comment: Для фрилансеров, консультантов, специалистов, зависящих от сарафанного радио.
- slug: think-set-expectations-early
  category: think/communication
  title: Заранее обозначить ожидания, чтобы не спорить потом
  body: Я начинаю [ПРОЕКТ/СОТРУДНИЧЕСТВО] с [КЕМ]. Помоги сформулировать, какие ожидания стоит проговорить прямо сейчас (сроки, объём правок, каналы связи), чтобы не пришлось выяснять отношения из-за недосказанности позже.
  comment: Профилактика конфликтов лучше их разрешения — этот промпт закрывает вопрос до его возникновения.
- slug: think-say-i-dont-know-professionally
  category: think/communication
  title: Профессионально признать 'я не знаю'
  body: Меня спросили [ВОПРОС], на который у меня нет точного ответа, в контексте, где от меня ждут экспертности. Помоги сформулировать честный ответ, который не подрывает доверие ко мне и сразу предлагает, как я найду ответ.
  comment: Признание незнания без потери авторитета — редкий, но ценный навык в любой экспертной роли.
- slug: think-reframe-complaint-as-request
  category: think/communication
  title: Превратить жалобу в конкретный запрос
  body: 'Я хочу пожаловаться [КОМУ] на [СИТУАЦИЯ], но просто жалоба ничего не изменит. Помоги переформулировать это в конкретный запрос: что именно я хочу, чтобы человек сделал по-другому, без общих слов вроде «быть внимательнее».'
  comment: Жалобы без конкретного запроса редко приводят к изменению поведения — этот промпт решает именно это.
- slug: think-self-critique-loop
  category: think/self-check
  title: Цикл самокритики до результата
  body: 'Сделай [РЕЗУЛЬТАТ]. Затем сам оцени по критерию: [ЧТО ВАЖНО, например «убедительность для инвестора»]. Найди самое слабое место, перепиши только его, оцени заново. Повтори, пока оценка не перестанет расти. Покажи финальную версию и что менялось на каждом круге.'
  comment: 'Универсально: письмо, презентация, оффер, договор — всё, что можно оценить по внятному критерию.'
- slug: think-devils-advocate
  category: think/self-check
  title: Адвокат дьявола против своего же решения
  body: 'Вот решение, которое я собираюсь принять: [РЕШЕНИЕ]. Стань самым жёстким его критиком: найди 3 причины, почему оно провалится, на реальных примерах из этой сферы. Затем скажи, какая из причин реально опасна, а какая — надуманная, и что изменить, чтобы её снять.'
  comment: 'Спасает от решений, принятых на эмоциях: наём, инвестиция, смена стратегии, крупная покупка.'
- slug: think-preflight-checklist
  category: think/self-check
  title: Проверка перед необратимым шагом
  body: 'Перед тем как я [ДЕЙСТВИЕ: подписать, отправить, опубликовать, уволить, инвестировать], прогони это как чек-лист «что должно быть верно, чтобы не пожалеть». Дай вердикт: можно / нет, и точный список того, что нужно проверить или исправить сначала.'
  comment: Универсальный 'стоп-кран' перед любым решением, которое нельзя отменить.
- slug: think-assumption-audit
  category: think/self-check
  title: Аудит скрытых допущений
  body: 'Разбери [ПЛАН/РЕШЕНИЕ] и найди все допущения, которые я принимаю как данность, но не проверял: про рынок, про людей, про сроки, про бюджет. Для каждого скажи, насколько оно рискованно, если окажется неверным, и как его быстро проверить.'
  comment: Для стратегии, бизнес-плана, найма, любого решения на 'предположениях, которые всем кажутся очевидными'.
- slug: think-self-check-against-goal
  category: think/self-check
  title: Проверка результата против исходной цели
  body: 'Вот результат, который я получил: [РЕЗУЛЬТАТ]. Вот цель, ради которой я это делал: [ЦЕЛЬ]. Проверь честно: результат реально приближает к цели, или просто выглядит как прогресс? Укажи конкретно, где расхождение.'
  comment: Ловит ситуации, когда работа сделана, а цель незаметно подменилась процессом.
- slug: think-steelman-then-break
  category: think/self-check
  title: Сначала укрепи аргумент, потом сломай
  body: 'Вот моя позиция: [ПОЗИЦИЯ/АРГУМЕНТ]. Сначала усиль её — приведи лучшую версию этого аргумента, какую только можно построить. Затем, уже на усиленной версии, найди её реальные слабые места. Не подменяй сильную версию слабой, чтобы легче критиковать.'
  comment: Честная проверка сильнее, чем критика соломенного чучела — распространённая ошибка при самопроверке.
- slug: think-outside-view-check
  category: think/self-check
  title: Взгляд со стороны без моего контекста
  body: 'Забудь всё, что я тебе говорил про свою ситуацию с [ЗАДАЧА], кроме голых фактов: [ФАКТЫ]. Оцени план так, как оценил бы посторонний человек, не вовлечённый эмоционально. Совпадает ли его вывод с тем, что предлагал я?'
  comment: Помогает отделить решение от собственной вовлечённости и желаемого исхода.
- slug: think-check-for-motivated-reasoning
  category: think/self-check
  title: Проверка на подгонку фактов под вывод
  body: 'Вот мой вывод: [ВЫВОД], и аргументы, которыми я его подкрепляю: [АРГУМЕНТЫ]. Проверь: я действительно логично пришёл к этому выводу, или подобрал аргументы под то, что уже хотел решить? Укажи, где рассуждение натянуто.'
  comment: 'Ловит частую ловушку: решение принято эмоционально, а аргументы добавлены задним числом.'
- slug: think-worst-case-realistic
  category: think/self-check
  title: Реалистичный, а не панический худший случай
  body: Для плана [ПЛАН] опиши не панический «всё сгорит», а реалистичный худший сценарий, который правда может случиться с разумной вероятностью. Скажи, переживу ли я его, и что заранее подстелить, чтобы не было катастрофой.
  comment: Отличается от общего 'а вдруг всё плохо' — даёт конкретный, вероятный сценарий, а не страшилку.
- slug: think-check-survivorship-bias
  category: think/self-check
  title: Проверка на ошибку выжившего
  body: 'Я хочу повторить успех [ПРИМЕР/КЕЙС] в своей ситуации: [МОЯ СИТУАЦИЯ]. Проверь: этот пример — реально применимая стратегия, или я вижу только тех, у кого получилось, и не вижу тех, у кого тот же подход провалился?'
  comment: Частая ошибка при копировании чужих успешных стратегий без учёта тех, кто пробовал и не выжил.
- slug: think-check-if-solving-right-problem
  category: think/self-check
  title: 'Проверка: решаю ли я правильную проблему'
  body: 'Вот проблема, как я её сформулировал: [ПРОБЛЕМА], и решение, которое я готовлю: [РЕШЕНИЕ]. Проверь: то, что я называю проблемой — это причина, или уже симптом чего-то более глубокого? Если симптом — в чём настоящая проблема?'
  comment: Спасает от красивых решений неправильно поставленной задачи.
- slug: think-check-consistency-across-docs
  category: think/self-check
  title: Проверка на противоречия между документами
  body: 'Вот несколько документов/сообщений на одну тему: [ДОКУМЕНТ 1], [ДОКУМЕНТ 2]. Найди все места, где они противоречат друг другу или создают разные ожидания у того, кто их читает. Укажи точное место и в чём расхождение.'
  comment: Для договоров, коммуникаций с клиентами, внутренних регламентов — где противоречия дорого стоят.
- slug: think-check-what-i-am-avoiding
  category: think/self-check
  title: Что я избегаю проверить
  body: 'Вот план/решение: [ПЛАН]. Угадай, какую часть этого плана я, скорее всего, не проверил внимательно, потому что не хочу услышать плохой ответ. Проверь именно её честно, даже если результат мне не понравится.'
  comment: Люди систематически не проверяют самое болезненное — этот промпт целится именно туда.
- slug: think-check-base-rate
  category: think/self-check
  title: Сверка с базовой вероятностью
  body: Я рассчитываю, что [ОЖИДАНИЕ, например «наш запуск получится как у X»]. Какая реальная базовая частота успеха у подобных начинаний в этой сфере вообще, без привязки к моему конкретному оптимизму? Насколько мой случай особенный, чтобы её обойти?
  comment: Возвращает ожидания к статистике, а не к вдохновлённому единичному примеру.
- slug: think-check-sunk-cost
  category: think/self-check
  title: Проверка на ловушку вложенных ресурсов
  body: 'Я думаю продолжать [ПРОЕКТ/РЕШЕНИЕ], потому что уже вложил [РЕСУРСЫ]. Оцени, будто я начинаю сейчас с нуля, не зная о прошлых вложениях: стоит ли это продолжать исходя только из будущей выгоды?'
  comment: Классическая ловушка невозвратных издержек — промпт убирает эмоциональную привязку к прошлому.
- slug: think-check-if-advice-is-generic
  category: think/self-check
  title: Проверка совета на générик
  body: 'Перечитай свой ответ на [ВОПРОС]. Убери из него всё, что подошло бы к любой похожей ситуации в принципе, и оставь только то, что применимо именно к моим конкретным деталям: [ДЕТАЛИ]. Что осталось?'
  comment: Часто после фильтра остаётся мало — это честный сигнал, что совет был универсальным, а не персональным.
- slug: think-check-emotional-vs-rational
  category: think/self-check
  title: Разделить эмоциональный и рациональный аргумент
  body: 'Вот почему я хочу [РЕШЕНИЕ]: [ПРИЧИНЫ]. Раздели эти причины на те, что основаны на фактах и цифрах, и те, что на самом деле про эмоции, статус или страх. Что останется, если убрать вторые?'
  comment: Не отменяет право на эмоциональное решение, но делает его осознанным, а не спрятанным за рационализацией.
- slug: think-check-if-timing-right
  category: think/self-check
  title: Проверка правильности момента
  body: 'Я планирую [ДЕЙСТВИЕ] сейчас. Оцени честно: это решение зависит от момента, или сработает в любое время? Если от момента — что именно делает сейчас хорошим или плохим временем, и не путаю ли я срочность с важностью.'
  comment: Ловит спешку, принятую за необходимость действовать именно сейчас.
- slug: think-check-alternative-not-considered
  category: think/self-check
  title: Вариант, который я не рассматривал
  body: Я выбираю между [ВАРИАНТ А] и [ВАРИАНТ Б] для [ЗАДАЧА]. Предложи третий вариант, который я, скорее всего, не рассматривал, потому что зациклился на этих двух. Он реально жизнеспособен или нет?
  comment: Часто решение 'застревает' в ложной дилемме из двух вариантов.
- slug: think-check-cost-of-delay
  category: think/self-check
  title: Цена отсрочки решения
  body: 'Я не могу решиться на [РЕШЕНИЕ] и хочу подождать ещё. Оцени честно: что реально теряется от каждой недели/месяца отсрочки, а что — просто моя тревога. Ожидание сейчас помогает или мешает?'
  comment: Разделяет полезную паузу для сбора информации от прокрастинации под видом осторожности.
- slug: think-check-if-i-am-the-problem
  category: think/self-check
  title: Проверка своей роли в повторяющейся проблеме
  body: 'У меня который раз повторяется одна и та же проблема: [ПРОБЛЕМА], но с разными людьми/проектами. Проверь честно: что в этом общего именно во мне или в моём подходе, а не в обстоятельствах, которые каждый раз называю причиной.'
  comment: Для паттернов, которые упорно повторяются — часто общий знаменатель не внешний, а внутренний.
- slug: think-check-plan-b-exists
  category: think/self-check
  title: Проверка на наличие плана Б
  body: Мой план — [ПЛАН], и он целиком опирается на то, что [КЛЮЧЕВОЕ УСЛОВИЕ] сработает. Если это условие не выполнится, что у меня останется? Распиши план Б честно, а не просто скажи «разберёмся по ситуации».
  comment: Ловит планы, которые выглядят надёжно только потому, что никто не проверял, что будет, если пойдёт не так.
- slug: think-check-if-copying-blindly
  category: think/self-check
  title: 'Проверка: копирую вслепую или адаптирую'
  body: 'Я собираюсь применить подход [ЧУЖОЙ ПОДХОД/КЕЙС] к своей ситуации: [МОЯ СИТУАЦИЯ]. Что в этом подходе завязано на условия, которых у меня нет, и что я на самом деле должен изменить, а не скопировать один в один?'
  comment: Прямое копирование чужой стратегии без учёта контекста — частая причина провала.
- slug: think-check-if-good-enough
  category: think/self-check
  title: Проверка на перфекционизм без пользы
  body: 'Вот текущая версия: [РЕЗУЛЬТАТ], и цель: [ЦЕЛЬ/ПОЛУЧАТЕЛЬ]. Честно скажи: она уже достаточно хороша для этой цели, или доработка реально изменит исход? Не улучшай ради улучшения — дай вердикт.'
  comment: Спасает от бесконечной полировки там, где результат уже решает задачу.
- slug: think-check-if-numbers-add-up
  category: think/self-check
  title: Проверка цифр на внутреннюю согласованность
  body: 'Вот расчёт/план с цифрами: [ЦИФРЫ/РАСЧЁТ]. Проверь их на внутреннюю логику: сходятся ли итоги с составляющими, реалистичны ли темпы роста и сроки, нет ли скрытого двойного счёта или забытых статей.'
  comment: Для финансовых моделей, смет, планов продаж — где ошибка в цифрах прячется за уверенным видом таблицы.
- slug: think-check-if-i-understood-the-ask
  category: think/self-check
  title: Проверка правильности понимания задачи
  body: 'Вот задача, как я её понял: [МОЁ ПОНИМАНИЕ], и оригинальный запрос: [ОРИГИНАЛ]. Проверь: я решаю именно то, что просили, или подменил задачу более удобной для себя версией? Укажи расхождение, если оно есть.'
  comment: Частая причина 'сделал хорошо, но не то' — задача незаметно подменяется по пути.
- slug: think-check-if-advice-scales
  category: think/self-check
  title: Проверка совета на масштаб
  body: 'Вот совет/решение для текущего масштаба: [ТЕКУЩИЙ МАСШТАБ]. Проверь: оно продолжит работать, если [ПАРАМЕТР] вырастет в 10 раз, или это решение, которое придётся полностью переделывать при росте?'
  comment: Для процессов и систем, которые проектируются один раз, а потом дорого меняются под нагрузкой.
- slug: think-check-hidden-dependency
  category: think/self-check
  title: Проверка на скрытую зависимость от одного человека/фактора
  body: 'Разбери план [ПЛАН] и найди: держится ли он на одном человеке, одном поставщике или одном условии, без явной замены? Если этот один элемент исчезнет — что произойдёт с остальным планом?'
  comment: Вскрывает хрупкость планов, которые выглядят устойчиво, пока не выпадет один ключевой элемент.
- slug: think-check-final-gut-vs-analysis
  category: think/self-check
  title: Сверка финального решения с интуицией
  body: 'Вот итоговое решение после всего анализа: [РЕШЕНИЕ]. Если бы я решал по чистой интуиции, не читая ни один анализ — куда бы она меня привела? Если направления расходятся — в чём именно, и кому в этом случае доверять больше.'
  comment: Расхождение анализа и интуиции — сигнал, что либо в данных, либо в интуиции есть что-то не учтённое.
- slug: think-role-red-team-expert
  category: think/expert-role
  title: Эксперт + встроенный критик
  body: 'Ты — [РОЛЬ, например «финансовый директор с 15-летним опытом»]. Сделай [ЗАДАЧА]. После того как сделаешь — включи режим самого въедливого критика в этой профессии и разбери свою же работу: где слабое место, что упустил новичок на твоём месте. Перепиши с учётом своей критики.'
  comment: Роль без критика скатывается в общие советы — критик заставляет её отработать по-настоящему.
- slug: think-two-experts-disagree
  category: think/expert-role
  title: Два эксперта, которые не согласны
  body: 'Разбери [ВОПРОС/РЕШЕНИЕ] глазами двух экспертов, которые по опыту расходятся во мнениях: [РОЛЬ 1] и [РОЛЬ 2]. Пусть каждый даст свою рекомендацию и аргументы. Затем укажи, в чём именно их подходы противоречат друг другу и что бы ты выбрал на моём месте.'
  comment: 'Хорошо для решений, где ''правильный'' ответ зависит от точки зрения: юрист vs продакт, врач vs пациент.'
- slug: think-explain-two-levels
  category: think/expert-role
  title: Объясни на два уровня и покажи разрыв
  body: 'Объясни [ТЕМА] так, будто я новичок. Затем объясни то же самое как для эксперта в этой области. В конце покажи: в чём именно версии расходятся — что упрощение скрывает, и когда это упрощение перестаёт работать.'
  comment: Работает для любой темы — от юридического термина до финансовой метрики.
- slug: think-role-veteran-vs-newcomer
  category: think/expert-role
  title: Ветеран профессии против новичка с нуля
  body: 'Реши [ЗАДАЧА] дважды: сначала как человек с 20-летним опытом в этой профессии, у которого есть проверенные шаблоны и интуиция. Потом как способный новичок без багажа, который смотрит на задачу свежим взглядом. Сравни решения — что даёт опыт, а что теряет.'
  comment: Показывает, где опыт помогает, а где превращается в шаблонное мышление.
- slug: think-role-specific-not-generic
  category: think/expert-role
  title: Максимально конкретная роль вместо общей
  body: Не бери роль общего вида. Стань [ОЧЕНЬ КОНКРЕТНАЯ РОЛЬ, например «хирург-ортопед, специализирующийся на спортивных травмах колена у профессиональных спортсменов»]. Разбери [ЗАДАЧА] так, как это сделал бы именно такой узкий специалист, а не эксперт «вообще в этой сфере».
  comment: Узкая роль вытаскивает специфику, которую общая роль сглаживает до банальностей.
- slug: think-role-skeptical-client
  category: think/expert-role
  title: Ты — скептичный клиент этого эксперта
  body: Ты — клиент, который уже обжигался с [РОЛЬ/УСЛУГА] и теперь не доверяет с полуслова. Задай самому себе как эксперту 5 вопросов, которые задал бы такой клиент, и ответь на них честно, без попытки успокоить дежурной фразой.
  comment: 'Для сфер, где доверие — главный барьер: медицина, юруслуги, финансы, ремонт.'
- slug: think-role-explain-own-mistake
  category: think/expert-role
  title: Эксперт разбирает свою типичную ошибку
  body: Ты — [РОЛЬ]. Вспомни (обобщённо, по опыту профессии) типичную ошибку, которую даже опытные специалисты в этой роли допускают в задачах вроде [ЗАДАЧА]. Реши мою задачу так, чтобы явно избежать именно этой ошибки, и покажи, где она обычно прячется.
  comment: Заставляет модель не просто дать 'правильный' ответ, а обойти конкретную ловушку профессии.
- slug: think-role-two-schools-of-thought
  category: think/expert-role
  title: Две разные школы мысли в профессии
  body: В [ОБЛАСТЬ] есть минимум два разных подхода к [ЗАДАЧА/ПРОБЛЕМА] — например, [ШКОЛА 1] и [ШКОЛА 2]. Реши мою задачу по правилам каждой школы отдельно, затем скажи, где они дают разный результат и почему.
  comment: 'Хорошо там, где нет единственно верной методологии: терапия, инвестиции, педагогика, архитектура ПО.'
- slug: think-role-explain-to-boss
  category: think/expert-role
  title: Эксперт объясняет решение своему руководителю
  body: Ты — [РОЛЬ]. Прими решение по [ЗАДАЧА]. Затем представь, что твой руководитель, сам не специалист в этой узкой области, спрашивает «а почему не проще?» — ответь так, чтобы решение выдержало этот вопрос, а не спряталось за терминами.
  comment: Проверяет, держится ли решение без жаргона — часто вскрывает, что оно было выбрано по инерции.
- slug: think-role-decade-ago-vs-now
  category: think/expert-role
  title: Как решали 10 лет назад и как сейчас
  body: Ты — [РОЛЬ]. Как специалист в этой профессии подошёл бы к [ЗАДАЧА] 10 лет назад, и как подходит сейчас? Что изменилось в инструментах, а что в самом мышлении. Дай решение по актуальному подходу с учётом этой разницы.
  comment: Вскрывает устаревшие практики, которые эксперт может тянуть по привычке.
- slug: think-role-worst-case-client
  category: think/expert-role
  title: Худший возможный клиент для этой задачи
  body: Ты — [РОЛЬ]. Реши [ЗАДАЧА] для обычного случая. Затем реши её же для самого сложного, требовательного или проблемного клиента, который тебе попадался в этой профессии. Покажи, что в решении меняется и почему.
  comment: Раскрывает запас прочности решения, а не только его вид в идеальных условиях.
- slug: think-role-explain-limits
  category: think/expert-role
  title: Эксперт честно называет границы своей компетенции
  body: Ты — [РОЛЬ]. Ответь на [ВОПРОС]. Затем явно скажи, где заканчивается твоя компетенция в этой роли и начинается смежная область, требующая другого специалиста — не размывай ответ, а чётко проведи границу.
  comment: 'Полезно там, где важно не давать советы за пределами роли: медицина, право, финансы.'
- slug: think-role-cost-of-being-wrong
  category: think/expert-role
  title: Эксперт оценивает цену своей ошибки
  body: 'Ты — [РОЛЬ]. Дай рекомендацию по [ЗАДАЧА]. Затем честно оцени: если ты не прав, что это будет стоить мне — по деньгам, времени или репутации. Скажи, насколько ты уверен, и стоит ли перепроверять у второго специалиста.'
  comment: Возвращает калибровку уверенности — эксперт не должен звучать одинаково убедительно во всех случаях.
- slug: think-role-teach-junior-colleague
  category: think/expert-role
  title: Эксперт объясняет младшему коллеге, а не клиенту
  body: Ты — [РОЛЬ] с большим опытом. Объясни, как решить [ЗАДАЧА], но не мне как клиенту, а младшему коллеге по профессии, который должен научиться делать это сам. Включи не только «что делать», но и «как я понял, что делать именно так».
  comment: Вытаскивает скрытую интуицию эксперта, а не только конечный результат.
- slug: think-role-different-industries
  category: think/expert-role
  title: Один эксперт, разные отрасли
  body: Ты — [РОЛЬ, например «эксперт по ценообразованию»]. Реши [ЗАДАЧА] так, как решал бы её в [ОТРАСЛЬ 1], а затем — как решал бы в [ОТРАСЛЬ 2]. Покажи, что в подходе универсально, а что специфично для отрасли.
  comment: Полезно, когда переносите чужой опыт в свою нишу и не знаете, что из него реально применимо.
- slug: think-role-under-time-pressure
  category: think/expert-role
  title: Решение в идеальных условиях и в цейтноте
  body: Ты — [РОЛЬ]. Реши [ЗАДАЧА], как если бы у тебя было сколько угодно времени и данных. Затем реши ту же задачу, как если бы у тебя было только [СРОК] и часть информации. Покажи, чем жертвует второе решение и насколько это допустимо.
  comment: Честный взгляд на то, что реально можно сократить под дедлайн, а что нельзя.
- slug: think-role-explain-tradeoff-not-answer
  category: think/expert-role
  title: Эксперт даёт компромисс, а не готовый ответ
  body: Ты — [РОЛЬ]. По вопросу [ВОПРОС] не существует одного правильного ответа — есть компромисс между [ФАКТОР А] и [ФАКТОР Б]. Разложи этот компромисс как эксперт и скажи, от чего зависит, в какую сторону мне сдвигаться.
  comment: Останавливает соблазн модели дать ложно-уверенный единственный ответ там, где его нет.
- slug: think-role-explain-via-analogy
  category: think/expert-role
  title: Эксперт объясняет через аналогию из другой сферы
  body: 'Ты — [РОЛЬ]. Объясни [СЛОЖНАЯ КОНЦЕПЦИЯ ИЗ ТВОЕЙ ОБЛАСТИ] через аналогию из совершенно другой сферы, понятной мне: [БЛИЗКАЯ МНЕ ОБЛАСТЬ]. Затем скажи, где аналогия ломается, чтобы я не перенёс её слишком буквально.'
  comment: Аналогии без предупреждения о границах часто вводят в заблуждение — этот промпт это чинит.
- slug: think-role-explain-industry-jargon
  category: think/expert-role
  title: Расшифровка профессионального жаргона с подвохом
  body: 'Ты — [РОЛЬ]. В [ДОКУМЕНТ/ПРЕДЛОЖЕНИЕ] используются термины: [ТЕРМИНЫ]. Расшифруй каждый простым языком и отдельно отметь те, за которыми обычно прячут невыгодные для клиента условия — это тот случай, или нет?'
  comment: Для договоров, смет, медицинских заключений — где жаргон может маскировать реальный смысл.
- slug: think-role-first-principles
  category: think/expert-role
  title: Решение с нуля, без опоры на шаблоны отрасли
  body: Забудь стандартные практики [ОТРАСЛЬ] на минуту. Ты — [РОЛЬ], решающий [ЗАДАЧА] с нуля, от первых принципов, как будто отраслевых шаблонов не существует. Затем сравни это решение со стандартным подходом — где шаблон себя оправдывает, а где нет.
  comment: Ловит случаи, когда 'так принято в отрасли' давно перестало быть оптимальным.
- slug: think-role-explain-to-regulator
  category: think/expert-role
  title: Эксперт защищает решение перед проверяющим
  body: Ты — [РОЛЬ]. Прими решение по [ЗАДАЧА]. Теперь представь, что тебе нужно защитить это решение перед строгим внешним проверяющим (аудитор, регулятор, комиссия) — какие вопросы он задаст и выдержит ли решение эту защиту без правок?
  comment: Для решений, которые должны быть не только эффективными, но и формально обоснованными.
- slug: think-role-explain-failure-story
  category: think/expert-role
  title: Эксперт рассказывает о типичном провале в этой задаче
  body: Ты — [РОЛЬ]. Прежде чем решать [ЗАДАЧА], опиши обобщённый, но реалистичный сценарий, как именно такие задачи проваливаются в этой профессии чаще всего. Затем реши задачу так, чтобы это конкретный сценарий провала был закрыт.
  comment: Конкретный сценарий провала работает лучше, чем абстрактное 'будь внимателен к рискам'.
- slug: think-role-explain-cheap-vs-right
  category: think/expert-role
  title: Быстрое дешёвое решение против правильного
  body: Ты — [РОЛЬ]. Дай мне быстрое и дешёвое решение [ЗАДАЧА] — то, что делают, когда нет времени или бюджета. Затем дай решение, которое сделал бы, будь у тебя карт-бланш. Честно скажи, чем первое рискует по сравнению со вторым.
  comment: Помогает принять осознанный компромисс, а не случайно выбрать плохой вариант из экономии.
- slug: think-role-explain-what-changed-mind
  category: think/expert-role
  title: Что заставило бы эксперта передумать
  body: 'Ты — [РОЛЬ]. Дай рекомендацию по [ЗАДАЧА]. Затем скажи: какой один новый факт или результат теста заставил бы тебя, как специалиста, полностью пересмотреть совет? Как мне быстрее всего это проверить на практике?'
  comment: Превращает совет эксперта в проверяемую гипотезу, а не в догму.
- slug: think-role-explain-for-different-budgets
  category: think/expert-role
  title: Одно решение под три разных бюджета
  body: 'Ты — [РОЛЬ]. Реши [ЗАДАЧА] для трёх разных бюджетов: минимальный, средний и «деньги не проблема». Не просто масштабируй одно решение — покажи, что меняется по сути на каждом уровне, а не только количество.'
  comment: Для ремонта, найма подрядчиков, маркетинговых кампаний — везде, где бюджет меняет саму стратегию.
- slug: think-role-explain-common-lie
  category: think/expert-role
  title: Что в этой профессии принято приукрашивать
  body: 'Ты — [РОЛЬ]. Расскажи честно: что специалисты в этой профессии обычно приукрашивают или замалчивают перед клиентами по [ЗАДАЧА/УСЛУГА], и как клиенту на моём месте распознать, когда это происходит с ним.'
  comment: 'Для покупки услуг, где силён информационный перекос: авторемонт, юруслуги, стройка, IT-подрядчики.'
- slug: think-role-explain-via-checklist
  category: think/expert-role
  title: Личный чек-лист эксперта для этой задачи
  body: Ты — [РОЛЬ]. Составь чек-лист, по которому ты лично проверяешь себя перед тем как закрыть задачу вроде [ЗАДАЧА] — не общий, а именно твой личный, выстраданный опытом. Затем прогони мою ситуацию по этому чек-листу.
  comment: Личный чек-лист эксперта обычно точнее и практичнее, чем общий отраслевой стандарт.
- slug: think-role-explain-disagreement-with-peer
  category: think/expert-role
  title: Эксперт не согласен с коллегой по этому же вопросу
  body: Ты — [РОЛЬ]. Дай свою рекомендацию по [ЗАДАЧА]. Затем представь, что коллега в той же профессии с тем же опытом дал бы другую рекомендацию — какую именно и почему, и как мне выбрать между вами, не будучи специалистом.
  comment: Честно показывает, где в профессии есть реальные разногласия, а не единое экспертное мнение.
- slug: think-role-explain-signal-vs-noise
  category: think/expert-role
  title: Что реально важно, а что — профессиональный шум
  body: Ты — [РОЛЬ]. В задачах вроде [ЗАДАЧА] специалисты обычно уделяют внимание множеству деталей. Раздели их на то, что реально влияет на результат, и то, что скорее ритуал профессии или перестраховка. Дай решение, сфокусированное на первом.
  comment: Убирает 'профессиональный шум' — вещи, которые эксперты делают по привычке, но не для сути дела.
