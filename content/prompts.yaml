- slug: sql-explain-analyze
  category: code/refactor
  title: "Оптимизация запроса через EXPLAIN ANALYZE"
  body: "Оптимизируй этот медленный SQL-запрос, используя анализ плана выполнения (EXPLAIN ANALYZE): {запрос}."
  comment: "Точка входа для любой проблемы производительности БД."

- slug: sql-migration-concurrent-index
  category: code/generate
  title: "Индекс на лету без блокировки"
