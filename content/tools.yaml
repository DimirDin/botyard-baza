- repo: microsoft/playwright-mcp
  category: mcp/servers
  description_ru: "Браузерная автоматизация и QA-тестирование сайтов через Playwright по протоколу MCP."
  badge: editors_choice
  verify_status: check
  body_md: |
    ### ❓ Что это

    **Playwright MCP** — официальный сервер от **Microsoft**, который даёт LLM доступ к браузеру
    через **Playwright**. Вместо скриншотов и визуальных моделей он передаёт модели структурированное
    accessibility-дерево страницы — то есть агент "видит" DOM как набор ролей и элементов, а не как
    картинку. Это быстрее, детерминированнее и не требует vision-модели.

    ### 🎯 Для чего

    Ставь, если нужен агент, который реально кликает по сайтам: сквозное тестирование, self-healing
    тесты, автозаполнение форм, скрейпинг динамических страниц, длительные автономные сценарии с
    сохранением состояния браузера между шагами. Авторы отдельно отмечают: если ты кодовый агент и
    просто гоняешь тесты/пишешь код — возможно, тебе больше подойдёт `Playwright CLI + SKILLS` (токены
    экономнее), а MCP — для сценариев, где важно долгоживущее состояние страницы и итеративное
    рассуждение над её структурой.

    ### 💻 Как установить

    ```bash
    # Стандартный конфиг для большинства MCP-клиентов (Claude Desktop, Cursor, VS Code и др.)
    {
      "mcpServers": {
        "playwright": {
          "command": "npx",
          "args": ["@playwright/mcp@latest"]
        }
      }
    }

    # Для Claude Code — отдельной командой:
    claude mcp add playwright npx @playwright/mcp@latest
    ```

    ### 🚀 Как пользоваться

    ```
    Требуется Node.js 18+ и любой MCP-клиент: VS Code, Cursor, Windsurf, Claude Desktop, Goose, Junie...
    После подключения агент получает инструменты навигации, кликов и снапшотов accessibility-дерева
    и может, например, выполнить: "открой сайт, найди форму логина, заполни и отправь".
    ```

    ### ⚠️ Грабли

    Персистентный профиль браузера может использоваться только одним инстансом одновременно —
    если несколько MCP-клиентов работают с одним workspace, они будут конфликтовать. Для параллельных
    клиентов запускай их с флагом `--isolated` или указывай отдельный `--user-data-dir` для каждого.

- repo: bytedance/UI-TARS-desktop
  category: apps/desktop
  description_ru: "Движок автоматизации десктопа и веб-интерфейсов с визуальным пониманием интерфейса."
  badge:
  verify_status: check
  body_md: |
    ![](https://raw.githubusercontent.com/bytedance/UI-TARS-desktop/main/images/tars.png)

    ### ❓ Что это

    **TARS** от **ByteDance** — это стек мультимодальных AI-агентов, включающий сразу два продукта:
    **Agent TARS** (CLI + Web UI для агентских задач в терминале, браузере и на компьютере) и
    **UI-TARS Desktop** (нативное десктопное GUI-приложение, управляющее компьютером через
    Vision-Language модель **UI-TARS**). Идея в том, чтобы агент "видел" экран как человек и
    управлял мышью/клавиатурой напрямую, а не только через API.

    ### 🎯 Для чего

    Подходит, когда нужно автоматизировать реальные GUI-сценарии: забронировать рейс или отель на
    сайте, собрать данные и построить график через дополнительные **MCP-серверы**, порулить локальным
    или удалённым компьютером/браузером без написания селекторов. Agent TARS хорош как универсальный
    ассистент с CLI/Web UI, а UI-TARS Desktop — как отдельное приложение для точного управления
    мышью и клавиатурой (кроссплатформенно: Windows/macOS/Browser).

    ### 💻 Как установить

    ```bash
    # Agent TARS: разовый запуск
    npx @agent-tars/cli@latest

    # Или глобальная установка (нужен Node.js >= 22)
    npm install @agent-tars/cli@latest -g

    # Запуск с выбранным провайдером модели
    agent-tars --provider anthropic --model claude-3-7-sonnet-latest --apiKey your-api-key
    ```

    ### 🚀 Как пользоваться

    ```
    agent-tars --provider volcengine --model doubao-1-5-thinking-vision-pro-250428 --apiKey your-api-key
    ```

    Ключевые фичи: **Hybrid Browser Agent** (GUI/DOM/гибрид), **Event Stream** для отслеживания
    работы агента, встроенная поддержка **MCP** для подключения внешних инструментов.

    ### ⚠️ Грабли

    UI-TARS Desktop требует собственную VLM-модель (UI-TARS-1.5/Seed-1.5-VL), это не просто обёртка
    над обычным LLM — без правильно развёрнутой модели GUI-агент работать не будет. Обязательно
    свой `apiKey` для выбранного провайдера при запуске Agent TARS.

- repo: exa-labs/exa-mcp-server
  category: mcp/servers
  description_ru: "Поиск в вебе, спроектированный специально под LLM — чистый текст без рекламы и шума."
  badge:
  verify_status: check
  body_md: |
    ### ❓ Что это

    **Exa MCP Server** от **Exa Labs** подключает AI-ассистентов к поисковому движку **Exa**:
    веб-поиск, поиск кода, ресёрч компаний — всё в виде чистого, готового к использованию LLM
    контента, без рекламного мусора обычной выдачи.

    ### 🎯 Для чего

    Полезен, когда агенту нужно "погуглить" по делу: найти актуальную информацию, вытащить полный
    текст страницы по URL, поискать примеры кода на GitHub/StackOverflow, собрать данные о компании
    или человеке. Есть отдельные **Agent Skills** для Claude Code — готовые пресеты под конкретные
    задачи: `company-research`, `code-search-exa`, `people-research`, поиск финансовых отчётов.

    ### 💻 Как установить

    ```bash
    # Через Claude Code CLI, подключение к готовому облачному серверу Exa
    claude mcp add --transport http exa https://mcp.exa.ai/mcp
    ```

    ### 🚀 Как пользоваться

    ```
    Основные инструменты:
    - web_search_exa — поиск по теме, чистый контент
    - web_fetch_exa — полный текст конкретной страницы по URL
    - web_search_advanced_exa — расширенный поиск с фильтрами по доменам/датам (по умолчанию выключен)
    - agent_create_run / agent_wait_for_run / agent_get_run_output — асинхронный Exa Agent
      для многошагового ресёрча (нужен OAuth или API-ключ)

    Включить дополнительные инструменты можно параметром в URL:
    https://mcp.exa.ai/mcp?tools=web_search_exa,web_search_advanced_exa,web_fetch_exa
    ```

    ### ⚠️ Грабли

    Для npm-варианта (`exa-mcp-server`) обязательно нужен собственный `EXA_API_KEY` — получить его
    можно в личном кабинете Exa. Часть инструментов (`get_code_context_exa`, `company_research_exa`,
    `deep_researcher_start` и др.) уже помечены как **deprecated** — используй их замены
    (`web_search_exa`, `web_search_advanced_exa`), а не устаревшие имена из старых примеров.

- repo: upstash/context7
  category: mcp/servers
  description_ru: "Подтягивает свежую, версионированную документацию библиотек прямо в контекст модели."
  badge: editors_choice
  verify_status: check
  body_md: |
    ![](https://github.com/upstash/context7/blob/master/public/cover.png?raw=true)

    ### ❓ Что это

    **Context7** от **Upstash** решает вечную боль LLM-кодинга: модель обучена на устаревших версиях
    библиотек и придумывает несуществующие API. Context7 в реальном времени подтягивает актуальную,
    версионированную документацию и примеры кода прямо в промпт — никакого переключения вкладок и
    выдуманных методов.

    ### 🎯 Для чего

    Ставь, если постоянно кодишь с помощью Cursor/Claude Code/других агентов и хочешь, чтобы код
    генерировался по актуальной версии библиотеки, а не по данным трёхлетней давности. Работает в
    двух режимах: **CLI + Skills** (без MCP, через команды `ctx7`) или классический **MCP**-сервер.
    Можно явно указывать библиотеку (`use library /supabase/supabase`) или версию ("Next.js 14").

    ### 💻 Как установить

    ```bash
    npx ctx7 setup
    ```

    Команда сама авторизует через OAuth, выдаёт API-ключ и ставит нужный skill под твоего агента.
    Есть флаги `--cursor`, `--claude`, `--opencode` для конкретного клиента.

    ### 🚀 Как пользоваться

    ```
    Create a Next.js middleware that checks for a valid JWT in cookies
    and redirects unauthenticated users to `/login`. use context7
    ```

    MCP-инструменты: `resolve-library-id` (находит ID библиотеки по имени) и `query-docs`
    (тянет документацию по ID вроде `/vercel/next.js`).

    ### ⚠️ Грабли

    Библиотеки в индексе Context7 — это community-контент: сами авторы предупреждают, что не
    гарантируют точность и безопасность всей документации, подозрительный контент можно и нужно
    репортить кнопкой "Report". Также сам MCP-сервер в этом репозитории — только клиентская часть;
    бэкенд, парсер и краулер закрыты и не публикуются.

