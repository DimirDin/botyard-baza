    Настройки анализа задаются файлом `.bsl-language-server.json` в корне проекта — без него сервер работает на дефолтных диагностиках, которые не всегда совпадают с ожиданиями конкретной команды. Проект живой и активно развивается — 3900+ issues/PR, стоит сверяться с актуальной документацией, а не с устаревшими гайдами.

- repo: Nikolay-Shirokov/cc-1c-skills
  category: agents/other
  description_ru: "Skills для полного цикла разработки на 1С:Предприятие 8.3 — обработки, отчёты, публикация на веб-сервере, тестирование через браузер. Версии на PowerShell и Python."
  badge: null
  verify_status: known
  body_md: |
    ![](https://opengraph.githubassets.com/1/Nikolay-Shirokov/cc-1c-skills)

    ### ❓ Что это
    Набор **навыков (skills)** для AI-агентов, в первую очередь для **Claude Code**, закрывающий полный цикл разработки на платформе **1С:Предприятие 8.3** — от создания конфигураций, расширений, внешних обработок и отчётов до загрузки изменений в информационную базу, публикации на веб-сервере (портативный Apache) и тестирования через веб-клиент. Навыки дают модели готовые абстракции над XML-форматами и CLI конфигуратора, а не заставляют разбираться в деталях реализации вручную.

    ### 🎯 Для чего
    Ставь, если разрабатываешь на 1С и хочешь, чтобы агент умел: собирать/разбирать **EPF/ERF** (`/epf-*`, `/erf-*`), работать с макетами **MXL** (`/mxl-*`), управляемыми формами (`/form-*`), ролями (`/role-*`), схемой компоновки данных (`/skd-*`), метаданными конфигурации (`/meta-*`, 23 типа), расширениями (`/cfe-*`), подсистемами (`/subsystem-*`), базами данных (`/db-*`) и веб-публикацией (`/web-*`) — вплоть до автотестов через веб-клиент и записи видеоинструкций с субтитрами и TTS. Проект живой, активно развивается.

    ### 💻 Как установить
    ```
    /plugin marketplace add https://github.com/Nikolay-Shirokov/cc-1c-skills
    /plugin install 1c-skills@cc-1c-skills        # PowerShell (Windows)
    /plugin install 1c-skills-py@cc-1c-skills     # Python (Linux/Mac)
    ```
    Либо просто скопируй `.claude/skills/` из репозитория в корень своего проекта — навыки станут доступны при следующем запуске Claude Code оттуда.

    ### 🚀 Как пользоваться
    ```bash
    python tools/cc-1c-skills/scripts/switch.py claude-code --project-dir .
    ```
    Не обязательно запоминать команды — просто опиши задачу своими словами, Claude сам подберёт нужный навык. Слэш-команды вроде `/epf-init МояОбработка` тоже работают, если нужен точный контроль.

    ### ⚠️ Грабли
    Основной рантайм — **PowerShell 5.1+** на Windows; для Linux/Mac есть Python-порты (ветка `port-claude-code-py`). Флаг `--link` при установке экспериментальный: Node.js резолвит `__dirname` через junction к реальному пути источника навыков, а не к каталогу проекта, из-за чего скиллы с Node.js-скриптами (например `/web-test`) могут писать файлы не туда — при проблемах переключайся на обычное копирование без `--link`.

