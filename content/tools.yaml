    Открываете нужный ноутбук из таблицы рецептов README, например `tool_use/customer_service_agent.ipynb` или `multimodal/getting_started_with_vision.ipynb`, и запускаете ячейки в Jupyter — примеры написаны на Python, но концепции переносимы на любой язык с поддержкой Claude API.

    ### ⚠️ Грабли
    Примеры написаны в первую очередь на Python — если ваш стек другой, придётся переносить логику самостоятельно. Перед использованием третьесторонних интеграций (Pinecone, Voyage AI и т.п.) нужны отдельные ключи/аккаунты этих сервисов.

- repo: anthropics/claude-agent-sdk-python
  category: libs/python
  description_ru: "Официальный Python SDK для сборки агентов на базе Claude — обёртка над Claude Code с поддержкой кастомных инструментов и хуков."
  badge:
  verify_status: known
  body_md: |
    ![](https://opengraph.githubassets.com/1/anthropics/claude-agent-sdk-python)

    ### ❓ Что это
    **Claude Agent SDK for Python** — официальный SDK от Anthropic для программной сборки агентов на Claude. Под капотом использует движок Claude Code (CLI бандлится вместе с пакетом), но даёт Python-интерфейс: асинхронную функцию `query()` для разовых запросов и класс `ClaudeSDKClient` для двусторонних интерактивных сессий с поддержкой кастомных инструментов и хуков.

    ### 🎯 Для чего
    Нужен, когда хотите встроить Claude-агента прямо в своё Python-приложение: с собственными инструментами (**custom tools** через `@tool` и `create_sdk_mcp_server` — работают в том же процессе, без отдельного сервера), с **хуками** (`PreToolUse` и др., которые перехватывают и контролируют поведение агента), с ограничением доступных тулов через `allowed_tools`/`disallowed_tools` и `permission_mode`, либо для миграции со старого `claude-code-sdk`.

    ### 💻 Как установить
    ```bash
    pip install claude-agent-sdk
    ```
    Требуется **Python 3.10+**. Claude Code CLI бандлится автоматически — отдельно ставить не нужно, но можно указать свой через `ClaudeAgentOptions(cli_path="/path/to/claude")`.

    ### 🚀 Как пользоваться
    ```python
    import anyio
    from claude_agent_sdk import query

    async def main():
        async for message in query(prompt="What is 2 + 2?"):
            print(message)

    anyio.run(main)
    ```

    ### ⚠️ Грабли
    При переходе с версий SDK младше 0.1.0 нужно учитывать breaking changes: переименование `ClaudeCodeOptions` → `ClaudeAgentOptions`, изменение конфигурации системного промпта, изоляцию настроек и новые механизмы суб-агентов и форков сессий — детали в `CHANGELOG.md`.

