- repo: microsoft/playwright-mcp
  category: mcp/servers
  description_ru: "Браузерная автоматизация и QA-тестирование сайтов через Playwright по протоколу MCP."
  badge: editors_choice
  verify_status: check
  body_md: |
    ![](https://opengraph.githubassets.com/1/microsoft/playwright-mcp)

    ### ❓ Что это

    **Playwright MCP** — официальный сервер от **Microsoft**, который даёт LLM доступ к браузеру
    через **Playwright**. Вместо скриншотов и визуальных моделей он передаёт модели структурированное
    accessibility-дерево страницы — то есть агент "видит" DOM как набор ролей и элементов, а не как
    картинку. Это быстрее, детерминированнее и не требует vision-модели.

    ### 🎯 Для чего

    Ставь, если нужен агент, который реально кликает по сайтам: сквозное тестирование, self-healing
    тесты, автозаполнение форм, скрейпинг динамических страниц, длительные автономные сценарии с
    сохранением состояния браузера между шагами. Авторы отдельно отмечают: если ты кодовый агент и
    просто гоняешь тесты/пишешь код — возможно, тебе больше подойдёт `Playwright CLI + SKILLS` (токены
    экономнее), а MCP — для сценариев, где важно долгоживущее состояние страницы и итеративное
    рассуждение над её структурой.

    ### 💻 Как установить

    ```bash
    # Стандартный конфиг для большинства MCP-клиентов (Claude Desktop, Cursor, VS Code и др.)
    {
      "mcpServers": {
        "playwright": {
          "command": "npx",
          "args": ["@playwright/mcp@latest"]
        }
      }
    }

    # Для Claude Code — отдельной командой:
    claude mcp add playwright npx @playwright/mcp@latest
    ```

    ### 🚀 Как пользоваться

    ```
    Требуется Node.js 18+ и любой MCP-клиент: VS Code, Cursor, Windsurf, Claude Desktop, Goose, Junie...
    После подключения агент получает инструменты навигации, кликов и снапшотов accessibility-дерева
    и может, например, выполнить: "открой сайт, найди форму логина, заполни и отправь".
    ```

    ### ⚠️ Грабли

    Персистентный профиль браузера может использоваться только одним инстансом одновременно —
    если несколько MCP-клиентов работают с одним workspace, они будут конфликтовать. Для параллельных
    клиентов запускай их с флагом `--isolated` или указывай отдельный `--user-data-dir` для каждого.

- repo: bytedance/UI-TARS-desktop
  category: apps/desktop
  description_ru: "Движок автоматизации десктопа и веб-интерфейсов с визуальным пониманием интерфейса."
  badge:
  verify_status: check
  body_md: |
    ![](https://raw.githubusercontent.com/bytedance/UI-TARS-desktop/main/images/tars.png)

    ### ❓ Что это

    **TARS** от **ByteDance** — это стек мультимодальных AI-агентов, включающий сразу два продукта:
    **Agent TARS** (CLI + Web UI для агентских задач в терминале, браузере и на компьютере) и
    **UI-TARS Desktop** (нативное десктопное GUI-приложение, управляющее компьютером через
    Vision-Language модель **UI-TARS**). Идея в том, чтобы агент "видел" экран как человек и
    управлял мышью/клавиатурой напрямую, а не только через API.

    ### 🎯 Для чего

    Подходит, когда нужно автоматизировать реальные GUI-сценарии: забронировать рейс или отель на
    сайте, собрать данные и построить график через дополнительные **MCP-серверы**, порулить локальным
    или удалённым компьютером/браузером без написания селекторов. Agent TARS хорош как универсальный
    ассистент с CLI/Web UI, а UI-TARS Desktop — как отдельное приложение для точного управления
    мышью и клавиатурой (кроссплатформенно: Windows/macOS/Browser).

    ### 💻 Как установить

    ```bash
    # Agent TARS: разовый запуск
    npx @agent-tars/cli@latest

    # Или глобальная установка (нужен Node.js >= 22)
    npm install @agent-tars/cli@latest -g

    # Запуск с выбранным провайдером модели
    agent-tars --provider anthropic --model claude-3-7-sonnet-latest --apiKey your-api-key
    ```

    ### 🚀 Как пользоваться

    ```
    agent-tars --provider volcengine --model doubao-1-5-thinking-vision-pro-250428 --apiKey your-api-key
    ```

    Ключевые фичи: **Hybrid Browser Agent** (GUI/DOM/гибрид), **Event Stream** для отслеживания
    работы агента, встроенная поддержка **MCP** для подключения внешних инструментов.

    ### ⚠️ Грабли

    UI-TARS Desktop требует собственную VLM-модель (UI-TARS-1.5/Seed-1.5-VL), это не просто обёртка
    над обычным LLM — без правильно развёрнутой модели GUI-агент работать не будет. Обязательно
    свой `apiKey` для выбранного провайдера при запуске Agent TARS.

- repo: exa-labs/exa-mcp-server
  category: mcp/servers
