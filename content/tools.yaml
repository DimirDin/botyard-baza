    Файлы написаны под формат Cursor (`.cursorrules`), для Claude Code синтаксис почти всегда переносится один в один, но специфичные Cursor-плейсхолдеры (`@codebase` и т.п.) нужно убрать.

- repo: tonynguyennvt/cursor-rules-awesome
