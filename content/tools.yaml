    Открыть веб-UI, создать приложение (Chatflow/Agent/Workflow), подключить Anthropic как провайдера модели в настройках, собрать граф узлов визуально.

    ### ⚠️ Грабли
    Полный self-host — это десяток сервисов в docker-compose (Postgres, Redis, Weaviate/векторная БД, worker'ы) — требует заметных ресурсов сервера даже для небольшой команды.

