    ### 🎯 Для чего
    Ставить, чтобы автоматизировать код-ревью PR — Claude комментирует замечания сразу при открытии
    PR, до того как его посмотрит человек, экономя время ревьюера на очевидных проблемах. Полезен для
    triage issues: назначить issue на бота и получить либо ответ с планом решения, либо сразу
    реализацию простого фикса в отдельном PR. Хорошо подходит для команд, которые уже используют
    AWS/GCP/Azure для остальной инфраструктуры — Action поддерживает соответствующие облачные способы
    авторизации без необходимости заводить отдельный ключ напрямую у Anthropic.

    ### 💻 Как установить
    ```
    /install-github-app
    ```
    (команда запускается прямо в Claude Code — дальше мастер сам настроит GitHub App и секреты)

    ### 🚀 Как пользоваться
    ```
    @claude fix the failing test in this PR
    ```

    ### ⚠️ Грабли
    Быстрый старт через `/install-github-app` требует прав администратора репозитория и работает
    только при прямой авторизации через Anthropic API — для AWS Bedrock, Google Vertex AI или
    Microsoft Foundry нужна отдельная ручная настройка по docs/cloud-providers.md, мастер её не
    покрывает.

- repo: anthropics/anthropic-sdk-go
