    Официальная Java-реализация MCP, включает интеграцию со Spring (starter для Spring Boot), синхронный и асинхронный (Reactor) API.

    ### 🎯 Для чего
    Естественный выбор для энтерпрайз-команд на Spring Boot — MCP-сервер поднимается как обычный Spring-бин без дополнительной инфраструктуры.

    ### 💻 Как установить
    ```xml
    <dependency>
