- repo: microsoft/playwright-mcp
  category: mcp/servers
  description_ru: "Браузерная автоматизация и QA-тестирование сайтов через Playwright по протоколу MCP."
  badge: editors_choice
  verify_status: check
  body_md: |
    ### ❓ Что это
    Официальный MCP-сервер от Microsoft, дающий модели браузерную автоматизацию поверх фреймворка
    Playwright. Ключевое отличие от скриншот-based подходов — сервер отдаёт модели структурированное
    accessibility-дерево страницы, а не картинку, поэтому не нужна визуальная модель и не тратятся
    токены на распознавание пикселей. Это делает взаимодействие с браузером детерминированным: агент
    видит именно структуру DOM/доступности, а не пытается угадать координаты кнопки по скриншоту.
    Работает как стандартный MCP-сервер, который подключается одной строкой конфига практически в
    любой MCP-клиент — VS Code, Cursor, Windsurf, Claude Desktop, Goose и другие. У Microsoft есть
    параллельный проект playwright-cli с обвязкой в виде Skills — авторы прямо рекомендуют его вместо
    MCP-варианта для агентов, ориентированных на кодинг, потому что CLI-вызовы дешевле по токенам, чем
    загрузка полной MCP tool-схемы и деревьев доступности в контекст. MCP-версия остаётся уместной для
    задач, где важно долго удерживать состояние браузера между шагами — сквозная автоматизация,
    самовосстанавливающиеся тесты, длинные исследовательские сценарии.

    ### 🎯 Для чего
    Использовать, когда Claude должен не просто написать тест, а реально провести его в живом
    браузере — заполнить форму, дождаться навигации, проверить, что появился нужный элемент. Хорошо
    подходит для QA-сценариев: сгенерировать сценарий регрессионного теста и сразу прогнать его,
    а не только описать шаги текстом. Годится для research-автоматизации — обхода нескольких страниц
    сайта подряд с накоплением состояния, где важно, чтобы агент "помнил", что уже открыл и что
    увидел. Если основная цель — просто дать агенту, пишущему код, возможность запускать браузерные
    команды без лишней токен-нагрузки, разумнее начать с playwright-cli, а не с этого MCP-сервера.

    ### 💻 Как установить
    ```json
    {
      "mcpServers": {
        "playwright": {
          "command": "npx",
          "args": ["@playwright/mcp@latest"]
        }
      }
    }
    ```

    ### 🚀 Как пользоваться
    ```
    Open example.com, fill the login form and take an accessibility snapshot
    ```

    ### ⚠️ Грабли
    Нужен Node.js 18 или новее. Если цель — просто дать кодинг-агенту браузерные команды подешевле по
    токенам, а не долгую сессию с состоянием, README прямо советует взять playwright-cli+SKILLS
    вместо этого MCP-сервера.

- repo: bytedance/UI-TARS-desktop
  category: apps/desktop
  description_ru: "Движок автоматизации десктопа и веб-интерфейсов с визуальным пониманием интерфейса."
  badge: null
  verify_status: check
  body_md: |
    ### ❓ Что это
    Стек мультимодальных AI-агентов от ByteDance, который на самом деле включает в себя два разных
    продукта под одной крышей: Agent TARS — универсальный агент для терминала, браузера и продуктов,
    работающий через CLI и веб-интерфейс, и UI-TARS Desktop — нативное десктопное приложение, дающее
    GUI-агенту на основе модели UI-TARS возможность управлять графическим интерфейсом компьютера
    напрямую, как это делает человек мышью и клавиатурой. В отличие от MCP-серверов, которые дают
    модели структурированный доступ к данным, UI-TARS ориентирован на визуальное понимание интерфейса
    — агент "смотрит" на экран и действует, а не просто вызывает API. Agent TARS дополнительно
    интегрируется с MCP-инструментами, приближая работу к тому, как человек естественно доводит
    задачу до конца через разные приложения. Проект активно развивается и попал в топ трендов GitHub
    (Trendshift). Есть отдельная документация под каждую из двух частей стека.

    ### 🎯 Для чего
    Использовать UI-TARS Desktop, когда задача требует управления десктопными приложениями без API —
    старый софт без интеграций, GUI-инструменты, где нет способа достучаться иначе, кроме как через
    интерфейс. Agent TARS подходит для более широких автоматизаций, объединяющих терминал, браузер и
    MCP-инструменты в одном сценарии — например, собрать данные с сайта, обработать локально и
    выложить результат. Это не замена Claude Code для написания кода, а скорее дополнение для
    задач "нажми кнопку в приложении, которое не даёт программного доступа" — там, где обычный
    агент, работающий с файлами и терминалом, бессилен.

    ### 💻 Как установить
