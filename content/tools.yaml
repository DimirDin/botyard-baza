    ### ❓ Что это
    **LiteLLM** — open-source AI-шлюз, дающий "единый унифицированный интерфейс для вызова 100+ LLM-провайдеров — OpenAI, Anthropic, Gemini, Bedrock, Azure и других — в формате OpenAI". Поставляется как Python SDK и как self-host прокси-сервер с виртуальными ключами, трекингом расходов, guardrails и балансировкой нагрузки.

