    ### ❓ Что это
    **Firecrawl** — API для поиска, скрейпинга и взаимодействия с сайтами в масштабе. Покрывает 96% веба, включая JS-heavy страницы, с P95-задержкой 3.4 секунды на миллионах страниц, и отдаёт результат в markdown, JSON или скриншотах, готовых для LLM.

