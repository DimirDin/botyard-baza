- repo: guardrails-ai/guardrails
  category: code/rules
  description_ru: "Python-фреймворк для валидации входов/выходов LLM и генерации структурированных данных — прогоняет ответы модели через настраиваемые 'guard'-проверки (токсичность, конкуренты, regex и т.д.) из каталога Guardrails Hub."
  badge: null
  verify_status: known
  body_md: |
    ![Guardrails in your application](https://raw.githubusercontent.com/guardrails-ai/guardrails/main/docs/assets/with_and_without_guardrails.svg)

    ### ❓ Что это
    **Guardrails** — Python-фреймворк, который помогает строить надёжные AI-приложения через две функции: 1) запускает Input/Output Guards, детектирующие и смягчающие конкретные типы рисков в ответах LLM, 2) помогает генерировать структурированные данные из LLM (например, по Pydantic-модели). Готовые проверки-валидаторы («guardrails») берутся из каталога **Guardrails Hub**.

    ### 🎯 Для чего
    Ставь, если нужно поставить прослойку между приложением и LLM, которая ловит токсичный контент, упоминания конкурентов, несоответствие regex или произвольной схеме, прежде чем ответ уйдёт пользователю:
    - `RegexMatch` — валидация по regex с `OnFailAction.EXCEPTION`
    - `CompetitorCheck` — блокировка упоминаний конкурентов
    - `ToxicLanguage` — детекция токсичности с порогом
    - `Guard.for_pydantic()` — генерация структурированных данных по Pydantic-схеме
    - standalone-сервер на Flask (`guardrails start`) с REST/OpenAI-совместимым API

    ### 💻 Как установить
    ```bash
    pip install guardrails-ai
    guardrails configure
    guardrails hub install hub://guardrails/regex_match
    ```

    ### 🚀 Как пользоваться
    ```python
    from guardrails import Guard, OnFailAction
    from guardrails.hub import RegexMatch

    guard = Guard().use(
        RegexMatch, regex="\(?\d{3}\)?-? *\d{3}-? *-?\d{4}", on_fail=OnFailAction.EXCEPTION
    )
    guard.validate("123-456-7890")
    ```
    Для production-режима как отдельного сервиса: `guardrails start --config=./config.py`, рекомендуется деплоить через Docker + Gunicorn.

    ### ⚠️ Грабли
    **Важно проверять версию пакета перед продовым использованием.** 12 мая 2026 года был обнаружен supply chain compromise в пакете `guardrails-ai` версии **0.10.1** на PyPI (описан в issue-трекере проекта под тегом socket-threat-research-team #1473). Прежде чем ставить этот пакет в прод-окружение, сверь установленную версию и убедись, что она не совпадает с скомпрометированной.

- repo: The-PR-Agent/pr-agent
  category: code/ci-cd
  description_ru: "Open-source AI-ревьюер пул-реквестов — community-форк/продолжение оригинального PR-Agent, переданного Qodo сообществу; это НЕ коммерческий продукт Qodo Merge (бывший Codium-ai)."
  badge: null
  verify_status: known
  body_md: |
    ![](https://www.qodo.ai/images/pr_agent/diagram-v0.9.png)

    ### ❓ Что это
    **PR-Agent** — открытый AI-агент для код-ревью пул-реквестов, "The Original Open-Source PR Reviewer". Важное уточнение из README: это **community-поддерживаемый legacy-проект Qodo**, отдельный от основного коммерческого продукта Qodo для код-ревью (бывший Codium-ai / Qodo Merge). Qodo подарила PR-Agent open-source сообществу, репозиторий теперь живёт в организации `the-pr-agent` и развивается внешними мейнтейнерами (первый — Naor Peled).

    ### 🎯 Для чего
    Ставь, если хочешь автоматический AI-ревью PR без привязки к платному SaaS: каждый инструмент (`/describe`, `/review`, `/improve`, `/ask`) делает один LLM-вызов (~30 секунд, дёшево). Работает с GitHub, GitLab, Bitbucket, Azure DevOps, Gitea; поддерживает OpenAI GPT, Claude, Deepseek и другие модели через конфиг.
    - `/describe` — автогенерация описания PR
    - `/review` — код-ревью с фидбеком
    - `/improve` — предложения по улучшению кода
    - `/ask` — вопросы по PR, включая ask на конкретных строках кода

    ### 💻 Как установить
    ```bash
    pip install pr-agent
    export OPENAI_KEY=your_key_here
    ```
    Или как GitHub Action:
    ```yaml
    # .github/workflows/pr-agent.yml
    name: PR Agent
    on:
      pull_request:
        types: [opened, synchronize]
    jobs:
      pr_agent_job:
        runs-on: ubuntu-latest
        steps:
        - name: PR Agent action step
          uses: the-pr-agent/pr-agent@main
          env:
            OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    ```

    ### 🚀 Как пользоваться
    ```bash
    pr-agent --pr_url https://github.com/owner/repo/pull/123 review
    ```

    ### ⚠️ Грабли
    Docker-образы переехали: релизы **0.34.2+** публикуются под `pragent/pr-agent` на Docker Hub, старые релизы (до `v0.31` включительно) остались замороженным архивом в `codiumai/pr-agent` — при апгрейде обнови все `image:` / `docker pull` / `uses: docker://` ссылки. Не путай этот репозиторий с коммерческим Qodo Merge — там другой, более функциональный движок и отдельная модель распространения.

- repo: assistant-ui/assistant-ui
  category: apps/web
  description_ru: "TypeScript/React-библиотека композируемых примитивов для быстрой сборки продакшен-уровня чат-интерфейсов в духе ChatGPT — стриминг, retries, вложения и генеративный UI из коробки."
  badge: null
  verify_status: known
  body_md: |
    ![assistant-ui starter template](https://raw.githubusercontent.com/assistant-ui/assistant-ui/main/.github/assets/assistant-ui-starter.gif)

    ### ❓ Что это
    **assistant-ui** — открытая TypeScript/React-библиотека для быстрой сборки продакшен-уровня AI чат-интерфейсов ("The UX of ChatGPT in your React app"). Вместо одного монолитного чат-компонента даёт набор composable-примитивов — `Thread`, `Message`, `Composer`, `ThreadList`, `ActionBar` — из которых собирается любой UX, со стилями либо своими, либо готовыми на базе shadcn/ui.

    ### 🎯 Для чего
    Ставь, если строишь свой AI-чат на React и не хочешь писать стриминг, авто-скролл, retry, вложения файлов, markdown-рендеринг и подсветку кода с нуля:
    - streaming, auto-scroll, retries, attachments, markdown, code highlighting, voice dictation, keyboard shortcuts, accessibility — из коробки
    - **Generative UI**: рендер tool calls как React-компонентов, inline human approvals
    - бэкенды: `@assistant-ui/react-ai-sdk` (Vercel AI SDK), `@assistant-ui/react-langgraph`/`react-langchain`, `@assistant-ui/react-ag-ui`/`react-a2a`, `@assistant-ui/react-data-stream` для кастомного бэкенда
    - модели: OpenAI, Anthropic, Google Gemini, Mistral, Perplexity, AWS Bedrock, Azure, Fireworks, Ollama

    ### 💻 Как установить
    ```bash
    npx assistant-ui@latest create   # новый проект
    npx assistant-ui@latest init     # добавить в существующий
    ```
    Или напрямую:
    ```bash
    npm install @assistant-ui/react @assistant-ui/react-ai-sdk
    ```

    ### 🚀 Как пользоваться
    ```tsx
    "use client";
    import { AssistantRuntimeProvider } from "@assistant-ui/react";
    import { useChatRuntime } from "@assistant-ui/react-ai-sdk";
    import { Thread } from "@/components/assistant-ui/thread";

    export function Chat() {
      const runtime = useChatRuntime();
      return (
        <AssistantRuntimeProvider runtime={runtime}>
          <Thread />
        </AssistantRuntimeProvider>
      );
    }
    ```
    `useChatRuntime` по умолчанию цепляется к Vercel AI SDK — замени на `useLangGraphRuntime`, `useDataStreamRuntime` или свой рантайм под собственный бэкенд.

    ### ⚠️ Грабли
    Библиотека распространяется под MIT, но часть фич (managed thread history, telemetry, file storage) доступна только через платный **Assistant Cloud** (`assistant-cloud`) — то есть не весь стек полностью self-hosted "из коробки". Для React Native и терминала (Ink) нужны отдельные пакеты `@assistant-ui/react-native` и `@assistant-ui/react-ink`.

