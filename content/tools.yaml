- repo: anthropics/anthropic-sdk-typescript
  category: libs/javascript
  description_ru: "Официальная TypeScript/JavaScript-библиотека Anthropic для работы с Claude API из Node.js, Deno, Bun и edge-рантаймов — база для любого серверного интеграционного проекта."
  badge: editors_choice
  verify_status: known
  body_md: |
    ![](https://raw.githubusercontent.com/anthropics/anthropic-sdk-typescript/main/.github/logo.svg)

    ### ❓ Что это
    **Claude SDK for TypeScript** — официальная библиотека **Anthropic** для интеграции Claude API в серверные TypeScript- и JavaScript-приложения. Поддерживает несколько рантаймов: `Node.js 20 LTS+`, `Deno v1.28.0+`, `Bun 1.0+`, `Cloudflare Workers` и `Vercel Edge Runtime`. Требует **TypeScript 4.9+**.

    ### 🎯 Для чего
    Ставь, если пишешь бэкенд или serverless-функцию на TS/JS и хочешь дергать `messages.create` напрямую, без обёрток и лишних абстракций — это первоисточник, на котором построены многие другие инструменты.

    ### 💻 Как установить
    ```bash
    npm install @anthropic-ai/sdk
    ```

    ### 🚀 Как пользоваться
    ```js
    import Anthropic from '@anthropic-ai/sdk';

    const client = new Anthropic({
      apiKey: process.env['ANTHROPIC_API_KEY'],
    });

    const message = await client.messages.create({
      max_tokens: 1024,
      messages: [{ role: 'user', content: 'Hello, Claude' }],
      model: 'claude-opus-4-6',
    });

    console.log(message.content);
    ```

    ### ⚠️ Грабли
    Использование в браузере **по умолчанию отключено** из соображений безопасности (ключ API светился бы в клиентском коде) — включать его нужно явно и осознанно, для продакшена так делать не стоит.

