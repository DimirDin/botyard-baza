- repo: HUANGCHIHHUNGLeo/claude-real-video
  category: cli/skill
  description_ru: "CLI-утилита crv: локально режет видео на сцены, дедуплицирует кадры и снимает транскрипт — Claude «смотрит» видео без загрузки в облако."
  verify_status: known
  body_md: |
    ![](/tools/claude-real-video-demo.gif)

    ### ❓ Что это
    **claude-real-video (crv)** — Python-утилита, которая скачивает видео (YouTube/Instagram/TikTok/локальный файл) или берёт локальный файл и превращает его в набор ключевых кадров + текстовый транскрипт, которые можно скормить любой LLM. Вместо фиксированной выборки «1 кадр в секунду» (как у большинства решений, включая нативный Gemini) crv детектит смену сцены и дедуплицирует похожие кадры — в README пример: 58-секундный ролик при fps=1 даёт 58 кадров, crv оставляет 26 реально различающихся. Весь процессинг — локально, MIT-лицензия.

    ### 🎯 Для чего
    Полезно, когда нужно проанализировать чужой видеоролик (структуру, хук, монтаж конкурента) или дать Claude Code «посмотреть» баг-репорт в виде скринкаста — без ручной нарезки кадров и без отправки видео в чужое облако. Ставится как обычный skill в Claude Code — дальше просто кидаете ссылку в чат.

    ### 💻 Как установить
    ```bash
    pip install claude-real-video              # ядро (кадры + дедуп)
    pip install "claude-real-video[whisper]"    # + транскрипция аудио
    ```
    Нужен `ffmpeg`/`ffprobe` в PATH (`brew install ffmpeg` / `apt install ffmpeg`). Как skill для Claude Code:
    ```bash
    mkdir -p ~/.claude/skills && cp -r skills/claude-real-video ~/.claude/skills/
    ```

    ### 🚀 Как пользоваться
    ```bash
    crv "https://www.youtube.com/watch?v=..."
    # → crv-out/frames/*.jpg + crv-out/transcript.txt + crv-out/MANIFEST.txt
    ```
    Дальше кадры + `MANIFEST.txt` отдаются в Claude/ChatGPT/Gemini. Флаг `--why "find the pricing strategy"` фокусирует анализ на конкретной цели, `--kb ~/notes` сохраняет результат как заметку.

    ### ⚠️ Грабли
    Платная **crv Pro** ($19 разово) добавляет анализ движения камеры и монтажного ритма — бесплатная версия отвечает только «что на экране», не «как это снято». Скачивание видео по URL — только то, на что есть права (`--cookies` предназначен для собственного авторизованного доступа, не для обхода приватности чужих аккаунтов).

- repo: bradautomates/claude-video
  category: cli/skill
  description_ru: "Плагин /watch для Claude Code — Claude смотрит любое видео (YouTube/TikTok/Loom/локальный файл): кадры + таймкоды + транскрипт, ставится в один клик через /plugin."
  verify_status: known
  body_md: |
    ![](https://opengraph.githubassets.com/1/bradautomates/claude-video)

    ### ❓ Что это
    **Claude Video (`/watch`)** — плагин/скилл, который даёт Claude Code возможность реально «посмотреть» видео: по URL (всё, что поддерживает `yt-dlp` — YouTube, Loom, TikTok, X, Instagram и сотни других) или локальному файлу вытаскивает кадры (scene-aware либо быстрый keyframe-режим), получает таймкодированный транскрипт (сначала бесплатные субтитры, при их отсутствии — Whisper) и читает каждый кадр как изображение — так модель отвечает по тому, что реально видно и слышно, а не по названию или обрывку транскрипта.

    ### 🎯 Для чего
    Прямое попадание в контент-конвейер: разбор структуры/хука чужого вирального ролика, диагностика бага по присланному скринкасту, саммари длинного видео/плейлиста в заметки, вычленение сути из хайповых launch-видео. Встроенная логика бюджета кадров и дедупликации не даёт разово сжечь контекст на длинном ролике.

    ### 💻 Как установить
    ```
    /plugin marketplace add bradautomates/claude-video
    /plugin install watch@claude-video
    ```
    Есть и вариант через `npx skills add bradautomates/claude-video -g` (для Codex/Cursor/Copilot/Gemini CLI и 50+ других хостов), а также ручная установка `.skill`-файла для claude.ai (web). `yt-dlp` и `ffmpeg` ставятся сами при первом запуске (через brew на macOS).

    ### 🚀 Как пользоваться
    ```
    /watch https://youtu.be/dQw4w9WgXcQ what happens at the 30 second mark?
    ```
    Можно указать `--start`/`--end` для фокуса на конкретном отрезке, или `--detail token-burner` для полного покрытия без урезания кадров на длинном видео.

    ### ⚠️ Грабли
    Whisper-транскрипция (когда у видео нет субтитров) требует API-ключ (Groq или OpenAI) — бесплатны только субтитры от `yt-dlp`. На длинных видео (>10 мин) дефолтный бюджет кадров даёт «sparse scan» — для детального разбора конкретного момента лучше сразу сузить через `--start`/`--end`, а не гонять полный проход.



