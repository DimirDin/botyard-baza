- repo: All-Hands-AI/OpenHands
  category: apps/desktop
  description_ru: "Open-source платформа AI-агентов-разработчиков с полным циклом задач."
  badge: null
  verify_status: check
  body_md: |
    ### ❓ Что это
    Проект существенно эволюционировал: изначальный OpenHands-агент теперь обёрнут в более широкий
    продукт "Agent Canvas" — self-hosted центр управления кодинг-агентами и автоматизациями, а не
    только сам агент. Ключевая идея — Canvas не привязан к одному агенту: из коробки он умеет
    запускать штатного open-source агента OpenHands, но с тем же успехом подключает сторонних агентов
    — Claude Code, Codex, Gemini — через протокол Agent-Client Protocol (ACP). Запускается локально
    на своей машине по умолчанию, но может подключаться к разным "бэкендам агента" — Docker-
    контейнерам, виртуальным машинам, инфраструктуре компании, либо к облаку OpenHands Cloud/
    Enterprise. Позволяет строить автоматизации по расписанию или по вебхукам — например, автоматически
    декомпозировать GitHub issue на задачи или публиковать сгенерированный отчёт в Slack. Авторы
    отдельно предупреждают, что код сейчас переезжает: сам агент и agent server теперь живут в
    OpenHands/software-agent-sdk, а Agent Canvas — в OpenHands/agent-canvas, этот репозиторий —
    переходная точка между старой и новой структурой.

    ### 🎯 Для чего
    Разворачивать, когда нужен единый self-hosted центр управления сразу несколькими кодинг-агентами
    (в том числе Claude Code) с историей разговоров и автоматизациями, а не отдельный терминал под
    каждый агент. Интеграции со Slack, GitHub, Linear через готовые автоматизации пригождаются, чтобы
    агент реагировал на события (новый issue, вебхук) без ручного запуска сессии каждый раз. ACP-
    поддержка полезна, если хочется сохранить существующий выбор агента (например, Claude Code), но
    получить вокруг него единый UI, расписания и мультибэкендный запуск, которого нет в самом
    терминальном инструменте.

    ### 💻 Как установить
    ```bash
    npm install -g @openhands/agent-canvas
    agent-canvas
    ```

    ### 🚀 Как пользоваться
    Открыть веб-интерфейс Agent Canvas → подключить бэкенд агента (локальный, Docker или облачный) →
    создать автоматизацию или начать разговор с агентом прямо из UI.

    ### ⚠️ Грабли
    Вариант без Docker-песочницы запускает agent-server прямо на хосте с полным доступом к файловой
    системе — README явно предупреждает об этом; для изоляции стоит выбирать вариант с Docker-
    песочницей и отдельным `PROJECTS_PATH`.

