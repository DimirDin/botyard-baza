    - Использовать **LLM Router** — серверную маршрутизацию запросов по эвристике, которая сама выбирает подходящую модель под тип входа (картинки, инструменты, обычный текст).
    - Подключать **MCP-серверы** для вызова инструментов и функций прямо в диалоге.
    - Кастомизировать брендинг (название, ассеты, описания) через переменные окружения.

    ### 💻 Как установить
    ```bash
    git clone https://github.com/huggingface/chat-ui
    cd chat-ui
    npm install
    ```
    Перед запуском создайте `.env.local` с ключами доступа к нужному провайдеру (пример для Hugging Face, llama.cpp, Ollama, OpenRouter, Poe — в документации репозитория).

    ### 🚀 Как пользоваться
    Запустите dev-сервер стандартными командами Node.js после настройки `.env.local` и подключения MongoDB. Для продакшена в репозитории описаны процедуры сборки и **Docker-деплой**.

    ### ⚠️ Грабли
    Без переменной `OPENAI_BASE_URL` и корректно настроенного `.env.local` приложение не подключится ни к одной модели — проект больше не поддерживает старые провайдер-специфичные конфиги напрямую, всё идёт через OpenAI-совместимый слой. Также обязательно нужна MongoDB — без неё не сохранятся ни история чатов, ни настройки пользователей.

- repo: TabbyML/tabby
  category: apps/vscode
  description_ru: "Self-hosted AI-ассистент для кода — открытая альтернатива GitHub Copilot с автодополнением, чатом и поддержкой потребительских GPU."
  badge: null
  verify_status: known
  body_md: |
    ![Demo](https://user-images.githubusercontent.com/388154/230440226-9bc01d05-9f57-478b-b04d-81184eba14ca.gif)
    ### ❓ Что это
    **Tabby** — self-hosted AI-ассистент для написания кода, открытая и локальная альтернатива GitHub Copilot. Работает автономно: не требует внешней СУБД или облачного сервиса, отдаёт **OpenAPI-интерфейс** для лёгкой интеграции с существующей инфраструктурой (например, облачными IDE), и поддерживает **потребительские GPU**.

    ### 🎯 Для чего
    - Автодополнение кода и **чат-панель** прямо в IDE (VSCode, Vim, IntelliJ и другие).
    - **Answer Engine** — центральный движок знаний для команды разработки, интегрируется с внутренними данными (репозитории, GitLab MR, документация через REST API).
    - Индексация контекста репозитория (в т.ч. GitLab Merge Request) для более точных подсказок.
    - Развёртывание своего сервера инференса с выбором модели автодополнения и чат-модели.

    ### 💻 Как установить
    Запуск сервера Tabby через Docker за одну минуту:
    ```bash
    docker run -it \
      --gpus all -p 8080:8080 -v $HOME/.tabby:/data \
      tabbyml/tabby \
      serve --model StarCoder-1B --device cuda --chat-model Qwen2-1.5B-Instruct
    ```
    Для сборки из исходников:
    ```bash
    git clone --recurse-submodules https://github.com/TabbyML/tabby
    cd tabby
    ```
    Если репозиторий уже клонирован без `--recurse-submodules`, нужно выполнить `git submodule update --recursive --init`, затем поставить зависимости (`brew install protobuf` на macOS, `apt install protobuf-compiler libopenblas-dev` на Ubuntu/Debian) и собрать через `cargo build`.

    ### 🚀 Как пользоваться
    После запуска сервера подключите один из **IDE/Editor Extensions** (VSCode, Vim, IntelliJ и др.) к своему инстансу Tabby и настройте параметры через раздел **Configuration** в документации.

    ### ⚠️ Грабли
    Клонировать репозиторий нужно **обязательно с `--recurse-submodules`** — иначе сборка не найдёт нужные подмодули, и придётся вручную выполнять `git submodule update --recursive --init`. Для GPU-инференса через Docker потребуется правильно настроенный `--gpus all` и совместимый драйвер CUDA.

