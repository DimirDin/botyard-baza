- repo: jlowin/fastmcp
  category: mcp/frameworks
  description_ru: "Python-фреймворк для быстрой сборки MCP-серверов и клиентов."
  badge: editors_choice
  verify_status: check
  body_md: |
    ![](https://raw.githubusercontent.com/PrefectHQ/fastmcp/main/docs/assets/brand/f-watercolor-waves-2.png)

    ### ❓ Что это

    **FastMCP** — Python-фреймворк для протокола **Model Context Protocol**, сделанный командой
    **Prefect**. FastMCP 1.0 в своё время вошёл в официальный MCP Python SDK, а актуальная
    самостоятельная версия сегодня скачивается миллион раз в день и, по словам авторов, лежит в
    основе около **70%** всех MCP-серверов на любых языках.

    ### 🎯 Для чего

    Ставь, когда пишешь MCP-сервер или клиента на Python и не хочешь вручную городить схемы,
    валидацию и протокольный жизненный цикл. У FastMCP три "столпа": **Servers** — оборачивают
    твои Python-функции в MCP tools/resources/prompts; **Clients** — подключаются к любому серверу
    (локальному или удалённому) с полной поддержкой протокола; **Apps** — дают инструментам
    интерактивный UI прямо внутри диалога с моделью.

    ### 💻 Как установить

    ```bash
    uv pip install fastmcp
    ```

    ### 🚀 Как пользоваться

    ```python
    from fastmcp import FastMCP

    mcp = FastMCP("Demo 🚀")

    @mcp.tool
    def add(a: int, b: int) -> int:
        """Add two numbers"""
        return a + b

    if __name__ == "__main__":
        mcp.run()
    ```

    ### ⚠️ Грабли

    Если после `pip`-апгрейда с версии 3.2 или более ранней `import fastmcp` падает — нужно
    выполнить `pip install --force-reinstall fastmcp` (баг известен, `uv` этой проблемы не имеет).
    Для продакшена авторы отдельно продвигают платный **Prefect Horizon** как enterprise-шлюз —
    сам FastMCP остаётся бесплатным и open-source.

- repo: docker/mcp-gateway
  category: mcp/docker
  description_ru: "Шлюз Docker для запуска и оркестрации MCP-серверов в контейнерах."
  badge:
  verify_status: check
  body_md: |
    ![](https://raw.githubusercontent.com/docker/mcp-gateway/main/img/enable_toolkit.png)

    ### ❓ Что это

    **Docker MCP Gateway** — CLI-плагин `docker-mcp`, который стоит за **MCP Toolkit** в Docker
    Desktop. Каждый MCP-сервер из каталога Docker MCP Catalog запускается в изолированном
    Docker-контейнере, а сам Gateway даёт AI-клиентам (VS Code, Cursor, Claude Desktop и др.) единую
    точку подключения ко всем этим серверам сразу.

    ### 🎯 Для чего

    Нужен, если хочешь безопасно и предсказуемо раскатывать MCP-серверы в продакшене или на команде:
    единое управление секретами через Docker Desktop (ключи не светятся в переменных окружения),
    встроенные **OAuth**-флоу для серверов, требующих авторизации, динамическое обнаружение
    инструментов и единая конфигурация, общая для всех подключённых клиентов.

    ### 💻 Как установить

    ```bash
    git clone https://github.com/docker/mcp-gateway.git
    cd mcp-gateway
    mkdir -p "$HOME/.docker/cli-plugins/"
    make docker-mcp
    ```

    ### 🚀 Как пользоваться

    ```bash
    # Создать профиль с сервером из каталога
    docker mcp profile create --name dev-tools --server catalog://mcp/docker-mcp-catalog/github

    # Запустить сам Gateway (stdio, дефолтный профиль)
    docker mcp gateway run

    # Или в потоковом режиме на порту
    docker mcp gateway run --port 8080 --transport streaming
    ```

    ### ⚠️ Грабли

    Нужен **Docker Desktop 4.59+** с включённой фичей MCP Toolkit. Если работаешь без Docker Desktop
    (WSL2, Docker CE, контейнерная среда) и видишь ошибку "Docker Desktop is not running" —
    выставляй `DOCKER_MCP_IN_CONTAINER=1`, а фичу профилей включай вручную командой
    `docker mcp feature enable profiles`.

- repo: southleft/figma-console-mcp
  category: mcp/servers
  description_ru: "MCP-сервер для доступа к консоли и данным Figma прямо из агента."
  badge:
  verify_status: check
  body_md: |
    ### ❓ Что это

    **Figma Console MCP** от студии **Southleft** превращает Figma в API для AI-агента: сервер даёт
    Claude и другим MCP-клиентам доступ к дизайн-системе Figma — переменным, компонентам, стилям,
    а также к консоли и скриншотам через плагин **Desktop Bridge**.

    ### 🎯 Для чего

    Полезен дизайнерам и разработчикам, которые хотят управлять Figma через естественный язык:
    извлечение design tokens в формате DTCG, двусторонняя синхронизация токенов код↔Figma, создание
    фреймов/компонентов/component-set'ов из матрицы вариантов одним вызовом, визуальный дебаг через
    скриншоты, работа с **FigJam**-досками и **Figma Slides**, а также проверка доступности (14
    WCAG-чеков) и паритета дизайна с кодом.

    ### 💻 Как установить

    ```bash
