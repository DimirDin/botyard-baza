    в настройках, выбери одного из 300+ ассистентов или создай своего, подключи MCP-серверы
    для расширения возможностей агента.
    ```

    ### ⚠️ Грабли

    Community-версия распространяется под **AGPL-3.0** с дополнительными условиями (Apache 2.0 +
    Addendum Terms для части кода) — коммерческое использование разрешено, но требует полного
    соответствия условиям лицензии; для снятия ограничений AGPL нужна отдельная коммерческая
    лицензия от авторов.

