  badge: editors_choice
  verify_status: check
  body_md: |
    ### ❓ Что это
    **CrewAI** — открытый Python-фреймворк для построения продакшн-готовых мультиагентных workflow, за которым стоит компания **CrewAI Inc**. Даёт два уровня абстракции: **CrewAI Crews** — ролевые автономные агенты, работающие совместно, и **CrewAI Flows** — событийно-управляемые автоматизации с точным контролем, одиночными вызовами LLM и нативной поддержкой Crews внутри. Через курсы на learn.crewai.com сертифицировано уже больше **100 000 разработчиков** — по сути один из стандартов в теме продакшн-агентов.

    Для организаций есть коммерческая надстройка **CrewAI AMP Suite** — управляемый деплой, трейсинг и observability, governance и security, часть возможностей (**Crew Control Plane**) доступна бесплатно через app.crewai.com.

    ### 🎯 Для чего
    Примеры применения из README: написание job description, планировщик поездок (trip planner), анализ акций (stock analysis) — то есть не только код, а произвольные многошаговые бизнес-задачи, где нужно несколько ролей-агентов с разными целями. Для Claude Code есть даже готовый набор скиллов, подключаемых как плагин:
    - `getting-started` — скаффолдинг новых проектов, выбор между `LLM.call()` / `Agent` / `Crew` / `Flow`;
    - `design-agent` — настройка агентов (role, goal, backstory, tools, LLMs, memory, guardrails);
    - `design-task` — описания задач, зависимости, структурированный вывод (`output_pydantic`, `output_json`);
    - `ask-docs` — обращение к живому MCP-серверу документации CrewAI.

    ### 💻 Как установить
    ```bash
    pip install crewai
    ```
    Для интеграции с Claude Code:
    ```bash
    /plugin marketplace add crewAIInc/skills
    /plugin install crewai-skills@crewai-plugins
    /reload-plugins
    ```
    Для Cursor/Codex/Windsurf и других — через [skills.sh](https://skills.sh/crewaiinc/skills):
    ```bash
    npx skills add crewaiinc/skills
    ```

    ### 🚀 Как пользоваться
    Базовый сценарий — создать `Agent` с ролью/целью/бэкграундом, объединить нескольких агентов и задачи в `Crew` (или собрать `Flow` для событийного пайплайна) и запустить через `crew.py`/`main.py`. Подробные примеры (Trip Planner, Stock Analysis, совместное использование Crews и Flows) — в README и доках crewai.com.

    ### ⚠️ Грабли
    Проект по умолчанию собирает **телеметрию использования** (об этом отдельно предупреждает README) — если это критично, её нужно явно отключать. Часть возможностей (трейсинг, unified control plane, продвинутая observability) доступна только в коммерческом **CrewAI AMP Suite**, а не в открытом ядре.

- repo: langchain-ai/langgraph
  category: agents/orchestration
  description_ru: "Низкоуровневый фреймворк от LangChain для оркестрации стейтфул, долгоживущих агентов и мультиагентных графов."
  badge: editors_choice
  verify_status: check
  body_md: |
    ![](https://raw.githubusercontent.com/langchain-ai/langgraph/main/github/images/logo-dark.svg)

    ### ❓ Что это
    **LangGraph** — низкоуровневый фреймворк оркестрации от **LangChain Inc** (создателей одноимённой библиотеки, но работает и без неё) для построения, управления и деплоя долгоживущих стейтфул агентов. Идея — представить логику агента графом: узлы и рёбра вместо цепочек промптов. Архитектурно вдохновлён Google **Pregel** и **Apache Beam**, а публичный интерфейс — **NetworkX**. Используется в проде такими компаниями, как Klarna, Replit и Elastic.

    ### 🎯 Для чего
    - Когда нужен **durable execution** — агент переживает падения и рестарты, продолжая ровно с того места, где остановился.
    - Для **human-in-the-loop** сценариев — можно на любом шаге инспектировать и модифицировать состояние агента.
    - Когда важна **долгая память** — и оперативная (в рамках одного рассуждения), и персистентная между сессиями.
    - Для отладки сложного поведения агента через **LangSmith** — трейсинг, визуализация переходов состояний, метрики.
    - Если задача уже переросла простые цепочки и нужна инфраструктура для production-деплоя сложных агентных систем.
    - Для более простого старта поверх LangGraph есть надстройка **Deep Agents** — агенты с саб-агентами и файловой системой из коробки.

    ### 💻 Как установить
    ```bash
    pip install -U langgraph
    ```

    ### 🚀 Как пользоваться
    Библиотека низкоуровневая: вы описываете граф из узлов (шагов) и рёбер (переходов) и запускаете его как единый workflow — вместо готовых рецептов LangGraph даёт примитивы для durable execution, памяти и чекпоинтов. Для JS/TS есть отдельная **LangGraph.js**. Быстрый старт и подробные гайды — в [docs.langchain.com](https://docs.langchain.com/oss/python/langgraph/quickstart).

    ### ⚠️ Грабли
    Это именно низкоуровневый инструмент — если нужен быстрый результат без изучения примитивов графа, авторы сами советуют сначала взглянуть на **Deep Agents**, построенный поверх LangGraph. Для полноценного трейсинга и продакшен-деплоя понадобится **LangSmith** (отдельный продукт LangChain).

- repo: lastmile-ai/mcp-agent
  category: agents/orchestration
  description_ru: "Компактный Python-фреймворк для сборки агентов поверх MCP по паттернам из статьи Anthropic Building Effective Agents, с опциональной durable-обвязкой на Temporal."
  badge: editors_choice
  verify_status: check
  body_md: |
    ![](https://github.com/user-attachments/assets/c8d059e5-bd56-4ea2-a72d-807fb4897bde)

    ### ❓ Что это
    **mcp-agent** — простой композируемый фреймворк для построения агентов на **Model Context Protocol**. Философия авторов: MCP — это всё, что нужно для агентов, а простые паттерны надёжнее сложных архитектур. Библиотека полностью реализует MCP (берёт на себя управление жизненным циклом подключений к MCP-серверам) и реализует в композируемом виде каждый паттерн из статьи Anthropic **Building Effective Agents**. Опционально масштабируется до durable-workflow на **Temporal** — можно ставить агентов на паузу и восстанавливать без изменений в коде.

    ### 🎯 Для чего
    - Быстро собрать агента, который подключается к MCP-серверам (**filesystem**, **fetch** и другим) и вызывает LLM.
    - Реализовать классические паттерны агентов — **map-reduce**, **orchestrator**, **evaluator-optimizer**, **router** и другие — не изобретая их заново.
    - Превратить агента в собственный **MCP-сервер** (в том числе с FastMCP-совместимым API) — например, обернуть его в ChatGPT App.
    - Когда нужна надёжность продакшена: паузы, восстановление после сбоев, долгие workflow — через опциональный Temporal executor.

    ### 💻 Как установить
    ```bash
    uv add "mcp-agent"
    # или
    pip install mcp-agent
    ```

    ### 🚀 Как пользоваться
    ```python
    from mcp_agent.app import MCPApp
    from mcp_agent.agents.agent import Agent
    from mcp_agent.workflows.llm.augmented_llm_openai import OpenAIAugmentedLLM

    app = MCPApp(name="hello_world")

    async def main():
        async with app.run():
            agent = Agent(
                name="finder",
                instruction="Use filesystem and fetch to answer questions.",
                server_names=["filesystem", "fetch"],
            )
            async with agent:
                llm = await agent.attach_llm(OpenAIAugmentedLLM)
                answer = await llm.generate_str("Summarize README.md in two sentences.")
    ```
    Список MCP-серверов и провайдера LLM (`openai.default_model` и т.п.) задаются в `mcp_agent.config.yaml`, ключи — в `mcp_agent.secrets.yaml` (в `.gitignore`).

    ### ⚠️ Грабли
    Секреты (API-ключи) нужно класть в `mcp_agent.secrets.yaml` или переменные окружения — файл с настройками (`mcp_agent.config.yaml`) в репозиторий коммитить можно, а с секретами — нет, это отдельный незакоммиченный файл. Для опциональных провайдеров LLM (openai, anthropic, google, azure, bedrock) нужно доустанавливать соответствующие extras, например `uv add "mcp-agent[openai, anthropic]"`.

