    Ставь, если хочешь дать агенту (Claude Desktop, VS Code + Copilot, OpenAI Agents SDK и др.) прямой доступ к Redis-инстансу командами вроде «Store the entire conversation in a stream» или «Index and search this vector» — без ручного написания Redis-команд.

    ### 💻 Как установить
    ```bash
    uvx --from redis-mcp-server@latest redis-mcp-server --url redis://localhost:6379/0
    ```

    ### 🚀 Как пользоваться
    Пропиши сервер в конфиге MCP-клиента (Claude Desktop, VS Code и т.д.), указав команду запуска (`uvx --from redis-mcp-server@latest redis-mcp-server`) и параметры подключения — далее сервер сам объявляет доступные tools для работы с Redis.

    ### ⚠️ Грабли
    Также доступен как Docker-образ (`mcp/redis`) — но независимо от способа установки нужен доступный Redis-инстанс с указанным URL/паролем; сервер сам по себе базу не поднимает. Лицензия — **MIT**.

- repo: supabase/mcp
  category: mcp/servers
  description_ru: "Официальный MCP-сервер Supabase — подключает Cursor, Claude и другие AI-ассистенты напрямую к вашим проектам Supabase для работы с базой данных, Edge Functions и хранилищем."
  badge: null
  verify_status: known
  body_md: |
    ![supabase-mcp-demo](https://github.com/user-attachments/assets/3fce101a-b7d4-482f-9182-0be70ed1ad56)

    ### ❓ Что это
    **Supabase MCP Server** — официальная реализация [Model Context Protocol](https://modelcontextprotocol.io/introduction) от **Supabase**. Стандартизирует общение LLM с вашими Supabase-проектами: сервер даёт AI-ассистенту доступ к управлению таблицами, конфигурацией, Edge Functions и данными напрямую через MCP-подключение по URL `https://mcp.supabase.com/mcp`.

    ### 🎯 Для чего
    Ставь, если хочешь, чтобы Claude/Cursor/Windsurf могли сами читать схему базы, писать миграции, деплоить Edge Function или искать баг по логам — без ручного копирования SQL и конфигов между дашбордом и чатом. Инструменты сгруппированы по фичам:
    - `account` — `list_projects`, `create_project`, `pause_project`, `list_organizations`
    - `database` — `list_tables`, `apply_migration`, `execute_sql`
    - `debugging` — `get_logs`, `get_advisors`
    - `development` — `get_project_url`, `generate_typescript_types`
    - `functions` (Edge Functions) — `deploy_edge_function`, `get_edge_function`
    - `branching` (экспериментально, нужен платный план) — `create_branch`, `merge_branch`, `rebase_branch`
    - `storage` — отключена по умолчанию, включается через `features=storage`

    ### 💻 Как установить
    Отдельной установки не требуется — сервер удалённый (hosted). Добавь в конфиг MCP-клиента:
    ```json
    {
      "mcpServers": {
        "supabase": {
          "type": "http",
          "url": "https://mcp.supabase.com/mcp"
        }
      }
    }
    ```

    ### 🚀 Как пользоваться
    Клиент запросит логин в Supabase при первом подключении — выбери организацию с нужным проектом. Рекомендуется сузить область работы через query-параметры:
    ```
    https://mcp.supabase.com/mcp?project_ref=<project-ref>&read_only=true&features=database,docs
    ```
    Для локальной разработки через Supabase CLI сервер доступен на `http://localhost:54321/mcp` (ограниченный набор инструментов, без OAuth 2.1).

    ### ⚠️ Грабли
    Без `project_ref` сервер видит **все проекты организации**, а без `read_only=true` LLM может выполнять `apply_migration`, `create_project`, `deploy_edge_function` и другие мутирующие операции — README прямо советует включать read-only режим по умолчанию и сначала изучить security best practices. Сервер помечен как pre-1.0 — ожидайте breaking changes между версиями.

