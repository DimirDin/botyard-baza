    ```bash
    /plugin marketplace add trailofbits/skills
    /plugin menu
    ```
    Для Codex:
    ```bash
    codex plugin marketplace add trailofbits/skills
    codex plugin add <plugin-name>@trailofbits
    ```

    ### 🚀 Как пользоваться
    После установки маркетплейса откройте `/plugin menu`, найдите нужный плагин (например `static-analysis` или `constant-time-analysis`) и установите — дальше он подключается к анализу автоматически по контексту задачи.

    ### ⚠️ Грабли
    Скиллы узкоспециализированы под конкретные security-задачи (криптография, смарт-контракты, реверс-инжиниринг) — без профильных знаний в этой области результаты анализа сложно правильно интерпретировать, это инструмент для экспертов, а не общего назначения.

