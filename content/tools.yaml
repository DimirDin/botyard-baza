- repo: langfuse/langfuse
  category: code/monitoring
  description_ru: "Langfuse — открытая self-hostable платформа для трейсинга, оценки и отладки LLM-приложений: видно каждый вызов модели, каждый retrieval и каждое действие агента в одном дашборде."
  badge: null
  verify_status: known
  body_md: |
    ![](https://github.com/user-attachments/assets/5810ae13-15d6-4b60-afd2-927adc501861)

    ### ❓ Что это
    **Langfuse** — open source LLM engineering платформа, которая помогает разрабатывать, мониторить, оценивать и отлаживать AI-приложения. Инструментирует вызовы LLM, retrieval, embedding и действия агентов через трейсы, даёт версионирование промптов, встроенный playground и датасеты для тестирования перед деплоем.

    ### 🎯 Для чего
    Ставь, если строишь продакшн-приложение на LLM и нужно понимать, что реально происходит внутри агента: поддерживает LLM-as-a-judge, кодовые эвалюаторы, ручную разметку и пользовательский фидбек, интегрируется с **OpenAI** (drop-in замена), **LangChain**, **LlamaIndex**, **Haystack**, **LiteLLM**, **Vercel AI SDK**.

