  description_ru: "Крупный маркетплейс плагинов для Claude Code: 88 плагинов, 194 субагента, 158 скиллов и 106 слэш-команд из единого Markdown-источника под пять разных агентских харнессов."
  badge:
  verify_status: check
  body_md: |
    ![](https://opengraph.githubassets.com/1/wshobson/agents)

    ### ❓ Что это
    **Agentic Plugin Marketplace** — не просто набор субагентов, а целая production-ready экосистема "строительных блоков" для агентской разработки: **88 плагинов**, **194 агента**, **158 скиллов**, **106 команд** и **16 оркестраторов**. Фишка проекта — единый источник в Markdown (`plugins/`), из которого генерируются нативные артефакты сразу для пяти харнессов: **Claude Code**, **OpenAI Codex CLI**, **Cursor**, **OpenCode** и **Gemini CLI** (плюс **GitHub Copilot**) — без "усреднения" под наименьший общий знаменатель.

    Агенты распределены по доменам: архитектура, языки программирования, инфраструктура, безопасность, данные, ML, документация, бизнес, SEO. Модели подбираются по уровню задачи — например, плагин `python-development` содержит агентов **python-pro**, **django-pro** и **fastapi-pro** плюс команду скаффолдинга и 16 скиллов (async, тестирование, packaging и т.д.).

    Тиры моделей под задачи:
    - **Tier 0 — Fable 5** — самые долгие автономные прогоны (крупные миграции, многочасовая работа, опционально, дороже);
    - **Tier 1 — Opus** — архитектура, безопасность, ревью кода, продакшн-критичные задачи;
    - **Tier 2 — inherit** — выбор пользователя (backend/frontend/AI/ML и т.п.);
    - **Tier 3 — Sonnet** — документация, тестирование, дебаг, API-референсы;
    - **Tier 4 — Haiku** — быстрые операционные задачи, SEO, деплой, контент.

    Отдельно подключается внешний **Pensyve** — модуль постоянной памяти для Claude Code и остальных харнессов.

    ### 🎯 Для чего
    Ставить, когда нужен целый "инженерный отдел" субагентов сразу под несколько инструментов (не только Claude Code), причём с гарантией, что каждый харнесс получает нативный, а не переведённый "на отвяжись" формат. Есть встроенный фреймворк **plugin-eval** для оценки качества плагинов/скиллов в три слоя: статический анализ (<2 сек), LLM Judge (Haiku + Sonnet, ~30 сек) и Monte Carlo (50–100 симуляций, 2–5 мин).

    ### 💻 Как установить
    ```bash
    # Claude Code
    /plugin marketplace add wshobson/agents
    /plugin install python-development          # или любой из 88 плагинов

    # Codex CLI
    npx codex-marketplace add wshobson/agents

    # Gemini CLI / OpenCode (клонирование + генерация)
    gh repo clone wshobson/agents ~/agents && cd ~/agents
    make generate HARNESS=gemini && gemini extensions install .
    make install-opencode
    ```

    ### 🚀 Как пользоваться
    ```bash
    uv run plugin-eval score path/to/skill --depth quick
    uv run plugin-eval certify path/to/skill
    ```
    Каждый установленный плагин подгружает в контекст только свои агенты/команды/скиллы — не весь маркетплейс сразу.

    ### ⚠️ Грабли
    Для Gemini CLI и OpenCode сгенерированные деревья файлов **не коммитятся** (в `.gitignore`) — их нужно каждый раз генерировать через `make`. У Codex CLI есть жёсткий лимит **8 КБ на скилл** — команды при трансляции превращаются в скиллы, что может обрезать более объёмный контент.

