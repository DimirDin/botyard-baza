- repo: upstash/context7
  category: mcp/servers
  description_ru: "Подтягивает свежую, версионированную документацию библиотек прямо в контекст модели."
  badge: editors_choice
  verify_status: check
  body_md: |
    ### ❓ Что это
    MCP-сервер от команды Upstash, решающий конкретную и хорошо знакомую разработчикам проблему:
    модель обучена на данных определённого среза времени и по умолчанию не знает о свежих версиях
    библиотек, из-за чего либо выдаёт устаревшие примеры кода, либо галлюцинирует несуществующие
    методы API. Context7 подтягивает актуальную, привязанную к конкретной версии документацию и
    примеры кода прямо из первоисточника и кладёт их в контекст запроса перед тем, как модель
    начинает отвечать. Работает в двух режимах — как облачный размещённый сервис Upstash или
    локально через npx/установку пакета. Активация в промпте предельно простая: достаточно
    приписать "use context7" в конце запроса, и сервер сам определит нужную библиотеку и версию.
    Документация переведена на полтора десятка языков, что говорит о масштабе и активности проекта.
    Есть готовые кнопки установки под Cursor и другие MCP-клиенты.

    ### 🎯 Для чего
    Использовать в Claude Code или Claude.ai всякий раз, когда пишете код на библиотеке, которая
    часто меняет API — фреймворки вроде Next.js, современные ORM, облачные SDK — где обучающие данные
    модели заведомо отстают от реальной актуальной версии. Особенно полезно для новых или недавно
    вышедших мажорных версий популярных пакетов, когда модель с высокой вероятностью помнит только
    синтаксис предыдущей версии. Хорошая практика — держать Context7 подключённым постоянно как MCP-
    сервер по умолчанию для проектных сессий Claude Code, а не вспоминать о нём только после того,
    как модель предложила несуществующий метод.

    ### 💻 Как установить
    ```bash
    npx -y @upstash/context7-mcp
    ```

    ### 🚀 Как пользоваться
    ```
    Create a Next.js middleware that checks a JWT in cookies. use context7
    ```

    ### ⚠️ Грабли
    Триггер работает только если явно приписать "use context7" в конце запроса — без этой фразы
    сервер не активируется сам по себе, даже если подключён в конфиге клиента.

