    вручную переимпортировать манифест в Figma — Figma кеширует файлы плагина на уровне приложения.

- repo: disler/claude-code-hooks-mastery
  category: code/hooks
  description_ru: "Учебный полигон с примерами всех 13 хуков Claude Code, сабагентами и командной builder/validator-валидацией."
  badge:
  verify_status: check
  body_md: |
    ![](https://raw.githubusercontent.com/disler/claude-code-hooks-mastery/main/images/hooked.png)

    ### ❓ Что это
    Репозиторий-песочница от разработчика **disler**, который методично разбирает **все 13 событий жизненного цикла хуков** Claude Code — от `UserPromptSubmit` и `PreToolUse` до `SessionStart`/`SessionEnd` и `Setup`. Заодно показывает **сабагентов** (включая **Meta-Agent**, который создаёт других агентов) и систему командной валидации `builder`/`validator`.

    ### 🎯 Для чего
    Когда нужно быстро разобраться, какой хук за что отвечает и подсмотреть готовый рабочий код: блокировка опасных команд (`rm -rf`, доступ к `.env`), логирование в `logs/`, TTS-озвучка событий, кастомные statusline (целых 9 версий — от базовой до powerline-стиля) и output-styles (`genui.md`, `ultra-concise.md` и др.).

    ### 💻 Как установить
    ```bash
    git clone https://github.com/disler/claude-code-hooks-mastery
    cd claude-code-hooks-mastery
    ```
    Понадобятся **Astral UV** и **Claude Code**; опционально — ElevenLabs/OpenAI/Ollama для TTS и LLM-фич.

    ### 🚀 Как пользоваться
    ```
    # Хуки уже настроены в .claude/settings.json — просто работайте с Claude Code
    # События логируются в logs/*.json (pre_tool_use.json, stop.json, session_start.json...)
    ```
    Хук может вернуть JSON с полями `decision`, `reason`, `continue` — так, например, `PreToolUse` блокирует опасную команду через exit-код 2.

    ### ⚠️ Грабли
    Файл `logs/chat.json` хранит **только последнюю** сессию разговора — при новой сессии он полностью перезаписывается, в отличие от остальных логов, которые дописываются.

- repo: pascalporedda/awesome-claude-code
  category: code/hooks
  description_ru: "Набор кроссплатформенных звуковых хуков для Claude Code — сигнал, когда агенту нужно внимание или задача завершена."
  badge:
  verify_status: check
  body_md: |
    ![](https://opengraph.githubassets.com/1/pascalporedda/awesome-claude-code)

    ### ❓ Что это
    Несмотря на общее название, это конкретный проект — **звуковые уведомления** для Claude Code через хуки `Notification`, `Stop` и `SubagentStop`. Автор задумывает репозиторий как будущий центральный хаб community-хуков (с менеджером для их установки), но пока это готовый рабочий набор звуков без внешних зависимостей.

    ### 🎯 Для чего
    Ставить, если раздражает необходимость следить за терминалом: хук проиграет звук, когда Claude ждёт вашего ответа, и другой звук — когда задача завершена (плюс отдельный сигнал на завершение сабагента).

    ### 💻 Как установить
    ```bash
    # Глобально для всех проектов
    ./install-global.sh

    # Откат
    ./uninstall-global.sh
    ```
    Локально — просто скопируйте директорию `.claude` в проект.

    ### 🚀 Как пользоваться
    ```bash
    # Ручной тест хука уведомления
    npx tsx .claude/hooks/notification.ts --notify

    # Тест с фейковым событием
    echo '{"type":"Notification","data":{}}' | npx tsx .claude/hooks/notification.ts --notify
    ```
    Флаг `--chat` дополнительно логирует полные транскрипты разговора в `chat.json`.

    ### ⚠️ Грабли
    Хуки написаны на TypeScript и требуют **Node.js** в `$PATH` (запускаются через `npx tsx`, без сборки). На Windows/Linux нужны свои файлы `on-agent-need-attention.wav` и `on-agent-complete.wav` — на macOS используются системные звуки, и файлы не нужны.

- repo: musistudio/claude-code-router
  category: code/routers
  description_ru: "Десктопный гейтвей и панель управления для маршрутизации запросов Claude Code, Codex и ZCode к разным LLM-провайдерам."
  badge:
  verify_status: check
  body_md: |
    ![](https://raw.githubusercontent.com/musistudio/claude-code-router/main/blog/images/claude-code-router.png)

    ### ❓ Что это
    **Claude Code Router Desktop** — локальный гейтвей и десктопное приложение (macOS/Windows/Linux) от **musistudio**, которое перенаправляет запросы Claude Code, Codex и ZCode к тому провайдеру модели, который вам реально нужен, вместо ручной настройки конфигов каждого клиента.

    ### 🎯 Для чего
    Один локальный endpoint для нескольких агентских инструментов сразу; условная маршрутизация по правилам, fallback на резервные модели, ротация API-ключей и статистика расходов. Поддерживаемые провайдеры: **OpenAI-compatible API**, **Anthropic Messages**, **Gemini**, **OpenRouter**, **DeepSeek**, **SiliconFlow**, **Moonshot**, **Kimi Code**, **Mistral**, **Z.AI**, **Bailian** и кастомные endpoint'ы.

    ### 💻 Как установить
    ```text
    1. Открыть страницу GitHub Releases проекта
    2. Скачать пакет под свою платформу (.dmg/.zip для macOS, .exe для Windows, .AppImage для Linux)
    3. Установить и запустить Claude Code Router
    ```
    При первом запуске CCR создаёт локальный конфиг в `~/.claude-code-router/config.sqlite` (Windows — `%APPDATA%\Claude Code Router\config.sqlite`).

    ### 🚀 Как пользоваться
    ```
    1. Providers → Add Provider — добавить провайдера (пресет или свой endpoint)
    2. Routing — настроить условные правила и fallback
    3. Server → Start — гейтвей поднимется на http://localhost:8080
    4. Agent Config — подключить Claude Code / Codex / ZCode к гейтвею
    ```

    ### ⚠️ Грабли
    Легаси-конфиг `config.json` читается **только один раз** для миграции, если ещё нет SQLite-базы — дальше вся конфигурация живёт только в `config.sqlite`.

- repo: ryoppippi/ccusage
  category: code/monitoring
  description_ru: "CLI-утилита для анализа расхода токенов и затрат по сессиям сразу нескольких AI-агентов, включая Claude Code."
  badge: editors_choice
  verify_status: check
  body_md: |
    ![](https://cdn.jsdelivr.net/gh/ccusage/ccusage@main/docs/public/logo.svg)

    ### ❓ Что это
    **ccusage** — CLI-утилита, которая читает локальные данные использования разных coding-агентов и превращает их в отчёты по дням, неделям, месяцам и сессиям. Изначально заточена под Claude Code, но теперь поддерживает целый список источников: **Claude Code**, **Codex**, **OpenCode**, **Amp**, **Droid**, **Codebuff**, **Hermes Agent**, **pi-agent**, **Goose**, **OpenClaw**, **Kilo**, **Kimi**, **Qwen**, **GitHub Copilot CLI**, **Gemini CLI**.

    ### 🎯 Для чего
    Посмотреть, сколько токенов и денег съедает работа с агентами: дневные/недельные/месячные отчёты, разбивка по моделям (`--breakdown`), отслеживание 5-часовых billing-окон Claude Code (`ccusage blocks`), интеграция в statusline (`ccusage statusline`, бета).

    ### 💻 Как установить
    ```bash
    npx ccusage@latest
    ```
    Также доступно через `bunx`, `pnpm dlx`, `pnpx` и `nix run github:ccusage/ccusage`.

    ### 🚀 Как пользоваться
    ```bash
    bunx ccusage            # все источники по дням
    bunx ccusage daily --since 2026-04-25 --until 2026-05-16
    bunx ccusage claude daily --instances --project myproject
    bunx ccusage blocks      # 5-часовые billing-окна Claude Code
    bunx ccusage --compact   # компактная таблица для скриншотов
    ```

    ### ⚠️ Грабли
    Инструмент **только читает** локальные файлы использования каждого CLI (например `~/.claude/projects/`) — если у агента нет локальных логов сессий или он не входит в список поддерживаемых источников, отчёта не будет.

