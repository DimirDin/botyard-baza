- repo: microsoft/autogen
  category: agents/multi-agent
  description_ru: "Фреймворк Microsoft для мультиагентных LLM-систем с layered-архитектурой (Core/AgentChat/Extensions) и MCP-интеграцией — важен исторически, но сейчас в режиме поддержки без развития."
  badge: editors_choice
  verify_status: known
  body_md: |
    ![](https://media.githubusercontent.com/media/microsoft/autogen/refs/heads/main/python/packages/autogen-studio/docs/ags_screen.png)

    ### ❓ Что это
    **AutoGen** — фреймворк для создания мультиагентных AI-приложений, которые действуют автономно или вместе с человеком. Архитектура слоями: **Core API** (message passing, event-driven агенты, локальный/распределённый runtime), **AgentChat API** (упрощённый API для быстрого прототипирования, групповые чаты) и **Extensions API** (клиенты LLM, выполнение кода). Отдельно идёт **AutoGen Studio** — no-code GUI для мультиагентных workflow.

    ### 🎯 Для чего
    Ставь, если изучаешь паттерны мультиагентной оркестрации или поддерживаешь legacy-проект на AutoGen. Для нового проекта разработчики сами рекомендуют смотреть в сторону **Microsoft Agent Framework** — AutoGen новых фич не получает.

    ### 💻 Как установить
    ```bash
    pip install -U "autogen-agentchat" "autogen-ext[openai]"
    ```

    ### 🚀 Как пользоваться
    ```python
    import asyncio
    from autogen_agentchat.agents import AssistantAgent
    from autogen_ext.models.openai import OpenAIChatCompletionClient

    async def main() -> None:
        model_client = OpenAIChatCompletionClient(model="gpt-4.1")
        agent = AssistantAgent("assistant", model_client=model_client)
        print(await agent.run(task="Say 'Hello World!'"))
        await model_client.close()

    asyncio.run(main())
    ```

    ### ⚠️ Грабли
    Проект в статусе **"Maintenance Mode"**: не получает новых фич, поддерживается сообществом. Microsoft прямо советует новым пользователям стартовать с **Microsoft Agent Framework**, а существующим — мигрировать по официальному migration guide. Требуется **Python 3.10+**.

