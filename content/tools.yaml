- repo: DeusData/codebase-memory-mcp
  category: mcp/dev-tools
  description_ru: "MCP-сервер, индексирующий кодовую базу в граф знаний (158 языков) — структурные запросы вместо grep-by-grep, экономия токенов в разы."
  verify_status: check
  body_md: |
    ![](docs/graph-ui-screenshot.png)

    ### ❓ Что это
    **codebase-memory-mcp** — локальный MCP-сервер на чистом C без зависимостей: полностью индексирует репозиторий (tree-sitter AST + Hybrid LSP для Python/TS/Go/Rust и ещё десятка языков) в постоянный граф знаний — функции, классы, цепочки вызовов, HTTP-роуты, кросс-сервисные связи. 14 MCP-инструментов, единый статический бинарник под macOS/Linux/Windows.

    ### 🎯 Для чего
    Вместо того чтобы агент рылся по файлам через grep/read циклы, он делает структурные запросы к графу — заявлено 10× меньше токенов и 2× меньше вызовов инструментов на аналогичных задачах (бенчмарк на 31 репозитории, есть препринт на arXiv). Особенно полезно на большой кодовой базе с несколькими репо и запутанными кросс-ссылками — агент держит актуальную карту зависимостей вместо повторного вычитывания файлов.

    ### 💻 Как установить
    ```bash
    curl -fsSL https://raw.githubusercontent.com/DeusData/codebase-memory-mcp/main/install.sh | bash
    ```
    Инсталлятор сам определяет установленных агентов (Claude Code, Codex CLI, Gemini CLI, Zed, Aider и др.) и прописывает MCP-конфиг. Есть вариант с `--ui` — 3D-визуализация графа на `localhost:9749`. Для Windows — PowerShell-скрипт `install.ps1`.

    ### 🚀 Как пользоваться
