    ### ❓ Что это
    **Langflow** — платформа для сборки и деплоя AI-агентов и workflow с визуальным конструктором и встроенными API- и MCP-серверами: любой собранный flow превращается в инструмент, который можно подключить к приложению на любом стеке. Поддерживает основные LLM, векторные базы и растущую библиотеку AI-компонентов "из коробки".

