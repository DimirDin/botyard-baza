    Ставь `en-ru-translator-adv` и `ru-editor`, если Claude Code генерирует тебе тексты на русском и они получаются с кальками, канцеляритом и характерным «ИИ-акцентом» — эти скилы соблюдают русскую типографику (кавычки-ёлочки, тире, буква «ё») и ведут глоссарий терминов. `ru-textovod` — для отдельной проверки орфографии/пунктуации через внешний сервис. `telegram-cli` — если нужно управлять Telegram (чаты, сообщения, медиа) прямо из агентской сессии.

    ### 💻 Как установить
    ```bash
    git clone git@github.com:miolamio/claude-skills.git
    cp -r claude-skills/en-ru-translator-adv /path/to/your/project/.claude/skills/
    ```
    Для использования во всех проектах — копируй в `~/.claude/skills/` вместо папки проекта. Для `telegram-cli` отдельно: `npm install -g @miolamio/tg-cli`.

    ### 🚀 Как пользоваться
    Claude Code подхватывает скил автоматически после копирования — перезапуск не требуется. `telegram-cli` вызывается командой `tg` с подкомандами `tg auth`, `tg chat`, `tg message`, `tg media`; есть режим `--toon` для сжатого вывода, экономящего 30–40% токенов на LLM-контексте.

    ### ⚠️ Грабли
    Для `ru-textovod` нужны переменные окружения `TEXTOVOD_USER_ID` и `TEXTOVOD_API_KEY` (API v1) или `TEXTOVOD_API2_TOKEN` (API v2 для нейросетевой автокоррекции) — без них скил не сработает.

