    **Reader** от **Jina AI** — сервис, который конвертирует любую веб-страницу в чистый markdown, пригодный для скармливания LLM, через простой запрос вида `https://r.jina.ai/[URL]`. Дополнительно даёт веб-поиск с фетчем топ-результатов через `https://s.jina.ai/[query]`.

    ### 🎯 Для чего
    Ставь, если агенту нужно «прочитать» произвольную ссылку без headless-браузера и парсера под каждый сайт: обрабатывает отрендеренные страницы (headless Chrome либо лёгкий curl), PDF через PDF.js, документы Office (Word, Excel, PowerPoint) и даже картинки — с подписями от VLM.

