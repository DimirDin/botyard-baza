    Ядро — открытый код под **AGPL-3.0** (SDK — под MIT), это copyleft-лицензия со своими условиями для сервисов на его основе. README прямо требует уважать `robots.txt` (соблюдается по умолчанию) и политики конфиденциальности сайтов, которые вы скрейпите.

