- repo: VoltAgent/awesome-claude-code-subagents
  category: agents/subagents
  description_ru: "Оркестрация команды специализированных AI-агентов (DevOps, QA, архитектор) внутри одной сессии Claude Code."
  badge: null
  verify_status: known
  body_md: |
    ### ❓ Что это
    Коллекция из более чем 150 готовых субагентов для Claude Code, разбитых на 10 категорий по
    ролям разработки — от бэкенда и фронтенда до DevOps, QA и архитектуры. Субагент в терминологии
    Claude Code — это отдельная специализированная конфигурация с собственным системным промптом и
    зоной ответственности, которую основной агент может вызвать для конкретной подзадачи, не смешивая
    контекст с остальной сессией. Идея репозитория — не писать промпты для типовых ролей с нуля, а
    взять уже проверенный сообществом набор и подключить целиком через систему плагинов Claude Code.
    Устанавливается одной командой как marketplace-плагин: добавляете источник, затем ставите нужный
    плагин по имени. Проект явно придерживается vendor-neutral позиции — авторы не принимают PR, чья
    единственная цель — прорекламировать чужой продукт внутри субагента, что снижает риск скрытой
    рекламы в промптах. Поддержка идёт за счёт спонсорства, а не встроенной монетизации самих
    агентов.

    ### 🎯 Для чего
    Полезно, когда одна сессия Claude Code должна закрыть разноплановую задачу — например,
    спроектировать API, написать код, покрыть тестами и подготовить конфиг для деплоя — вместо того
    чтобы вручную переключать контекст и промпт под каждую роль. Подходит для команд, которые хотят
    единообразного стиля работы агента по ролям (например, у всех разработчиков одинаковый "QA-
    агент" с одним и тем же чек-листом) — достаточно один раз подключить плагин, и все получают
    одинаковый набор субагентов. Хорошая отправная точка, если ещё не пробовали делегирование
    подзадач субагентам в Claude Code и хочется увидеть рабочие примеры конфигурации, а не писать
    свою с нуля вслепую.

    ### 💻 Как установить
    ```bash
    claude plugin marketplace add VoltAgent/awesome-claude-code-subagents
    claude plugin install <plugin-name>
    ```

    ### 🚀 Как пользоваться
    ```
    Use the qa-engineer subagent to review this PR for edge cases
    ```

    ### ⚠️ Грабли
    Имя конкретного плагина нужно узнать заранее из каталога проекта — команда `plugin install`
    требует точное имя, а не общее название репозитория; авторы также не принимают агентов,
    рекламирующих конкретный продукт, так что вставленные "спонсорские" субагенты из сторонних форков
    стоит перепроверять отдельно.

