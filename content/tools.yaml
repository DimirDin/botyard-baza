- repo: VoltAgent/awesome-claude-code-subagents
  category: agents/subagents
  description_ru: "Коллекция из 150+ специализированных сабагентов Claude Code на все случаи разработки — от бэкенда до healthcare-compliance."
  badge:
  verify_status: known
  body_md: |
    ![](https://github.com/user-attachments/assets/55b97c47-8506-4be0-b18f-f5384d063cbb)

    ### ❓ Что это
    **Awesome Claude Code Subagents** от команды **VoltAgent** — самая полная коллекция готовых сабагентов для Claude Code: **154+ специализированных AI-помощников**, разложенных по **10 категориям** — от core development до бизнеса и продукта. Каждый сабагент — это `.md`-файл с описанием роли и экспертизы (например, **backend-developer**, **rust-engineer**, **kubernetes-specialist**).

    ### 🎯 Для чего
    Ставь, когда хочешь мгновенно получить узкого эксперта под задачу вместо универсального агента. Категории и примеры сабагентов из README:
    - **01. Core Development** (`voltagent-core-dev`) — например **api-designer**, **frontend-developer**, **fullstack-developer**, **mobile-developer**;
    - **02. Language Specialists** (`voltagent-lang`) — **python-pro**, **rust-engineer**, **typescript-pro**, **golang-pro**, **react-specialist** и ещё два десятка языковых экспертов;
    - **03. Infrastructure** (`voltagent-infra`) — **cloud-architect**, **kubernetes-specialist**, **terraform-engineer**, **sre-engineer**;
    - **04. Quality & Security** (`voltagent-qa-sec`) — **security-auditor**, **penetration-tester**, **code-reviewer**, **debugger**;
    - **05. Data & AI** (`voltagent-data-ai`) — **ai-engineer**, **data-scientist**, **llm-architect**, **prompt-engineer**;
    - **06. Developer Experience** (`voltagent-dev-exp`) — **cli-developer**, **git-workflow-manager**, **mcp-developer**;
    - **07. Specialized Domains** — **blockchain-developer**, **fintech-engineer**, **hipaa-compliance**, **game-developer**;
    - **08. Business & Product** (`voltagent-biz`) — **product-manager**, **business-analyst**, **legal-advisor**.

    ### 💻 Как установить
    ```bash
    claude plugin marketplace add VoltAgent/awesome-claude-code-subagents
    claude plugin install voltagent-lang    # например, языковые специалисты
    claude plugin install voltagent-infra   # инфраструктура и DevOps
    ```
    Либо интерактивный установщик без клонирования:
    ```bash
    curl -sO https://raw.githubusercontent.com/VoltAgent/awesome-claude-code-subagents/main/install-agents.sh
    chmod +x install-agents.sh
    ./install-agents.sh
    ```

    ### 🚀 Как пользоваться
    После установки плагина сабагенты вызываются автоматически по контексту задачи, либо явным упоминанием, например: "Find PHP agents and install php-pro globally" через `agent-installer`.

    ### ⚠️ Грабли
    Плагин `voltagent-meta` (оркестрация) полноценно работает только когда **вместе с ним установлены и другие категории** сабагентов — сам по себе он бесполезен. При ручной установке файлы нужно класть в `~/.claude/agents/` (глобально) или `.claude/agents/` (для проекта).

- repo: ComposioHQ/awesome-claude-skills
  category: code/skills
  description_ru: "База скиллов, связывающих Claude с внешними сервисами через готовые интеграции от Composio."
  badge:
  verify_status: check
  body_md: |
    ### ❓ Что это
