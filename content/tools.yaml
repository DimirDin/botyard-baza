    Аннотировать бины как MCP-инструменты через предоставленный Spring Boot starter, остальное конфигурируется как обычный Spring-сервис.

    ### ⚠️ Грабли
    Реактивный (WebFlux) и блокирующий (WebMVC) варианты SDK имеют разный API — выбирайте вариант под существующий стек, чтобы не смешивать модели.

- repo: langchain4j/langchain4j
  category: mcp/frameworks
  description_ru: "Java-фреймворк для AI-разработки (аналог LangChain) с нативной интеграцией MCP-клиента."
  verify_status: known
  body_md: |
    ### ❓ Что это
    LangChain4j — Java-библиотека для построения LLM-приложений: цепочки, RAG, память диалога, агенты, плюс встроенный MCP-клиент для подключения внешних инструментов.

    ### 🎯 Для чего
    Если ваш AI-слой пишется на Java/Kotlin и вы уже используете LangChain4j для RAG/агентов — MCP-клиент подключается без дополнительных зависимостей.

    ### 💻 Как установить
    ```xml
    <dependency>
      <groupId>dev.langchain4j</groupId>
      <artifactId>langchain4j-mcp</artifactId>
    </dependency>
    ```

    ### 🚀 Как пользоваться
    Создать `McpClient`, передать его как источник инструментов в `AiServices` — модель сама решает, когда вызывать MCP-инструмент.

    ### ⚠️ Грабли
    Библиотека большая и обновляется часто — держите версии `langchain4j-core` и `langchain4j-mcp` синхронными, иначе возможны конфликты API.

- repo: swisnl/mcp-client
  category: mcp/frameworks
  description_ru: "Реализация универсального PHP MCP-клиента от агентства Swis — для подключения к MCP-серверам из любого PHP-приложения."
  verify_status: check
  body_md: |
    ### ❓ Что это
    Легковесный PHP-клиент для MCP (в отличие от официального SDK — сфокусирован именно на клиентской части, без серверных примитивов).

    ### 🎯 Для чего
    Подходит, если нужно из существующего PHP-приложения (не обязательно на MCP-инфраструктуре Anthropic) дёргать сторонние MCP-серверы как источник инструментов для своего LLM-пайплайна.

    ### 💻 Как установить
    ```bash
    composer require swisnl/mcp-client
    ```

    ### 🚀 Как пользоваться
    ```php
