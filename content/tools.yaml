- repo: modelcontextprotocol/python-sdk
  category: mcp/frameworks
  description_ru: "Официальный Python SDK для Model Context Protocol от Anthropic и сообщества — пишешь MCP-серверы и клиентов на Python."
  badge: editors_choice
  verify_status: known
  body_md: |
    ![](https://opengraph.githubassets.com/1/modelcontextprotocol/python-sdk)

    ### ❓ Что это
    Официальная **Python-реализация Model Context Protocol (MCP)** — открытого протокола, который стандартизирует, как приложения передают контекст (инструменты, ресурсы, промпты) языковым моделям. README текущей версии описывает **v2** как pre-release (alpha/beta) ветку под активной разработкой — для продакшена рекомендована стабильная **v1.x**.

    ### 🎯 Для чего
    Ставь, если пишешь MCP-сервер или клиента на Python: SDK даёт декораторы для регистрации инструментов (`@mcp.tool()`) и ресурсов (`@mcp.resource()`), а также асинхронный клиент для вызова этих инструментов из кода.

    ### 💻 Как установить
    ```bash
    uv add "mcp[cli]==2.0.0b1"          # или: pip install "mcp[cli]==2.0.0b1"
    ```

    ### 🚀 Как пользоваться
    ```python
    from mcp.server import MCPServer

    mcp = MCPServer("Demo")

    @mcp.tool()
    def add(a: int, b: int) -> int:
        """Add two numbers."""
        return a + b

    @mcp.resource("greeting://{name}")
    def greeting(name: str) -> str:
        """Greet someone by name."""
        return f"Hello, {name}!"
    ```
    Клиент:
    ```python
    import asyncio
    from mcp import Client
    from server import mcp

    async def main() -> None:
        async with Client(mcp) as client:
            result = await client.call_tool("add", {"a": 1, "b": 2})
            print(result.structured_content)

    asyncio.run(main())
    ```

    ### ⚠️ Грабли
    **v2 — не для продакшена**: README прямо предупреждает "Do not use v2 in production", стабильной остаётся ветка **1.x**. Требуется Python 3.10+.

- repo: modelcontextprotocol/typescript-sdk
  category: mcp/frameworks
  description_ru: "Официальный TypeScript SDK для Model Context Protocol — серверы и клиенты MCP на Node.js/TypeScript от команды протокола."
  badge: editors_choice
  verify_status: known
  body_md: |
    ![](https://opengraph.githubassets.com/1/modelcontextprotocol/typescript-sdk)

    ### ❓ Что это
    Официальная **TypeScript-реализация Model Context Protocol (MCP)** — протокола, который "позволяет приложениям предоставлять контекст для LLM стандартизированным способом, отделяя предоставление контекста от самого взаимодействия с LLM". Текущая main-ветка — это **v2 (beta)**.

    ### 🎯 Для чего
    Ставь, если строишь MCP-сервер или клиента на TypeScript/Node.js: пакет даёт `McpServer` с методом `registerTool()` для регистрации инструментов со схемой на `zod`, транспорт по stdio, а также опциональные адаптеры под **Express** и **Hono**.

    ### 💻 Как установить
    ```bash
    npm install @modelcontextprotocol/server
    npm install @modelcontextprotocol/client
    ```
    Опциональные middleware:
    ```bash
    npm install @modelcontextprotocol/node
    npm install @modelcontextprotocol/express express
    npm install @modelcontextprotocol/hono hono
    ```

    ### 🚀 Как пользоваться
    ```typescript
    import { McpServer } from '@modelcontextprotocol/server';
    import { StdioServerTransport } from '@modelcontextprotocol/server/stdio';
    import * as z from 'zod/v4';

    const server = new McpServer({ name: 'greeting-server', version: '1.0.0' });

    server.registerTool(
        'greet',
        {
            description: 'Greet someone by name',
            inputSchema: z.object({ name: z.string() })
        },
        async ({ name }) => ({
            content: [{ type: 'text', text: `Hello, ${name}!` }]
        })
    );

    async function main() {
        const transport = new StdioServerTransport();
        await server.connect(transport);
    }

    main();
    ```

    ### ⚠️ Грабли
    Main-ветка сейчас — это **v2 (beta)**, а стабильной для продакшена с багфиксами и security-патчами остаётся **v1.x** — не тащи main в прод не глядя.

- repo: run-llama/llama_index
  category: libs/python
  description_ru: "Главный Python-фреймворк LlamaIndex для построения RAG и агентных приложений поверх собственных данных — коннекторы, индексы, ретриверы, интеграция с любым LLM."
  badge: editors_choice
  verify_status: known
  body_md: |
    ![](https://opengraph.githubassets.com/1/run-llama/llama_index)

    ### ❓ Что это
    **LlamaIndex** — open-source "data framework" для построения агентных LLM-приложений: даёт коннекторы данных (API, PDF, SQL и т.д.), способы структурировать данные в индексы и graph'ы, и продвинутый retrieval/query-интерфейс поверх этих данных. Пакет разделён на стартовый `llama-index` (core + набор интеграций) и `llama-index-core` для точечной сборки с нужными интеграциями из **LlamaHub** (300+ пакетов).

    ### 🎯 Для чего
    Ставь, если строишь RAG-приложение или агента поверх собственных данных: высокоуровневый API собирает индекс и запускает запрос в 5 строк кода, а низкоуровневые API дают кастомизировать любой модуль — от коннекторов до ретриверов и реранкеров.

    ### 💻 Как установить
    ```sh
    pip install llama-index-core
    pip install llama-index-llms-openai
    pip install llama-index-llms-ollama
    pip install llama-index-embeddings-huggingface
    ```

    ### 🚀 Как пользоваться
    ```python
    import os
    os.environ["OPENAI_API_KEY"] = "YOUR_OPENAI_API_KEY"

    from llama_index.core import VectorStoreIndex, SimpleDirectoryReader

    documents = SimpleDirectoryReader("YOUR_DATA_DIRECTORY").load_data()
    index = VectorStoreIndex.from_documents(documents)

    query_engine = index.as_query_engine()
    query_engine.query("YOUR_QUESTION")
    ```
    По умолчанию данные хранятся в памяти; сохранить на диск: `index.storage_context.persist()`.

    ### ⚠️ Грабли
    Импорты вида `from llama_index.core.xxx import ...` — это ядро, а `from llama_index.xxx.yyy import ...` (без `core`) — отдельный интеграционный пакет, который нужно ставить отдельно; их легко перепутать. Новые интеграции принимаются в репозиторий только если "meaningfully integrate" с существующими компонентами фреймворка — на усмотрение мейнтейнеров.

