    ### 💻 Как установить
    Удалённый сервер (хостится GitHub) — просто добавь в конфиг клиента:
    ```json
    {
      "servers": {
        "github": {
          "type": "http",
          "url": "https://api.githubcopilot.com/mcp/"
        }
      }
    }
    ```
    Для локального запуска через Docker:
    ```
    ghcr.io/github/github-mcp-server
    ```
    Образ публичный; при ошибках pull может понадобиться `docker logout ghcr.io`.

    ### 🚀 Как пользоваться
    Один клик установки логинит через OAuth (браузерный флоу, токен хранится только в памяти). Для локального Docker-варианта задействуй фиксированный callback-порт `127.0.0.1:8085`. Альтернатива OAuth — Personal Access Token через переменную `GITHUB_PERSONAL_ACCESS_TOKEN` (имеет приоритет над OAuth).

    ### ⚠️ Грабли
    Совместимость с remote-хостом требует VS Code 1.101+ или другой MCP-хост с поддержкой удалённых серверов; GitHub Enterprise Server **не** поддерживает remote-хостинг — только локальный сервер. Insiders Mode (`/mcp/insiders`) даёт ранний доступ к экспериментальным фичам, но может быть нестабилен.

- repo: firebase/firebase-tools
  category: mcp/servers
  description_ru: "Не отдельный MCP-сервер, а фича внутри официального CLI firebase-tools: та же утилита, которой деплоят Firebase-проекты, содержит встроенный Firebase MCP Server (папка src/mcp)."
  badge: null
  verify_status: known
  body_md: |
    ![](https://opengraph.githubassets.com/1/firebase/firebase-tools)

    ### ❓ Что это
    Важно: это **не самостоятельный MCP-пакет**, а часть большого CLI-инструмента **firebase-tools** — той же утилиты `firebase`, которой тестируют, деплоят и управляют Firebase-проектами из терминала. Как сказано в README: "This repository is also the home of the official Firebase MCP Server" — MCP-сервер живёт внутри репозитория в `./src/mcp` и запускается той же командой `firebase`, а не отдельным пакетом.

    ### 🎯 Для чего
    Ставь как обычный Firebase CLI, если тебе нужно деплоить Hosting/Functions/Firestore, гонять локальные эмуляторы или импортировать пользователей в Auth — и заодно получаешь MCP-сервер для подключения AI-ассистентов (например, через готовый deeplink для Cursor в шапке README) к тем же возможностям: Hosting, Realtime Database, Auth и деплою.
    - `login` / `login:ci` / `login:add` — аутентификация в Firebase
    - `deploy` / `serve` — деплой и локальный запуск Hosting + Cloud Functions
    - `database:get/set/push/update` — работа с Realtime Database
    - `auth:import` / `auth:export` — batch-импорт/экспорт пользователей
    - `emulators:start` / `emulators:exec` — локальные эмуляторы

    ### 💻 Как установить
    ```bash
    npm install -g firebase-tools
    ```
    Или standalone-бинарник без зависимостей:
    ```bash
    curl -sL firebase.tools | bash
    ```

    ### 🚀 Как пользоваться
    ```
    firebase login
    firebase init
    firebase deploy
    ```
    MCP-сервер настраивается отдельно — подробности в документации `./src/mcp` (в README дан готовый deeplink для установки в Cursor).

    ### ⚠️ Грабли
    Аутентификация через **User Token** (`FIREBASE_TOKEN` / `firebase login:ci`) помечена в README как **deprecated** и будет удалена в будущей мажорной версии — вместо неё рекомендован сервисный аккаунт через `GOOGLE_APPLICATION_CREDENTIALS`. Раз MCP — это подкомандный функционал внутри общего CLI, ищи документацию и настройку MCP не в корневом README, а в `src/mcp`.

