- repo: aaif-goose/goose
  category: mcp/clients
  description_ru: "Открытый CLI/агент от Block (бывш. Square) с полной поддержкой MCP-серверов — устанавливает зависимости, пишет и тестирует код автономно."
  verify_status: check
  body_md: |
    ### ❓ Что это
    **Goose** — open-source агентный CLI, изначально выпущенный командой **Block**: подключается к любому LLM-провайдеру (включая Claude через Anthropic API/Bedrock) и умеет вызывать MCP-серверы как инструменты «из коробки».

    ### 🎯 Для чего
    Ставьте, если нужен CLI-агент вне экосистемы Anthropic, который можно гонять на своей модели (в том числе локальной через Ollama) и подключать к произвольным MCP-серверам одной командой.

    ### 💻 Как установить
    ```bash
    curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh | bash
    ```

    ### 🚀 Как пользоваться
    ```bash
    goose configure   # выбор провайдера/модели
    goose session start
    ```
    MCP-серверы прописываются в `~/.config/goose/config.yaml` — после этого доступны как обычные extensions.

    ### ⚠️ Грабли
    Организация-владелец репозитория на GitHub периодически переезжает (rename), проверяйте актуальную ссылку перед установкой скрипта из интернета.

- repo: lobehub/lobehub
  category: mcp/clients
  description_ru: "Открытый веб-фреймворк для AI-чатов с плагинами, RAG и мультимодельностью — поддерживает Claude через API и MCP-плагины."
  verify_status: known
  body_md: |
    ### ❓ Что это
    **LobeChat** (репозиторий переехал в `lobehub/lobehub`) — self-hosted чат-интерфейс с современным UI, поддержкой голоса, генерации изображений и системой плагинов, включая MCP.

    ### 🎯 Для чего
    Полезен как готовая «морда» для своего Claude API-ключа с многопользовательским доступом, историей диалогов и рынком плагинов — альтернатива официальному claude.ai для self-host сценариев.

    ### 💻 Как установить
    ```bash
    docker run -d -p 3210:3210 \
      -e ANTHROPIC_API_KEY=sk-ant-... \
      lobehub/lobe-chat
    ```

    ### 🚀 Как пользоваться
    Открыть `localhost:3210`, выбрать модель Claude в настройках провайдеров, подключить MCP-сервер через раздел Plugins/Tools.

    ### ⚠️ Грабли
    Полноценная многопользовательская установка с базой данных и S3 требует отдельного docker-compose — однострочный докер-запуск подходит только для личного использования.

- repo: ggozad/oterm
  category: mcp/clients
  description_ru: "Терминальный TUI-клиент для Ollama с поддержкой MCP-инструментов — общение с локальными моделями прямо из консоли."
  verify_status: known
  body_md: |
