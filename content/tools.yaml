- repo: Not-Diamond/notdiamond-python
  category: code/routers
  description_ru: "SDK для динамической маршрутизации запросов между моделями на базе предсказания точности ответа."
  verify_status: check
  body_md: |
    ### ❓ Что это
    Python SDK Not Diamond — сервис, который перед каждым запросом предсказывает, какая модель (в том числе Claude) даст лучший ответ на конкретный промпт, и роутит именно туда.

    ### 🎯 Для чего
    Альтернатива статичным правилам маршрутизации ("простое — на дешёвую модель") — решение принимается по факту содержимого промпта на основе обученного предиктора качества.

    ### 💻 Как установить
    ```bash
    pip install notdiamond
    ```

    ### 🚀 Как пользоваться
    ```python
    from notdiamond import NotDiamond
    client = NotDiamond()
    result, session_id, provider = client.chat.completions.create(
        messages=[...], model=["anthropic/claude-sonnet-4-5", "openai/gpt-4o"]
    )
    ```

    ### ⚠️ Грабли
    Требует облачного API-ключа Not Diamond (SaaS-сервис) — сама маршрутизация не считается локально, это дополнительная сетевая зависимость и точка отказа в пайплайне.

- repo: huggingface/smolagents
  category: agents/multi-agent
  description_ru: "Библиотека от Hugging Face, ориентированная на исполнение агентами чистого Python-кода вместо JSON tool-calls."
  verify_status: known
  body_md: |
    ### ❓ Что это
    smolagents — минималистичная библиотека агентов от HF: вместо классических JSON-based tool calls агент пишет и исполняет обычный Python-код для решения задачи («code agents»).

    ### 🎯 Для чего
    Подход с исполняемым кодом часто даёт более надёжные многошаговые действия, чем цепочка отдельных JSON tool-calls — полезно для задач с математикой, обработкой данных, циклами.

    ### 💻 Как установить
    ```bash
    pip install smolagents
    ```

    ### 🚀 Как пользоваться
    ```python
    from smolagents import CodeAgent, AnthropicModel
    agent = CodeAgent(tools=[...], model=AnthropicModel("claude-sonnet-4-5"))
    agent.run("посчитай...")
    ```

    ### ⚠️ Грабли
    Исполнение сгенерированного кода агентом — по умолчанию в локальном Python-процессе; для недоверенных промптов обязательно используйте песочницу (у библиотеки есть режим sandbox через Docker/E2B).

