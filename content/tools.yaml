    $tools = $client->listTools();
    $result = $client->callTool('name', $args);
    ```

    ### ⚠️ Грабли
    Проект от стороннего агентства (не Anthropic) — темп обновлений под новые версии спецификации MCP стоит сверять отдельно от официального SDK.

- repo: anthropics/anthropic-sdk-python
  category: libs/python
  description_ru: "Официальный Python-клиент Anthropic для Messages API — базовая библиотека для любой интеграции Claude в Python."
  badge: editors_choice
  verify_status: known
  body_md: |
    ### ❓ Что это
    Официальный SDK от Anthropic для вызова Claude API из Python: синхронный и асинхронный клиенты, стриминг, tool use, поддержка prompt caching и batch API.

    ### 🎯 Для чего
    Основа для любой Python-интеграции с Claude — используется как напрямую, так и «под капотом» большинством фреймворков (LangChain, LlamaIndex и др.).

    ### 💻 Как установить
    ```bash
