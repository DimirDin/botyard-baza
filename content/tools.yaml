  badge:
  verify_status: check
  body_md: |
    ![](https://opengraph.githubassets.com/1/exa-labs/exa-mcp-server)

    ### ❓ Что это

    **Exa MCP Server** от **Exa Labs** подключает AI-ассистентов к поисковому движку **Exa**:
    веб-поиск, поиск кода, ресёрч компаний — всё в виде чистого, готового к использованию LLM
    контента, без рекламного мусора обычной выдачи.

    ### 🎯 Для чего

    Полезен, когда агенту нужно "погуглить" по делу: найти актуальную информацию, вытащить полный
    текст страницы по URL, поискать примеры кода на GitHub/StackOverflow, собрать данные о компании
    или человеке. Есть отдельные **Agent Skills** для Claude Code — готовые пресеты под конкретные
    задачи: `company-research`, `code-search-exa`, `people-research`, поиск финансовых отчётов.

    ### 💻 Как установить

    ```bash
    # Через Claude Code CLI, подключение к готовому облачному серверу Exa
    claude mcp add --transport http exa https://mcp.exa.ai/mcp
    ```

    ### 🚀 Как пользоваться

    ```
    Основные инструменты:
    - web_search_exa — поиск по теме, чистый контент
    - web_fetch_exa — полный текст конкретной страницы по URL
    - web_search_advanced_exa — расширенный поиск с фильтрами по доменам/датам (по умолчанию выключен)
    - agent_create_run / agent_wait_for_run / agent_get_run_output — асинхронный Exa Agent
      для многошагового ресёрча (нужен OAuth или API-ключ)

    Включить дополнительные инструменты можно параметром в URL:
    https://mcp.exa.ai/mcp?tools=web_search_exa,web_search_advanced_exa,web_fetch_exa
    ```

    ### ⚠️ Грабли

    Для npm-варианта (`exa-mcp-server`) обязательно нужен собственный `EXA_API_KEY` — получить его
    можно в личном кабинете Exa. Часть инструментов (`get_code_context_exa`, `company_research_exa`,
    `deep_researcher_start` и др.) уже помечены как **deprecated** — используй их замены
    (`web_search_exa`, `web_search_advanced_exa`), а не устаревшие имена из старых примеров.

- repo: upstash/context7
  category: mcp/servers
  description_ru: "Подтягивает свежую, версионированную документацию библиотек прямо в контекст модели."
  badge: editors_choice
  verify_status: check
  body_md: |
    ![](https://github.com/upstash/context7/blob/master/public/cover.png?raw=true)

    ### ❓ Что это

    **Context7** от **Upstash** решает вечную боль LLM-кодинга: модель обучена на устаревших версиях
    библиотек и придумывает несуществующие API. Context7 в реальном времени подтягивает актуальную,
    версионированную документацию и примеры кода прямо в промпт — никакого переключения вкладок и
    выдуманных методов.

    ### 🎯 Для чего

    Ставь, если постоянно кодишь с помощью Cursor/Claude Code/других агентов и хочешь, чтобы код
    генерировался по актуальной версии библиотеки, а не по данным трёхлетней давности. Работает в
    двух режимах: **CLI + Skills** (без MCP, через команды `ctx7`) или классический **MCP**-сервер.
    Можно явно указывать библиотеку (`use library /supabase/supabase`) или версию ("Next.js 14").

    ### 💻 Как установить

    ```bash
    npx ctx7 setup
    ```

    Команда сама авторизует через OAuth, выдаёт API-ключ и ставит нужный skill под твоего агента.
    Есть флаги `--cursor`, `--claude`, `--opencode` для конкретного клиента.

    ### 🚀 Как пользоваться

    ```
    Create a Next.js middleware that checks for a valid JWT in cookies
    and redirects unauthenticated users to `/login`. use context7
    ```

    MCP-инструменты: `resolve-library-id` (находит ID библиотеки по имени) и `query-docs`
    (тянет документацию по ID вроде `/vercel/next.js`).

    ### ⚠️ Грабли

    Библиотеки в индексе Context7 — это community-контент: сами авторы предупреждают, что не
    гарантируют точность и безопасность всей документации, подозрительный контент можно и нужно
    репортить кнопкой "Report". Также сам MCP-сервер в этом репозитории — только клиентская часть;
    бэкенд, парсер и краулер закрыты и не публикуются.

