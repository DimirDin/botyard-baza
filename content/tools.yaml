- repo: guidance-ai/guidance
  category: libs/python
  description_ru: "Библиотека для контроля структуры ответов LLM — ограничивает генерацию грамматикой прямо во время сэмплинга."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Guidance — библиотека для «управляемой генерации»: позволяет задавать ответу LLM жёсткую структуру (регулярки, JSON-схему, грамматики) на уровне токен-сэмплинга, а не постфактум-парсинга.

    ### 🎯 Для чего
    Полезна там, где нужна гарантированно валидная структура вывода (JSON, код по шаблону) и не хочется полагаться на надежду, что модель «не собьётся» с формата.

    ### 💻 Как установить
    ```bash
    pip install guidance
    ```

    ### 🚀 Как пользоваться
    ```python
    from guidance import models, gen
    lm = models.Anthropic("claude-sonnet-4-5")
    lm += "Ответь числом: " + gen(regex=r"\d+")
    ```

    ### ⚠️ Грабли
    Глубокий контроль на уровне логитов (constrained decoding) доступен не для всех провайдеров одинаково — для API-моделей вроде Claude часть возможностей работает иначе, чем для локальных open-weight моделей.

- repo: fastapi/fastapi
  category: libs/python
  description_ru: "Стандартный де-факто фреймворк для Python-бэкендов и API-интеграций с LLM — быстрый, с автогенерацией OpenAPI-схем."
  verify_status: known
  body_md: |
    ### ❓ Что это
    FastAPI — современный ASGI-фреймворк для Python с автоматической валидацией через Pydantic и генерацией OpenAPI/Swagger-документации.

    ### 🎯 Для чего
    Частый выбор как backend для AI-приложений: чистая типизация запросов/ответов упрощает и стриминг LLM-ответов, и описание MCP/tool-схем через Pydantic-модели.

    ### 💻 Как установить
    ```bash
    pip install fastapi uvicorn
    ```

    ### 🚀 Как пользоваться
    ```python
    from fastapi import FastAPI
    app = FastAPI()
    
    @app.post("/chat")
    async def chat(msg: str):
        ...
    ```
    ```bash
    uvicorn main:app --reload
    ```

    ### ⚠️ Грабли
    Async-эндпоинты требуют, чтобы все вызовы к БД/внешним API внутри тоже были async — синхронный вызов внутри `async def` блокирует event loop.

- repo: PrefectHQ/prefect
  category: libs/python
  description_ru: "Оркестратор рабочих процессов на Python — часто используется для построения надёжных агентных и RAG-конвейеров с ретраями и мониторингом."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Prefect — фреймворк оркестрации workflow: декораторы `@flow`/`@task`, встроенные ретраи, кэширование, расписания и UI для мониторинга запусков.

    ### 🎯 Для чего
    Полезен, когда агентный/RAG-пайплайн выходит за рамки одного скрипта — нужны ретраи на упавших шагах, расписание и видимость, что именно пошло не так в конкретном запуске.

    ### 💻 Как установить
    ```bash
    pip install prefect
    ```

    ### 🚀 Как пользоваться
    ```python
    from prefect import flow, task
    
    @task(retries=3)
    def call_claude(prompt): ...
    
    @flow
    def pipeline():
        call_claude("...")
    ```

    ### ⚠️ Грабли
    Полноценный Prefect Server/Cloud с UI требует отдельного деплоя — для простых скриптов иногда избыточен по сравнению с обычным `try/except` + логированием.

- repo: stanfordnlp/dspy
  category: libs/python
  description_ru: "DSPy — фреймворк для программной оптимизации промптов вместо ручного prompt engineering, из Стэнфорда."
  badge: editors_choice
  verify_status: known
  body_md: |
    ### ❓ Что это
    DSPy — фреймворк, в котором промпты и few-shot примеры не пишутся руками, а компилируются/оптимизируются программно под заданную метрику качества, по аналогии с обучением модели.

    ### 🎯 Для чего
    Полезен, когда prompt engineering вручную упирается в потолок — DSPy автоматически подбирает формулировки и примеры под конкретную задачу и датасет с эталонными ответами.

    ### 💻 Как установить
    ```bash
    pip install dspy
    ```

    ### 🚀 Как пользоваться
    ```python
    import dspy
    lm = dspy.LM("anthropic/claude-sonnet-4-5")
    dspy.configure(lm=lm)
    qa = dspy.Predict("question -> answer")
    ```

    ### ⚠️ Грабли
    Оптимизация (compile) требует размеченного датасета примеров и лишних вызовов API для подбора промптов — не бесплатно ни по времени, ни по токенам.

- repo: langchain-ai/langchainjs
  category: libs/javascript
  description_ru: "JS/TS-версия LangChain — оркестрация цепочек, RAG и агентов на Node/edge-рантаймах с поддержкой Claude."
  verify_status: known
  body_md: |
    ### ❓ Что это
    LangChain.js — портированная на JavaScript/TypeScript версия LangChain: цепочки, retrievers, агенты, интеграции с векторными БД и провайдерами моделей, включая Anthropic.

    ### 🎯 Для чего
    Выбор для команд, чей стек целиком на Node/Next.js — не нужно поднимать отдельный Python-сервис ради RAG-пайплайна.

    ### 💻 Как установить
    ```bash
    npm install langchain @langchain/anthropic
    ```

    ### 🚀 Как пользоваться
    ```ts
    import { ChatAnthropic } from "@langchain/anthropic";
    const model = new ChatAnthropic({ model: "claude-sonnet-4-5" });
    await model.invoke("привет");
    ```

    ### ⚠️ Грабли
    API периодически меняется между мажорными версиями (миграция на `@langchain/core` модули) — при обновлении сверяйтесь с changelog, легко словить breaking changes.

- repo: BuilderIO/gpt-crawler
  category: libs/javascript
  description_ru: "Инструмент для сборки документации сайта в единый файл знаний для LLM — полезен для подготовки контекста Claude по внешним докам."
  verify_status: known
  body_md: |
    ### ❓ Что это
    CLI-утилита на Playwright: обходит указанный сайт (например, документацию) и собирает контент в единый JSON/markdown-файл, пригодный для загрузки в контекст LLM или в кастомный GPT/проект Claude.

    ### 🎯 Для чего
    Удобно, когда нужно быстро скормить Claude документацию стороннего продукта, у которого нет готового MCP-сервера или API — например, для Projects/Claude.ai knowledge base.

    ### 💻 Как установить
    ```bash
    git clone https://github.com/BuilderIO/gpt-crawler
    cd gpt-crawler && npm i
    ```

    ### 🚀 Как пользоваться
    Указать `url` и `selector` в `config.ts`, затем:
    ```bash
    npm start
    ```
    Результат — `output.json` со всем собранным контентом сайта.

    ### ⚠️ Грабли
    Обход чужого сайта краулером может нарушать его `robots.txt`/условия использования — проверяйте это перед массовым скрапингом сторонней документации.

- repo: humanloop/humanloop-node
  category: libs/javascript
  description_ru: "Библиотека для мониторинга, трекинга и оценки работы LLM (включая Claude) в проде — логирование вызовов и версионирование промптов."
  verify_status: check
  body_md: |
    ### ❓ Что это
    Node.js SDK платформы Humanloop: логирует вызовы к LLM-провайдерам (включая Anthropic), хранит версии промптов и позволяет прогонять оценки (evals) на исторических логах.

    ### 🎯 Для чего
    Полезен командам, которым нужна видимость, как промпт ведёт себя в проде на реальном трафике, и возможность откатиться на предыдущую версию промпта без деплоя кода.

    ### 💻 Как установить
    ```bash
    npm install humanloop
    ```

    ### 🚀 Как пользоваться
    ```ts
    import { Humanloop } from "humanloop";
    const hl = new Humanloop({ apiKey: process.env.HUMANLOOP_KEY });
    await hl.chat({ path: "my-prompt", messages: [...] });
    ```

    ### ⚠️ Грабли
    Требует облачного аккаунта Humanloop (SaaS) — сами логи и версии промптов хранятся не локально, а на их платформе.

- repo: brianc/node-postgres
  category: libs/javascript
  description_ru: "Модуль для PostgreSQL на Node.js — часто используется как фундамент для собственных Node MCP-серверов, работающих с БД."
  verify_status: known
  body_md: |
    ### ❓ Что это
    `node-postgres` (`pg`) — низкоуровневый, но стабильный и очень широко используемый клиент PostgreSQL для Node.js: пул соединений, параметризованные запросы, поддержка стриминга курсоров.

    ### 🎯 Для чего
    Основа почти для любого самописного MCP-сервера или backend-инструмента на Node, которому нужен прямой доступ к Postgres без ORM.

    ### 💻 Как установить
    ```bash
    npm install pg
    ```

    ### 🚀 Как пользоваться
    ```ts
    import { Pool } from "pg";
    const pool = new Pool({ connectionString: process.env.DATABASE_URL });
    const { rows } = await pool.query("SELECT 1");
    ```

    ### ⚠️ Грабли
    Все запросы — только через параметризацию (`$1, $2, ...`), никогда не собирайте SQL конкатенацией строк, особенно если строки приходят из ответа LLM.

- repo: expressjs/express
  category: libs/javascript
  description_ru: "Классический Node.js веб-фреймворк — часто служит транспортным слоем для MCP HTTP/SSE-серверов."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Express — минималистичный и самый распространённый веб-фреймворк для Node.js: роутинг, middleware, стандарт де-факто для HTTP API за последние 10+ лет.

    ### 🎯 Для чего
    Многие самописные MCP-серверы с HTTP/SSE-транспортом поднимаются именно на Express — простой и предсказуемый способ обслужить `/sse` и `/messages` эндпоинты для протокола MCP.

    ### 💻 Как установить
    ```bash
    npm install express
    ```

    ### 🚀 Как пользоваться
    ```ts
    import express from "express";
    const app = express();
    app.get("/health", (_, res) => res.send("ok"));
    app.listen(3000);
    ```

    ### ⚠️ Грабли
    Сам по себе не даёт ни валидации, ни типизации — для продакшена обычно добавляют Zod/Pydantic-аналог и явную обработку ошибок middleware.

- repo: vercel/modelfusion
  category: libs/javascript
  description_ru: "Утилиты для генерации текста, работы с токенами и построения пайплайнов в JS/TS (ранее ai-utils, теперь ModelFusion)."
  verify_status: check
  body_md: |
    ### ❓ Что это
    ModelFusion (репозиторий переехал из `lgrammel/ai-utils`) — TypeScript-библиотека для построения типобезопасных LLM-пайплайнов: генерация текста, эмбеддинги, извлечение структурированных данных, множество провайдеров включая Anthropic.

    ### 🎯 Для чего
    Альтернатива LangChain.js для тех, кому важнее строгая типизация TypeScript и меньше «магии» в абстракциях — пайплайн строится из явных, предсказуемых функций.

    ### 💻 Как установить
    ```bash
    npm install modelfusion
    ```

    ### 🚀 Как пользоваться
    ```ts
    import { generateText, anthropic } from "modelfusion";
    const text = await generateText({
      model: anthropic.ChatTextGenerator({ model: "claude-sonnet-4-5" }),
      prompt: "привет",
    });
    ```

    ### ⚠️ Грабли
    Проект сменил название и владельца репозитория (теперь под Vercel) — старые ссылки/примеры на `ai-utils` могут вести на устаревшую версию API.

- repo: crystaldba/postgres-mcp
  category: mcp/servers
  description_ru: "Продвинутый MCP-сервер для PostgreSQL: анализ индексов, объяснение планов запросов, безопасный режим только для чтения."
  verify_status: check
  body_md: |
    ### ❓ Что это
    MCP-сервер для Postgres с упором на аналитику и оптимизацию: EXPLAIN-планы, рекомендации по индексам, health-check базы — не просто «выполнить SQL», а помощник по производительности.

    ### 🎯 Для чего
    Полезен, если хотите, чтобы Claude не только читал данные, но и предлагал реальные оптимизации схемы/индексов на основе `EXPLAIN ANALYZE`, а не общих советов из памяти модели.

    ### 💻 Как установить
    ```bash
    pip install postgres-mcp
    ```
    или запуск через `pipx run postgres-mcp --access-mode=restricted`.

    ### 🚀 Как пользоваться
    Прописать сервер в MCP-конфиге агента с `DATABASE_URL`; режим `restricted` разрешает только `SELECT`-запросы.

    ### ⚠️ Грабли
    Полный (unrestricted) режим даёт агенту возможность выполнять произвольный SQL, включая `DROP`/`DELETE` — на проде используйте только `restricted`-режим и read-replica.

- repo: jerhadf/linear-mcp-server
  category: mcp/servers
  description_ru: "MCP-сервер для интеграции с Linear — создание, поиск и обновление задач прямо из диалога с Claude."
  verify_status: check
  body_md: |
    ### ❓ Что это
    MCP-сервер, оборачивающий Linear API: поиск issues, создание задач, комментарии, обновление статусов — стандартный CRUD по трекеру задач через MCP-инструменты.

    ### 🎯 Для чего
    Полезен для workflow, где Claude Code должен сам заводить/обновлять задачи по итогам сессии (баг нашёлся — завести issue) без переключения в веб-интерфейс Linear.

    ### 💻 Как установить
    ```bash
    npx -y linear-mcp-server
    ```
    Требуется `LINEAR_API_KEY` в переменных окружения.

    ### 🚀 Как пользоваться
    Прописать сервер в MCP-конфиге агента — далее доступны инструменты `search_issues`, `create_issue`, `update_issue` и т.п.

    ### ⚠️ Грабли
    Персональный API-ключ Linear даёт агенту права как у вас — на общих/командных workspace стоит завести отдельный сервисный аккаунт с ограниченными правами.

- repo: sashabaranov/go-openai
  category: libs/go
  description_ru: "Клиент OpenAI на Go — де-факто стандарт для Go-экосистемы, используется и для Ollama-совместимых моделей."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Самая популярная Go-библиотека для OpenAI-совместимого API: chat completions, стриминг, function calling. Благодаря OpenAI-совместимому режиму у многих провайдеров (включая некоторые прокси к Claude) используется как универсальный клиент.

    ### 🎯 Для чего
    Полезна, если инфраструктура уже стандартизована на OpenAI-совместимый формат запросов (например, через LiteLLM-прокси перед Claude) и нужен проверенный Go-клиент без написания HTTP-обвязки с нуля.

    ### 💻 Как установить
    ```bash
    go get github.com/sashabaranov/go-openai
    ```

    ### 🚀 Как пользоваться
    ```go
    client := openai.NewClient(apiKey)
    resp, _ := client.CreateChatCompletion(ctx, req)
    ```

    ### ⚠️ Грабли
    Нативно не понимает Anthropic Messages API формат — для прямой работы с Claude нужен либо OpenAI-совместимый прокси (LiteLLM и т.п.), либо родной Go SDK MCP/Anthropic.

- repo: google/generative-ai-go
  category: libs/go
  description_ru: "Официальный Go SDK от Google для моделей семейства Gemini — полезен для мультимодельных Go-пайплайнов рядом с Claude."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Официальный клиент Google для Gemini API на Go: текст, изображения, function calling, embeddings.

    ### 🎯 Для чего
    Актуален для мультимодельных Go-приложений, где часть задач идёт на Gemini (например, из-за цены/скорости), а часть — на Claude через отдельный клиент.

    ### 💻 Как установить
    ```bash
    go get github.com/google/generative-ai-go/genai
    ```

    ### 🚀 Как пользоваться
    ```go
    client, _ := genai.NewClient(ctx, option.WithAPIKey(key))
    model := client.GenerativeModel("gemini-2.5-pro")
    resp, _ := model.GenerateContent(ctx, genai.Text("привет"))
    ```

    ### ⚠️ Грабли
    API и модельные имена Google обновляются independently от Anthropic — для сравнения цен/лимитов сверяйтесь с актуальной документацией Google, а не по аналогии с Claude.

- repo: cohere-ai/cohere-go
  category: libs/go
  description_ru: "Официальная Go-библиотека для интеграции API Cohere — актуальна для мультипровайдерных Go-пайплайнов."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Официальный Go SDK Cohere: генерация текста, rerank, embeddings — часто используется как дешёвая rerank-ступень перед финальным вызовом Claude в RAG-пайплайнах.

    ### 🎯 Для чего
    Полезен для гибридных архитектур: Cohere rerank для сужения кандидатов из векторного поиска, финальный ответ — от Claude.

    ### 💻 Как установить
    ```bash
    go get github.com/cohere-ai/cohere-go/v2
    ```

    ### 🚀 Как пользоваться
    ```go
    client := client.NewClient(client.WithToken(apiKey))
    resp, _ := client.Rerank(ctx, &cohere.RerankRequest{...})
    ```

    ### ⚠️ Грабли
    Rerank и generate — разные модели с разным ценообразованием у Cohere, не путайте лимиты одного эндпоинта с другим при планировании расходов.

- repo: henomis/milvus-go
  category: libs/go
  description_ru: "Go-клиент для распределённой векторной базы данных Milvus."
  verify_status: check
  body_md: |
    ### ❓ Что это
    Неофициальный, но широко используемый Go-клиент для Milvus — открытой распределённой векторной БД для хранения эмбеддингов и similarity-поиска.

    ### 🎯 Для чего
    Нужен для Go-бэкендов, реализующих собственный RAG поверх Claude: хранение эмбеддингов документов и быстрый top-k поиск перед формированием контекста для модели.

    ### 💻 Как установить
    ```bash
    go get github.com/milvus-io/milvus-sdk-go/v2
    ```
    (либо уточнить актуальный путь модуля в README `henomis/milvus-go`).

    ### 🚀 Как пользоваться
    ```go
    client, _ := client.NewGrpcClient(ctx, "localhost:19530")
    client.Search(ctx, collection, ...)
    ```

    ### ⚠️ Грабли
    Milvus сам по себе — тяжёлая распределённая система (etcd + MinIO + query/data nodes), для небольших проектов может быть избыточен по сравнению с pgvector.

- repo: pinecone-io/go-pinecone
  category: libs/go
  description_ru: "Официальный SDK облачной векторной БД Pinecone на Go."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Официальный Go-клиент Pinecone — managed векторной базы данных: upsert/query эмбеддингов, метаданные, namespace-изоляция.

    ### 🎯 Для чего
    Актуален для Go-сервисов с RAG поверх Claude, где хочется managed-решение без своего кластера (в отличие от self-hosted Milvus/pgvector).

    ### 💻 Как установить
    ```bash
    go get github.com/pinecone-io/go-pinecone/v3/pinecone
    ```

    ### 🚀 Как пользоваться
    ```go
    client, _ := pinecone.NewClient(pinecone.NewClientParams{ApiKey: key})
    idx, _ := client.Index(host)
    idx.UpsertVectors(ctx, vectors)
    ```

    ### ⚠️ Грабли
    Managed-сервис — расходы растут с объёмом векторов и запросов, для прототипов дешевле начать с pgvector/локального Milvus и мигрировать при росте нагрузки.

- repo: pkoukk/tiktoken-go
  category: libs/go
  description_ru: "Порт библиотеки Tiktoken на Go для точного подсчёта токенов OpenAI-совместимых моделей."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Go-порт OpenAI `tiktoken` — точный подсчёт количества токенов по BPE-энкодеру без обращения к API.

    ### 🎯 Для чего
    Полезен для прикидки стоимости/лимитов запроса до его отправки — но учитывайте, что токенизатор Claude отличается от OpenAI, для точного подсчёта токенов Claude нужен отдельный подход (count_tokens в Anthropic SDK).

    ### 💻 Как установить
    ```bash
    go get github.com/pkoukk/tiktoken-go
    ```

    ### 🚀 Как пользоваться
    ```go
    enc, _ := tiktoken.GetEncoding("cl100k_base")
    tokens := enc.Encode(text, nil, nil)
    ```

    ### ⚠️ Грабли
    Даёт точный подсчёт только для энкодеров семейства OpenAI (cl100k_base и т.п.) — для Claude это лишь грубая оценка, реальное число токенов может заметно отличаться.

- repo: ollama/ollama
  category: libs/go
  description_ru: "CLI-утилита и демон для запуска локальных LLM на своём компьютере — написан на Go, даёт OpenAI-совместимое API."
  badge: editors_choice
  verify_status: known
  body_md: |
    ### ❓ Что это
    Ollama — локальный движок инференса open-weight моделей (Llama, Qwen, Mistral и др.): скачивает, квантует и запускает модели одной командой, отдаёт HTTP API.

    ### 🎯 Для чего
    Полезен для офлайн-экспериментов, приватных данных (модель не покидает машину) или как дешёвая локальная альтернатива для второстепенных задач в пайплайне, где основной «мозг» — Claude.

    ### 💻 Как установить
    ```bash
    curl -fsSL https://ollama.com/install.sh | sh
    ```

    ### 🚀 Как пользоваться
    ```bash
    ollama pull llama3.1
    ollama run llama3.1
    ```
    HTTP API доступен на `localhost:11434` — совместим с клиентами вроде `oterm`.

    ### ⚠️ Грабли
    Качество и скорость сильно зависят от локального железа (VRAM/RAM) — не стоит ожидать паритета по качеству рассуждений с Claude на задачах, требующих сложной логики.

- repo: 0xPlaygrounds/rig
  category: libs/rust
  description_ru: "Rig — эргономичный Rust-фреймворк для создания модульных ИИ-агентов с поддержкой множества провайдеров, включая Anthropic."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Rig — Rust-библиотека для построения LLM-приложений: агенты, RAG, векторные хранилища, единый интерфейс поверх нескольких провайдеров моделей.

    ### 🎯 Для чего
    Выбор для команд, которым нужна производительность и безопасность типов Rust в проде — например, высоконагруженный сервис-прокси перед Claude API.

    ### 💻 Как установить
    ```bash
    cargo add rig-core
    ```

    ### 🚀 Как пользоваться
    ```rust
    let client = rig::providers::anthropic::Client::new(&api_key);
    let agent = client.agent("claude-sonnet-4-5").build();
    let resp = agent.prompt("привет").await?;
    ```

    ### ⚠️ Грабли
    Экосистема моложе Python/JS-аналогов — часть интеграций (векторные БД, инструменты) реализована не так полно, проверяйте поддержку конкретного провайдера перед стартом проекта.

- repo: jeremychone/rust-genai
  category: libs/rust
  description_ru: "Rust-библиотека для интеграции с 26+ провайдерами LLM (Claude, OpenAI, Ollama и др.) через единый интерфейс."
  verify_status: known
  body_md: |
    ### ❓ Что это
    `genai` — минималистичный Rust-клиент с единым API поверх множества провайдеров: переключение между Claude, OpenAI, Gemini, Ollama одной строкой конфигурации.

    ### 🎯 Для чего
    Удобен, когда нужно быстро сравнить ответы разных моделей на одном запросе или держать fallback-провайдера на случай недоступности основного.

    ### 💻 Как установить
    ```bash
    cargo add genai
    ```

    ### 🚀 Как пользоваться
    ```rust
    let client = genai::Client::default();
    let resp = client.exec_chat("claude-sonnet-4-5", chat_req, None).await?;
    ```

    ### ⚠️ Грабли
    Единый интерфейс не покрывает провайдер-специфичные фичи (например, extended thinking или prompt caching Claude) — для тонкой настройки под конкретного провайдера иногда нужен родной SDK.

- repo: pepperoni21/ollama-rs
  category: libs/rust
  description_ru: "Специализированный асинхронный клиент для локального API Ollama на Rust."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Асинхронная Rust-обёртка над HTTP API Ollama: генерация, чат, эмбеддинги, управление моделями (pull/list/delete).

    ### 🎯 Для чего
    Нужен, если Rust-сервис использует локальную модель через Ollama как часть пайплайна (например, для дешёвой предобработки перед вызовом Claude на финальном шаге).

    ### 💻 Как установить
    ```bash
    cargo add ollama-rs
    ```

    ### 🚀 Как пользоваться
    ```rust
    let ollama = Ollama::default();
    let res = ollama.generate(GenerationRequest::new("llama3.1".into(), prompt)).await?;
    ```

    ### ⚠️ Грабли
    Работает только с локально запущенным демоном Ollama — сам по себе не обращается ни к каким облачным API.

- repo: huggingface/candle
  category: libs/rust
  description_ru: "Минималистичный ML-фреймворк на Rust от Hugging Face — инференс моделей без Python-рантайма."
  badge: editors_choice
  verify_status: known
  body_md: |
    ### ❓ Что это
    Candle — Rust-фреймворк для тензорных вычислений и инференса ML-моделей (включая LLM), нацеленный на минимальный бинарник и отсутствие зависимости от Python/PyTorch в рантайме.

    ### 🎯 Для чего
    Актуален, когда нужно встроить инференс небольшой открытой модели прямо в Rust-бинарник (edge/embedded-сценарии) — с Claude напрямую не связан, но часто используется рядом как локальный слой предобработки.

    ### 💻 Как установить
    ```bash
    cargo add candle-core candle-transformers
    ```

    ### 🚀 Как пользоваться
    Загрузка весов модели в формате safetensors и прямой forward-pass через API `candle-transformers` — примеры под конкретные архитектуры (Llama, Mistral и т.п.) есть в репозитории.

    ### ⚠️ Грабли
    Более низкоуровневый инструмент, чем Ollama/llama.cpp — требует больше кода для запуска конкретной модели, зато даёт полный контроль над рантаймом.

- repo: EricLBuehler/mistral.rs
  category: libs/rust
  description_ru: "Высокопроизводительный движок локального инференса на Rust для Llama, Mistral, Gemma с поддержкой квантования."
  verify_status: known
  body_md: |
    ### ❓ Что это
    `mistral.rs` — быстрый локальный инференс-движок на Rust с поддержкой квантованных GGUF-моделей, есть OpenAI-совместимый HTTP-сервер режим.

    ### 🎯 Для чего
    Альтернатива llama.cpp/Ollama, когда важна максимальная скорость на CPU/GPU и нужен нативный Rust-интерфейс, а не только CLI.

    ### 💻 Как установить
    ```bash
    cargo install --git https://github.com/EricLBuehler/mistral.rs mistralrs-server
    ```

    ### 🚀 Как пользоваться
    ```bash
    mistralrs-server --port 1234 gguf -m <repo> -f <file.gguf>
    ```
    Далее доступен OpenAI-совместимый эндпоинт `/v1/chat/completions`.

    ### ⚠️ Грабли
    Совместимость с конкретными архитектурами моделей появляется постепенно — перед выбором свежей модели проверьте таблицу поддерживаемых архитектур в README.

- repo: rustformers/llm
  category: libs/rust
  description_ru: "Экосистема библиотек для инференса локальных GGUF-моделей на CPU и GPU на Rust."
  verify_status: check
  body_md: |
    ### ❓ Что это
    Набор Rust-крейтов для загрузки и инференса моделей в формате GGML/GGUF — предшественник многих современных Rust LLM-рантаймов.

    ### 🎯 Для чего
    Годится для встраивания простого локального инференса в существующий Rust-проект без внешних процессов (в отличие от вызова Ollama по HTTP).

    ### 💻 Как установить
    ```bash
    cargo add llm
    ```

    ### 🚀 Как пользоваться
    Загрузка модели в формате GGML/GGUF и вызов `Model::infer` согласно примерам в репозитории.

    ### ⚠️ Грабли
    Проект менее активно развивается, чем более новые альтернативы (candle, mistral.rs) — перед стартом нового проекта сравните дату последнего коммита с активностью аналогов.

- repo: extism/extism
  category: libs/rust
  description_ru: "Плагин-система на WebAssembly — используется для безопасного изолированного исполнения агентных скиллов/плагинов."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Extism — универсальный фреймворк для WASM-плагинов: любую функцию можно скомпилировать в WASM-модуль и безопасно (в песочнице) вызывать из хост-приложения на десятке языков, включая Rust, Go, Python, Node.

    ### 🎯 Для чего
    Полезен для построения плагинной архитектуры агента (вроде «скиллов»), где сторонний/сгенерированный код исполняется в изолированной песочнице, а не напрямую в основном процессе.

    ### 💻 Как установить
    ```bash
    cargo add extism
    ```

    ### 🚀 Как пользоваться
    ```rust
    let mut plugin = Plugin::new(wasm_bytes, [], true)?;
    let output = plugin.call::<&str, &str>("greet", "world")?;
    ```

    ### ⚠️ Грабли
    WASM-песочница ограничивает доступ к файловой системе/сети по умолчанию — если плагину нужен I/O, права нужно явно пробросить через host-функции, продумывая модель доверия заранее.

- repo: comet-ml/opik
  category: code/monitoring
  description_ru: "Open-source платформа для трейсинга, логирования и оценки работы LLM-приложений (в том числе на Claude)."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Opik от Comet — открытая платформа наблюдаемости для LLM/агентных приложений: трейсы вызовов, датасеты для оценки, встроенные и кастомные метрики качества.

    ### 🎯 Для чего
    Позволяет увидеть полную цепочку вызовов агента (включая промежуточные tool calls), а не только финальный ответ — полезно при отладке многошаговых Claude Code-подобных пайплайнов.

    ### 💻 Как установить
    ```bash
    pip install opik
    ```
    Либо self-host через `docker compose` из репозитория.

    ### 🚀 Как пользоваться
    ```python
    import opik
    opik.configure()
    
    @opik.track
    def my_llm_call(prompt): ...
    ```

    ### ⚠️ Грабли
    Self-host версия требует своей инфраструктуры (ClickHouse и др. сервисы в compose) — для быстрого старта проще облачный вариант, для приватных данных — self-host.

- repo: agenta-ai/agenta
  category: code/monitoring
  description_ru: "Платформа для совместной работы над промптами: A/B тестирование, оценки и трекинг версий."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Agenta — open-source LLMOps платформа: версионирование промптов, A/B тесты между вариантами, human-in-the-loop и автоматические оценки, наблюдение за трассами (evaluation + observability).

    ### 🎯 Для чего
    Удобна командам, где над промптами работают не только разработчики — non-технический ревьюер может сравнивать варианты промпта в UI без доступа к коду.

    ### 💻 Как установить
    ```bash
    git clone https://github.com/agenta-ai/agenta
    cd agenta && docker compose up -d
    ```

    ### 🚀 Как пользоваться
    Подключить SDK (`pip install agenta`) к своему приложению, версии промптов и эксперименты редактируются через веб-UI.

    ### ⚠️ Грабли
    Полноценный self-host — это несколько сервисов в docker-compose (Postgres, Redis и др.) — для одного разработчика может быть избыточно тяжёлым решением.

- repo: Promptfoo/promptfoo
  category: code/monitoring
  description_ru: "CLI-утилита для автоматического тестирования и валидации ответов LLM — промпт-регрессия как часть CI."
  badge: editors_choice
  verify_status: known
  body_md: |
    ### ❓ Что это
    Promptfoo — CLI и библиотека для тестирования промптов: описываете тест-кейсы (вход + ожидаемые свойства ответа) в YAML, инструмент прогоняет их против одной или нескольких моделей и сравнивает результаты.

    ### 🎯 Для чего
    Полезен, чтобы ловить регрессии при смене модели/промпта до продакшена — как unit-тесты, но для качества LLM-ответов, легко встраивается в CI/CD.

    ### 💻 Как установить
    ```bash
    npm install -g promptfoo
    ```

    ### 🚀 Как пользоваться
    ```bash
    promptfoo init
    promptfoo eval
    promptfoo view   # веб-UI с результатами
    ```

    ### ⚠️ Грабли
    Оценки на базе LLM-судьи (`llm-rubric`) сами стоят токенов и подвержены той же нестабильности, что и оцениваемая модель — для критичных метрик комбинируйте с детерминированными проверками (regex, json-schema).

- repo: mlflow/mlflow
  category: code/monitoring
  description_ru: "Платформа управления жизненным циклом ML, дополненная разделом MLflow LLM Tracking/Tracing."
  verify_status: known
  body_md: |
    ### ❓ Что это
    MLflow — устоявшаяся open-source платформа ML-экспериментов, дополненная модулями GenAI: трейсинг LLM-вызовов, оценка (`mlflow.evaluate`), реестр промптов.

    ### 🎯 Для чего
    Хороший выбор, если в компании уже используется MLflow для классических ML-моделей — LLM/агентные трейсы ложатся в ту же инфраструктуру и UI без нового инструмента.

    ### 💻 Как установить
    ```bash
    pip install mlflow
    ```

    ### 🚀 Как пользоваться
    ```python
    import mlflow
    mlflow.anthropic.autolog()
    with mlflow.start_run():
        ...
    ```

    ### ⚠️ Грабли
    GenAI-функциональность добавлена относительно недавно поверх старой ML-платформы — часть UI всё ещё заточена под классические ML-эксперименты, а не под просмотр многошаговых агентных трасс.

- repo: wandb/wandb
  category: code/monitoring
  description_ru: "Weights & Biases — платформа экспериментов, включающая раздел Weave для трейсинга и мониторинга ИИ-агентов."
  verify_status: known
  body_md: |
    ### ❓ Что это
    W&B — популярная платформа для трекинга ML-экспериментов, включает продукт **Weave** для наблюдаемости LLM/агентов: трейсы, датасеты, оценки, сравнение версий промптов.

    ### 🎯 Для чего
    Аналогично MLflow — удобен, если команда уже пользуется W&B для метрик обучения, теперь можно трейсить и Claude-based агентные пайплайны в том же дашборде.

    ### 💻 Как установить
    ```bash
    pip install wandb weave
    ```

    ### 🚀 Как пользоваться
    ```python
    import weave
    weave.init("my-project")
    
    @weave.op()
    def call_claude(prompt): ...
    ```

    ### ⚠️ Грабли
    Полная функциональность (командные дашборды, длинное хранение трасс) — платная SaaS-часть; open-source клиент бесплатен, но с ограничениями по хранению.

- repo: k8sgpt-ai/k8sgpt
  category: code/ci-cd
  description_ru: "ИИ-агент для сканирования кластеров Kubernetes, диагностики ошибок и генерации рекомендаций на естественном языке."
  verify_status: known
  body_md: |
    ### ❓ Что это
    k8sgpt — CLI-инструмент, который сканирует Kubernetes-кластер (CrashLoopBackOff, неудачные деплои, проблемы с ресурсами и т.п.) и объясняет причину человеческим языком через LLM-провайдера.

    ### 🎯 Для чего
    Полезен для дежурных/SRE — вместо ручного разбора `kubectl describe` и логов агент сразу выдаёт вероятную причину и шаги исправления, экономя время в CI/CD и инцидентах.

    ### 💻 Как установить
    ```bash
    brew install k8sgpt
    ```

    ### 🚀 Как пользоваться
    ```bash
    k8sgpt auth add --backend anthropic --model claude-sonnet-4-5
    k8sgpt analyze --explain
    ```

    ### ⚠️ Грабли
    Требует прав на чтение объектов кластера через kubeconfig — на проде стоит завести отдельный read-only ServiceAccount вместо личных admin-прав.

- repo: diggerhq/digger
  category: code/ci-cd
  description_ru: "Terraform-оркестратор в CI/CD, запускающий `plan`/`apply` прямо в вашем GitHub Actions/GitLab CI без отдельного сервера."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Digger — open-source альтернатива Atlantis/Terraform Cloud: запускает `terraform plan`/`apply` внутри вашего собственного CI-раннера (GitHub Actions и др.), комментирует план прямо в PR.

    ### 🎯 Для чего
    В контексте ИИ полезен как основа для «ИИ-ревью инфраструктурных изменений» — план из PR можно скормить Claude на анализ рисков перед `apply`, не поднимая отдельный сервер оркестрации.

    ### 💻 Как установить
    Добавить workflow-файл `digger.yml` в `.github/workflows/` по шаблону из документации + `digger.yml` конфиг с описанием проектов Terraform.

    ### 🚀 Как пользоваться
    PR с изменениями в Terraform-коде автоматически триггерит `plan`-комментарий; `apply` — по команде в комментарии или через merge (настраивается политикой).

    ### ⚠️ Грабли
    Digger выполняет `apply` с правами вашего CI-раннера — критично ограничить, кто может мержить/комментировать PR, иначе это прямой путь к неавторизованным изменениям инфраструктуры.

- repo: coder/coder
  category: code/ci-cd
  description_ru: "Облачные среды разработки (CDE) с поддержкой ИИ-ассистентов — воспроизводимые dev-окружения для команды."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Coder — self-hosted платформа облачных сред разработки: воспроизводимые рабочие пространства как код (Terraform), доступ через браузер/SSH/IDE, интеграции с ИИ-агентами прямо в workspace.

    ### 🎯 Для чего
    Полезен для команд, где Claude Code/агенты должны работать в единообразных, изолированных и воспроизводимых окружениях, а не на разномастных локальных машинах разработчиков.

    ### 💻 Как установить
    ```bash
    curl -fsSL https://coder.com/install.sh | sh
    coder server
    ```

    ### 🚀 Как пользоваться
    Описать шаблон workspace в Terraform, затем `coder create` — разработчик или агент получает готовое окружение по шаблону.

    ### ⚠️ Грабли
    Полноценный self-host требует администрирования отдельного сервера/кластера — для одиночного разработчика это явно избыточно, инструмент рассчитан на команду.

- repo: run-llama/llama_deploy
  category: code/ci-cd
  description_ru: "Сервис для деплоя и масштабирования агентных систем LlamaIndex в облаке и CI."
  verify_status: known
  body_md: |
    ### ❓ Что это
    LlamaDeploy — фреймворк для превращения LlamaIndex-workflow (агентов) в независимо масштабируемые микросервисы с очередью сообщений между ними.

    ### 🎯 Для чего
    Полезен, когда агентный пайплайн на LlamaIndex перерастает прототип и его нужно задеплоить как отдельные сервисы с независимым масштабированием стадий (например, retrieval отдельно от генерации).

    ### 💻 Как установить
    ```bash
    pip install llama-deploy
    ```

    ### 🚀 Как пользоваться
    Описать `Workflow` в LlamaIndex, обернуть в `deployment` конфиг `llama_deploy`, задеплоить через CLI `llamactl`.

    ### ⚠️ Грабли
    Добавляет свою инфраструктуру (message queue, control plane) поверх LlamaIndex — для простых однопроцессных агентов это лишний слой сложности.

- repo: mindsdb/mindshub
  category: code/ci-cd
  description_ru: "Платформа для автоматизации деплоя и запуска AI/ML-моделей прямо из баз данных через SQL-подобные запросы."
  verify_status: check
  body_md: |
    ### ❓ Что это
    MindsDB (репозиторий переименован в `mindshub`) — платформа, позволяющая обращаться к LLM (включая Claude) и ML-моделям SQL-подобными запросами прямо из существующей БД, без отдельного ML-сервиса.

    ### 🎯 Для чего
    Полезен, если аналитики уже работают через SQL и хочется дать им доступ к Claude («спроси модель по этой таблице») без написания Python-кода и отдельного API-слоя.

    ### 💻 Как установить
    ```bash
    docker run -p 47334:47334 mindsdb/mindsdb
    ```

    ### 🚀 Как пользоваться
    ```sql
    CREATE MODEL claude_model
    PREDICT answer
    USING engine='anthropic', model_name='claude-sonnet-4-5';
    ```

    ### ⚠️ Грабли
    Проект недавно сменил имя репозитория (mindsdb → mindshub) — при обновлении сверяйте актуальные Docker-образы и документацию, старые ссылки могут вести на архивную версию.

- repo: jerryjliu/llama-hub
  category: code/ci-cd
  description_ru: "Коннекторы данных LlamaIndex (включая интеграцию с Git/GitHub) для CI/CD и RAG-автоматизаций."
  verify_status: check
  body_md: |
    ### ❓ Что это
    LlamaHub — репозиторий готовых data-коннекторов для LlamaIndex: загрузчики из GitHub, Notion, Slack, баз данных и десятков других источников для построения индекса под RAG.

    ### 🎯 Для чего
    Ускоряет подключение источника данных к RAG-пайплайну — вместо написания своего загрузчика для, скажем, GitHub-репозитория, берётся готовый коннектор.

    ### 💻 Как установить
    ```bash
    pip install llama-index-readers-github
    ```
    (конкретный пакет — под нужный коннектор, единого мега-пакета `llama-hub` в актуальных версиях уже нет).

    ### 🚀 Как пользоваться
    ```python
    from llama_index.readers.github import GithubRepositoryReader
    docs = GithubRepositoryReader(...).load_data(branch="main")
    ```

    ### ⚠️ Грабли
    Проект был реструктурирован — большинство коннекторов давно переехали в namespace-пакеты `llama-index-readers-*`, искать нужно по актуальному LlamaIndex hub, а не по старому монорепо.

- repo: di-sukharev/opencommit
  category: code/hooks
  description_ru: "OpenCommit — генератор commit-сообщений по вашему `git diff`, поддерживает Claude как провайдера."
  badge: editors_choice
  verify_status: known
  body_md: |
    ### ❓ Что это
    CLI-утилита, которая читает staged `git diff` и генерирует осмысленное commit-сообщение по Conventional Commits через LLM (OpenAI, Anthropic и другие провайдеры).

    ### 🎯 Для чего
    Экономит время на формулировании commit-сообщений и приводит их к единому формату (`feat:`, `fix:` и т.п.) во всей команде без ручной дисциплины.

    ### 💻 Как установить
    ```bash
    npm install -g opencommit
    oco config set OCO_API_KEY=<ключ>
    oco config set OCO_AI_PROVIDER=anthropic
    ```

    ### 🚀 Как пользоваться
    ```bash
    git add .
    oco
    ```
    Можно поставить как git-хук (`oco hook set`), чтобы вызывался автоматически при `git commit`.

    ### ⚠️ Грабли
    Отправляет содержимое diff во внешний API — на репозиториях с чувствительным кодом стоит убедиться, что это допустимо политикой безопасности проекта.

- repo: Nutlope/aicommits
