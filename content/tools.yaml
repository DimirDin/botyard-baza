- repo: crewAIInc/crewAI
  category: agents/orchestration
  description_ru: "Фреймворк для оркестрации команд AI-агентов с ролями и задачами."
  badge: editors_choice
  verify_status: check
  body_md: |
    ### ❓ Что это
    Открытый Python-фреймворк для оркестрации мультиагентных систем, спроектированный с нуля отдельно
    от LangChain — то есть не надстройка над чужой абстракцией, а собственная лёгкая архитектура.
    Ключевая метафора — "команда" (crew) из агентов, у каждого из которых есть роль, цель и набор
    инструментов, а задачи распределяются и выполняются согласованно между ними, как в реальной
    рабочей группе. Даёт как высокоуровневые готовые абстракции для быстрого старта, так и
    низкоуровневый контроль для тонкой настройки, когда стандартных паттернов оркестрации
    недостаточно. Проект один из самых заметных в нише — попал в топ трендов GitHub (Trendshift),
    имеет коммерческую облачную версию (Start Cloud Trial) в дополнение к open-source ядру, активный
    форум сообщества и отдельный блог с практиками применения.

    ### 🎯 Для чего
    Использовать, когда задачу естественно решать распределением ролей между несколькими агентами —
    например, один агент исследует тему, второй пишет черновик, третий проверяет факты — а не одним
    универсальным промптом на всё сразу. Подходит для построения производственных мультиагентных
    пайплайнов (обработка контента, автоматизация бизнес-процессов), где нужна предсказуемая
    координация между шагами, а не свободная импровизация одного агента. Облачная версия пригождается,
    когда нужен managed-хостинг оркестрации без самостоятельного развёртывания инфраструктуры под
    open-source ядро.

    ### 💻 Как установить
    ```bash
    uv pip install crewai
    ```

    ### 🚀 Как пользоваться
    ```bash
    crewai create crew my_project
    ```

    ### ⚠️ Грабли
    Нужен Python в диапазоне >=3.10 <3.14 — более новая версия не поддерживается. README отдельно
    предупреждает про `ModuleNotFoundError: No module named 'tiktoken'` — чинится установкой
    `uv pip install 'crewai[tools]'`, а не переустановкой самого crewai.

- repo: langchain-ai/langgraph
  category: agents/orchestration
  description_ru: "Библиотека для построения стейтфул мультиагентных графов поверх LangChain."
  badge: editors_choice
  verify_status: check
  body_md: |
    ### ❓ Что это
    Низкоуровневый фреймворк оркестрации от команды LangChain для построения долгоживущих, стейтфул
    агентов, представленных в виде графа состояний, а не линейной цепочки шагов. Такая модель хорошо
    подходит для сложных сценариев, где нужны ветвления, циклы и возврат к предыдущим шагам — то, что
    трудно выразить обычной последовательной цепочкой вызовов. Проекту доверяют крупные компании
    (Klarna, Replit, Elastic упомянуты авторами как пользователи в продакшене), что указывает на
    зрелость библиотеки для реальных нагрузок, а не только для экспериментов. Ставится стандартно
    через pip, есть эквивалентная JS/TS-версия LangGraph.js для тех, кто работает в JavaScript-
    экосистеме. Поверх LangGraph команда развивает более высокоуровневый пакет Deep Agents — для тех,
    кому не нужен полный низкоуровневый контроль над графом состояний, а нужны быстро собираемые
    агенты с планированием и файловой системой.

    ### 🎯 Для чего
    Использовать, когда сценарий агента не укладывается в простую линейную цепочку — нужны условные
    переходы, повторные попытки, возврат назад по графу в зависимости от промежуточного результата.
    Подходит для построения производственных long-running агентов, которым нужно надёжно сохранять
    состояние между шагами (например, многодневный воркфлоу обработки заявки). Если нужен именно
    низкоуровневый контроль над архитектурой агента — LangGraph предпочтительнее готовых высокоуровневых
    фреймворков; если контроль не критичен и важна скорость старта, стоит сначала попробовать Deep
    Agents поверх него.

    ### 💻 Как установить
    ```bash
    pip install -U langgraph
    ```

    ### 🚀 Как пользоваться
    Готового однострочного примера в самом README нет — рабочий код графа состояний стоит смотреть
    в официальном LangGraph Quickstart (docs.langchain.com/oss/python/langgraph/quickstart).

    ### ⚠️ Грабли
    README прямо советует: если не нужен именно низкоуровневый контроль над графом, начинать стоит с
    более высокоуровневого пакета Deep Agents поверх LangGraph, а не с самого LangGraph — иначе легко
    переусложнить простую задачу.

- repo: lastmile-ai/mcp-agent
  category: agents/orchestration
  description_ru: "Компактный фреймворк для сборки агентов поверх MCP по паттернам из статьи Anthropic об building effective agents."
  badge: editors_choice
  verify_status: check
  body_md: |
    ### ❓ Что это
    Компактный фреймворк, построенный на явной философии: MCP — это всё, что нужно для сборки
    агентов, а простые, композируемые паттерны надёжнее сложных архитектур для реального продакшена.
    Проект прямо опирается на известную статью Anthropic "Building Effective Agents" и превращает
    описанные там паттерны (последовательная цепочка, параллелизация, маршрутизация, оценщик-
    оптимизатор и другие) в готовый к использованию код поверх Model Context Protocol, а не
    заставляет реализовывать их с нуля по каждому проекту заново. В отличие от более тяжёлых
    оркестраторов вроде LangGraph или CrewAI, здесь MCP — не одна из интеграций, а сама основа
    архитектуры: агент общается с инструментами исключительно через MCP-серверы. Публикуется как
    Python-пакет через pip, документация ведётся на отдельном сайте docs.mcp-agent.com, есть открытые
    примеры в папке examples.

    ### 🎯 Для чего
    Использовать, когда хочется реализовать конкретный паттерн из статьи Anthropic об эффективных
    агентах (например, оценщик-оптимизатор или маршрутизацию между специализированными подагентами)
    без написания инфраструктурного кода вокруг MCP с нуля. Подходит тем, кто уже выбрал MCP как
    основной способ подключения агента к инструментам и не хочет тащить в проект тяжёлый оркестратор
    общего назначения ради нескольких простых паттернов. Хорошая отправная точка для изучения самих
    паттернов эффективных агентов на практике — примеры в репозитории читаются как рабочая иллюстрация
    к теоретической статье, а не абстрактная документация.

    ### 💻 Как установить
    ```bash
    uv add "mcp-agent[anthropic]"
    ```

    ### 🚀 Как пользоваться
    ```bash
    uvx mcp-agent init
    uv run main.py
    ```

    ### ⚠️ Грабли
    Провайдер модели (Anthropic, OpenAI и другие) — это отдельный опциональный экстра-пакет
    (`mcp-agent[anthropic]`), базовая установка `pip install mcp-agent` его не включает, без явного
    указания провайдера агент не сможет обратиться к нужной модели.

