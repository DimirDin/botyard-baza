- repo: sst/opencode
  category: apps/desktop
  description_ru: "Open-source терминальный AI-агент для разработки от команды SST, задуманный как открытая альтернатива Claude Code."
  badge:
  verify_status: check
  body_md: |
    ![](https://raw.githubusercontent.com/sst/opencode/dev/packages/web/src/assets/lander/screenshot.png)

    ### ❓ Что это
    **OpenCode** — open source AI coding agent от команды **sst** (создателей одноимённого IaC-фреймворка). По сути открытая альтернатива Claude Code: терминальный интерфейс плюс отдельное **desktop-приложение (бета)** под macOS, Windows и Linux. README переведён на два десятка языков, включая русский (`README.ru.md`) — сообщество явно международное.

    ### 🎯 Для чего
    Ставить, когда хочется терминального AI-агента для кода без привязки к конкретному вендору: сборка фич, рефакторинг, исследование незнакомого репозитория. Есть два встроенных режима-агента, между которыми переключаешься клавишей `Tab`:
    - **build** — агент с полным доступом, для реальной разработки;
    - **plan** — read-only агент для анализа и планирования: не трогает файлы и спрашивает разрешение перед каждой bash-командой, удобен для изучения незнакомого кода.

    Плюс встроен служебный **general**-субагент для сложных многошаговых поисков — вызывается через `@general` прямо в сообщении.

    ### 💻 Как установить
    ```bash
    # быстрый вариант
    curl -fsSL https://opencode.ai/install | bash

    # через пакетные менеджеры
    npm i -g opencode-ai@latest        # или bun/pnpm/yarn
    brew install anomalyco/tap/opencode # macOS/Linux, рекомендуемый
    scoop install opencode              # Windows
    sudo pacman -S opencode             # Arch Linux
    nix run nixpkgs#opencode
    ```
    Desktop-приложение (бета) можно поставить через `brew install --cask opencode-desktop` или скачать с [opencode.ai/download](https://opencode.ai/download).

    ### 🚀 Как пользоваться
    ```
    Tab            — переключить агента build ↔ plan
    @general ...   — явно вызвать general-субагента для сложной задачи
    ```

    ### ⚠️ Грабли
    Перед установкой авторы явно просят удалить версии старше `0.1.x` — иначе апдейт может сломаться. Также если делаете сторонний проект с "opencode" в названии (например, "opencode-dashboard") — авторы просят явно указать в README, что это не официальная разработка команды OpenCode.

- repo: block/goose
  category: apps/desktop
  description_ru: "Универсальный локальный AI-агент, изначально созданный в Block (Square), теперь развивается под крылом Agentic AI Foundation при Linux Foundation."
  badge:
  verify_status: check
  body_md: |
    ![](https://opengraph.githubassets.com/1/block/goose)

    ### ❓ Что это
    **goose** — открытый AI-агент, который работает прямо на твоей машине: desktop-приложение под macOS/Linux/Windows, CLI для терминала и API для встраивания куда угодно, написан на **Rust**. Проект стартовал в **Block** (материнская компания Square и Cash App), а недавно **переехал** из `block/goose` под управление **Agentic AI Foundation (AAIF)** при Linux Foundation — часть ссылок и упоминаний в репозитории ещё в процессе обновления.

    ### 🎯 Для чего
    В отличие от чисто кодерских агентов, goose не ограничен разработкой — его ставят и для research, писательских задач, автоматизации рутины и анализа данных. Работает с **15+ провайдерами**: Anthropic, OpenAI, Google, Ollama, OpenRouter, Azure, Bedrock и другими, причём можно использовать как API-ключи, так и уже оплаченную подписку Claude/ChatGPT/Gemini через **ACP**. Расширяется через **70+ extensions** по протоколу **Model Context Protocol (MCP)**.

    ### 💻 Как установить
    ```bash
    curl -fsSL https://github.com/aaif-goose/goose/releases/download/stable/download_cli.sh | bash
    ```
    Либо скачать desktop-приложение со страницы установки в [документации](https://goose-docs.ai/docs/getting-started/installation).

    ### 🚀 Как пользоваться
    Прямого примера вызова в README нет — после установки CLI запускается как обычный агент, десктоп-версия открывается как отдельное приложение; дальнейшие шаги описаны в [Quickstart](https://goose-docs.ai/docs/quickstart).

    ### ⚠️ Грабли
    Проект в процессе переезда организации (`block/goose` → `aaif-goose/goose`) — часть ссылок, бейджей и, вероятно, издательских процессов ещё не устаканилась, так что стоит свериться с актуальным репозиторием перед установкой из старых инструкций.

- repo: All-Hands-AI/OpenHands
  category: apps/desktop
  description_ru: "Self-hosted центр управления AI-агентами разработки (Agent Canvas) — единая панель для OpenHands, Claude Code, Codex, Gemini и любых ACP-совместимых агентов."
  badge:
  verify_status: check
  body_md: |
    ![](https://assets.openhands.dev/logo-whitebackground.png)

    ### ❓ Что это
    **OpenHands Agent Canvas** — self-hosted "центр управления" для кодерских AI-агентов и автоматизаций. Превращает набор агентов в постоянно работающую инженерную команду: заводишь диалоги и настраиваешь автоматизации вроде "сгенерировать отчёт и опубликовать в Slack" или "автоматически разложить GitHub issue на задачи". Запускает из коробки открытый агент **OpenHands**, но умеет работать и со сторонними — **Claude Code**, **Codex**, **Gemini** — через любой агент с поддержкой **Agent-Client Protocol (ACP)**.

    Важно: код проекта переезжает — сам агент и Agent Server теперь живут в `OpenHands/software-agent-sdk`, а Agent Canvas — в `OpenHands/agent-canvas`.

    ### 🎯 Для чего
    - self-hosting агентов локально, в Docker, на VM или в своей корп-инфраструктуре, с возможностью переключаться между разными "бэкендами" не теряя контекст;
    - **автоматизации и workflow**, интегрированные со **Slack**, **GitHub**, **Linear** — по расписанию или по вебхуку;
    - подключение любой LLM по своему выбору (bring your own model).

    ### 💻 Как установить
    ```bash
    # Вариант 1 — без песочницы (агент получает полный доступ к файловой системе!)
    npm install -g @openhands/agent-canvas
    agent-canvas

    # Вариант 2 — в Docker-песочнице
    export PROJECTS_PATH="$HOME/projects"
    mkdir -p "$PROJECTS_PATH" "$HOME/.openhands"
    docker run -it --rm -p 8000:8000 \
      -v "$HOME/.openhands:/home/openhands/.openhands" \
      -v "${PROJECTS_PATH}:/projects" \
      ghcr.io/openhands/agent-canvas:1.0.0-rc.11
    ```

    ### 🚀 Как пользоваться
    ```
    agent-canvas --frontend-only   # только статический фронтенд + ingress
    agent-canvas --backend-only    # только agent server + automation backend
    ```
    После запуска интерфейс открывается на `http://localhost:8000`, дополнительные бэкенды добавляются прямо из UI.

    ### ⚠️ Грабли
    Установка "без песочницы" явно помечена предупреждением: агент-сервер выполняется напрямую на твоей машине и получает **полный доступ к файловой системе** — авторы советуют использовать это только с оглядкой на безопасность или сразу брать Docker-вариант.

- repo: slopus/happy
  category: apps/mobile
  description_ru: "Мобильный и веб-клиент для Claude Code и Codex с end-to-end шифрованием — следи и управляй сессиями агента с телефона."
  badge:
  verify_status: check
  body_md: |
    ![](/icons/tools/body/happy-logotype-dark.png)

    ### ❓ Что это
    **Happy** (бывший `happy-coder`) — мобильный и веб-клиент, который позволяет пользоваться **Claude Code** и **Codex** из любой точки с **end-to-end шифрованием**: код и переписка не покидают твои устройства в открытом виде. Состоит из четырёх частей: **Happy App** (веб + мобильный клиент на Expo), **Happy CLI** (обёртка для запуска Claude Code/Codex), **Happy Agent** (CLI для удалённого управления сессиями) и **Happy Server** (бэкенд шифрованной синхронизации).

    ### 🎯 Для чего
    Ставить, если хочется проверять, что делает твой AI-агент, не сидя за компом: push-уведомления, когда Claude Code или Codex просит разрешение или падает с ошибкой, и мгновенное переключение между телефоном и десктопом одним нажатием клавиши.

    ### 💻 Как установить
    ```bash
    npm install -g happy
    ```
    Плюс мобильные приложения — [iOS](https://apps.apple.com/us/app/happy-claude-code-client/id6748571505) и [Android](https://play.google.com/store/apps/details?id=com.ex3ndr.happy).

    ### 🚀 Как пользоваться
    ```bash
    # вместо claude используешь:
    happy claude
    # или вместо codex:
    happy codex
    ```
    На компьютере запускаешь `happy` вместо `claude`/`codex`; чтобы перехватить сессию с телефона — она перезапускается в удалённом режиме, а чтобы вернуть управление на комп — достаточно нажать любую клавишу на клавиатуре.

    ### ⚠️ Грабли
    Пакет мигрировал с имени `happy-coder` на `happy` — если раньше стоял старый пакет, стоит переустановить под новым именем. Авторы подчёркивают: никакой телеметрии и трекинга, весь код открыт для аудита — но раз речь про шифрование сессий, стоит внимательно проверить свою конфигурацию перед тем как доверять ей рабочий код.

- repo: siteboon/claudecodeui
  category: apps/mobile
  description_ru: "Веб и мобильный UI для запуска и удалённого мониторинга Claude Code, Cursor CLI, Codex и Gemini CLI — как локально, так и из облака."
  badge:
  verify_status: check
  body_md: |
    ![](https://raw.githubusercontent.com/siteboon/claudecodeui/main/public/screenshots/desktop-main.png)

    ### ❓ Что это
    **CloudCLI** (он же **Claude Code UI**) — десктопный и мобильный интерфейс поверх **Claude Code**, **Cursor CLI**, **Codex** и **Gemini CLI**. Позволяет видеть свои активные проекты и сессии откуда угодно — локально или удалённо. Есть и коммерческая облачная версия **CloudCLI Cloud**, но сам UI-слой — открытый исходный код.

    ### 🎯 Для чего
    - **Интерактивный чат** и встроенный **терминал** для общения с агентами прямо из браузера;
    - **File Explorer** с подсветкой синтаксиса и live-редактированием, **Git Explorer** для стейджинга/коммитов/переключения веток;
    - **Browser Use** — открытие браузерных сессий для агентских задач вроде веб-исследований;
    - **Plugin System** — можно добавлять свои вкладки, бэкенд-сервисы и интеграции;
    - опциональная интеграция с **TaskMaster AI** для планирования задач и разбора PRD.

    ### 💻 Как установить
    ```bash
    # быстрый запуск без установки (Node.js v22+)
    npx @cloudcli-ai/cloudcli

    # или установка глобально
    npm install -g @cloudcli-ai/cloudcli
    cloudcli
    ```
    Есть и вариант в изолированной Docker-песочнице:
    ```bash
    npx @cloudcli-ai/cloudcli@latest sandbox ~/my-project
    ```

    ### 🚀 Как пользоваться
    После запуска открой `http://localhost:3001` — все существующие сессии Claude Code/Codex/Cursor CLI/Gemini CLI подхватываются автоматически, список моделей можно получить через `GET /api/providers/:provider/models`.

    ### ⚠️ Грабли
