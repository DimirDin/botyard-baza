    ```python
    from langfuse import observe
    from langfuse.openai import openai

    @observe()
    def story():
        return openai.chat.completions.create(
            model="gpt-4o",
            messages=[{"role": "user", "content": "What is Langfuse?"}],
        ).choices[0].message.content
    ```

    ### ⚠️ Грабли
    Лицензия MIT, но папки `ee` (Enterprise Edition) под ней не ходят — часть фич закрытая. Телеметрия включена по умолчанию, отключается через `TELEMETRY_ENABLED=false`. Под капотом — ClickHouse, так что self-host требует поднять ещё и эту БД.

