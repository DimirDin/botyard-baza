    ### ❓ Что это
    **mcp-cli** — CLI-инспектор для **Model Context Protocol**: умеет запускать MCP-серверы из разных источников, listать `Tools`, `Resources`, `Prompts`, вызывать их и поддерживает **OAuth** для SSE и Streamable HTTP серверов.

