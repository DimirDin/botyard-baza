    версий с diff между снапшотами и даже сканировать доступность интерфейса по чек-листу WCAG.
    Отдельная функция — bidirectional token sync: экспорт переменных Figma в формате DTCG и обратный
    импорт изменений из кода в Figma с полным применением diff (создание, переименование, ре-таргетинг
    алиасов), что по заявлению авторов заменяет связку Style Dictionary + Tokens Studio. Поддерживает
    несколько способов подключения — удалённый SSE, облачный режим, локальный npx или git. Есть
    в реальном времени мониторинг логов консоли через плагин Desktop Bridge.

    ### 🎯 Для чего
    Подключать, когда нужно, чтобы Claude не просто описывал дизайн словами, а напрямую читал и менял
    реальные Figma-файлы — вытащить актуальные переменные темы перед вёрсткой компонента, проверить
    соответствие макета и кода. Bidirectional token sync особенно полезен в связке дизайнер-разработчик:
    можно менять токены в коде и прогонять изменения обратно в Figma без ручной синхронизации файлов.
    Встроенное сканирование доступности пригождается на этапе ревью макета перед реализацией — поймать
    нарушения WCAG на уровне дизайна дешевле, чем чинить их после того, как компонент уже собран в
    коде.

    ### 💻 Как установить
    ```bash
    npx figma-console-mcp
    ```

    ### 🚀 Как пользоваться
    ```
    Extract the design tokens from this Figma file and export them as DTCG JSON
    ```

    ### ⚠️ Грабли
    После обновления версии сервера нужно заново переимпортировать плагин в Figma (`code.js` +
    `ui.html`) — README отдельно подчёркивает это требование для версий с изменениями в токен-синке,
    иначе плагин продолжит работать со старой логикой.

- repo: disler/claude-code-hooks-mastery
  category: code/hooks
  description_ru: "Примеры и паттерны использования хуков Claude Code — от логирования до автоматизации."
  badge: null
  verify_status: check
  body_md: |
    ### ❓ Что это
    Учебный репозиторий, детально разбирающий систему хуков Claude Code — жизненный цикл событий,
    что приходит в payload на каждое событие, как останавливать или изменять поведение агента через
    коды возврата хука. Помимо самих хуков репозиторий заодно показывает смежные продвинутые темы:
    сабагентов Claude Code, мета-агента (агента, который сам создаёт других агентов под задачу),
    командную систему валидации через оркестрацию нескольких агентов, кастомные output styles и
    строки статуса. Технически хуки реализованы как однофайловые Python-скрипты через UV — то есть
    без отдельного venv и управления зависимостями, каждый хук — самостоятельный исполняемый файл.
    Есть интеграции с опциональными сервисами вроде ElevenLabs (голосовые уведомления через
    отдельный MCP-сервер) и Firecrawl (веб-скрапинг). Репозиторий скорее справочник и полигон для
    экспериментов, чем готовая к продакшену библиотека хуков.

    ### 🎯 Для чего
    Изучать, когда нужно понять, что вообще можно сделать через хуки Claude Code — здесь собраны
    конкретные примеры на каждый тип события, а не только абстрактное описание из документации.
    UserPromptSubmit-хук из этого репозитория отдельно разобран как самый гибкий: он позволяет
    перехватывать и модифицировать промпт пользователя до того, как его увидит модель. Полезно как
    отправная точка для собственных хуков логирования, звуковых уведомлений о завершении задачи или
    интеграции с внутренними системами компании — большинство паттернов можно скопировать и
    адаптировать, не изобретая структуру с нуля.

    ### 💻 Как установить
    ```bash
    git clone https://github.com/disler/claude-code-hooks-mastery.git
    cd claude-code-hooks-mastery
    uv sync
    ```

    ### 🚀 Как пользоваться
    Скопировать нужный хук из `.claude/hooks/` в свой проект и подключить его в `.claude/settings.json`
    под соответствующим событием (Notification, Stop, UserPromptSubmit и т.п.).

    ### ⚠️ Грабли
    Хуки реализованы как однофайловые скрипты через UV — без установленного Astral UV они не
    запустятся, обычного системного Python недостаточно.

- repo: pascalporedda/awesome-claude-code
  category: code/hooks
  description_ru: "Курируемый список ресурсов по Claude Code с акцентом на хуки и конфиги."
  badge: null
  verify_status: check
  body_md: |
    ### ❓ Что это
    Небольшой узкоспециализированный набор хуков для Claude Code, который решает конкретную бытовую
    проблему: звуковое оповещение о том, что агенту нужно внимание пользователя или что задача
    завершена, вместо необходимости постоянно смотреть в терминал. Реализовано через три типа хука —
    Notification (звук, когда Claude ждёт ответа), Stop (звук по завершении основной задачи) и
    SubagentStop (звук по завершении подзадачи субагента). На macOS хуки используют встроенные
    системные звуки без каких-либо файлов — просто работает из коробки; на Windows и Linux нужно
    положить рядом с проектом пару .wav-файлов. Все события дополнительно логируются в JSON-файлы,
    есть опциональная запись полной стенограммы чата для последующего разбора. Автор описывает
    репозиторий как зачаток более крупной цели — стать центральным хабом community-хуков с менеджером
    для их поиска и установки, то есть на момент публикации это скорее начальная версия идеи, чем
    финальный продукт.

    ### 🎯 Для чего
    Ставить, если работаете с Claude Code в фоне (запустили длинную задачу и переключились на другое
    окно) и хотите узнавать о завершении или запросе внимания по звуку, а не проверять терминал вручную
    каждые несколько минут. Удобно как минимальный пример собственного хука для тех, кто ещё не писал
    свой Notification/Stop-хук и хочет короткий рабочий шаблон вместо чтения документации с нуля.
    JSON-логирование событий пригождается, если нужно позже проанализировать, сколько раз за день
    агент останавливался и ждал реакции пользователя.

    ### 💻 Как установить
    ```bash
    git clone https://github.com/pascalporedda/awesome-claude-code.git
    cp -r awesome-claude-code/.claude ./.claude
    ```

    ### 🚀 Как пользоваться
    Просто продолжить работать с Claude Code как обычно — хуки срабатывают автоматически на события
    Notification/Stop/SubagentStop, отдельно вызывать их не нужно.

    ### ⚠️ Грабли
    На Windows/Linux (в отличие от macOS) нужно вручную положить файлы `on-agent-need-attention.wav`
    и `on-agent-complete.wav` в корень проекта — без них хук будет молча падать при попытке
    воспроизвести звук.

- repo: musistudio/claude-code-router
  category: code/routers
  description_ru: "Роутер запросов Claude Code к разным LLM-провайдерам и моделям."
  badge: null
  verify_status: check
  body_md: |
    ### ❓ Что это
    Локальный шлюз и десктопная панель управления, которая перенаправляет запросы Claude Code (а
    заодно Codex и других совместимых клиентов) к тому провайдеру модели, который реально нужен, а не
    к тому, что задан по умолчанию. Вместо настройки каждого клиента отдельно под конкретный провайдер
    даёт единую локальную конечную точку, к которой подключаются все инструменты сразу. Поддерживает
    правила маршрутизации — по умолчанию, условные, с fallback на резервную модель при сбое, с
    переписыванием запроса на лету. Из коробки понимает целую линейку провайдеров: OpenAI-совместимые
    API, Anthropic Messages, Gemini, OpenRouter, DeepSeek, SiliconFlow, Moonshot, Mistral и другие,
    плюс кастомные эндпоинты. В десктопном приложении есть дашборд с балансами аккаунтов, статистикой
    использования по моделям и логами запросов — то есть это не только прокси, но и панель мониторинга
    расходов сразу по нескольким провайдерам.

    ### 🎯 Для чего
    Ставить, когда используете несколько LLM-провайдеров параллельно и хотите переключаться между
    ними без переконфигурации каждого клиента — например, основная работа на Claude, но для дешёвых
    рутинных задач хочется падать на более дешёвую модель через fallback-правило. Полезен для контроля
    расходов: правила ротации API-ключей и fallback снижают риск упереться в лимит одного провайдера
    посреди рабочей сессии. Функция "fusion models" (объединение базовой модели с vision, поиском или
    MCP-инструментами в один переиспользуемый профиль) удобна, если нужно быстро переключать пресеты
    конфигурации под разные типы задач, не меняя настройки вручную каждый раз.

    ### 💻 Как установить
    Скачать сборку Claude Code Router Desktop под свою ОС со страницы релизов репозитория.

    ### 🚀 Как пользоваться
    Открыть панель → добавить провайдера в разделе Provider management → задать правило маршрутизации
    по умолчанию → запустить Claude Code через встроенный Agent Config, указывающий на локальный
    эндпоинт CCR.

    ### ⚠️ Грабли
    Это desktop-приложение с локальным гейтвеем, а не просто конфиг-файл — часть функциональности
    (проверка баланса аккаунтов, дашборд) зависит от того, что приложение реально запущено в фоне,
    просто прописать эндпоинт в конфиге клиента недостаточно для полного набора фич.

- repo: ryoppippi/ccusage
  category: code/monitoring
  description_ru: "CLI-утилита для анализа расхода токенов и затрат Claude Code по сессиям."
  badge: editors_choice
  verify_status: check
  body_md: |
    ### ❓ Что это
    CLI-инструмент, который анализирует уже накопленные локальные данные Claude Code (и других
    агентных CLI) и превращает их в понятный отчёт по расходу токенов и деньгам — без обращения к
    какому-либо облачному сервису, вся аналитика строится по файлам на диске. Показывает расход в
    терминале в виде читаемых таблиц: по дням, по сессиям, по проектам — так что видно не только
    общую сумму, но и где именно тратится бюджет. Проект набрал заметную популярность в сообществе
    (упоминается в awesome-claude-code) и имеет активных спонсоров. Ставится и запускается как обычный
    npm-пакет, отдельного сервера или регистрации не требует. Расширяется дашбордом-визуализацией
    поверх тех же данных для тех, кому текстового отчёта в терминале недостаточно.

    ### 🎯 Для чего
    Использовать регулярно, если Claude Code — часть рабочего процесса и хочется понимать, куда
    уходит бюджет по токенам, не заходя в биллинг вручную и не собирая цифры руками. Полезно для
    команд, разделяющих расходы по проектам — отчёт по сессиям и проектам показывает, какая задача
    оказалась дороже остальных, и это помогает решить, где сократить лишние прогоны агента. Хороший
    инструмент для личной гигиены использования: смотреть отчёт раз в неделю дешевле, чем разбираться
    с неожиданно большим счётом в конце месяца.

    ### 💻 Как установить
    ```bash
    npx ccusage@latest
    ```

    ### 🚀 Как пользоваться
    ```bash
    npx ccusage@latest daily
    ```

    ### ⚠️ Грабли
    Утилита читает локальные лог-файлы Claude Code с диска — если история сессий была очищена
    вручную или запускалась на другой машине, отчёт по ней просто не построится, восстановить его
    неоткуда.

- repo: junhoyeo/tokscale
  category: code/monitoring
  description_ru: "Мониторинг использования токенов в реальном времени для LLM-агентов."
  badge: null
  verify_status: check
  body_md: |
    ### ❓ Что это
    Высокопроизводительный CLI-инструмент и дашборд для отслеживания расхода токенов и денег сразу
    по нескольким агентным кодинг-инструментам, а не только по Claude Code. Во второй версии проект
    переписан с нуля на нативный Rust TUI (текстовый интерфейс в терминале) вместо более тяжёлой
    предыдущей реализации, что дало кроссплатформенную поддержку и заметный прирост скорости. По
    сравнению с ccusage, который тоже анализирует локальные данные Claude Code, Tokscale явно
    позиционируется шире — как единый инструмент для нескольких агентов сразу, с более активной
    разработкой и еженедельными релизами от автора. Устанавливается как обычный npm-пакет
    (tokscale), поддерживает несколько языков документации (английский, корейский, японский,
    китайский), что говорит о международном сообществе пользователей.

    ### 🎯 Для чего
    Использовать вместо или вместе с ccusage, если в работе задействовано сразу несколько AI-кодинг-
    агентов (не только Claude Code) и нужен единый дашборд расходов по всем сразу, а не по одному
    инструменту в отдельности. TUI-интерфейс полезен для тех, кто предпочитает живой обновляющийся
    экран в терминале вместо статичного текстового отчёта — удобно держать открытым в отдельной
    вкладке терминала во время работы. Как и ccusage, подходит для контроля бюджета на уровне
    личного или командного использования без интеграции со сторонними биллинговыми системами.

    ### 💻 Как установить
    ```bash
    npx tokscale@latest
    ```

    ### 🚀 Как пользоваться
    Запустить без аргументов — откроется живой TUI-дашборд с расходом токенов по агентам, который
    обновляется в реальном времени, пока идут сессии.

    ### ⚠️ Грабли
    Версия 2 — полностью переписанный на Rust TUI, отличный от более ранней реализации; если в
    прошлом уже пробовали tokscale и он показался тяжёлым или медленным, стоит попробовать заново на
    актуальной версии, а не полагаться на старое впечатление.

- repo: anthropics/claude-code-action
  category: code/ci-cd
  description_ru: "Официальный GitHub Action для запуска Claude Code в CI/CD-пайплайнах."
  badge: editors_choice
  verify_status: check
  body_md: |
    ### ❓ Что это
    Официальный GitHub Action от Anthropic, который встраивает Claude Code прямо в PR и issues
    репозитория. Умеет сам определять нужный режим работы по контексту события — упоминание
    @claude в комментарии, назначение issue на бота, явный запрос через промпт в workflow — без
    ручной настройки под каждый сценарий отдельно. Может отвечать на вопросы о коде и архитектуре,
    делать содержательный код-ревью PR с конкретными предложениями, а для простых правок и рефакторинга
    — сразу вносить изменения самостоятельно. Работает на инфраструктуре собственного GitHub-раннера
    репозитория — то есть код не покидает вашу CI-среду, а к модели уходят только сами запросы, причём
