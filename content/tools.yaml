    релизным процессом Anthropic, версии синхронизированы с изменениями в самом API.

    ### 🎯 Для чего
    Использовать, когда встраиваете Claude в бэкенд-сервис, написанный на Go — например, в
    высоконагруженный API-шлюз компании, где важна производительность рантайма и статическая типизация.
    Официальный статус SDK означает, что новые возможности API (новые модели, параметры, режимы)
    появляются здесь синхронно с релизами Anthropic, в отличие от неофициальных SDK, которые могут
    отставать. Подходит как основа для собственного Go-сервиса-обёртки над Claude API внутри
    инфраструктуры компании, где уже принят Go как основной язык бэкенда.

    ### 💻 Как установить
    ```bash
    go get -u 'github.com/anthropics/anthropic-sdk-go'
    ```

    ### 🚀 Как пользоваться
    ```go
    client := anthropic.NewClient(option.WithAPIKey("my-anthropic-api-key"))
    message, err := client.Messages.New(context.TODO(), anthropic.MessageNewParams{
        MaxTokens: 1024,
        Messages:  []anthropic.MessageParam{anthropic.NewUserMessage(anthropic.NewTextBlock("Hi"))},
        Model:     anthropic.ModelClaudeOpus4_6,
    })
    ```

    ### ⚠️ Грабли
    Ключ API по умолчанию читается из переменной окружения `ANTHROPIC_API_KEY` — если она не задана,
    `option.WithAPIKey` нужно передавать явно, иначе клиент не сможет авторизоваться.

- repo: tmikus/anthropic-sdk-rust
  category: libs/rust
  description_ru: "Неофициальный community Rust SDK для Claude API."
  badge: null
  verify_status: check
  body_md: |
    ### ❓ Что это
    Неофициальный, но полнофункциональный Rust-клиент для Claude API, написанный сообществом с упором
    на идиоматичность и безопасность типов, которые в Rust обычно строже, чем в динамических языках.
    Даёт полноценный async/await через tokio, потоковую передачу ответов в реальном времени, полную
    поддержку tool use, мультимодальные запросы с изображениями и документами, builder-паттерн для
    удобной сборки запросов. Есть встроенный подсчёт токенов для оценки стоимости запроса до его
    отправки и логика повторных попыток с экспоненциальной задержкой при временных сбоях API —
    возможности, которые в других SDK иногда приходится реализовывать самостоятельно поверх базового
    клиента. Публикуется как обычный крейт в реестре crates.io, подключается через Cargo.toml.
    Поскольку это community-проект без официальной поддержки Anthropic, обновления под самые свежие
    возможности API могут выходить с задержкой относительно официальных SDK.

    ### 🎯 Для чего
    Использовать, когда сервис пишется на Rust и нужен типобезопасный доступ к Claude API без
    написания собственного HTTP-клиента с нуля — актуально для высоконагруженных или embedded-
    сценариев, где Rust выбран из соображений производительности и безопасности памяти. Встроенный
    подсчёт токенов пригождается для предварительной оценки стоимости запроса на клиенте, прежде чем
    реально его отправлять — полезно в приложениях с жёстким бюджетным контролем. Retry-логика с
    экспоненциальной задержкой из коробки экономит время по сравнению с реализацией устойчивости к
    сбоям API вручную.

    ### 💻 Как установить
    ```toml
    [dependencies]
    anthropic_rust = "0.1.3"
    tokio = { version = "1.0", features = ["full"] }
    ```

    ### 🚀 Как пользоваться
    ```rust
    let client = Client::new(Model::Claude35Sonnet20241022)?;
    let request = client.chat_builder()
        .user_message(ContentBlock::text("Hello, Claude!"))
        .build();
    let response = client.execute_chat(request).await?;
    ```

    ### ⚠️ Грабли
    Это неофициальный community-крейт — версия модели в примере (`Claude35Sonnet20241022`) может
    отставать от актуальной линейки моделей Anthropic, перед продакшен-использованием стоит свериться
    с последним релизом крейта на crates.io, а не брать значение из примера как есть.

- repo: cline/cline
  category: apps/vscode
  description_ru: "Автономный AI-агент внутри VS Code для написания и рефакторинга кода."
  badge: editors_choice
  verify_status: check
  body_md: |
    ### ❓ Что это
    Открытый агент для написания кода, живущий внутри VS Code как расширение, а не в отдельном
    терминале — то есть визуально ближе к привычному Copilot-подобному опыту, но с полноценной
    агентностью: чтение файлов, правки, выполнение команд в интегрированном терминале. Позиционируется
    как "открытый коллега" — модель у пользователя есть выбор, какого провайдера подключить, а не
    привязка к одному вендору. Активно поддерживается сообществом: свой Discord, отдельный сабреддит,
    публичная секция feature requests с открытым голосованием за приоритеты разработки. В отличие от
    терминального Claude Code, Cline даёт визуальный diff предлагаемых изменений прямо в редакторе
    перед тем, как их применить, что упрощает построчный контроль над тем, что меняет агент. Ставится
    как обычное расширение из маркетплейса VS Code, отдельной установки CLI не требует.

    ### 🎯 Для чего
    Выбирать, когда привычнее работать с агентом визуально прямо в редакторе, а не в терминале —
    видеть diff предложенных правок построчно перед принятием ближе к обычному code review, чем к
    диалогу в чате. Подходит тем, кто хочет свободу выбора модели-провайдера под конкретную задачу
    (не привязываться к одному вендору), в отличие от инструментов, заточенных под одну модель.
    Хороший вариант для команд, уже плотно живущих в VS Code как основной IDE, где переключение в
    отдельный терминал ради агента создаёт лишний контекст-свитч.

    ### 💻 Как установить
    Установить расширение "Cline" из маркетплейса VS Code (Extensions → поиск "Cline" → Install).

    ### 🚀 Как пользоваться
    Открыть панель Cline в сайдбаре → подключить API-ключ модели (Claude, OpenAI и т.п.) → написать
    задачу в чате, например "add error handling to this function".

    ### ⚠️ Грабли
    Нужен собственный API-ключ провайдера модели — расширение само по себе бесплатно, но токены
    оплачиваются напрямую выбранному провайдеру, отдельной встроенной подписки на модель нет.

