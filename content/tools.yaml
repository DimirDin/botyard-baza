- repo: obra/superpowers
  category: agents/workflow
  description_ru: "Фреймворк навыков и методология разработки для Claude Code и других агентов: brainstorming → план → TDD → саб-агенты, 170k+ звёзд."
  badge: editors_choice
  verify_status: known

  body_md: |
    ### ❓ Что это
    **Superpowers** — это не просто набор скиллов, а целая методология разработки софта для коммитящих код агентов. Автор — **Jesse Vincent** и команда **Prime Radiant**. Идея: как только агент видит, что вы начинаете что-то строить, он не бросается сразу писать код — сначала уточняет спеку через вопросы, показывает дизайн кусками для одобрения, затем готовит план реализации, понятный "въедливому джуну без вкуса и контекста", с упором на честный red/green **TDD**, **YAGNI** и **DRY**. После вашего "go" запускается **subagent-driven-development** — агент диспатчит саб-агентов на каждую задачу плана, проверяет их работу и двигается дальше, иногда автономно работая часами.

    ### 🎯 Для чего
    - Когда хочется, чтобы агент не гадал молча, а на старте уточнял ТЗ и показывал план перед тем, как писать код.
    - Для дисциплины **TDD** — навык `test-driven-development` буквально удаляет код, написанный до теста.
    - Для длинных автономных сессий с несколькими саб-агентами, каждый из которых работает по своей задаче и проходит two-stage review.
    - Работает не только в Claude Code — есть установка под **Antigravity**, **Codex App/CLI**, **Cursor**, **Factory Droid**, **GitHub Copilot CLI**, **Kimi Code**, **OpenCode** и **Pi**.

    Полный список навыков (Skills Library), потому что тут есть что перечислить:
    - **Testing**: `test-driven-development` — цикл RED-GREEN-REFACTOR.
    - **Debugging**: `systematic-debugging` — 4-фазный процесс поиска первопричины; `verification-before-completion` — проверка, что баг реально исправлен.
    - **Collaboration**: `brainstorming`, `writing-plans`, `executing-plans`, `dispatching-parallel-agents`, `requesting-code-review`, `receiving-code-review`, `using-git-worktrees`, `finishing-a-development-branch`, `subagent-driven-development`.
    - **Meta**: `writing-skills` — как писать новые навыки; `using-superpowers` — введение в систему.

    ### 💻 Как установить
    ```bash
    /plugin install superpowers@claude-plugins-official
    ```
    Либо через отдельный маркетплейс Superpowers:
    ```bash
    /plugin marketplace add obra/superpowers-marketplace
    /plugin install superpowers@superpowers-marketplace
    ```
    Для других харнессов (Antigravity, Codex, Cursor, Droid, Copilot CLI, Kimi Code, OpenCode, Pi) — свои команды установки, ставить нужно отдельно для каждого.

    ### 🚀 Как пользоваться
    Ничего специально вызывать не нужно — навыки триггерятся автоматически по ходу разговора: агент сам проверяет relevant skills перед любой задачей. Базовый рабочий процесс: `brainstorming` → `using-git-worktrees` → `writing-plans` → `subagent-driven-development`/`executing-plans` → `test-driven-development` → `requesting-code-review` → `finishing-a-development-branch`.

    ### ⚠️ Грабли
    Проект не принимает контрибьюшены с новыми навыками, а изменения существующих обязаны работать сразу во всех поддерживаемых агентах. По умолчанию включена телеметрия версии через логотип Prime Radiant в визуальном companion-фиче `brainstorming` (без деталей вашего проекта/промптов) — отключается переменной окружения `SUPERPOWERS_DISABLE_TELEMETRY`.
- repo: forrestchang/andrej-karpathy-skills
  category: code/rules
  description_ru: "Один файл CLAUDE.md — 4 принципа против типичных багов LLM-кодинга (по наблюдениям Andrej Karpathy). Оригинал, не путать с форками."
  badge:
  verify_status: known

  body_md: |
    ### ❓ Что это
    Один-единственный файл `CLAUDE.md`, собранный **Forrest Chang** по мотивам [поста Andrej Karpathy](https://x.com/karpathy/status/2015883857489522876) о типичных проблемах LLM-кодинга: модели молча делают неверные предположения, не признают, что запутались, любят раздувать абстракции и код на 1000 строк там, где хватило бы 100, а ещё иногда трогают комментарии и код, которые не до конца понимают, хотя это не относится к задаче.

    ### 🎯 Для чего
    Файл формулирует 4 принципа, которые прямо адресуют эти проблемы:
    - **Think Before Coding** — явно проговаривать допущения, представлять несколько трактовок, останавливаться и спрашивать при путанице вместо того, чтобы угадывать.
    - **Simplicity First** — минимум кода без "гибкости" и абстракций про запас; тест простой: "решил бы так senior-инженер?".
    - **Surgical Changes** — трогать только то, что нужно менять, не рефакторить соседний код и не удалять чужой dead code без запроса.
    - **Goal-Driven Execution** — превращать императивные задачи в проверяемые цели ("исправь баг" → "напиши тест, который его воспроизводит, потом почини").

    Ставить стоит, если хочется быстро (одним файлом) снизить количество лишних правок в диффах и получать уточняющие вопросы до, а не после ошибок.

    ### 💻 Как установить
    Как плагин Claude Code (рекомендуется):
    ```bash
    /plugin marketplace add forrestchang/andrej-karpathy-skills
    /plugin install andrej-karpathy-skills@karpathy-skills
    ```
    Либо просто как `CLAUDE.md` в проекте:
    ```bash
    curl -o CLAUDE.md https://raw.githubusercontent.com/forrestchang/andrej-karpathy-skills/main/CLAUDE.md
    ```

    ### 🚀 Как пользоваться
    Файл рассчитан на то, чтобы его смёржили с проектными инструкциями — добавляете свои разделы (например, "Use TypeScript strict mode") прямо в `CLAUDE.md` рядом с принципами Karpathy. Для Cursor тот же смысл покрывает готовое правило `.cursor/rules/karpathy-guidelines.mdc`.

    ### ⚠️ Грабли
    Гайдлайны сознательно смещены в сторону осторожности, а не скорости — авторы советуют использовать здравый смысл на тривиальных правках (опечатки, однострочники), не применяя полную строгость процесса к каждой мелочи.
- repo: yamadashy/repomix
  category: libs/other
  description_ru: "Упаковывает весь репозиторий в один AI-friendly файл (XML/MD/JSON) для скармливания в LLM. Есть MCP-сервер, Docker, GitHub Action."
  badge: editors_choice
  verify_status: known

  body_md: |
    ![](https://raw.githubusercontent.com/yamadashy/repomix/main/website/client/src/public/images/docs/repomix-file-usage-1.png)

    ### ❓ Что это
    **Repomix** упаковывает весь ваш репозиторий в один файл, удобный для скармливания в LLM — Claude, ChatGPT, DeepSeek, Perplexity, Gemini, Gemma, Llama, Grok и другие. На выходе — XML, Markdown или Plain Text с посчитанным количеством токенов на файл и на весь репозиторий.

    ### 🎯 Для чего
    - Отдать LLM весь контекст проекта разом — для рефакторинга, ревью архитектуры, поиска багов.
    - **Code Compression** (`--compress`) — через **Tree-sitter** вытаскивает ключевые элементы кода, сокращая токены, но сохраняя структуру, когда весь репозиторий целиком не влезает в контекст.
    - Быстро проверить репозиторий на утечки секретов — встроен **Secretlint**.
    - Есть варианты без установки: сайт [repomix.com](https://repomix.com), Chrome/Firefox-расширение (кнопка "Repomix" прямо на странице GitHub-репозитория), community-VSCode-расширение **Repomix Runner**, MCP-сервер, Docker-образ и GitHub Action.

    ### 💻 Как установить
    ```bash
    # без установки
    npx repomix@latest

    # или глобально
    npm install -g repomix
    # yarn global add repomix
    # bun add -g repomix
    # brew install repomix
    ```

    ### 🚀 Как пользоваться
    ```bash
    # в корне проекта
    repomix
    ```
    Команда создаст `repomix-output.xml` со всем репозиторием, который затем отдаётся в промпт ассистенту, например: "This file contains all the files in the repository combined into one. I want to refactor the code, so please review it first."

    ### ⚠️ Грабли
    По умолчанию Repomix уважает `.gitignore`, `.ignore` и `.repomixignore`, но перед отправкой сгенерированного файла наружу всё равно стоит проверять его на секреты (для этого и встроен Secretlint) — случайно упаковать `.env` в общий файл и отправить его в LLM легко, если игнор-файлы не настроены аккуратно.
- repo: affaan-m/everything-claude-code
  category: agents/workflow
  description_ru: "Продакшн-конфиги (агенты, скиллы, хуки, команды) с хакатона Anthropic x Forum Ventures, 10+ месяцев обкатки в реальных проектах."
  badge:
  verify_status: known

  body_md: |
    ![](https://raw.githubusercontent.com/affaan-m/everything-claude-code/main/assets/hero.png)

    ### ❓ Что это
    **ECC (Everything Claude Code)** — не просто набор конфигов, а харнесс-нативная операционная система для агентной работы: скиллы, "инстинкты", оптимизация памяти, непрерывное обучение, security-сканирование и research-first разработка. Один мейнтейнер, **affaan-m**, выпускает обновления еженедельно сразу для 7 харнессов: Codex, Claude Code, Cursor, OpenCode, Gemini, Zed, GitHub Copilot. На версию 2.0.0 в репозитории заявлено 66 агентов, 268 скиллов и 84 legacy command shim'а.

    ### 🎯 Для чего
    Проект собирает конкретные готовые пакеты под разные домены — вот что реально перечислено в README:
    - **Операторские воркфлоу**: `brand-voice`, `social-graph-ranker`, `connections-optimizer`, `customer-billing-ops`, `ecc-tools-cost-audit`, `google-workspace-ops`, `project-flow-ops`, `workspace-surface-audit`.
    - **Медиа и запуск продукта**: `manim-video`, `remotion-video-creation`.
    - **Языковые ревьюеры/резолверы сборки**: `typescript-reviewer`, `pytorch-build-resolver`, `java-build-resolver`, `java-reviewer`, `kotlin-reviewer`, `kotlin-build-resolver`, плюс скилл `pytorch-patterns`, `nestjs-patterns`, `bun-runtime`, `nextjs-turbopack`.
    - **Пакет для prediction-market задач (Itô)**: `ito-market-intelligence`, `ito-basket-compare`, `ito-trade-planner`, `ito-data-atlas-agent`, `prediction-market-oracle-research`, `prediction-market-risk-review`.
    - **Пакет оптимизации производительности**: `parallel-execution-optimizer`, `benchmark-optimization-loop`, `data-throughput-accelerator`, `latency-critical-systems`, `recursive-decision-ledger`.
    - Есть даже прототип control-plane на Rust (`ecc2/`) с командами `dashboard`, `start`, `sessions`, `status`, `stop`, `resume`, `daemon`.

    ### 💻 Как установить
    Рекомендуемый путь — плагин Claude Code, но если хочется обойтись без хуков:
    ```bash
    ./install.sh --profile minimal --target claude
    # или
    npx ecc-install --profile minimal --target claude
    ```
    Есть также помощник для подбора нужных компонентов:
    ```bash
    npx ecc consult "security reviews" --target claude
    ```

    ### 🚀 Как пользоваться
    После установки профиля можно доустанавливать отдельные компоненты и профили, например:
    ```bash
    npx ecc install --profile minimal --target claude --with capability:machine-learning
    ```
    Для отчёта о состоянии окружения: `ecc status --markdown --write status.md` — сводка по готовности, активным сессиям, здоровью скиллов и связанным задачам из Linear/GitHub.

    ### ⚠️ Грабли
    Авторы прямо предупреждают: **ставьте ECC только из официальных источников** — репозиторий `github.com/affaan-m/ECC`, npm-пакеты `ecc-universal`/`ecc-agentshield`, официальный GitHub App и slug `ecc@ecc`; сторонние зеркала не проверяются и могут содержать вредоносный код. Второе правило — **не смешивать способы установки**: самая частая поломка — сначала `/plugin install`, а затем поверх него ещё и `install.sh --profile full` или `npx ecc-install --profile full`.
- repo: smtg-ai/claude-squad
  category: apps/web
  description_ru: "Терминальное приложение — управляет несколькими AI-агентами (Claude Code, Codex, Gemini, Aider) параллельно, каждый в своём git worktree."
  badge:
  verify_status: known

  body_md: |
    ![](https://raw.githubusercontent.com/smtg-ai/claude-squad/main/assets/screenshot.png)

    ### ❓ Что это
    **Claude Squad** — терминальный TUI-менеджер, который держит несколько локальных агентов (**Claude Code**, **Codex**, **Gemini CLI**, **Aider** и другие) в отдельных изолированных воркспейсах, позволяя работать над несколькими задачами одновременно из одного окна терминала. Под капотом — **tmux** для изолированных терминальных сессий и **git worktrees** для изоляции кодовых баз каждого агента на своей ветке.

    ### 🎯 Для чего
    - Запустить сразу несколько задач в фоне, в том числе в yolo/auto-accept режиме.
    - Ревьюить изменения каждого агента до их применения, чекаутить их до пуша.
    - Держать несколько инстансов агентов на разных ветках без конфликтов между ними.

    ### 💻 Как установить
    ```bash
    brew install claude-squad
    ln -s "$(brew --prefix)/bin/claude-squad" "$(brew --prefix)/bin/cs"
    ```
    Или вручную:
    ```bash
    curl -fsSL https://raw.githubusercontent.com/smtg-ai/claude-squad/main/install.sh | bash
    ```

    ### 🚀 Как пользоваться
    ```bash
    cs
    ```
    По умолчанию запускается `claude`, но можно указать другого агента: `cs -p "codex"`, `cs -p "gemini"`, `cs -p "aider --model ollama_chat/gemma3:1b"`. Горячие клавиши в TUI: `n` — новая сессия, `N` — новая сессия с промптом, `D` — удалить сессию, `↵/o` — подключиться к сессии, `s` — закоммитить и запушить ветку, `c` — checkout (закоммитить и поставить на паузу), `r` — возобновить.

    ### ⚠️ Грабли
    Нужны установленные **tmux** и **gh** (GitHub CLI) — без них приложение не запустится. Если видите ошибку `failed to start new session: timed out waiting for tmux session`, поможет обновление самого агента (например, `claude`) до последней версии. Лицензия — **AGPL-3.0**.
- repo: nizos/tdd-guard
  category: code/hooks
  description_ru: "Хуки, принудительно включающие TDD в Claude Code — блокирует реализацию без падающего теста и избыточный код сверх требований."
  badge:
  verify_status: known

  body_md: |
    ![](https://raw.githubusercontent.com/nizos/tdd-guard/main/docs/assets/tdd-guard-demo.gif)

    ### ❓ Что это
    **TDD Guard** следит, чтобы Claude Code реально соблюдал Test-Driven Development: когда агент пытается пропустить тесты или реализовать больше, чем требуется, TDD Guard блокирует это действие и объясняет, что нужно сделать вместо этого.

    ### 🎯 Для чего
    - **Test-First Enforcement** — блокирует реализацию, если нет падающего теста.
    - **Minimal Implementation** — не даёт написать код сверх того, что требуют текущие тесты.
    - **Lint Integration** — заставляет рефакторить по вашим правилам линтера.
    - **Customizable Rules** — правила валидации подстраиваются под ваш стиль TDD.
    - **Session Control** — можно включать/выключать проверку прямо посреди сессии.
    - Поддерживаемые тест-фреймворки: **Vitest**, **Jest**, **Storybook**, **pytest**, **PHPUnit**, **Go**, **Rust**, **RSpec**, **Minitest**.

    ### 💻 Как установить
    ```bash
    /plugin marketplace add nizos/tdd-guard
    /plugin install tdd-guard@tdd-guard
    /tdd-guard:setup
    ```

    ### 🚀 Как пользоваться
    После `setup` хуки работают автоматически в фоне на каждой сессии — ничего вызывать вручную не нужно: как только агент пытается писать реализацию без падающего теста или лезет за пределы требований, TDD Guard блокирует шаг и объясняет, что не так.

    ### ⚠️ Грабли
    Нужен **Node.js 22+**. Хуки выполняются с правами вашего пользователя — стоит иметь это в виду при доверии к автоматическим правкам. Авторы сообщают, что новое развитие идёт в отдельном проекте **[Probity](https://github.com/nizos/probity)** (валидация по активности сессии, больше агентов/языков/раннеров), а TDD Guard остаётся поддерживаемым для тех, кто уже на нём сидит.
- repo: letta-ai/claude-subconscious
  category: agents/autonomous
  description_ru: "Фоновый агент поверх Claude Code с постоянной памятью между сессиями — наблюдает за транскриптами, копит контекст, подсказывает."
  badge:
  verify_status: known

  body_md: |
    ![](https://raw.githubusercontent.com/letta-ai/claude-subconscious/main/assets/evil-claude.jpeg)

    ### ❓ Что это
    **Claude Subconscious** — демо-приложение на **Letta Code SDK**: второй агент, работающий под капотом Claude Code, который смотрит за транскриптами каждой сессии, читает файлы кода (`Read`, `Grep`, `Glob`), копит память между сессиями и проектами и "шепчет" подсказки перед следующим промптом — не блокируя работу. Через фичу Letta **Conversations** один агент-подсознание может обслуживать сразу несколько параллельных сессий Claude Code с общей памятью.

    ### 🎯 Для чего
    - Когда раздражает, что Claude Code "забывает всё" между сессиями, а писать это руками в `CLAUDE.md` не хочется — Subconscious ничего туда не пишет, память живёт в самом Letta-агенте.
    - Чтобы получать контекстные подсказки и напоминания о паттернах проекта до и во время работы, а не после того, как ошибка уже сделана.
    - Для экспериментов с background-агентами — сам проект честно называет себя демо-приложением, а не production-инструментом (для прода авторы отсылают к **Letta Code**).

    ### 💻 Как установить
    ```bash
    /plugin marketplace add letta-ai/claude-subconscious
    /plugin install claude-subconscious@claude-subconscious
    ```

    ### 🚀 Как пользоваться
    ```bash
    export LETTA_API_KEY="your-api-key"
    ```
    Дальше поведение настраивается переменными окружения: `LETTA_MODE` (`whisper` по умолчанию — только сообщения, `full` — блоки памяти + сообщения, `off` — выключить), `LETTA_MODEL`, `LETTA_CONTEXT_WINDOW`, `LETTA_BASE_URL` (для self-hosted Letta), `LETTA_SDK_TOOLS` (`read-only` по умолчанию, `full`, `off`).

    ### ⚠️ Грабли
    Авторы прямым текстом пишут: это **демо-приложение, не для продакшена**; для полноценного использования — отдельный проект **Letta Code**. Обязательно нужен `LETTA_API_KEY` с [app.letta.com](https://app.letta.com). На Linux (Ubuntu/Fedora/Arch, где `/tmp` часто на отдельной файловой системе) установка плагина может падать с `EXDEV: cross-device link not permitted` — обходится выставлением `TMPDIR` в директорию внутри `$HOME`.
