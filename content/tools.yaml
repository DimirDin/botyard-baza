- repo: modelcontextprotocol/servers
  category: mcp/servers
  description_ru: "Официальный репозиторий базовых MCP-серверов от разработчиков протокола (Files, Git, Postgres и др.)."
  badge: editors_choice
  verify_status: known
  body_md: |
    ![](https://opengraph.githubassets.com/1/modelcontextprotocol/servers)

    ### ❓ Что это
    Официальный репозиторий **эталонных реализаций** серверов **Model Context Protocol (MCP)**, поддерживаемый управляющей группой протокола (steering group). Здесь только небольшой набор образцовых серверов — полный каталог сторонних MCP-серверов стоит искать в [MCP Registry](https://registry.modelcontextprotocol.io/).

    ### 🎯 Для чего
    Служит учебным материалом для разработчиков, которые пишут собственные MCP-серверы, и демонстрирует возможности SDK. Актуальные эталонные серверы: **Everything** (тестовый сервер с prompts/resources/tools), **Fetch** (загрузка веб-контента), **Filesystem** (безопасные файловые операции), **Git**, **Memory** (персистентная память на графе знаний), **Sequential Thinking** и **Time**. Более старые серверы (Brave Search, GitHub, GitLab, Google Drive, Postgres, Puppeteer, Redis, Slack, SQLite и др.) перенесены в архив `servers-archived`.

    ### 💻 Как установить
    ```bash
    # TypeScript-серверы через npx
    npx -y @modelcontextprotocol/server-memory

    # Python-серверы через uvx или pip
    uvx mcp-server-git
    # или
    pip install mcp-server-git
    python -m mcp_server_git
    ```

    ### 🚀 Как пользоваться
    Пропишите сервер в конфиге MCP-клиента, например Claude Desktop:
    ```json
    {
      "mcpServers": {
        "memory": {
          "command": "npx",
          "args": ["-y", "@modelcontextprotocol/server-memory"]
        }
      }
    }
    ```

    ### ⚠️ Грабли
    Авторы явно предупреждают: это **эталонные реализации для демонстрации**, а не production-ready решения — перед использованием нужно самостоятельно оценить требования безопасности и добавить нужные защитные меры под свою модель угроз.

