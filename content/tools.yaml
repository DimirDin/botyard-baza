# tools.yaml — ядро инструментов для запуска Фазы 1
#
# ВАЖНО: verify_status фиксирует, насколько репозиторий подтверждён на момент сборки файла.
#   - "known"   — официальный репозиторий Anthropic или широко известный публичный проект,
#                 упоминаемый в независимых источниках (не только в исходном списке пользователя)
#   - "check"   — правдоподобное название, но НЕ подтверждено independent-источником;
#                 обязательно прогнать через GitHub API синк (§8 PROJECT_CONTEXT) перед публикацией,
#                 всё что вернёт 404 — не публикуется
#
# Список НЕ включает конкретные "brand/mcp-servicename" записи из присланного дампа
# (aws/mcp-aws, stripe/mcp-stripe, spotify/mcp-spotify и т.п.) — паттерн один-в-один
# на каждый мыслимый бренд типичен для LLM-галлюцинации при генерации длинных списков.
# Это не значит, что таких серверов не существует физически — значит, что именно эти
# репозитории под этими именами не подтверждены и не должны попасть в продакшен без проверки.

- repo: anthropics/claude-code
  category: apps/desktop
  description_ru: "Официальный CLI-агент Claude Code от Anthropic — терминальный инструмент для автономной разработки прямо в вашем проекте."
  badge: editors_choice
  verify_status: known
  body_md: |
    ![](https://raw.githubusercontent.com/anthropics/claude-code/main/demo.gif)

    ### ❓ Что это
    **Claude Code** — официальный агентный CLI-инструмент от **Anthropic**, который живёт прямо в терминале, понимает структуру вашего проекта и пишет/правит код по обычным текстовым командам. Работает как самостоятельный CLI, так и внутри IDE, а на GitHub его можно позвать прямо в issue или PR через упоминание `@claude`.

    ### 🎯 Для чего
    Ставь, если хочешь, чтобы агент сам разбирался в незнакомом коде, гонял рутинные правки (рефакторинг, миграции, тесты), объяснял сложные куски логики и разруливал git-рутину — коммиты, ветки, конфликты. Репозиторий также включает набор готовых **плагинов**, расширяющих команды и агентов Claude Code (подробности в `plugins/README.md`).

    ### 💻 Как установить
    ```bash
    curl -fsSL https://claude.ai/install.sh | bash
    ```
    Есть и другие варианты: `brew install --cask claude-code` (macOS/Linux), `irm https://claude.ai/install.ps1 | iex` или `winget install Anthropic.ClaudeCode` (Windows). Установка через `npm install -g @anthropic-ai/claude-code` официально считается устаревшей.

    ### 🚀 Как пользоваться
    ```
    cd /путь/к/проекту
    claude
    ```
    Дальше просто общаетесь с агентом на естественном языке — просите объяснить код, написать фичу или разобраться с багом.

    ### ⚠️ Грабли
    Требуется **Node.js 18+**. Claude Code собирает часть телеметрии (usage-данные, принятие/отклонение правок, содержимое отчётов через `/bug`) — политику хранения и использования данных стоит прочитать отдельно, прежде чем пускать инструмент на чувствительный код.

- repo: anthropics/skills
  category: code/skills
  description_ru: "Официальная папка динамических скиллов и инструкций от Anthropic, которые Claude подгружает для решения специализированных задач."
  badge: editors_choice
  verify_status: known
  body_md: |
    ![](https://opengraph.githubassets.com/1/anthropics/skills)

    ### ❓ Что это
    **Skills** — официальный репозиторий Anthropic с примерами **Agent Skills**: папками из инструкций, скриптов и ресурсов, которые Claude подгружает динамически, чтобы лучше справляться со специфическими задачами. Каждый скилл — это самостоятельная папка с файлом `SKILL.md`, где хранятся инструкции и метаданные. Часть скиллов (например, создание и редактирование документов) реально используется внутри продакшен-функций Claude — работа с файлами `.docx`, `.pdf`, `.pptx` и `.xlsx`.

    ### 🎯 Для чего
    Полезно как источник готовых примеров и вдохновения для собственных скиллов: от творческих задач (арт, музыка, дизайн) до технических (тестирование веб-приложений, генерация MCP-серверов) и корпоративных workflow (коммуникации, брендинг). Репозиторий также можно подключить как маркетплейс плагинов для Claude Code.

    ### 💻 Как установить
    ```bash
    /plugin marketplace add anthropics/skills
    ```
    Затем через меню `Browse and install plugins` выбрать `anthropic-agent-skills` → `document-skills` или `example-skills`, либо сразу:
    ```bash
    /plugin install document-skills@anthropic-agent-skills
    /plugin install example-skills@anthropic-agent-skills
    ```

    ### 🚀 Как пользоваться
    ```
    Use the PDF skill to extract the form fields from path/to/some-file.pdf
    ```
    После установки плагина скилл активируется просто упоминанием в запросе — Claude сам подхватывает нужные инструкции.

    ### ⚠️ Грабли
    Авторы прямо предупреждают: скиллы даны **только в демонстрационных и образовательных целях** — фактическое поведение Claude может отличаться от показанного в примерах. Перед использованием в критичных сценариях скиллы нужно тщательно протестировать в своём окружении.

- repo: anthropics/claude-cookbooks
  category: libs/python
  description_ru: "Официальные примеры кода и рецептов работы с Claude API от Anthropic — готовые сниппеты для копирования в свои проекты."
  badge: editors_choice
  verify_status: known
  body_md: |
    ![](https://opengraph.githubassets.com/1/anthropics/claude-cookbooks)

    ### ❓ Что это
    **Claude Cookbooks** — официальная коллекция ноутбуков и рецептов от **Anthropic**, показывающая эффективные способы использования Claude. Это готовые Python-примеры (Jupyter notebooks), которые можно копировать почти без изменений в свой проект.

    ### 🎯 Для чего
    Пригодится, когда нужно быстро разобраться, как решить конкретную задачу с Claude API: классификация текста, RAG (retrieval augmented generation), суммаризация, интеграция с инструментами (customer service agent, калькулятор, SQL-запросы), работа с изображениями и PDF, авто-эвалюации промптов, JSON-режим, prompt caching и запуск суб-агентов (Haiku как помощник для Opus).

