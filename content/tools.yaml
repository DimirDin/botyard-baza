    **Happy** (бывший `happy-coder`) — мобильный и веб-клиент, который позволяет пользоваться **Claude Code** и **Codex** из любой точки с **end-to-end шифрованием**: код и переписка не покидают твои устройства в открытом виде. Состоит из четырёх частей: **Happy App** (веб + мобильный клиент на Expo), **Happy CLI** (обёртка для запуска Claude Code/Codex), **Happy Agent** (CLI для удалённого управления сессиями) и **Happy Server** (бэкенд шифрованной синхронизации).

    ### 🎯 Для чего
    Ставить, если хочется проверять, что делает твой AI-агент, не сидя за компом: push-уведомления, когда Claude Code или Codex просит разрешение или падает с ошибкой, и мгновенное переключение между телефоном и десктопом одним нажатием клавиши.

    ### 💻 Как установить
    ```bash
    npm install -g happy
    ```
