# tools.yaml — ядро инструментов для запуска Фазы 1
#
# ВАЖНО: verify_status фиксирует, насколько репозиторий подтверждён на момент сборки файла.
#   - "known"   — официальный репозиторий Anthropic или широко известный публичный проект,
#                 упоминаемый в независимых источниках (не только в исходном списке пользователя)
#   - "check"   — правдоподобное название, но НЕ подтверждено independent-источником;
#                 обязательно прогнать через GitHub API синк (§8 PROJECT_CONTEXT) перед публикацией,
#                 всё что вернёт 404 — не публикуется
#
# Список НЕ включает конкретные "brand/mcp-servicename" записи из присланного дампа
# (aws/mcp-aws, stripe/mcp-stripe, spotify/mcp-spotify и т.п.) — паттерн один-в-один
# на каждый мыслимый бренд типичен для LLM-галлюцинации при генерации длинных списков.
# Это не значит, что таких серверов не существует физически — значит, что именно эти
# репозитории под этими именами не подтверждены и не должны попасть в продакшен без проверки.

- repo: anthropics/claude-code
  category: apps/desktop
  description_ru: "Официальный CLI-агент Claude Code от Anthropic. Терминальный инструмент для автономной разработки."
  badge: editors_choice
  verify_status: known
  body_md: |
    ### ❓ Что это
    Claude Code — официальный агентный CLI-инструмент от Anthropic, который живёт прямо в терминале
    и умеет читать, понимать и менять код целого репозитория, а не отдельный файл в изоляции.
    В отличие от чат-интерфейса, это не диалог "вопрос-ответ", а агент, который сам решает, какие
    файлы открыть, какие команды выполнить и как проверить результат. Он понимает структуру проекта,
    может пройтись по нескольким модулям сразу и держит в голове контекст сессии, пока вы работаете.
    Умеет запускать линтеры, тесты, git-команды и другие инструменты окружения самостоятельно, без
    ручного копирования команд. Ставится одной командой через официальный установочный скрипт или
    менеджер пакетов — никакой отдельной IDE или плагина не требуется. Работает как из голого
    терминала, так и встраивается в существующий редактор или CI-раннер. По сути это самый близкий
    к "разработчику-напарнику" интерфейс к Claude — вы описываете задачу словами, агент делает
    остальное и отчитывается о шагах.

    ### 🎯 Для чего
    Основной сценарий — рутинные, но трудоёмкие задачи разработки: массовый рефакторинг по всему
    репозиторию, миграция между версиями библиотек, добавление тестов к непокрытому коду, разбор
    незнакомой кодовой базы перед тем как в неё лезть руками. Хорошо заходит для "объясни, что делает
    этот модуль" на большом legacy-проекте, где чтение вручную заняло бы часы. В связке с CLAUDE.md
    в корне проекта агент подхватывает контекст и соглашения команды автоматически при каждом
    запуске, так что не приходится каждый раз объяснять стиль кода заново. Через хуки и Skills
    Claude Code расширяется под конкретный workflow — от автозапуска тестов после правки до
    интеграции с внутренними инструментами компании. Отдельный сценарий — headless-режим в CI/CD:
    агент запускается без интерактива и выполняет заранее описанную задачу как часть пайплайна.

    ### 💻 Как установить
    ```bash
    curl -fsSL https://claude.ai/install.sh | bash
    ```

    ### 🚀 Как пользоваться
    ```bash
    cd my-project
    claude
    ```

    ### ⚠️ Грабли
    Установка через `npm install -g @anthropic-ai/claude-code` официально устарела — README прямо
    просит использовать нативный install-скрипт или пакетный менеджер ОС вместо npm. Первый запуск
    требует авторизации через браузер, так что на headless-сервере без браузера этот шаг нужно
    пройти заранее на обычной машине.

- repo: anthropics/skills
  category: code/skills
  description_ru: "Официальная папка динамических скиллов и инструкций от Anthropic."
  badge: editors_choice
  verify_status: known
  body_md: |
    ### ❓ Что это
    Официальный репозиторий Anthropic с примерами Skills — папок с инструкциями, скриптами и
    ресурсами, которые Claude подгружает динамически при выполнении специализированных задач.
    В отличие от системного промпта, скилл не висит в контексте постоянно: модель сама решает,
    когда он нужен, и подтягивает его по требованию, экономя токены на всё остальное время. Каждый
    скилл — самостоятельная папка с файлом SKILL.md, где описаны метаданные и пошаговая инструкция,
    плюс при необходимости вспомогательные скрипты. Репозиторий содержит скиллы на любой вкус: от
    творческих (дизайн, музыка) до технических (тестирование веб-приложений, генерация MCP-серверов)
    и корпоративных (брендинг, коммуникации). Часть скиллов — с открытой лицензией Apache 2.0, часть
    (создание docx/pdf/pptx/xlsx) source-available — это те же скиллы, что работают под капотом в
    самом Claude.ai. Ставится как маркетплейс плагинов Claude Code одной командой, либо копируется
    вручную в проектную папку .claude/skills. Официальный, живой репозиторий — обновляется вместе с
    развитием спецификации Agent Skills.

    ### 🎯 Для чего
    Использовать как справочник паттернов, когда пишете свои скиллы под задачи компании — не
    изобретать формат SKILL.md с нуля, а посмотреть на рабочий пример. Готовые скиллы из папки
    document-skills пригождаются, если нужно генерировать docx/pptx/xlsx-отчёты прямо из Claude Code
    без сторонних библиотек. Пример-скиллы из example-skills — быстрый способ понять, где скилл
    выигрывает у обычного промпта: там, где задача повторяется много раз в одном формате (ревью по
    чек-листу, генерация отчёта по шаблону). В Claude Code скиллы устанавливаются как плагины через
    /plugin marketplace add — удобно раздать всей команде одинаковый набор автоматизаций одной
    командой вместо копирования файлов вручную.

    ### 💻 Как установить
    ```
    /plugin marketplace add anthropics/skills
    /plugin install document-skills@anthropic-agent-skills
    ```

    ### 🚀 Как пользоваться
    ```
    Use the PDF skill to extract the form fields from path/to/some-file.pdf
    ```

    ### ⚠️ Грабли
    Авторы прямо пишут в README: скиллы даны для демонстрации и обучения, реальное поведение Claude
    может отличаться от показанного примера — не полагайтесь на них как на гарантированный контракт
    без собственной проверки в своём окружении.

- repo: anthropics/claude-cookbooks
  category: libs/python
  description_ru: "Официальные примеры кода и рецептов работы с Claude API от Anthropic."
  badge: editors_choice
  verify_status: known
  body_md: |
    ### ❓ Что это
    Официальная коллекция готовых к копированию примеров кода от Anthropic, показывающих, как решать
    конкретные задачи через Claude API. Это не документация в привычном смысле, а набор рабочих
    Jupyter-ноутбуков — открыл, посмотрел, скопировал в свой проект, адаптировал под себя. Примеры
    написаны в основном на Python, но идеи и структура запросов к API переносятся на любой язык,
    у которого есть HTTP-клиент. Материал разбит по возможностям модели: классификация текста, RAG
    (дополнение ответа внешними знаниями), суммаризация, работа с изображениями и документами через
    vision, использование инструментов (tool use) для интеграции с внешними функциями. Отдельный
    блок посвящён интеграциям со сторонними сервисами — векторными базами вроде Pinecone, Wikipedia,
    обычными веб-страницами. Репозиторий активно поддерживается и пополняется сообществом и командой
    Anthropic, issues и PR принимаются. Для входа с нуля есть отдельный курс Claude API Fundamentals,
    на который cookbook и ссылается как на стартовую точку.

    ### 🎯 Для чего
    Смотреть сюда в первую очередь, когда нужно быстро понять формат запроса под конкретный кейс —
    например, как правильно оформить tool use для интеграции Claude Code или своего агента с внешней
    функцией, без угадывания по документации. Полезно как источник "рабочих истины": если параметр
    API ведёт себя не так, как в общедоступных статьях, здесь можно свериться с актуальным примером
    от самой Anthropic. Кейсы про RAG и работу с внешними базами пригождаются, когда встраиваете
    Claude в собственный продукт и нужен not-toy пример архитектуры, а не абстрактная схема. Ноутбуки
    с vision полезны, если проект работает со скриншотами, сканами документов или диаграммами — тут
    показано, как готовить изображение для запроса и как читать результат.

    ### 💻 Как установить
    ```bash
    git clone https://github.com/anthropics/claude-cookbooks.git
    cd claude-cookbooks
    pip install anthropic jupyter
    ```

    ### 🚀 Как пользоваться
    ```bash
    jupyter notebook tool_use/calculator_tool.ipynb
    ```

    ### ⚠️ Грабли
    Это не библиотека для импорта, а набор ноутбуков — их открывают в Jupyter и разбирают ячейка за
    ячейкой, а не ставят через pip. Для запуска нужен собственный ключ Claude API (платный по
    использованию), README прямо отправляет за ним на сайт Anthropic перед тем, как пробовать примеры.

- repo: anthropics/claude-agent-sdk-python
  category: libs/python
  description_ru: "Официальный Python SDK для сборки агентов на базе Claude."
  badge: null
  verify_status: known
  body_md: |
    ### ❓ Что это
    Официальный Python SDK от Anthropic для сборки собственных автономных агентов на базе тех же
    механизмов, что использует сам Claude Code — чтение и правка файлов, выполнение команд,
    вызов инструментов. Это не обёртка над обычным чат-эндпоинтом Claude API, а именно агентный
    слой: под капотом SDK использует CLI Claude Code для выполнения шагов, и при установке пакета
    через pip нужный CLI подтягивается автоматически, отдельно ставить ничего не требуется. Главная
    функция — асинхронная query(), которая принимает промпт и возвращает поток сообщений: обычный
    текстовый ответ ассистента, блоки с текстом внутри, результаты вызова инструментов. Поведение
    агента настраивается через ClaudeAgentOptions — системный промпт, ограничение числа шагов
    (max_turns), путь к конкретной версии CLI, если не нужен бандл по умолчанию. Требует Python 3.10
    и выше. Проект живой и официальный, соответствует SDK, на котором построен сам продукт Claude
    Code, так что не расходится с ним поведением.

    ### 🎯 Для чего
    Использовать, когда нужно встроить агентную логику Claude (не просто чат, а именно
    самостоятельно выполняющего шаги ассистента) внутрь своего Python-приложения, скрипта или
    внутреннего инструмента компании — например, автоматический ревьюер PR, бот для тикетов, свой
    headless-раннер для CI. Подходит, если хочется получить поведение Claude Code программно, без
    интерактивного терминала — тот же движок, но управляемый из кода. Параметр max_turns полезен,
    когда важно ограничить агента по числу шагов из соображений стоимости или предсказуемости в
    продакшене. Годится как основа для кастомных subagents или оркестраторов, если стандартного
    интерфейса Claude Code недостаточно и нужен полный контроль над циклом запрос-инструмент-ответ.

    ### 💻 Как установить
    ```bash
    pip install claude-agent-sdk
    ```

    ### 🚀 Как пользоваться
    ```python
    import anyio
    from claude_agent_sdk import query

    async def main():
        async for message in query(prompt="What is 2 + 2?"):
            print(message)

    anyio.run(main)
    ```

    ### ⚠️ Грабли
    Нужен Python 3.10+. CLI Claude Code бандлится вместе с пакетом автоматически — если на машине уже
    стоит системная версия Claude Code и хочется использовать именно её, а не бандл, путь к бинарнику
    нужно явно указать через `ClaudeAgentOptions(cli_path=...)`, иначе SDK возьмёт свою версию.

- repo: punkpeye/awesome-mcp-servers
  category: mcp/servers
  description_ru: "Один из крупнейших курируемых каталогов MCP-серверов с активным сообществом."
  badge: editors_choice
  verify_status: known
  body_md: |
    ### ❓ Что это
    Один из крупнейших и самых активно поддерживаемых курируемых списков MCP-серверов на GitHub,
    оформленный по формату awesome-list — просто размеченный README с ссылками, без своего кода.
    Список фокусируется на production-ready и экспериментальных серверах, которые дают моделям
    безопасный доступ к файлам, базам данных, внешним API и другим источникам контекста через
    протокол MCP. Каждая запись помечена значками: официальная реализация или нет, на каком языке
    написана (Python, TypeScript, Go), что упрощает быстрый поиск нужного стека. Есть разделы
    Clients, Tutorials, Frameworks — то есть это не только серверы, но и точка входа в остальную
    экосистему MCP. Поддерживается сообществом при участии платформы Glama.ai, у которой есть
    отдельный live-каталог с более актуальным поиском, а этот репозиторий — его переведённый на
    много языков GitHub-фасад. Активно обновляется, есть Discord и субреддит r/mcp для обсуждений.

    ### 🎯 Для чего
    Стартовая точка, когда нужно подключить Claude (через Claude Desktop, Claude Code или
    собственного агента) к внешнему источнику данных и не хочется писать MCP-сервер с нуля —
    вероятность, что кто-то уже сделал такой сервер под нужный сервис, здесь выше всего. Полезно
    для быстрого сравнения альтернатив: например, если нужен сервер для PostgreSQL, тут можно
    сразу увидеть несколько вариантов реализации и выбрать по языку или активности разработки.
    Раздел Frameworks пригождается, если решили писать свой сервер — там собраны SDK и шаблоны,
    которые экономят время на боилерплейте. Из-за открытого формата репозитория (просто README)
    сюда стоит заглядывать регулярно — список растёт быстрее, чем любая статья о нём успевает
    устареть.

    ### 💻 Как установить
    Это не пакет, а README со ссылками — устанавливать нечего, ставится конкретный сервер, на который
    вы перейдёте по ссылке из списка.

    ### 🚀 Как пользоваться
    Открыть раздел Server Implementations → найти сервер по языку значка (🐍 Python, 📇 TypeScript,
    🏎️ Go) → перейти по ссылке в его собственный README за инструкцией установки.

    ### ⚠️ Грабли
    Значок 🎖️ означает официальную реализацию — сторонние серверы того же назначения стоит проверять
    внимательнее перед тем, как давать им доступ к файлам или сети (см. предупреждение о безопасности
    в соседнем списке appcypher/awesome-mcp-servers).

- repo: appcypher/awesome-mcp-servers
  category: mcp/servers
  description_ru: "Ещё один крупный курируемый каталог Model Context Protocol серверов по категориям."
  badge: null
  verify_status: known
  body_md: |
    ### ❓ Что это
    Параллельный punkpeye/awesome-mcp-servers курируемый список MCP-серверов, устроенный по тому же
    принципу awesome-list, но с собственной структурой категорий и отдельным акцентом на разделе про
    безопасность. Прямо в начале README — предупреждение о рисках: MCP-сервер без песочницы
    выполняется с теми же правами, что и хост-процесс, то есть может читать файлы, ходить в сеть и
    исполнять произвольные команды. Список даёт понятные рекомендации, как снижать этот риск —
    использовать официальные реализации, запускать в виртуалках, ограничивать права по минимуму.
    Отдельная секция показывает таблицу поддерживаемых MCP-клиентов — Claude Desktop, Zed, Cody,
    Continue, LibreChat и другие — с прямыми ссылками на их документацию по подключению MCP. Сам
    каталог серверов структурирован по функциональным категориям, а не только по языку реализации.
    Обновляется реже, чем punkpeye-версия, но полезен как второй источник для сверки, потому что
    списки местами пересекаются, но не идентичны.

    ### 🎯 Для чего
    Использовать вместе с punkpeye/awesome-mcp-servers как второй источник при поиске конкретного
    MCP-сервера — если что-то не нашлось в одном списке, часто находится в другом. Секция про
    безопасность MCP стоит прочитать перед тем, как ставить любой сторонний сервер в
    продакшен-окружение — там прямо расписаны конкретные риски и практики их снижения, а не общие
    слова. Таблица поддерживаемых клиентов удобна, если непонятно, умеет ли конкретное приложение
    (например, редактор Zed или self-hosted чат LibreChat) вообще работать с MCP и куда смотреть
    в его документации.

    ### 💻 Как установить
    Это README-список, а не пакет — устанавливается конкретный сервер, выбранный из каталога, сама
    страница ничего не ставит.

    ### 🚀 Как пользоваться
    Открыть таблицу Examples of Supported Clients → проверить, поддерживает ли нужное приложение MCP
    → перейти в Server Implementations за конкретной реализацией.

    ### ⚠️ Грабли
    Прочитать блок Security Warning в начале файла обязательно перед установкой любого сервера без
    пометки ⭐ — README прямо говорит, что несанкционированный MCP-сервер выполняется с правами
    хост-процесса и может получить полный доступ к файлам и сети.

- repo: modelcontextprotocol/servers
  category: mcp/servers
  description_ru: "Официальный репозиторий базовых MCP-серверов от разработчиков протокола (Files, Git, Postgres и др.)."
  badge: editors_choice
  verify_status: known
  body_md: |
