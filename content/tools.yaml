- repo: trailofbits/skills
  category: code/skills
  description_ru: "Специализированные скиллы для ИБ-аудита и поиска уязвимостей от исследовательской команды Trail of Bits."
  badge: editors_choice
  verify_status: check
  body_md: |
    ### ❓ Что это
    **Trail of Bits Skills Marketplace** — маркетплейс плагинов Claude Code от известной ИБ-компании **Trail of Bits**, собирающий скиллы для AI-ассистированного анализа безопасности, тестирования и аудита кода. Совместим и с **Codex** через его поддержку Claude-маркетплейсов.

    ### 🎯 Для чего
    Пригодится security-инженерам и аудиторам для узких, но серьёзных задач:
    - **Смарт-контракты**: `building-secure-contracts` (сканеры уязвимостей для 6 блокчейнов), `entry-point-analyzer`;
    - **Аудит кода**: `c-review`, `rust-review` (с SARIF-выводом), `static-analysis` (CodeQL, Semgrep), `differential-review`, `supply-chain-risk-auditor`, `fp-check` (проверка ложных срабатываний);
    - **Анализ вредоносного ПО**: `yara-authoring`;
    - **Верификация**: `constant-time-analysis` (тайминг-атаки в криптографии), `mutation-testing`, `zeroize-audit`;
    - **Реверс-инжиниринг**: `dwarf-expert`;
    - **Мобильная безопасность**: `firebase-apk-scanner`.
    Есть даже "Trophy Case" — список реальных уязвимостей, найденных с помощью этих скиллов (например, тайминг-канал в подписях ML-DSA).

