- repo: 1c-syntax/claude-code-bsl-lsp
  category: code/rules
  description_ru: "Плагин Claude Code, подключающий BSL Language Server как LSP для файлов .bsl и .os — диагностика ошибок, go to definition, автодополнение прямо в сессии."
  badge: editors_choice
  verify_status: known
  body_md: |
    ![](https://opengraph.githubassets.com/1/1c-syntax/claude-code-bsl-lsp)

    ### ❓ Что это
    Плагин **Claude Code**, который подключает **BSL Language Server** как полноценный LSP-сервер для файлов `.bsl` (1С:Предприятие) и `.os` (**OneScript**). Даёт агенту диагностику качества кода, go to definition, find references, hover-подсказки, code actions/quick fixes, навигацию по символам и форматирование — прямо внутри сессии Claude Code.

    ### 🎯 Для чего
    Ставь, если пишешь на **BSL** и хочешь, чтобы Claude Code видел код не как текст, а как язык программирования — с проверкой ошибок и переходами по определениям, а не догадками по grep. Плагин сам следит за обновлениями: на старте каждой сессии проверяет GitHub на новый релиз (не чаще раза в 8 минут) и подтягивает свежий бинарник.

    ### 💻 Как установить
    ```bash
    claude
    /plugin marketplace add 1c-syntax/claude-code-bsl-lsp
    /plugin install bsl-language-server@bsl-language-server
    ```
    Либо вручную — клонировать репозиторий и добавить как локальный marketplace: `git clone https://github.com/1c-syntax/claude-code-bsl-lsp.git`, затем `/plugin marketplace add /path/to/claude-code-bsl-lsp`.

    ### 🚀 Как пользоваться
    ```
    /plugin install bsl-language-server@bsl-language-server
    ```
    После установки LSP работает автоматически на файлах `.bsl` и `.os` — ничего дополнительно вызывать не нужно. Настройки — через `.bsl-language-server.json` в корне проекта.

    ### ⚠️ Грабли
    Если автозагрузка бинарника не сработала, ставь **BSL Language Server** вручную — скачай релиз под свою платформу и положи бинарник в `PATH`. На **Windows** плагин работает через **Git Bash** (по умолчанию) или **PowerShell 6+** как fallback, если bash недоступен.

