- repo: VoidEditor/void
  category: apps/vscode
  description_ru: "Форк VS Code от Void для локальной и приватной генерации кода."
  verify_status: check
  body_md: |
    ### ❓ Что это
    Void — форк VS Code (не расширение, а отдельный редактор) с AI-функциями, встроенными на уровне ядра, с акцентом на возможность использовать локальные модели и приватность (не отправлять код третьим лицам без ведома пользователя).

    ### 🎯 Для чего
    Интересен, если хочется AI-функции уровня Cursor, но как open-source форк без vendor lock-in, с возможностью подключить и облачный Claude, и полностью локальную модель.

    ### 💻 Как установить
    Скачать сборку под свою ОС со страницы релизов репозитория.

    ### 🚀 Как пользоваться
    При первом запуске выбрать провайдера модели (в том числе Anthropic API-ключ) в настройках — далее работает как обычный VS Code с добавленными AI-панелями.

    ### ⚠️ Грабли
    Как форк VS Code, синхронизация с апстримом и совместимость с частью проприетарных расширений Microsoft Marketplace могут отставать или отсутствовать.

- repo: warpdotdev/Warp
  category: apps/editors
  description_ru: "AI-акселерированный терминал с автодополнением команд, объяснением ошибок и встроенным агентным режимом."
  badge: editors_choice
  verify_status: known
  body_md: |
    ### ❓ Что это
    Warp — переосмысленный терминал (Rust) с текстовым редактором ввода, блоками команд, AI-автодополнением и агентным режимом (Warp Agent Mode) для выполнения многошаговых задач в shell на естественном языке.

    ### 🎯 Для чего
    Полезен как альтернатива обычному терминалу для тех, кто хочет объяснение ошибок команд и AI-помощь по shell прямо в интерфейсе терминала, а не в отдельном чате.

    ### 💻 Как установить
    Скачать с официального сайта `warp.dev` (macOS/Linux/Windows).

    ### 🚀 Как пользоваться
    Открыть Warp, ввести запрос на естественном языке в командную строку через `#` или явно вызвать AI-панель — можно выбрать провайдера модели в настройках.

    ### ⚠️ Грабли
    Часть AI-функциональности требует аккаунта Warp и облачной обработки — полностью офлайн-режим доступен не для всех фич.

- repo: sigoden/aichat
  category: apps/editors
  description_ru: "Консольный клиент с богатым TUI, поддерживающий Claude, OpenAI и Ollama одновременно."
  verify_status: known
  body_md: |
    ### ❓ Что это
    `aichat` — CLI/TUI чат-клиент на Rust с поддержкой множества провайдеров (Claude, OpenAI, Gemini, Ollama и др.) в одном инструменте, включая RAG-режим и режим "агента" с функциями.

    ### 🎯 Для чего
    Удобен как единая консольная точка входа для разных моделей — можно быстро переключаться между Claude и локальной моделью через Ollama прямо в терминале без смены инструмента.

    ### 💻 Как установить
    ```bash
    cargo install aichat
    ```

    ### 🚀 Как пользоваться
    ```bash
    aichat --model claude:claude-sonnet-4-5 "вопрос"
    ```
    Интерактивный REPL-режим запускается без аргументов: просто `aichat`.

    ### ⚠️ Грабли
    Конфигурация нескольких провайдеров и ключей хранится в одном YAML-файле (`~/.config/aichat/config.yaml`) — убедитесь, что права на файл ограничены, там лежат все API-ключи разом.

- repo: prompt-toolkit/python-prompt-toolkit
  category: apps/editors
  description_ru: "Библиотека для построения интерактивных консольных приложений с автодополнением — часто фундамент под собственные AI-терминалы."
  verify_status: known
  body_md: |
    ### ❓ Что это
    `prompt_toolkit` — зрелая Python-библиотека для написания интерактивных CLI/REPL интерфейсов: подсветка синтаксиса, автодополнение, многострочный ввод, история команд.

    ### 🎯 Для чего
    Частый выбор как основа для собственного консольного клиента к Claude API — вместо `input()` даёт полноценный REPL с историей и автодополнением почти бесплатно.

    ### 💻 Как установить
    ```bash
    pip install prompt_toolkit
    ```

    ### 🚀 Как пользоваться
    ```python
    from prompt_toolkit import PromptSession
    session = PromptSession()
    text = session.prompt("> ")
    ```

    ### ⚠️ Грабли
    Библиотека низкоуровневая — сама по себе не даёт AI-функциональности, это just building block, вызовы к Claude API нужно писать поверх неё самостоятельно.

- repo: nushell/nushell
  category: apps/editors
  description_ru: "Современный shell со структурированными данными — часто используется как база для AI-автодополнения команд в терминале."
  verify_status: known
  body_md: |
    ### ❓ Что это
    Nushell — shell нового поколения, где вывод команд — структурированные данные (таблицы), а не голый текст, что упрощает программную обработку (в том числе LLM-агентами, парсящими вывод команд).

    ### 🎯 Для чего
    Актуален, если строите собственного терминального агента поверх shell — структурированный вывод Nushell гораздо надёжнее скармливать LLM для интерпретации, чем произвольный текстовый вывод bash.

    ### 💻 Как установить
    ```bash
    brew install nushell
    ```

    ### 🚀 Как пользоваться
    ```bash
    nu
    ls | where size > 1mb
    ```
    Вывод команд можно сериализовать в JSON/CSV нативно для передачи в LLM-пайплайн.

    ### ⚠️ Грабли
    Синтаксис и набор команд заметно отличаются от bash/zsh — существующие shell-скрипты не заработают без переписывания под Nushell.
