    для iOS и Android в официальных сторах, плюс веб-версия для доступа без установки чего-либо на
    телефон. Установка требует CLI-компонента на компьютере, где реально работает Claude Code/Codex
    — мобильное приложение выступает "окном" в эту сессию, а не отдельным независимым агентом.
    Проект открытый, с публичной документацией и Discord-сообществом.

    ### 🎯 Для чего
    Использовать, когда нужно проверить или скорректировать длинную задачу Claude Code, запущенную
    дома или на рабочей машине, не находясь физически за компьютером — например, посмотреть, на каком
    шаге агент, или ответить на уточняющий вопрос прямо с телефона. End-to-end шифрование делает это
    приемлемым даже для рабочих проектов с чувствительным кодом, где просто перекидывать терминал в
    публичный удалённый доступ было бы неприемлемо. Полезно для длинных автономных задач (миграции,
    массовый рефакторинг), которые запускаются и продолжают идти, пока пользователь не у компьютера.

    ### 💻 Как установить
    ```bash
    npm install -g happy
    ```

    ### 🚀 Как пользоваться
    ```bash
    happy claude
    ```

    ### ⚠️ Грабли
    Пакет мигрировал с имени `happy-coder` на `happy` — если в старых инструкциях или блог-постах
    встречается `npm install -g happy-coder`, актуальное имя пакета теперь просто `happy`.

