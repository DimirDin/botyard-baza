    Инструменты объявляются PHP-атрибутами над методами, сервер поднимается как обычный PSR-7 HTTP-хендлер или CLI-процесс для stdio.

    ### ⚠️ Грабли
    Экосистема PHP MCP-серверов пока небольшая — меньше готовых примеров интеграции, чем для TS/Python.

