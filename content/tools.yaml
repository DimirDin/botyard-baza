    ![](https://raw.githubusercontent.com/zylon-ai/private-gpt/main/fern/docs/assets/privategpt_banner.png)

    ### ❓ Что это
    **PrivateGPT** — open-source API-слой, который превращает локальные модели в готовые к продакшену AI-приложения. Сам PrivateGPT модели не запускает: он подключается к любому OpenAI-совместимому серверу инференса (Ollama, llama.cpp, vLLM) через `OPENAI_API_BASE` и добавляет поверх стандартный слой — сообщения, retrieval, инструменты, БД. Проект теперь называется PrivateGPT и разрабатывается компанией **Zylon** — это переименованный и переработанный бывший `imartinez/privateGPT`.

    ### 🎯 Для чего
    Ставь, если хочешь свой локальный аналог Anthropic API поверх открытых моделей — без облачных зависимостей:
    - стандартный Messages API (streaming, async, подсчёт токенов)
    - ingestion файлов и артефактов, retrieval с цитированием (agentic RAG)
    - встроенные tools в духе Claude API: web search, web fetch, code execution
    - кастомные tools и **MCP-коннекторы**
    - структурированный доступ к базам данных и CSV
    - встроенный workbench UI на `/ui` для тестирования

    ### 💻 Как установить
    ```bash
    # macOS
    brew tap zylon-ai/tap
    brew install private-gpt
    ```
    ```bash
    # Linux
    curl -LsSf https://astral.sh/uv/install.sh | sh
    uv tool install --python 3.11 \
      --find-links https://wheels.privategpt.dev/packages/ \
      "private-gpt[core]"
    ```

    ### 🚀 Как пользоваться
    Сначала запусти локальный OpenAI-совместимый сервер (проще всего Ollama):
    ```bash
    ollama pull qwen3.5:35b
    ollama pull mxbai-embed-large
    ollama serve
    ```
    Затем сам PrivateGPT:
    ```bash
    OPENAI_API_BASE=http://localhost:<llm-port>/v1 \
      OPENAI_EMBEDDING_API_BASE=http://localhost:<embedding-port>/v1 \
      private-gpt serve
    ```
    UI откроется на `http://localhost:8080/ui`, API — на `http://localhost:8080`.

    ### ⚠️ Грабли
    По таблице совместимости с Claude API в README часть возможностей пока не поддержана или частична: **prompt caching не поддерживается вовсе (❌)**, OAuth/organizations тоже отсутствуют (❌), а Skills реализованы лишь частично (⚙️). Это открытый слой API, а не готовое enterprise-решение — полноценная инфраструктура (масштабирование, RBAC, аудит) продаётся отдельно под брендом Zylon.

