- repo: apify/mcpc
  category: mcp/clients
  description_ru: "Универсальный терминальный MCP-клиент от Apify: постоянные сессии, stdio/HTTP-транспорт, OAuth 2.1, удобен для отладки своих MCP-серверов."
  verify_status: known
  body_md: |
    ### ❓ Что это
    **mcpc** — CLI-клиент общего назначения для протокола MCP: подключается к любому серверу (stdio или HTTP/SSE), поддерживает постоянные сессии, задачи (tasks) и OAuth 2.1 авторизацию.

    ### 🎯 Для чего
    Удобен для разработки и отладки собственных MCP-серверов — можно вручную вызывать инструменты, смотреть сырые JSON-RPC сообщения и тестировать авторизацию, не поднимая полноценного агента вроде Claude Code.

    ### 💻 Как установить
    ```bash
    npm install -g mcpc
    ```

    ### 🚀 Как пользоваться
    ```bash
