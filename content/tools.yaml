    ![](https://opengraph.githubassets.com/1/github/github-mcp-server)

    ### ❓ Что это
    **GitHub MCP Server** — официальный сервер Model Context Protocol от **GitHub**, соединяющий AI-инструменты напрямую с платформой GitHub. Даёт агентам и чат-ботам возможность читать код и репозитории, управлять issues и pull request'ами, анализировать код и автоматизировать workflow — всё через естественноязыковые запросы.

