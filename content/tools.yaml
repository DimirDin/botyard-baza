    Официальный репозиторий эталонных (reference) реализаций серверов Model Context Protocol от
    команды, которая развивает сам протокол. Его цель — не покрыть все возможные интеграции, а
    показать на небольшом числе примеров, как правильно использовать SDK MCP и какие возможности
    протокола вообще существуют: ресурсы, инструменты, промпты. Сейчас в активном наборе — Everything
    (тестовый сервер со всеми примитивами сразу), Fetch (загрузка веб-страниц для модели), Filesystem
    (безопасные файловые операции с настраиваемыми правами доступа), Git, Memory (память на основе
    графа знаний), Sequential Thinking и Time. Более прикладные серверы вроде PostgreSQL, GitHub,
    Google Drive, Puppeteer и Brave Search были в этом же репозитории, но перенесены в архивный
    servers-archived — команда явно пишет, что это учебные примеры, а не готовые к продакшену решения.
    За актуальным списком серверов сторонних разработчиков официально рекомендуется идти в реестр
    MCP Registry, а не в этот репозиторий. SDK для реализации своих серверов есть под все основные
    языки — от TypeScript и Python до Go, Rust, Swift, Kotlin.

    ### 🎯 Для чего
    Смотреть сюда, когда изучаете, как вообще устроен MCP-сервер изнутри — это самый чистый и
    официальный источник примера кода, без сторонних абстракций поверх протокола. Filesystem-сервер
    из этого репозитория — хороший стартовый MCP для Claude Desktop или Claude Code, если нужен
    контролируемый доступ к локальным файлам без стороннего кода неизвестного происхождения. Полезно
    как референс перед тем, как писать собственный сервер на выбранном SDK — скопировать структуру
    рабочего примера быстрее, чем разбираться в спецификации протокола с нуля. Если нужен готовый
    сервер под конкретный сервис (Postgres, GitHub и т.п.) — это не то место: тот функционал уже
    архивирован здесь и логичнее искать актуальную поддерживаемую реализацию в MCP Registry.

    ### 💻 Как установить
    ```bash
    npx -y @modelcontextprotocol/server-filesystem /path/to/allowed/dir
    ```

    ### 🚀 Как пользоваться
    Добавить сервер в конфиг MCP-клиента (Claude Desktop, Claude Code) и указать, к какой папке
    разрешён доступ — дальше агент читает и пишет файлы только внутри неё.

    ### ⚠️ Грабли
    Серверы из архива (Postgres, GitHub, Google Drive и другие) больше не поддерживаются в этом
    репозитории — README прямо направляет за актуальными версиями в MCP Registry, ставить их отсюда
    по старым ссылкам не стоит.

