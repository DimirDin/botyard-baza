    ![](https://github.com/user-attachments/assets/1d60c2e9-82ed-4ee5-b749-f9e021c85f4d)

    ### ❓ Что это
    Официальный **GitHub Action** от Anthropic, который запускает Claude Code прямо в PR и issues репозитория. Сам определяет режим работы: реагирует на упоминания **@claude**, назначение issue или явные промпты в конфиге автоматизации. Работает на **вашем собственном GitHub runner**, поддерживает Anthropic API (ключ или workload identity federation), **AWS Bedrock**, **Google Vertex AI** и **Microsoft Foundry**.

    ### 🎯 Для чего
    Автоматический код-ревью PR, реализация простых фич и рефакторингов по запросу в комментарии, триаж и разметка issues, синхронизация документации с кодом, security-ориентированные ревью по OWASP, плановые проверки здоровья репозитория по расписанию.

    ### 💻 Как установить
    ```bash
    # В терминале, там где установлен Claude Code
    claude
    /install-github-app
    ```
    Команда проведёт через установку GitHub-приложения и нужных секретов (требуются права администратора репозитория).

    ### 🚀 Как пользоваться
    ```
    Просто упомяните @claude в комментарии к PR или issue —
    и Action ответит на вопрос или внесёт правки в код.
    ```

    ### ⚠️ Грабли
    Для настройки через AWS Bedrock, Google Vertex AI или Microsoft Foundry быстрый способ `/install-github-app` не подходит — нужна ручная настройка (см. `docs/cloud-providers.md`), а сам quickstart доступен только пользователям прямого Anthropic API.

- repo: anthropics/anthropic-sdk-go
  category: libs/go
  description_ru: "Официальный Go SDK для работы с Claude API от Anthropic."
  badge: editors_choice
  verify_status: check
  body_md: |
    ![](https://opengraph.githubassets.com/1/anthropics/anthropic-sdk-go)

    ### ❓ Что это
    Официальная библиотека от **Anthropic** для доступа к **Claude API** из Go-приложений — тонкая типобезопасная обёртка над HTTP API с автогенерируемыми типами запросов и ответов.

    ### 🎯 Для чего
    Когда бэкенд написан на Go и нужно вызывать Claude без самодельного HTTP-клиента: отправка сообщений, стриминг, работа с инструментами (tool use) — всё через официально поддерживаемый SDK.

    ### 💻 Как установить
    ```sh
    go get -u 'github.com/anthropics/anthropic-sdk-go@v1.56.0'
    ```

    ### 🚀 Как пользоваться
    ```go
    client := anthropic.NewClient(
        option.WithAPIKey("my-anthropic-api-key"), // по умолчанию берётся из ANTHROPIC_API_KEY
    )
    message, err := client.Messages.New(context.TODO(), anthropic.MessageNewParams{
        MaxTokens: 1024,
        Messages: []anthropic.MessageParam{
            anthropic.NewUserMessage(anthropic.NewTextBlock("What is a quaternion?")),
        },
        Model: anthropic.ModelClaudeOpus4_6,
    })
    ```

    ### ⚠️ Грабли
    Требуется **Go 1.24+** — на более старых версиях компилятора сборка не пройдёт.

- repo: tmikus/anthropic-sdk-rust
  category: libs/rust
  description_ru: "Неофициальный community Rust SDK для Claude API — типобезопасный, async-first, с поддержкой стриминга и tool use."
  badge:
  verify_status: check
  body_md: |
    ![](https://opengraph.githubassets.com/1/tmikus/anthropic-sdk-rust)

    ### ❓ Что это
    **anthropic_rust** — неофициальный (community) Rust SDK для Claude API от автора **tmikus**: идиоматичный код на типах Rust, async/await поверх tokio, builder-паттерн для запросов.

    ### 🎯 Для чего
    Если проект на Rust и нужен клиент к Claude с поддержкой стриминга ответов, вызова инструментов (tool calling), мультимодальных запросов (изображения/документы) и подсчётом токенов до отправки запроса.

    ### 💻 Как установить
    ```toml
    [dependencies]
    anthropic_rust = "0.1.3"
    tokio = { version = "1.0", features = ["full"] }
    ```

    ### 🚀 Как пользоваться
    ```rust
    let client = Client::new(Model::Claude35Sonnet20241022)?;

    let request = client.chat_builder()
        .user_message(ContentBlock::text("Hello, Claude!"))
        .build();

    let response = client.execute_chat(request).await?;
    ```
    Ключ читается из переменной окружения `ANTHROPIC_API_KEY`, либо задаётся явно через `Client::builder().api_key(...)`.

    ### ⚠️ Грабли
    Это **неофициальный** SDK версии `0.1.3` — в примерах README фигурируют модели `Claude35Sonnet20241022` и `Claude3Opus20240229`, то есть поддержка актуальных моделей может отставать от официальных SDK Anthropic.

- repo: cline/cline
  category: apps/vscode
  description_ru: "Открытый автономный AI-агент для написания и рефакторинга кода — CLI, SDK, VS Code, JetBrains и веб-канбан для параллельных агентов."
  badge: editors_choice
  verify_status: check
  body_md: |
    ![](https://raw.githubusercontent.com/cline/cline/main/assets/icons/icon.png)

    ### ❓ Что это
    **Cline** — open-source coding agent, который живёт сразу в нескольких формах: терминальный **CLI**, **VS Code** и **JetBrains** расширения, веб-**Kanban** для параллельных агентов (свой worktree и авто-коммит на карточку) и **SDK** (`@cline/sdk`) для сборки собственных агентов на том же движке.

    ### 🎯 Для чего
    Правки кода сразу по нескольким файлам с диффами на ревью, выполнение bash-команд с реакцией на вывод в реальном времени (сборки, тесты, деплой), режимы **Plan**/**Act** (сначала план — потом исполнение), командная работа нескольких агентов с координатором, запуск по cron-расписанию, чат с агентом из **Slack**, **Telegram**, **Discord**, **Google Chat**, **WhatsApp** и **Linear**.

    ### 💻 Как установить
    ```bash
    npm i -g cline       # CLI
    npm i -g kanban       # веб-канбан для параллельных агентов
    npm install @cline/sdk  # SDK для своих интеграций
    ```
    VS Code и JetBrains — через соответствующие маркетплейсы.

    ### 🚀 Как пользоваться
    ```bash
    cline --team-name auth-sprint "Plan and implement user authentication with tests"

    cline schedule create "PR summary" \
      --cron "0 9 * * MON-FRI" \
      --prompt "List all open PRs and their review status" \
      --workspace /path/to/repo
    ```
    Правила проекта задаются в файлах `.clinerules` и подхватываются автоматически во всех клиентах.

    ### ⚠️ Грабли
    Работает с любым провайдером моделей (**Anthropic**, **OpenAI**, **Google**, **OpenRouter**, **AWS Bedrock**, **Azure/GCP Vertex**, **Cerebras/Groq**, **Ollama/LM Studio** и другие) — но JetBrains-плагин пока **не открыт как open source**, в отличие от остальных частей монорепо.

