    ### ❓ Что это
    Компактная альтернатива OpenCommit: тот же принцип (diff → LLM → commit-сообщение), но проще устроена и с меньшим числом настроек.

    ### 🎯 Для чего
    Подходит, если нужен максимально простой инструмент без сложной конфигурации провайдеров/промптов — поставил и сразу используешь.

    ### 💻 Как установить
    ```bash
    npm install -g aicommits
    aicommits config set OPENAI_KEY=<ключ>
    ```

    ### 🚀 Как пользоваться
    ```bash
    git add .
    aicommits
    ```

    ### ⚠️ Грабли
    Из коробки заточен под OpenAI-ключ — для работы через Claude потребуется совместимый прокси (например, LiteLLM) вместо прямой интеграции с Anthropic API.

- repo: the-cafe/git-ai-commit
  category: code/hooks
  description_ru: "Git-хук для генерации commit-сообщений, интегрированный в популярный фреймворк pre-commit."
  verify_status: check
  body_md: |
    ### ❓ Что это
    Инструмент для автогенерации commit-сообщений, распространяемый как хук для фреймворка `pre-commit` — ставится в `.pre-commit-config.yaml` вместе с остальными хуками проекта.

    ### 🎯 Для чего
    Удобен, если в проекте уже используется `pre-commit` для линтеров/форматтеров — генерация commit-сообщений подключается тем же механизмом, без отдельной установки CLI.

    ### 💻 Как установить
    Добавить в `.pre-commit-config.yaml`:
    ```yaml
    - repo: https://github.com/the-cafe/git-ai-commit
      hooks:
        - id: git-ai-commit
    ```

    ### 🚀 Как пользоваться
    ```bash
    pre-commit install
    ```
    Дальше хук срабатывает автоматически на `git commit`.

    ### ⚠️ Грабли
    Небольшой проект с ограниченной аудиторией — перед внедрением в командный workflow стоит протестировать на тестовом репозитории, есть ли конфликты с другими pre-commit хуками.

- repo: ulab-uiuc/LLMRouter
  category: code/routers
