    mcpc tools list
    mcpc call my_tool '{"arg":1}'
    ```

    ### ⚠️ Грабли
    Это низкоуровневый отладочный инструмент, а не агент — сам по себе LLM не вызывает, только исполняет команды к MCP-серверу вручную.

- repo: PatrickJS/awesome-cursorrules
  category: code/rules
  description_ru: "Крупнейшая курируемая база `.cursorrules`-файлов и правил для популярных стеков — Next.js, React, Vue, Python, Go и десятки других."
  badge: editors_choice
  verify_status: known
  body_md: |
