# --- Раздел ожидает пополнения из блока A CONTENT_CHECKLIST.md ---
# Дальнейшие записи до целевых ~50 добавляются после присылки твоих ссылок
# (те, которыми ты реально пользовался — приоритет на бейдж editors_choice)
# и обязательного прогона через scripts/sync_content.py + GitHub API перед публикацией.
  body_md: |
    ### ❓ Что это
    **Awesome Claude Code** — курируемый список лучших ресурсов для Claude Code: скиллов, агентов, статус-лайнов, инструментов и плагинов, собранный **hesreallyhim** и сообществом. Список специально перезапущен так, чтобы подсвечивать проекты, не попавшие в прошлую итерацию, — часть "легаси"-ресурсов пока лежит отдельно в `README_ALTERNATIVES` и постепенно мигрирует в новый формат.

    ### 🎯 Для чего
    Когда нужно быстро сориентироваться, что вообще есть в экосистеме Claude Code, список разбит на разделы:
    - Start Here, From Anthropic
    - Documentation, Knowledge & Learning
    - Research & Scientific Inquiry
    - Providers, Runtime & Integration Infrastructure
    - Remote Control, Notifications & Voice I/O
    - Alternative Clients, Status Lines, Design & UI/UX
    - Writing & Prose Quality, Creative Media
    - Infrastructure & DevOps, Security
    - Multi-Agent Orchestration, Memory & Context Persistence
    - Usage & Cost Monitoring, Linting

    ### 💻 Как установить
    Это не библиотека и не CLI — устанавливать нечего, список просто читается на GitHub. Практический способ "поставить к себе" — открыть нужный раздел из оглавления и перейти по ссылке на конкретный проект, у которого уже будет своя команда установки.

    ### 🚀 Как пользоваться
    Идите в оглавление README, находите свою задачу (например, "Status Lines" или "Multi-Agent Orchestration") и смотрите короткие описания проектов в этом разделе — у каждой записи указан автор и ссылка на репозиторий.

    ### ⚠️ Грабли
    Список курируется, но это не значит, что каждый проект проверен на security или сопровождается — авторы сами предупреждают, что часть "легаси"-записей больше не обновляется (они перенесены в `README_ALTERNATIVES` и заморожены). Перед установкой стороннего проекта из списка стоит самостоятельно проверить его README и активность репозитория.

