    ```

    ### 🚀 Как пользоваться
    ```bash
    claude "use @agent-tech-lead-orchestrator and build a user authentication system"
    ```

    ### ⚠️ Грабли
    Сам автор предупреждает: оркестрация нескольких агентов на сложной фиче может съесть 10–50 тысяч
