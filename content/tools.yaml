    ### ❓ Что это
    Официальный CLI-плагин Docker (`docker-mcp`), который питает MCP Toolkit внутри Docker Desktop —
    единый шлюз для запуска и управления MCP-серверами в изолированных контейнерах. Главная боль,
    которую решает проект: без такого шлюза каждый MCP-сервер приходится ставить и настраивать
    отдельно под каждый клиент (VS Code, Cursor, Claude Desktop), включая секреты и переменные
    окружения — Gateway даёт всем клиентам одну и ту же точку подключения с общей конфигурацией.
    Каждый локальный MCP-сервер из каталога запускается в собственном изолированном Docker-контейнере
    с минимальными правами хоста, а не напрямую в системе через npx/uvx с полным доступом. Секреты и
    API-ключи хранятся через встроенный в Docker Desktop менеджер секретов, а не в переменных
    окружения открытым текстом. Поддерживает OAuth-флоу для сервисов, которым нужна токен-
    авторизация, и динамическое обнаружение доступных инструментов на подключённых серверах.

    ### 🎯 Для чего
    Разворачивать, когда используете сразу несколько MCP-серверов и хотите избежать дублирования
    настройки под каждый клиент — Gateway централизует конфигурацию один раз для всех. Изоляция через
    контейнеры особенно важна для серверов с сомнительным происхождением из каталогов вроде awesome-
    mcp-servers — там прямо предупреждают, что несанкционированный сервер может выполнить произвольный
    код с правами хоста, и Docker-изоляция снижает этот риск на практике, а не только на словах.
    Менеджер секретов Docker Desktop полезен, если не хочется хранить API-ключи сервисов (базы данных,
    облачные провайдеры) в конфигах MCP-клиентов в виде обычного текста.

    ### 💻 Как установить
    Требуется Docker Desktop 4.59+ с включённой функцией MCP Toolkit — плагин `docker-mcp`
    устанавливается вместе с ним, отдельно ставить ничего не нужно.

    ### 🚀 Как пользоваться
    ```bash
    docker mcp server list
    docker mcp server enable <server-name>
    ```

    ### ⚠️ Грабли
    Требует конкретную минимальную версию Docker Desktop (4.59+) с включённой фичей MCP Toolkit —
    на более старой версии плагин просто не увидит нужные возможности, обновление Docker Desktop
    обязательно перед использованием.

- repo: southleft/figma-console-mcp
  category: mcp/servers
  description_ru: "MCP-сервер для доступа к консоли и данным Figma прямо из агента."
  badge: null
  verify_status: check
  body_md: |
    ### ❓ Что это
    MCP-сервер, превращающий Figma в API, доступное AI-агенту напрямую — от извлечения переменных,
    компонентов и стилей до создания новых макетов и двусторонней синхронизации токенов дизайна.
    Помимо базового чтения/записи данных сервер умеет забирать скриншоты для визуальной отладки,
