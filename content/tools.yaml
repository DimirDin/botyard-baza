    Официальная Go-реализация протокола MCP от Anthropic: типобезопасные структуры для tools/resources/prompts, транспорт stdio и HTTP/SSE.

    ### 🎯 Для чего
    Выбирайте, если ваш бэкенд/инфраструктура уже на Go — не нужно поднимать отдельный Node/Python-процесс только ради MCP-сервера.

