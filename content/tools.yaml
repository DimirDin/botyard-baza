- repo: jlowin/fastmcp
  category: mcp/frameworks
  description_ru: "Python-фреймворк для быстрой сборки MCP-серверов и клиентов."
  badge: editors_choice
  verify_status: check
  body_md: |
    ### ❓ Что это
    Python-фреймворк для быстрой сборки MCP-серверов и клиентов, ставший фактическим стандартом для
    Python-разработчиков в экосистеме MCP — сейчас проект развивается под крылом Prefect (компании,
    известной своим оркестратором пайплайнов данных), хотя изначально был личным проектом автора.
    Идея FastMCP — превратить обычную Python-функцию в MCP-инструмент одной декорацией: пишете
    def add(a, b) с аннотациями типов и оборачиваете декоратором @mcp.tool — фреймворк сам генерирует
    схему инструмента, которую увидит модель. Берёт на себя весь низкоуровневый протокол MCP —
    сериализацию сообщений, транспорт, обработку ошибок — оставляя разработчику только бизнес-логику.
    Помимо серверной части есть и клиентские возможности — можно писать код, который сам подключается
    к чужим MCP-серверам. Активно поддерживается, попадал в топ трендов GitHub (Trendshift), есть
    отдельный сайт документации gofastmcp.com.

    ### 🎯 Для чего
    Использовать как основной инструмент, если пишете свой MCP-сервер на Python и не хотите
    разбираться с протоколом на низком уровне — большинство типовых серверов из awesome-списков MCP
    написаны именно на FastMCP или его аналогах. Подходит для быстрого прототипирования интеграции
    Claude с внутренним API компании: обернуть существующие Python-функции декоратором быстрее, чем
    писать HTTP-эндпоинты и схему вручную. Клиентская часть пригождается, если нужно программно
    тестировать поведение чужого MCP-сервера или строить свой оркестратор поверх нескольких серверов
    сразу.

    ### 💻 Как установить
    ```bash
    pip install fastmcp
    ```

    ### 🚀 Как пользоваться
    ```python
    from fastmcp import FastMCP

    mcp = FastMCP("Demo 🚀")

    @mcp.tool
    def add(a: int, b: int) -> int:
        """Add two numbers"""
        return a + b
    ```

    ### ⚠️ Грабли
    Проект переехал из-под личного пространства имён автора (jlowin) в организацию PrefectHQ — старые
    ссылки на jlowin/fastmcp работают через редирект GitHub, но актуальная документация и issues стоит
    искать уже в PrefectHQ/fastmcp.

