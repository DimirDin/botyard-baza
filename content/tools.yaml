    Это учебный материал, а не поддерживаемая библиотека — код может требовать адаптации под текущие версии зависимостей и актуальные модели.

- repo: Portkey-AI/gateway
  category: code/routers
  description_ru: "AI-шлюз с кэшированием, ретраями и авто-фоллбэком на резервные модели — единая точка входа к Claude и другим провайдерам."
  badge: editors_choice
  verify_status: known
  body_md: |
    ### ❓ Что это
    Portkey Gateway — open-source AI-шлюз (можно self-host): единый OpenAI-совместимый эндпоинт поверх 100+ провайдеров, с кэшированием ответов, автоматическими ретраями/фоллбэками и балансировкой нагрузки между ключами/моделями.

    ### 🎯 Для чего
    Полезен для продакшн-инфраструктуры: если Claude API временно недоступен или упёрлись в rate limit — шлюз сам переключится на резервного провайдера/ключ без изменения кода приложения.

