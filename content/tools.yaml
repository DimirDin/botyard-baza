    PHP, Ruby, Scala, Kotlin, Swift, Dart, Lua, Haskell, OCaml, Perl, C#, Clojure, Elixir, Erlang и
    другие. Каждый субагент — это выделенный эксперт в своей области, который либо вызывается
    автоматически по контексту задачи, либо явно указывается пользователем. У всех агентов заранее
    подобрана конкретная модель Claude под сложность типовой задачи в этой области — то есть коллекция
    сама решает баланс цена/качество, а не оставляет выбор модели пользователю каждый раз. Формат
    хранения простой: каждый субагент — отдельный Markdown-файл в папке agents/, что упрощает и чтение,
    и кастомизацию под себя.

    ### 🎯 Для чего
    Ставить, когда проект использует сразу несколько языков и хочется, чтобы Claude Code переключался
    на "эксперта" нужного стека автоматически, а не отвечал одним и тем же общим промптом независимо
    от того, Python это или Rust. Полезно как источник для точечного заимствования — если нужен только
    один конкретный язык-эксперт, файл можно скопировать отдельно, не подключая всю коллекцию целиком.
    Предустановленный выбор модели под сложность задачи экономит время на ручной настройке — не нужно
    самому решать, для какой роли достаточно быстрой модели, а для какой нужна более мощная.

    ### 💻 Как установить
    ```bash
    cd ~/.claude
    git clone https://github.com/0xfurai/claude-code-subagents.git agents
    ```

    ### 🚀 Как пользоваться
    ```
    Use the python-expert to optimize this algorithm
    ```

    ### ⚠️ Грабли
    Файлы должны лежать именно в `~/.claude/agents/` — просто скачать репозиторий в произвольную
    папку недостаточно, Claude Code ищет субагентов по фиксированному пути.

