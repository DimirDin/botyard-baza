  verify_status: known
  body_md: |
    ![](https://opengraph.githubassets.com/1/QuantGeekDev/docker-mcp)

    ### ❓ Что это
    **Docker MCP Server** — специализированный сервер протокола Model Context Protocol, который предоставляет Claude прямой доступ к Docker daemon на вашей машине.

    ### 🎯 Для чего
    Позволяет ИИ-агенту управлять локальным окружением Docker: просматривать список запущенных контейнеров, читать логи, перезапускать или останавливать службы, а также инспектировать конфигурацию образов и томов.

    ### 💻 Как установить
    Добавьте в конфигурацию Claude Desktop или Claude Code:
    ```json
    {
      "mcpServers": {
        "docker": {
          "command": "npx",
          "args": ["-y", "@quantgeekdev/docker-mcp"]
        }
      }
    }
    ```

    ### 🚀 Как пользоваться
    ```
    Покажи список запущенных docker-контейнеров и выведи последние 20 строк логов для контейнера с базой данных.
    ```

    ### ⚠️ Грабли
    Требуется запущенный Docker Desktop на хосте. Убедитесь, что у процесса, запускающего MCP-сервер, есть права на чтение сокета `/var/run/docker.sock`.

