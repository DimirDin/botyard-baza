    **AI SDK** — провайдер-агностичный TypeScript-тулкит для сборки AI-приложений и агентов поверх **Next.js, React, Svelte, Vue, Angular** и **Node.js**. По умолчанию работает через **Vercel AI Gateway**, который сразу даёт доступ ко всем крупным провайдерам, включая **Anthropic**, без отдельных ключей.

