    **oterm** — текстовый (TUI) клиент для локальных моделей через Ollama, умеет подключать MCP-серверы как источники инструментов и хранит историю сессий локально.

    ### 🎯 Для чего
    Подходит, если вы гоняете локальные модели (Llama, Qwen и т.п.) и хотите тот же MCP-инструментарий, что и в Claude Code, но без облачного API — полезно для офлайн-экспериментов или экономии токенов.

