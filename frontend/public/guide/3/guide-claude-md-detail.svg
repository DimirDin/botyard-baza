<svg viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a18"/><stop offset="100%" stop-color="#121210"/>
    </linearGradient>
  </defs>
  <rect width="700" height="220" rx="12" fill="url(#bg2)" stroke="#26261f"/>
  <rect x="0" y="0" width="6" height="220" rx="3" fill="#b98af0"/>
  
    <text x="40" y="70" font-family="sans-serif" font-size="14" fill="#F5F3EC">контекст проекта заполняется один раз</text>
    <rect x="40" y="86" width="480" height="26" rx="6" fill="#0f0f0d" stroke="#26261f"/>
